<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gita Kids</title>
  <style>
    html, body { margin: 0; height: 100%; background: #FDF6E3; color: #2D3A87;
      font-family: -apple-system, system-ui, sans-serif; }
    .wrap { height: 100%; display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 24px; box-sizing: border-box; }
    .mark { font-size: 56px; color: #C75B12; line-height: 1; }
    h1 { font-size: 22px; margin: 18px 0 6px; font-weight: 700; }
    p { margin: 0; font-size: 14px; color: #6b6b6b; max-width: 22rem; }
    .spin { margin-top: 22px; width: 26px; height: 26px; border: 3px solid #C4A24E33;
      border-top-color: #C75B12; border-radius: 50%; animation: s 0.9s linear infinite; }
    @keyframes s { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!--
    This shell is only shown as a fallback. At runtime Capacitor loads the live
    site (https://gitakids.com) via server.url, so all content/images stay current.
  -->
  <div class="wrap">
    <div class="mark" aria-hidden="true">&#x0950;</div>
    <h1>Gita Kids</h1>
    <p>Loading the book&hellip; If this screen stays, please check your internet connection.</p>
    <div class="spin" aria-hidden="true"></div>
  </div>
</body>
</html>
