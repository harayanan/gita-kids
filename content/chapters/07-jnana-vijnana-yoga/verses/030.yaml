chapter: 7
verse: 30
speaker: krishna

sanskrit: "साधिभूताधिदैवं मां साधियज्ञं च ये विदुः। प्रयाणकालेऽपि च मां ते विदुर्युक्तचेतसः॥"

transliteration: "sādhibhūtādhidaivaṁ māṁ sādhiyajñaṁ ca ye viduḥ | prayāṇakāle'pi ca māṁ te viduryuktacetasaḥ ||"

