chapter: 7
verse: 9
speaker: krishna

sanskrit: "पुण्यो गन्धः पृथिव्यां च तेजश्चास्मि विभावसौ। जीवनं सर्वभूतेषु तपश्चास्मि तपस्विषु॥"

transliteration: "puṇyo gandhaḥ pṛthivyāṁ ca tejaścāsmi vibhāvasau | jīvanaṁ sarvabhūteṣu tapaścāsmi tapasviṣu ||"

