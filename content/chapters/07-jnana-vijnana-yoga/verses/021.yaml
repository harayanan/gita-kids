chapter: 7
verse: 21
speaker: krishna

sanskrit: "यो यो यां यां तनुं भक्तः श्रद्धयार्चितुमिच्छति। तस्य तस्याचलां श्रद्धां तामेव विदधाम्यहम्॥"

transliteration: "yo yo yāṁ yāṁ tanuṁ bhaktaḥ śraddhayārcitumicchati | tasya tasyācalāṁ śraddhāṁ tāmeva vidadhāmyaham ||"

