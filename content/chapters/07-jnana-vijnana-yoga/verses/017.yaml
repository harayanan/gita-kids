chapter: 7
verse: 17
speaker: krishna

sanskrit: "तेषां ज्ञानी नित्ययुक्त एकभक्तिर्विशिष्यते। प्रियो हि ज्ञानिनोऽत्यर्थमहं स च मम प्रियः॥"

transliteration: "teṣāṁ jñānī nityayukta ekabhaktirviśiṣyate | priyo hi jñānino'tyarthamahaṁ sa ca mama priyaḥ ||"

