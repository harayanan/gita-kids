chapter: 7
verse: 5
speaker: krishna

sanskrit: "अपरेयमितस्त्वन्यां प्रकृतिं विद्धि मे पराम्। जीवभूतां महाबाहो ययेदं धार्यते जगत्॥"

transliteration: "apareyamitastvanyāṁ prakṛtiṁ viddhi me parām | jīvabhūtāṁ mahābāho yayedaṁ dhāryate jagat ||"

