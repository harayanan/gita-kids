chapter: 7
verse: 12
speaker: krishna

sanskrit: "ये चैव सात्त्विका भावा राजसास्तामसाश्च ये। मत्त एवेति तान्विद्धि न त्वहं तेषु ते मयि॥"

transliteration: "ye caiva sāttvikā bhāvā rājasāstāmasāśca ye | matta eveti tānviddhi na tvahaṁ teṣu te mayi ||"

