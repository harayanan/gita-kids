chapter: 7
verse: 10
speaker: krishna

sanskrit: "बीजं मां सर्वभूतानां विद्धि पार्थ सनातनम्। बुद्धिर्बुद्धिमतामस्मि तेजस्तेजस्विनामहम्॥"

transliteration: "bījaṁ māṁ sarvabhūtānāṁ viddhi pārtha sanātanam | buddhirbuddhimatāmasmi tejastejasvināmaham ||"

