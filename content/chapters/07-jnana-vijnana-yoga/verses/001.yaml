chapter: 7
verse: 1
speaker: krishna

sanskrit: "मय्यासक्तमनाः पार्थ योगं युञ्जन्मदाश्रयः। असंशयं समग्रं मां यथा ज्ञास्यसि तच्छृणु॥"

transliteration: "mayyāsaktamanāḥ pārtha yogaṁ yuñjanmadāśrayaḥ | asaṁśayaṁ samagraṁ māṁ yathā jñāsyasi tacchṛṇu ||"

dhatu_breakdown:
  - word: "मयि"
    parts: ["mad (me)", "i (locative)"]
    meaning: "on Me, in Me"
  - word: "आसक्तमनाः"
    parts: ["ā (towards)", "sañj (to cling, to attach)", "manas (mind)"]
    meaning: "with the mind attached, mind fixed"
  - word: "पार्थ"
    parts: ["pṛthā (Kunti)", "a (son of)"]
    meaning: "O son of Pritha, Arjuna"
  - word: "योगम्"
    parts: ["yuj (to yoke, to join)"]
    meaning: "yoga, the discipline of union"
  - word: "युञ्जन्"
    parts: ["yuj (to yoke, to practise)"]
    meaning: "practising, engaging in"
  - word: "मदाश्रयः"
    parts: ["mad (me)", "ā (towards)", "śri (to take shelter, to rest on)"]
    meaning: "taking refuge in Me"
  - word: "असंशयम्"
    parts: ["a (not)", "sam (together)", "śī (to lie, to waver)"]
    meaning: "without doubt, beyond all doubt"
  - word: "समग्रम्"
    parts: ["sam (fully)", "agra (whole, complete)"]
    meaning: "fully, completely, in entirety"
  - word: "माम्"
    parts: ["mad (me)"]
    meaning: "Me"
  - word: "यथा"
    parts: ["yathā (how, in what way)"]
    meaning: "how, in what way"
  - word: "ज्ञास्यसि"
    parts: ["jñā (to know)", "syasi (future, you will)"]
    meaning: "you shall know"
  - word: "तत्"
    parts: ["tad (that)"]
    meaning: "that"
  - word: "शृणु"
    parts: ["śru (to hear, to listen)"]
    meaning: "listen, hear"

meaning: >
  Krishna says: "Arjuna, keep your whole mind resting on Me, hold on to Me as
  your shelter, and keep practising this path of joining your heart to Me. If
  you do that, I will tell you how you can come to know Me completely, with no
  doubt left in you at all. Listen now."

story:
  title: "Listen With Your Whole Self"
  source: "mahabharata"
  body: |
    The two armies had stopped breathing.

    That is how it felt to Arjuna. Eighteen days of war were still ahead, but
    in this one strange pause between Krishna's teachings, the whole field of
    Kurukshetra seemed to hold itself still. The conch shells were silent. The
    elephants stood like grey hills. Far off, a single hawk hung in the white
    sky without moving its wings.

    Arjuna had heard a great deal already. He had heard about duty, and about
    the soul that never dies, and about working without grabbing at rewards. His
    head was full. He thought, in a tired way, that perhaps he had heard enough
    to last a lifetime.

    Then Krishna turned to look at him — really look at him — and Arjuna felt
    the air change.

    "Partha," Krishna said, using the old name, the one that meant son of his
    mother Kunti. "Everything I have told you so far has been like standing at
    the door of a house. Now I am going to take you inside."

    Arjuna sat up straighter on the chariot bench.

    "But you cannot come inside with half a mind," Krishna went on. His voice
    was quiet, the way a teacher's voice goes quiet when the most important thing
    is about to be said. "Let your mind rest on Me, the way a tired bird settles
    onto one branch and stops fluttering. Hold on to Me the way a child crossing
    a flooded river holds the hand of someone who knows the way across. Keep
    joining your heart to Me, again and again, even when it wanders off."

    Arjuna noticed that he had been gripping his bow without knowing it. Slowly,
    he relaxed his fingers.

    "Do that," said Krishna, "and I will show you who I truly am — not a guess,
    not a rumour, not a story you half believe. You will know Me fully, with
    not one doubt left hiding in a corner of your heart."

    The hawk overhead finally tipped its wings and slid sideways across the sky.

    "So now," Krishna finished, and the smallest smile touched his mouth, "do
    not just hear Me with your ears. Hear Me with all of you. Listen."

    And Arjuna, the greatest archer in the world, did the hardest thing he had
    done all day. He let everything else go quiet inside him — and he listened.

reflection: "When someone is telling you something that really matters, what helps you listen with your whole self instead of only half-listening?"
