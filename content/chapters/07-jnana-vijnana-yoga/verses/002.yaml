chapter: 7
verse: 2
speaker: krishna

sanskrit: "ज्ञानं तेऽहं सविज्ञानमिदं वक्ष्याम्यशेषतः। यज्ज्ञात्वा नेह भूयोऽन्यज्ज्ञातव्यमवशिष्यते॥"

transliteration: "jñānaṁ te'haṁ savijñānamidaṁ vakṣyāmyaśeṣataḥ | yajjñātvā neha bhūyo'nyajjñātavyamavaśiṣyate ||"

