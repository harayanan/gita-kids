chapter: 7
verse: 16
speaker: krishna

sanskrit: "चतुर्विधा भजन्ते मां जनाः सुकृतिनोऽर्जुन। आर्तो जिज्ञासुरर्थार्थी ज्ञानी च भरतर्षभ॥"

transliteration: "caturvidhā bhajante māṁ janāḥ sukṛtino'rjuna | ārto jijñāsurarthārthī jñānī ca bharatarṣabha ||"

