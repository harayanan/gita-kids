chapter: 7
verse: 29
speaker: krishna

sanskrit: "जरामरणमोक्षाय मामाश्रित्य यतन्ति ये। ते ब्रह्म तद्विदुः कृत्स्नमध्यात्मं कर्म चाखिलम्॥"

transliteration: "jarāmaraṇamokṣāya māmāśritya yatanti ye | te brahma tadviduḥ kṛtsnamadhyātmaṁ karma cākhilam ||"

