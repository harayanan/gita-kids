chapter: 7
verse: 22
speaker: krishna

sanskrit: "स तया श्रद्धया युक्तस्तस्याराधनमीहते। लभते च ततः कामान्मयैव विहितान्हि तान्॥"

transliteration: "sa tayā śraddhayā yuktastasyārādhanamīhate | labhate ca tataḥ kāmānmayaiva vihitānhi tān ||"

