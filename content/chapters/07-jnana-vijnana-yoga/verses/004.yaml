chapter: 7
verse: 4
speaker: krishna

sanskrit: "भूमिरापोऽनलो वायुः खं मनो बुद्धिरेव च। अहंकार इतीयं मे भिन्ना प्रकृतिरष्टधा॥"

transliteration: "bhūmirāpo'nalo vāyuḥ khaṁ mano buddhireva ca | ahaṁkāra itīyaṁ me bhinnā prakṛtiraṣṭadhā ||"

