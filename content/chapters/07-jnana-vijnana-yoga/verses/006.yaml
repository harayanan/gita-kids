chapter: 7
verse: 6
speaker: krishna

sanskrit: "एतद्योनीनि भूतानि सर्वाणीत्युपधारय। अहं कृत्स्नस्य जगतः प्रभवः प्रलयस्तथा॥"

transliteration: "etadyonīni bhūtāni sarvāṇītyupadhāraya | ahaṁ kṛtsnasya jagataḥ prabhavaḥ pralayastathā ||"

