summary: >
  Krishna reveals something amazing — he is present in everything! He is the
  taste in water, the light in the sun, and the fragrance in the earth. Most
  people don't notice this because the world is like a magic show that keeps
  us distracted. But those who look with love can see the divine everywhere.
