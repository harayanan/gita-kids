name: The Yoga of Divine and Demonic Qualities
sanskrit_name: दैवासुरसम्पद्विभागयोग
transliterated_name: Daivāsura Sampad Vibhāga Yoga
verse_count: 24
folk_art_style: madhubani
summary: >
  Krishna describes two kinds of qualities that live inside every person —
  divine ones and not-so-good ones. Divine qualities are things like courage,
  kindness, honesty, and generosity. The not-so-good ones include anger, pride,
  and cruelty. Krishna encourages us to grow our good qualities like a
  beautiful garden and to gently let go of the weeds.
