chapter: 16
verse: 23
speaker: krishna

sanskrit: "यः शास्त्रविधिमुत्सृज्य वर्तते कामकारतः। न स सिद्धिमवाप्नोति न सुखं न परां गतिम्॥"

transliteration: "yaḥ śāstravidhimutsṛjya vartate kāmakārataḥ | na sa siddhimavāpnoti na sukhaṁ na parāṁ gatim ||"

dhatu_breakdown:
  - word: "यः"
    parts: ["yad (who, which)"]
    meaning: "the one who"
  - word: "शास्त्रविधिम्"
    parts: ["śās (to teach, to instruct)", "tra (instrument of)", "vi (apart)", "dhā (to place, to ordain)"]
    meaning: "the guidance of the teaching, the rule of the scriptures"
  - word: "उत्सृज्य"
    parts: ["ud (up, away)", "sṛj (to release, to cast off)"]
    meaning: "having thrown aside, having cast away"
  - word: "वर्तते"
    parts: ["vṛt (to turn, to act, to behave)"]
    meaning: "acts, behaves, lives"
  - word: "कामकारतः"
    parts: ["kam (to desire)", "kṛ (to do)", "tas (from, by way of)"]
    meaning: "by the impulse of desire, doing whatever one wants"
  - word: "न"
    parts: ["na (not)"]
    meaning: "not"
  - word: "सः"
    parts: ["tad (he, that)"]
    meaning: "he, that person"
  - word: "सिद्धिम्"
    parts: ["sidh (to succeed, to be accomplished)"]
    meaning: "perfection, accomplishment"
  - word: "अवाप्नोति"
    parts: ["ava (down)", "āp (to reach, to attain)"]
    meaning: "attains, gains"
  - word: "सुखम्"
    parts: ["su (good)", "kha (space, ease)"]
    meaning: "happiness, ease"
  - word: "पराम्"
    parts: ["para (highest, supreme)"]
    meaning: "the highest, the supreme"
  - word: "गतिम्"
    parts: ["gam (to go)"]
    meaning: "path, goal, destination"

meaning: >
  Krishna gives a clear warning. If a person throws away the guidance of wise
  teaching and simply does whatever their desire tells them, moment to moment,
  they end up with nothing they were hoping for — not success, not happiness, and
  not the highest goal. Doing only what we feel like in the instant may seem free,
  but it leaves us empty. The wise teachings are not chains. They are the
  hand-rail on a steep path: there to keep us from falling.

story:
  title: "Ravana, Who Knew Better"
  source: "original"
  body: |
    Ravana, the king of Lanka, was no fool. People forget that. He was learned —
    deeply learned. He had studied the scriptures until he could recite them
    backward. He knew, word for word, what the wise teachings said about how a
    good person should live: rule with fairness, take what is yours and not what
    belongs to others, master your desires before they master you.

    Ravana knew all of it. And one day he set all of it aside.

    He had seen Sita, the wife of Rama, and desire rose up in him like a great
    wave. Some quiet voice — the voice of everything he had ever studied —
    whispered, "She is not yours. This is wrong. Turn back." But Ravana had grown
    used to doing whatever he wanted, the instant he wanted it. He pushed the
    voice aside. "I am the mighty king of Lanka," he told himself. "Why should
    rules bind me? I will simply take what I desire."

    So he carried Sita away across the sea, against everything he knew to be right.

    And here is the strange, sad part. Ravana had a golden city. He had power no
    one could match. He had every pleasure a king could imagine. Yet from the
    moment he followed his desire instead of his wisdom, he had no peace at all.
    Sita would not even look at him. His own brother begged him to do the right
    thing and was banished for it. His golden halls filled with worry. The mighty
    king paced his palace at night, restless and afraid, holding everything he
    had ever wanted and enjoying none of it.

    He did not gain success — his great kingdom crumbled. He did not gain
    happiness — he had never been more miserable. And he did not reach any high
    or noble end.

    Krishna told Arjuna of such men so he would understand: knowing the wise
    teaching is not enough. Ravana knew it perfectly and threw it away the one
    time it mattered, and chased his desire instead. The teachings had been a
    hand-rail on a cliff-edge the whole time. Ravana let go of the rail because
    it felt freer to let go. He found out, too late, what waits at the bottom of
    a cliff.

reflection: "Ravana knew the right thing to do but did what he wanted instead, and lost everything. Have you ever known the right choice but felt pulled to do something else? What helped you, or might help you, hold on to the rail?"
