chapter: 16
verse: 11
speaker: krishna

sanskrit: "चिन्तामपरिमेयां च प्रलयान्तामुपाश्रिताः। कामोपभोगपरमा एतावदिति निश्चिताः॥"

transliteration: "cintāmaparimeyāṁ ca pralayāntāmupāśritāḥ | kāmopabhogaparamā etāvaditi niścitāḥ ||"

dhatu_breakdown:
  - word: "चिन्ताम्"
    parts: ["cint (to worry, to brood)"]
    meaning: "worry, anxious care"
  - word: "अपरिमेयाम्"
    parts: ["a (not)", "pari (around, fully)", "mā (to measure)"]
    meaning: "immeasurable, beyond counting"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"
  - word: "प्रलयान्ताम्"
    parts: ["pra (forth)", "lī (to dissolve, to end)", "anta (end)"]
    meaning: "ending only with death, lasting until the very end"
  - word: "उपाश्रिताः"
    parts: ["upa (close)", "ā (towards)", "śri (to lean on, to take to)"]
    meaning: "given over to, leaning their whole weight on"
  - word: "कामोपभोगपरमाः"
    parts: ["kāma (desire)", "upa (towards)", "bhuj (to enjoy)", "parama (highest, supreme)"]
    meaning: "holding the enjoyment of pleasures as the highest thing"
  - word: "एतावत्"
    parts: ["etāvat (this much, only this)"]
    meaning: "this much and no more, only this"
  - word: "इति"
    parts: ["iti (thus, so)"]
    meaning: "thus, in this way"
  - word: "निश्चिताः"
    parts: ["nis (fully)", "ci (to gather, to settle)"]
    meaning: "firmly convinced, having concluded"

meaning: >
  Krishna shows the inner weather of the grasping life: worries beyond counting
  that stop only at death, because the heart has decided that enjoying pleasures
  is the highest aim there is: "this much, and nothing more." When pleasure is
  the only goal, every day brings fresh fear of losing it, and the worries pile up
  with no end in sight. A life built only on getting is a tired, anxious life.

story:
  title: "The King Who Could Not Sleep"
  source: "original"
  body: |
    From the outside, Hiranyakashipu's life looked like one long feast. Music
    in the halls, sweet dishes on golden plates, dancers, gardens, every
    pleasure a person could name. He had decided, long ago, that this was the
    whole point of being alive: to gather pleasures and enjoy them. "This
    much," he told himself, "is everything. There is nothing higher."

    But at night, when the lamps burned low, the king could not sleep.

    For every pleasure he had gathered brought a worry with it. He had gold —
    so he worried about thieves. He had power — so he worried about rivals. He
    had feasts — so he worried they might one day stop. He had enemies he had
    made along the way, and he lay awake counting them in the dark. The
    worries were beyond counting, and not one of them ever left him; they only
    multiplied, year after year, with no end he could see except the end of
    his own life.

    A servant once found him pacing the moonlit terrace before dawn.

    "Maharaja, you have everything. What troubles you?"

    "Everything," the king said. "That is exactly what troubles me. The more I
    have, the more I have to lose."

    He had built his whole life on the belief that enjoying things was the
    highest goal, and so the things now owned him, and the fear of losing
    them never slept.

    "See the price, Arjuna," Krishna said. "When pleasure is set up as the
    only aim, worry comes free with it, endless worry that ends only at death.
    The grasping person is not relaxing on a pile of treasure. He is standing
    guard over it, exhausted, all night long. A heart that wants peace must
    aim at something higher than the next pleasure, or it will never set the
    worry down."

reflection: "Have you ever wanted to keep something so badly that you felt worried about losing it? Does having more things always make us feel calmer — or sometimes more worried?"
