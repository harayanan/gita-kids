chapter: 16
verse: 8
speaker: krishna

sanskrit: "असत्यमप्रतिष्ठं ते जगदाहुरनीश्वरम्। अपरस्परसम्भूतं किमन्यत्कामहैतुकम्॥"

transliteration: "asatyamapratiṣṭhaṁ te jagadāhuranīśvaram | aparasparasambhūtaṁ kimanyatkāmahaitukam ||"

dhatu_breakdown:
  - word: "असत्यम्"
    parts: ["a (not)", "sat (that which truly is)"]
    meaning: "untrue, without truth"
  - word: "अप्रतिष्ठम्"
    parts: ["a (not)", "prati (firmly)", "sthā (to stand)"]
    meaning: "without a firm foundation, standing on nothing"
  - word: "ते"
    parts: ["tad (they, those)"]
    meaning: "they, those people"
  - word: "जगत्"
    parts: ["gam (to go, to move)"]
    meaning: "the world, the moving universe"
  - word: "आहुः"
    parts: ["ah (to say, to declare)"]
    meaning: "they say, they declare"
  - word: "अनीश्वरम्"
    parts: ["an (not)", "īśvara (the Lord, a ruler)"]
    meaning: "without a God, with no guiding Lord"
  - word: "अपरस्परसम्भूतम्"
    parts: ["a (not)", "paras-para (one-another, mutual)", "sam (together)", "bhū (to come into being)"]
    meaning: "born without any orderly cause, thrown together by mere chance"
  - word: "किम्"
    parts: ["kim (what)"]
    meaning: "what"
  - word: "अन्यत्"
    parts: ["anya (other)"]
    meaning: "else, other"
  - word: "कामहैतुकम्"
    parts: ["kāma (desire)", "hetu (cause)", "ka (made of)"]
    meaning: "caused only by desire, brought about by craving alone"

meaning: >
  Krishna describes how the grasping mind sees the whole world. It says: there is
  no truth anywhere, nothing rests on a firm foundation, no kind power watches
  over things, and everything just happened by accident — the only engine of life
  is wanting. "What else could there be," such a mind shrugs, "except getting
  what I crave?" When someone believes the world is meaningless, it becomes easy
  to treat it carelessly.

story:
  title: "Nothing Is Sacred"
  source: "original"
  body: |
    In the city of Lanka, Ravana the ten-headed king walked through his
    garden at dawn, and a gardener bowed before him with cupped hands full
    of jasmine.

    "Maharaja, the first flowers of the season. The temple priests asked if
    they might offer them at sunrise."

    Ravana plucked the jasmine from the man's hands and crushed it idly
    between his fingers. "Offer them to whom?" he said. "There is no one up
    there to receive them. The world is a heap of things, gardener — no
    truth holds it up, no god looks down on it. It all came together by
    accident, like dust blown into a pile. Why pretend it means anything?"

    The gardener did not know what to say.

    "Listen," Ravana went on, and his ten faces all smiled at once. "If
    nothing is sacred, then nothing is forbidden. There is no real right and
    no real wrong — only what I want and what I do not want. That is the only
    truth I believe in: my own desire. Everything else is a story weak people
    tell each other."

    He swept his arm across the garden. "These flowers, this city, those
    stars — they are mine to use however I please, because they belong to no
    one and mean nothing." And believing this, he saw no reason not to take
    whatever caught his eye, no reason to keep a promise, no reason to spare
    anyone. If the world was empty, then kindness was just a waste of time.

    Far away, a small monkey-messenger named Hanuman would one day enter that
    same garden — and he would treat a single blade of grass as something
    worthy of care, because he believed the very opposite: that the world is
    full, full of meaning, watched over, woven through with truth.

    "Notice," Krishna said to Arjuna, "where the selfish view begins. Not
    with a cruel act — with a cruel idea: that nothing matters. Once a person
    decides the world is empty and only wanting is real, every unkind thing
    becomes easy. Guard the idea, and the acts take care of themselves."

reflection: "If you really believed something was precious — a friend, a pet, a place — would you treat it carelessly? How does believing things matter change the way you act?"
