chapter: 16
verse: 14
speaker: krishna

sanskrit: "असौ मया हतः शत्रुर्हनिष्ये चापरानपि। ईश्वरोऽहमहं भोगी सिद्धोऽहं बलवान्सुखी॥"

transliteration: "asau mayā hataḥ śatrurhaniṣye cāparānapi | īśvaro'hamahaṁ bhogī siddho'haṁ balavānsukhī ||"

