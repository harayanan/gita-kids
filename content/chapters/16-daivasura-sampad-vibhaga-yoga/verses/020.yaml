chapter: 16
verse: 20
speaker: krishna

sanskrit: "आसुरीं योनिमापन्ना मूढा जन्मनि जन्मनि। मामप्राप्यैव कौन्तेय ततो यान्त्यधमां गतिम्॥"

transliteration: "āsurīṁ yonimāpannā mūḍhā janmani janmani | māmaprāpyaiva kaunteya tato yāntyadhamāṁ gatim ||"

dhatu_breakdown:
  - word: "आसुरीम्"
    parts: ["asura (a being of the lower, grasping nature)"]
    meaning: "demonic, of the grasping nature"
  - word: "योनिम्"
    parts: ["yoni (womb, source, birth)"]
    meaning: "a birth, a condition of life"
  - word: "आपन्नाः"
    parts: ["ā (towards)", "pad (to fall, to reach)"]
    meaning: "having fallen into, having entered"
  - word: "मूढाः"
    parts: ["muh (to be confused, to be deluded)"]
    meaning: "the confused ones, the deluded"
  - word: "जन्मनि"
    parts: ["jan (to be born)"]
    meaning: "in birth (repeated: life after life)"
  - word: "माम्"
    parts: ["mām (me)"]
    meaning: "Me"
  - word: "अप्राप्य"
    parts: ["a (not)", "pra (forth)", "āp (to reach, to attain)"]
    meaning: "not reaching, never turning toward"
  - word: "एव"
    parts: ["eva (only, indeed)"]
    meaning: "indeed, at all"
  - word: "कौन्तेय"
    parts: ["kuntī (Kunti)", "a (son of)"]
    meaning: "O son of Kunti, Arjuna"
  - word: "ततः"
    parts: ["tatas (from that, then)"]
    meaning: "from there, then"
  - word: "यान्ति"
    parts: ["yā (to go)"]
    meaning: "they go"
  - word: "अधमाम्"
    parts: ["adhama (lowest, basest)"]
    meaning: "to the lowest"
  - word: "गतिम्"
    parts: ["gam (to go)"]
    meaning: "a path, a state, a destination"

meaning: >
  Krishna explains what happens when someone stays stuck in their grasping,
  unkind nature. Confused and forgetful, life after life, they never turn toward
  Him — never toward love, never toward the light inside them — and so they keep
  drifting to lower and harder ways of living. The sadness here is not anger from
  God. It is simply what happens when you keep walking away from the warmth: you
  end up further and further out in the cold. And yet Krishna says "never turning
  toward Me," which means the turning is always possible — the moment you face the
  light again, the whole journey changes.

story:
  title: "The Asura Who Could Not Hear the Bell"
  source: "original"
  body: |
    Long ago, the gentle devas and the grasping asuras both lived under the same
    sky, and at the centre of the world there hung a great golden bell. When the
    bell was rung, its sound carried a single message to anyone who would listen:
    "Come home. You are loved. Turn this way."

    The devas heard the bell each morning and turned toward it, the way a
    sunflower turns to the sun. Their faces softened. Their hands opened. Year
    after year they grew lighter and kinder.

    There was one asura named Vidha who lived close enough to hear the bell too.
    But Vidha was always busy. There was a neighbour to envy, a grudge to polish,
    a treasure to guard, a slight to remember. "Later," he told himself each
    morning when the bell rang. "I will turn toward it later. First I must get
    even. First I must get more."

    And a strange thing happened, so slow he never noticed it. Each time he
    refused to turn, the bell sounded a little fainter to him — not because it
    rang less loudly, but because he had wandered a little further away. His ears
    grew used to ignoring it. His heart grew used to the cold.

    Many lifetimes passed. The devas, who had turned toward the bell again and
    again, lived in a world full of light. Vidha, who had said "later" again and
    again, woke each time in a harder, narrower, darker place, and could barely
    remember that a bell had ever rung at all.

    Krishna told Arjuna this so that he would understand: no one is thrown away.
    The bell never stops ringing. But the longer a person refuses to turn toward
    the light, the harder it becomes to hear — until "later" has quietly cost
    them everything. The only thing Vidha ever needed to do was turn his face,
    one single time, toward the sound that had been calling him home all along.

reflection: "Vidha kept saying 'later' until he could barely hear the bell. Is there something kind or good you keep putting off until 'later'? What would happen if you turned toward it today?"
