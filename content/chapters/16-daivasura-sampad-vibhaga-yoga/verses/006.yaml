chapter: 16
verse: 6
speaker: krishna

sanskrit: "द्वौ भूतसर्गौ लोकेऽस्मिन्दैव आसुर एव च। दैवो विस्तरशः प्रोक्त आसुरं पार्थ मे शृणु॥"

transliteration: "dvau bhūtasargau loke'smindaiva āsura eva ca | daivo vistaraśaḥ prokta āsuraṁ pārtha me śṛṇu ||"

