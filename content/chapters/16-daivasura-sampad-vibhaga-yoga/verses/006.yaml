meaning: >
  Krishna draws the two pictures together. There are two kinds of nature in
  this world, he says: the divine and the demonic. He has already described
  the divine kind in detail — the fearlessness, the kindness, the truth. Now,
  he tells Arjuna, listen and I will describe the demonic kind too, so you can
  recognise it. Knowing both clearly is how a person learns which way to grow.

story:
  title: "Two Branches from One Root"
  source: "Bhagavata Purana tradition"
  body: |
    In the golden palace of Hiranyakashipu there lived, side by side, the two
    natures Krishna spoke of — and you did not have to travel between worlds
    to see them. They sat at the very same table.

    The father, Hiranyakashipu, was the demonic kind. We have seen him:
    swaggering, harsh, quick to rage, blind with pride, demanding to be
    worshipped. The whole palace flinched when he raised his voice.

    But his small son, Prahlada, was the divine kind, and no one could
    understand how. He was born of the same blood, raised in the same gold
    halls, taught by the same fierce teachers. Yet the boy was fearless
    without being cruel, gentle without being weak, honest even when honesty
    was dangerous. He spoke kindly to the servants his father terrified. He
    forgave the teachers who scolded him. When other children boasted, he
    only smiled.

    "How can two such different beings grow from one root?" the courtiers
    whispered.

    A wise old gardener in the palace grounds, hearing them, leaned on his
    spade and said, "It is no mystery. I have two seeds in my pocket right
    now — one will grow into a thornbush, one into a fruit tree. Same soil,
    same rain, same sun. What each becomes is already folded inside it, and
    grows by the choices it leans toward — the thorn toward grabbing, the tree
    toward giving."

    This is exactly what Krishna meant. There are two natures in the world,
    he told Arjuna — the divine, which reaches toward kindness and truth, and
    the demonic, which curls inward toward grabbing and pride. He had painted
    the divine picture fully already. "Now," Krishna said, "listen, and I
    will show you the other clearly too."

    He was not warning Arjuna about monsters in faraway lands. He was teaching
    him to recognise the two branches that grow in every human heart — Prahlada
    and Hiranyakashipu, the giving way and the grabbing way — so that Arjuna
    would always know which one he was choosing to water.

reflection: "The gardener said the thornbush and the fruit tree grow in the same soil. What kinds of small daily choices do you think help the 'giving' branch grow stronger than the 'grabbing' one?"
