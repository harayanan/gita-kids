chapter: 16
verse: 17
speaker: krishna

sanskrit: "आत्मसम्भाविताः स्तब्धा धनमानमदान्विताः। यजन्ते नामयज्ञैस्ते दम्भेनाविधिपूर्वकम्॥"

transliteration: "ātmasambhāvitāḥ stabdhā dhanamānamadānvitāḥ | yajante nāmayajñaiste dambhenāvidhipūrvakam ||"

dhatu_breakdown:
  - word: "आत्मसम्भाविताः"
    parts: ["ātman (self)", "sam (fully)", "bhū (to esteem, to honour)"]
    meaning: "full of self-importance, thinking very highly of themselves"
  - word: "स्तब्धाः"
    parts: ["stambh (to be stiff, rigid)"]
    meaning: "stiff-necked, stubborn, unbending"
  - word: "धनमानमदान्विताः"
    parts: ["dhana (wealth)", "māna (pride, conceit)", "mad (to be intoxicated)", "anu (along with)", "i (to go, to be joined)"]
    meaning: "filled with the pride of wealth and drunk on conceit"
  - word: "यजन्ते"
    parts: ["yaj (to sacrifice, to worship)"]
    meaning: "they perform worship, they sacrifice"
  - word: "नामयज्ञैः"
    parts: ["nāman (name)", "yaj (to sacrifice)"]
    meaning: "with sacrifices in name only, worship that is only for show"
  - word: "ते"
    parts: ["tad (they, those)"]
    meaning: "they, those people"
  - word: "दम्भेन"
    parts: ["dambh (to deceive, to show off)"]
    meaning: "with hypocrisy, for display"
  - word: "अविधिपूर्वकम्"
    parts: ["a (not)", "vi (apart)", "dhā (to place, to ordain)", "pūrvaka (preceded by, in keeping with)"]
    meaning: "not according to the proper rule, against the right way"

meaning: >
  Krishna describes how such proud people even treat sacred things. Stuffed
  with self-importance, stiff and stubborn, dizzy with the pride of being rich,
  they do perform ceremonies and worship — but only for show. The prayers are
  "in name only," done to be seen and admired, not done with care or in the
  right spirit. Krishna is teaching that *how* and *why* we do a good thing
  matters as much as doing it: a gift or a prayer offered only to impress
  others has lost its heart.

story:
  title: "The Sacrifice for Show"
  source: "Puranic tradition"
  body: |
    There was once a wealthy lord named Garvaka — and *garva* means pride — who
    decided to hold the grandest sacrifice the land had ever seen.

    He did not do it to thank the heavens or to share with his people. He did it
    so that everyone for a hundred miles would say, "Have you heard? No one is
    as great, as rich, as generous as Garvaka!"

    He hired the most famous priests, not for their wisdom but for their fame.
    He piled up gold and silk in great heaps where the crowds could gawk at
    them. He stood at the centre of it all with his chin high and his back
    stiff, accepting bows.

    But Garvaka could not be bothered with the careful old rules of the rite. A
    humble priest stepped forward and said gently, "My lord, the offerings must
    be prepared just so, and the words spoken in their proper order, with a calm
    and grateful heart — otherwise it is only a show, not a sacrifice."

    Garvaka waved him away. "Who are you to instruct me? I am the richest man
    here. The rules can bend for me." And so the great fire was lit in a hurry,
    the sacred words mumbled out of order, the whole thing arranged to dazzle
    the eye rather than to honour anything at all.

    The crowds did gasp at the gold. They did praise his name as he hoped. But
    that evening, when the fires died and the visitors went home, Garvaka stood
    alone in the smoke and felt strangely empty — as hollow as a drum, all loud
    surface and nothing within.

    Nearby, in a tiny shrine, an old woman lit a single clay lamp, folded her
    hands, and offered one flower with her whole quiet heart. Her ceremony cost
    almost nothing, and no crowd ever saw it. Yet she walked home full and warm.

    This is what Krishna means, Arjuna. Worship done only to show off, in name
    alone and against the proper way, fills no one — not even the one who
    performs it. It is the heart behind the offering, never the size of it, that
    makes a thing truly sacred.

reflection: "Have you ever done something good mainly so people would notice? How might it feel different to do that same good thing quietly, just because it is right?"
