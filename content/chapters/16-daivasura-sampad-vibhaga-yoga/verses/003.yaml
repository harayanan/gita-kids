chapter: 16
verse: 3
speaker: krishna

sanskrit: "तेजः क्षमा धृतिः शौचमद्रोहो नातिमानिता। भवन्ति सम्पदं दैवीमभिजातस्य भारत॥"

transliteration: "tejaḥ kṣamā dhṛtiḥ śaucamadroho nātimānitā | bhavanti sampadaṁ daivīmabhijātasya bhārata ||"

dhatu_breakdown:
  - word: "तेजः"
    parts: ["tij (to be sharp, to glow)"]
    meaning: "vigour, bright inner energy"
  - word: "क्षमा"
    parts: ["kṣam (to forgive, to endure)"]
    meaning: "forgiveness, patience"
  - word: "धृतिः"
    parts: ["dhṛ (to hold, to bear up)"]
    meaning: "fortitude, steady firmness"
  - word: "शौचम्"
    parts: ["śuc (to be clean, to be pure)"]
    meaning: "cleanliness, purity inside and out"
  - word: "अद्रोहः"
    parts: ["a (not)", "druh (to wish harm, to hate)"]
    meaning: "freedom from hatred, wishing no one harm"
  - word: "न"
    parts: ["na (not)"]
    meaning: "not"
  - word: "अतिमानिता"
    parts: ["ati (too much)", "man (to think, to regard oneself)"]
    meaning: "excessive pride, thinking too highly of oneself"
  - word: "भवन्ति"
    parts: ["bhū (to be, to become)"]
    meaning: "they belong to, they are"
  - word: "सम्पदम्"
    parts: ["sam (fully)", "pad (to attain, to fall to)"]
    meaning: "treasure, wealth of qualities"
  - word: "दैवीम्"
    parts: ["div (to shine, the bright divine)"]
    meaning: "divine, godlike"
  - word: "अभिजातस्य"
    parts: ["abhi (towards)", "jan (to be born)"]
    meaning: "of one born to, of one suited for"
  - word: "भारत"
    parts: ["bharata (Bharata)", "a (descendant of)"]
    meaning: "O descendant of Bharata, Arjuna"

meaning: >
  Krishna finishes the list of the divine treasure: bright inner energy,
  forgiveness, the strength to bear hard things, cleanliness, wishing no one
  harm, and not being puffed up with pride. All these qualities, he tells
  Arjuna, belong to a person who is born to the divine nature. Notice that
  forgiveness sits right beside vigour: forgiving is not weakness; it takes
  more strength than striking back.

story:
  title: "The Harder Strength"
  source: "original"
  body: |
    Ravi came home with a torn kite and a face like a thundercloud.

    "Aman did it," he said, throwing the broken kite on the floor. Moti
    sniffed it and whined. "He cut my string on purpose, then laughed. I'd
    spent all week making that kite, Nani. All week."

    Nani wiped her hands and sat beside him. "And what do you want to do?"

    "I want to break his kite. I want to break two of them. I want everyone
    to laugh at him the way he laughed at me."

    Nani was quiet for a moment, letting the storm blow. Then she said, "You
    could do that. You're quick enough, and angry enough. But let me ask you
    something. Tomorrow morning, when the anger has cooled, which boy would
    you rather be — the one who broke a kite to get even, or the one who was
    big enough not to?"

    Ravi scowled at the floor.

    The next day, Aman came down the lane, scuffing his feet, not quite
    looking at Ravi. He had heard Ravi was furious. He was braced for a
    fight.

    Ravi felt the anger rise again, hot in his chest. He could feel his
    hands wanting to push. But he remembered Nani's question. He took a long
    breath, the way she had taught him, and let the heat pass through and out.

    "That was a mean thing you did," Ravi said, looking Aman straight in the
    eye. His voice was steady, not shaking. "It hurt. But I'm not going to
    wreck your kite back. I'd rather we just fly them together."

    Aman stared, completely thrown. He had expected shoving and shouting.
    Instead he got the truth, spoken plainly, and then a hand held out. His
    face crumpled. "I'm sorry, Ravi. Really. I'll help you mend yours."

    That evening Nani found the two boys on the rooftop, repairing the torn
    kite with paste and bamboo, laughing.

    "You forgave him," she said later, proud. "And you stayed strong while
    you did it — you told him the truth, you didn't pretend it was fine. That
    bright steadiness, that forgiving without crumbling — the old teachers
    called it part of the divine treasure. Anyone can hit back, Ravi. It
    takes the harder strength to forgive."

reflection: "Ravi found that forgiving Aman took more strength than getting even would have. Why do you think it can be harder to forgive someone than to fight back?"
