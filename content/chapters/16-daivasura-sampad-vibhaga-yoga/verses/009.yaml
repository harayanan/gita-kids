chapter: 16
verse: 9
speaker: krishna

sanskrit: "एतां दृष्टिमवष्टभ्य नष्टात्मानोऽल्पबुद्धयः। प्रभवन्त्युग्रकर्माणः क्षयाय जगतोऽहिताः॥"

transliteration: "etāṁ dṛṣṭimavaṣṭabhya naṣṭātmāno'lpabuddhayaḥ | prabhavantyugrakarmāṇaḥ kṣayāya jagato'hitāḥ ||"

dhatu_breakdown:
  - word: "एताम्"
    parts: ["etad (this)"]
    meaning: "this"
  - word: "दृष्टिम्"
    parts: ["dṛś (to see, to view)"]
    meaning: "view, way of seeing things"
  - word: "अवष्टभ्य"
    parts: ["ava (down)", "stabh (to prop up, to cling to)"]
    meaning: "having firmly clung to, holding fast to"
  - word: "नष्टात्मानः"
    parts: ["naś (to be lost, to perish)", "ātman (self, soul)"]
    meaning: "those who have lost their true self, the lost ones"
  - word: "अल्पबुद्धयः"
    parts: ["alpa (small, little)", "budh (to understand)"]
    meaning: "the small-minded, those of little understanding"
  - word: "प्रभवन्ति"
    parts: ["pra (forth)", "bhū (to come, to arise)"]
    meaning: "they come forth, they rise up"
  - word: "उग्रकर्माणः"
    parts: ["ugra (fierce, cruel)", "kṛ (to do, to act)"]
    meaning: "doers of fierce, harsh deeds"
  - word: "क्षयाय"
    parts: ["kṣi (to destroy, to waste away)"]
    meaning: "for the ruin, for the wasting-away"
  - word: "जगतः"
    parts: ["gam (to move, to go)"]
    meaning: "of the world"
  - word: "अहिताः"
    parts: ["a (not)", "hita (good, beneficial)"]
    meaning: "harmful ones, enemies of what is good"

meaning: >
  Holding tightly to that empty view — that nothing is true and only wanting
  matters — these lost, small-minded people rise up as doers of harsh deeds,
  becoming enemies of the world's wellbeing. Krishna shows the chain: a cold idea
  hardens into cold actions. The good news hidden here is that none of it is
  fixed. A "lost" self can be found again the moment it picks up a kinder view.

story:
  title: "The Pillar in the Hall"
  source: "original"
  body: |
    By now Hiranyakashipu had clung so long to one idea — that nothing was
    sacred and only his own will was real — that the idea had hardened into
    everything he did.

    His armies marched out and emptied villages. His tax-collectors took the
    last grain from poor farmers. He had decided he was the only thing that
    mattered, and so the wellbeing of the whole world seemed to him a small,
    silly thing, easy to spend.

    But the strangest harm fell inside his own home.

    His little son Prahlada had grown into a gentle, glowing boy who loved
    everyone and saw goodness woven through all things. To most fathers this
    would be a joy. To Hiranyakashipu it was an insult. The boy's kindness
    was a living argument against the king's whole way of seeing, proof that
    the world was not empty after all.

    "Where is this kindness of yours?" the king roared one evening, his voice
    shaking the hall. "Show me. Is it in this pillar?" And he struck a great
    stone pillar with his fist, as if to prove the world held nothing worth
    believing in.

    Prahlada did not flinch. "It is everywhere, Father," he said softly.
    "Even here. Even in you, if you would let it be."

    The hall went very quiet. For one heartbeat, something flickered across
    the king's face — almost as if a door had cracked open. But he had clung
    to the empty view too long, and he slammed the door shut. His harsh
    deeds had become a habit, and habits, Krishna teaches, are hard to break
    once they have been fed for years.

    "Watch carefully, Arjuna," Krishna said. "The king was not born cruel.
    He arrived there one clung-to idea at a time, until the cruelty came out
    of him on its own. This is why I am showing you the chain link by link,
    so you can see exactly where it could have been broken. And it can always
    be broken. Even a lost self can be found, the moment it lets go of the
    view that lost it."

reflection: "Have you ever noticed a small unkind thought grow into an unkind action? What might happen if you caught the thought early and let it go?"
