chapter: 16
verse: 22
speaker: krishna

sanskrit: "एतैर्विमुक्तः कौन्तेय तमोद्वारैस्त्रिभिर्नरः। आचरत्यात्मनः श्रेयस्ततो याति परां गतिम्॥"

transliteration: "etairvimuktaḥ kaunteya tamodvāraistribhirnaraḥ | ācaratyātmanaḥ śreyastato yāti parāṁ gatim ||"

dhatu_breakdown:
  - word: "एतैः"
    parts: ["etad (this, these)"]
    meaning: "by these, from these"
  - word: "विमुक्तः"
    parts: ["vi (apart, completely)", "muc (to free, to release)"]
    meaning: "completely freed, released"
  - word: "कौन्तेय"
    parts: ["kuntī (Kunti)", "a (son of)"]
    meaning: "O son of Kunti, Arjuna"
