    parts: ["āḍhya (rich, wealthy)"]
    meaning: "rich, wealthy"
  - word: "अभिजनवान्"
    parts: ["abhi (towards)", "jan (to be born)", "vat (having)"]
    meaning: "of noble birth, high-born, well-connected"
  - word: "अस्मि"
    parts: ["as (to be)"]
    meaning: "I am"
  - word: "कः"
