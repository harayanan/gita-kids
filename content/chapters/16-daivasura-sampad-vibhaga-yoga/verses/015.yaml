chapter: 16
verse: 15
speaker: krishna

sanskrit: "आढ्योऽभिजनवानस्मि कोऽन्योऽस्ति सदृशो मया। यक्ष्ये दास्यामि मोदिष्य इत्यज्ञानविमोहिताः॥"

transliteration: "āḍhyo'bhijanavānasmi ko'nyo'sti sadṛśo mayā | yakṣye dāsyāmi modiṣya ityajñānavimohitāḥ ||"

dhatu_breakdown:
