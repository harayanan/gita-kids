  - word: "सदृशः"
    parts: ["sa (together, like)", "dṛś (to see, to resemble)"]
    meaning: "equal to, like, a match for"
  - word: "मया"
    parts: ["mad (I, me)"]
    meaning: "to me, with me"
  - word: "यक्ष्ये"
    parts: ["yaj (to sacrifice, to worship)"]
    meaning: "I shall perform sacrifice"
  - word: "दास्यामि"
    parts: ["dā (to give)"]
    meaning: "I shall give, I shall make gifts"
  - word: "मोदिष्ये"
    parts: ["mud (to rejoice, to be glad)"]
    meaning: "I shall rejoice, I shall make merry"
