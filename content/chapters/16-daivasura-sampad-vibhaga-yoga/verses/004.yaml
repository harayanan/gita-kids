chapter: 16
verse: 4
speaker: krishna

sanskrit: "दम्भो दर्पोऽभिमानश्च क्रोधः पारुष्यमेव च। अज्ञानं चाभिजातस्य पार्थ सम्पदमासुरीम्॥"

transliteration: "dambho darpo'bhimānaśca krodhaḥ pāruṣyameva ca | ajñānaṁ cābhijātasya pārtha sampadamāsurīm ||"

dhatu_breakdown:
  - word: "दम्भः"
    parts: ["dambh (to deceive, to show off)"]
    meaning: "hypocrisy, pretending to be good"
  - word: "दर्पः"
    parts: ["dṛp (to be arrogant, to be wild with pride)"]
    meaning: "arrogance, swagger"
  - word: "अभिमानः"
    parts: ["abhi (towards)", "man (to think of oneself)"]
    meaning: "conceit, an inflated sense of self"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"
  - word: "क्रोधः"
    parts: ["krudh (to be angry)"]
    meaning: "anger"
  - word: "पारुष्यम्"
    parts: ["paruṣa (rough, harsh)"]
    meaning: "harshness, rough speech"
  - word: "एव"
    parts: ["eva (indeed, just)"]
    meaning: "indeed, surely"
  - word: "अज्ञानम्"
    parts: ["a (not)", "jñā (to know)"]
    meaning: "ignorance, not seeing clearly"
  - word: "अभिजातस्य"
    parts: ["abhi (towards)", "jan (to be born)"]
    meaning: "of one born to, belonging to one who has"
  - word: "पार्थ"
    parts: ["pṛthā (Kunti)", "a (son of)"]
    meaning: "O son of Pritha, Arjuna"
  - word: "सम्पदम्"
    parts: ["sam (fully)", "pad (to fall to, to attain)"]
    meaning: "treasure, set of qualities"
  - word: "आसुरीम्"
    parts: ["asura (demon, the unkind one)", "ī (belonging to)"]
    meaning: "demonic, of the harsh and grasping nature"

meaning: >
  Now Krishna names the opposite set — the demonic nature. These are not
  monsters but unkind habits anyone can fall into: showing off and pretending
  to be good, swaggering arrogance, a swollen opinion of oneself, quick anger,
  harsh and rough words, and a cloudy mind that cannot see clearly. Krishna
  calls these the demonic treasure, though it is really a trap. He names them
  so we can recognise them — and choose not to grow them.

story:
  title: "The King Who Wanted to Be Worshipped"
  source: "Bhagavata Purana tradition"
  body: |
    Hiranyakashipu was the mightiest king of his age, and he knew it. His
    palace was carved from gold. His throne sat higher than any other. When
    he walked through his halls, a hundred courtiers bent so low their
    foreheads touched the marble.

    But all that bowing was never enough for him.

    "Who is greater than I?" he would roar, and the frightened courtiers
    would cry, "No one, great king! No one in all the worlds!" He loved to
    hear it. He made them say it again and again. This was his arrogance —
    his swagger that needed an audience.

    He thought himself a god. He ordered the people to worship him and no
    other, and he pretended his harsh rule was for their good. "I protect
    you," he would say grandly, though everyone knew he protected only
    himself. This was his hypocrisy — wearing the mask of a guardian over the
    face of a tyrant.

    When anyone displeased him, his anger came down like a hammer. A servant
    who spilled a cup, a minister who gave honest advice — all met the same
    rough, cutting words, the same flash of rage. The whole palace learned to
    walk softly and speak only what the king wished to hear.

    And here was the strangest thing. For all his gold and power,
    Hiranyakashipu could not see the simplest truth — that the people feared
    him but did not love him, that no amount of forced worship would ever
    fill the hole inside him. His conceit had made him blind. This was his
    ignorance: a mind too full of itself to see clearly.

    His own small son, Prahlada, gentle and unafraid, once said to him,
    "Father, the greatness you chase cannot be grabbed. It grows only in a
    kind heart."

    Hiranyakashipu did not understand the boy at all. How could he? Showing
    off, swagger, conceit, anger, harsh words, and a blind mind — Krishna
    calls these the demonic set. They had grown so tall in the king that they
    had crowded out everything gentle, and left him, for all his thrones,
    poor.

reflection: "Hiranyakashipu had gold and power but felt empty inside. Why do you think showing off and being harsh leave a person feeling poor rather than rich?"
