chapter: 16
verse: 16
speaker: krishna

sanskrit: "अनेकचित्तविभ्रान्ता मोहजालसमावृताः। प्रसक्ताः कामभोगेषु पतन्ति नरकेऽशुचौ॥"

transliteration: "anekacittavibhrāntā mohajālasamāvṛtāḥ | prasaktāḥ kāmabhogeṣu patanti narake'śucau ||"

dhatu_breakdown:
  - word: "अनेकचित्तविभ्रान्ताः"
    parts: ["an (not)", "eka (one)", "cit (to think, to be aware)", "vi (apart)", "bhram (to wander, to whirl)"]
    meaning: "bewildered by many scattered thoughts, their minds pulled in countless directions"
  - word: "मोहजालसमावृताः"
    parts: ["muh (to be deluded)", "jāla (net)", "sam (completely)", "ā (around)", "vṛ (to cover, to enclose)"]
    meaning: "wrapped all around in the net of delusion"
  - word: "प्रसक्ताः"
    parts: ["pra (forth, strongly)", "sañj (to cling, to be attached)"]
    meaning: "clinging fast, deeply attached"
  - word: "कामभोगेषु"
    parts: ["kam (to desire)", "bhuj (to enjoy)"]
    meaning: "in the enjoyments of desire, in chasing pleasures"
  - word: "पतन्ति"
    parts: ["pat (to fall)"]
    meaning: "they fall"
  - word: "नरके"
    parts: ["naraka (a dark, miserable state)"]
    meaning: "into a wretched, unhappy condition"
  - word: "अशुचौ"
    parts: ["a (not)", "śuc (to be clean, pure)"]
    meaning: "foul, unclean, murky"

meaning: >
  When the mind is pulled in a hundred directions at once — wanting this, then
  that, then something else — it loses its way. Krishna says such people get
  tangled up in delusion like a fish caught in a net, clinging tightly to one
  pleasure after another. In the end all that grasping does not bring them joy;
  it drops them into a murky, unhappy place. Not a fiery dungeon — a state of
  the heart, the misery a restless, never-satisfied mind makes for itself.

story:
  title: "The Net That Caught Itself"
  source: "Panchatantra tradition"
  body: |
    In an old teaching tale, there once lived a fisherman's son who set a wide
    net across a sparkling pond, hoping to catch every fish at once.

    Now in that pond swam a clever little fish named Chitra, whose name meant
    "many-coloured," because her thoughts darted everywhere like flashes of
    colour. She could never decide what she wanted. When she saw a crumb of
    bread, she swam for it. Halfway there she saw a shiny pebble and turned for
    that. Then a floating petal caught her eye, then a wriggling worm, then a
    bubble — and she zigzagged across the whole pond, wanting all of it,
    keeping none of it.

    The older fish warned her gently. "Chitra, swim with a calm and single
    mind, and you'll always find the gap in the net. It is restless darting
    that drives a fish straight into the cords."

    But Chitra could not slow her whirling thoughts. *This! No, that! No, the
    other!* She rushed after a glittering lure — and then a brighter one beside
    it — and in chasing both at once she shot sideways into the very middle of
    the net.

    The more she thrashed, the more the cords wrapped around her. The net had
    not chased her; her own scattered wanting had carried her into it. And the
    pond, once wide and bright, suddenly felt small, dim and tangled.

    A wise old turtle who lived among the reeds nosed her free before the
    fisherman's son returned, and he told her something she never forgot.
    "Little one, a mind that wants everything at once weaves a net no one else
    needs to throw. Calm the wanting, and the water opens up again."

    This, Krishna tells Arjuna, is what happens to a heart lost in endless
    craving. Pulled a thousand ways, wrapped in delusion's net, clinging to one
    pleasure after another, it tumbles at last into a murky, joyless place — a
    net it wove for itself, and one that kindness and calm can always unravel.

reflection: "When you want lots of things all at once, does your mind feel calm or jumbled? What helps you settle on just one thing and enjoy it fully?"
