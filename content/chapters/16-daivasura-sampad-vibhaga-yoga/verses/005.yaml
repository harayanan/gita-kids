chapter: 16
verse: 5
speaker: krishna

sanskrit: "दैवी सम्पद्विमोक्षाय निबन्धायासुरी मता। मा शुचः सम्पदं दैवीमभिजातोऽसि पाण्डव॥"

transliteration: "daivī sampadvimokṣāya nibandhāyāsurī matā | mā śucaḥ sampadaṁ daivīmabhijāto'si pāṇḍava ||"

dhatu_breakdown:
  - word: "दैवी"
    parts: ["div (to shine, the bright divine)"]
    meaning: "divine, the godlike kind"
  - word: "सम्पत्"
    parts: ["sam (fully)", "pad (to fall to, to attain)"]
    meaning: "treasure, the wealth of qualities"
  - word: "विमोक्षाय"
    parts: ["vi (apart, away)", "mokṣ (to free, to release)"]
    meaning: "for freedom, for liberation"
  - word: "निबन्धाय"
    parts: ["ni (down)", "bandh (to bind, to tie)"]
    meaning: "for bondage, for being tied down"
  - word: "आसुरी"
    parts: ["asura (demon, the unkind one)", "ī (belonging to)"]
    meaning: "demonic, the harsh and grasping kind"
  - word: "मता"
    parts: ["man (to think, to consider)"]
    meaning: "is considered, is held to be"
  - word: "मा"
    parts: ["mā (do not)"]
    meaning: "do not"
  - word: "शुचः"
    parts: ["śuc (to grieve, to sorrow)"]
    meaning: "grieve, be sorrowful"
  - word: "सम्पदम्"
    parts: ["sam (fully)", "pad (to fall to, to attain)"]
    meaning: "treasure, set of qualities"
  - word: "दैवीम्"
    parts: ["div (to shine, the bright divine)"]
    meaning: "divine, godlike"
  - word: "अभिजातः"
    parts: ["abhi (towards)", "jan (to be born)"]
    meaning: "born to, suited for"
  - word: "असि"
    parts: ["as (to be)"]
    meaning: "you are"
  - word: "पाण्डव"
    parts: ["pāṇḍu (Pandu)", "a (son of)"]
    meaning: "O son of Pandu, Arjuna"

meaning: >
  Krishna sums it up: the divine treasure leads to freedom, and the demonic
  one ties a person down. Then he turns to comfort Arjuna directly: do not
  grieve. You are born to the divine nature. This is one of the kindest lines
  in the whole Gita: Krishna is saying the good seeds are already in you. You
  do not have to become someone else. You only have to keep watering what is
  already there.

story:
  title: "The Seeds Are Already in You"
  source: "original"
  body: |
    After hearing about the demonic qualities — the showing off, the anger,
    the harsh words — Ravi grew very quiet. He sat on the step with Moti's
    head in his lap and would not look up.

    "What is it?" Nani asked, settling beside him.

    "Nani," he said in a small voice, "yesterday I lost my temper at Aman.
    And sometimes I do show off. And once I told a fib so I wouldn't get in
    trouble." His chin trembled. "What if I'm the demonic kind? What if those
    bad seeds are the ones growing in me?"

    Nani did not laugh, and she did not brush it away. She took his hand.

    "Listen to me carefully," she said, "because Krishna said this very thing
    to a worried friend long ago, and it is the most comforting line in the
    whole song." She paused. "Do not grieve. You are born to the divine
    nature."

    Ravi looked up. "But the fibs — the temper —"

    "Every garden has a few weeds, my love. That does not make it a weed
    patch. It makes it a garden with weeds, which you pull as you find them."
    She gestured at her half-painted wall, where a peacock was taking shape
    among unfinished lines. "Do you see this peacock? When I started, it was
    just a few crooked marks. A stranger might have said, 'That is a mess.'
    But I knew the peacock was already there in the lines, waiting. I only had
    to keep going."

    She squeezed his hand. "The kind seeds — the brave one, the honest one,
    the giving one — they are already planted in you. I have watched them
    sprout all summer. The fact that you feel sorry about the temper and the
    fib? That sorrow is itself a divine seed. A hard heart would not
    care at all."

    Ravi felt something loosen in his chest, like a knot coming undone.

    "So I'm not the demonic kind?"

    "You are born to the divine kind," Nani said firmly. "Now stop grieving
    and go water it. Be brave today. Be honest today. That is all freedom
    ever asks."

reflection: "Nani told Ravi that feeling sorry about a mistake is itself a good sign. Why might caring that you did wrong show that the kind seeds are already growing in you?"
