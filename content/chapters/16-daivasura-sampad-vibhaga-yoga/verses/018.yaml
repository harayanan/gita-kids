chapter: 16
verse: 18
speaker: krishna

sanskrit: "अहङ्कारं बलं दर्पं कामं क्रोधं च संश्रिताः। मामात्मपरदेहेषु प्रद्विषन्तोऽभ्यसूयकाः॥"

transliteration: "ahaṅkāraṁ balaṁ darpaṁ kāmaṁ krodhaṁ ca saṁśritāḥ | māmātmaparadeheṣu pradviṣanto'bhyasūyakāḥ ||"

dhatu_breakdown:
  - word: "अहङ्कारम्"
    parts: ["aham (I)", "kṛ (to do, to make)"]
    meaning: "egoism, the 'I-am-everything' feeling"
  - word: "बलम्"
    parts: ["bala (strength, force)"]
    meaning: "force, raw strength used to push others"
  - word: "दर्पम्"
    parts: ["dṛp (to be arrogant, insolent)"]
    meaning: "arrogance, haughtiness"
  - word: "कामम्"
    parts: ["kam (to desire)"]
    meaning: "lust, craving desire"
  - word: "क्रोधम्"
    parts: ["krudh (to be angry)"]
    meaning: "anger"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"
  - word: "संश्रिताः"
    parts: ["sam (fully)", "śri (to lean on, to take refuge in)"]
    meaning: "having taken hold of, clinging to, relying on"
  - word: "माम्"
    parts: ["mad (I, me)"]
    meaning: "Me (the Divine within all)"
  - word: "आत्मपरदेहेषु"
    parts: ["ātman (one's own)", "para (other)", "deha (body)"]
    meaning: "in their own bodies and in the bodies of others"
  - word: "प्रद्विषन्तः"
    parts: ["pra (strongly)", "dviṣ (to hate, to be hostile)"]
    meaning: "resenting, bearing hatred, turning against"
  - word: "अभ्यसूयकाः"
    parts: ["abhi (towards)", "asū (to be jealous, to find fault)"]
    meaning: "envious, fault-finding, grudging"

meaning: >
  Krishna names the load such a heart carries: ego, force, arrogance, craving,
  and anger — clinging to all five at once. And here is the saddest part. Since
  the Divine quietly lives inside every being, a person ruled by these feelings
  ends up resenting that very goodness — in themselves and in everyone around
  them. They grow grudging and fault-finding, unable to bear the light they
  cannot see. Krishna says *Me* here to remind us: hurting others, or scorning
  the good in them, is really turning against the same gentle presence that
  lives in our own heart too.

story:
  title: "The Father Who Could Not Bear the Light"
  source: "Bhagavata Purana"
  body: |
    King Hiranyakashipu had a son unlike himself in every way — small Prahlada,
    whose heart was so full of love for the Divine that it spilled out as
    kindness to everyone he met.

    The boy was gentle with servants. He shared his food with stray creatures.
    When other children quarrelled, Prahlada was the one who made peace. And all
    day, quietly, he remembered the Lord who lives in every heart, and his face
    shone with a calm the whole palace could feel.

    You might think a father would be proud. But Hiranyakashipu's heart was
    crowded — packed tight with ego, with the love of force, with arrogance,
    with greedy wanting, and with a quick, hot anger. There was no room left in
    it for tenderness. And so, strangely, the gentleness of his own little boy
    *annoyed* him.

    "Why do you praise this Lord?" he would roar. "*I* am your lord! Praise me!"
    The more peaceful Prahlada grew, the angrier his father became — for the
    boy's quiet goodness was a light, and Hiranyakashipu had wrapped himself in
    so many heavy feelings that the light hurt his eyes.

    Here is the deep thing the storytellers point to. The same gentle Divine
    that glowed in Prahlada also lived, unnoticed, inside Hiranyakashipu
    himself. By resenting the goodness in his son, the king was really fighting
    the very best part of his own heart — the soft, bright part buried under all
    that ego and anger.

    Prahlada understood this, even as a child. He never hated his father back.
    "He carries something heavy," the boy thought, "and one day he may set it
    down." He kept loving him, the way you keep a lamp burning in a window for
    someone still out in the dark.

    Krishna tells Arjuna that this is what those five heavy feelings do: they
    make a person resent the goodness in others and in themselves. And the way
    out is not anger in return, but the steady, patient kindness of a Prahlada —
    a light left burning, in case the lost one turns toward home.

reflection: "Has someone's kindness or calm ever annoyed you when you were in a bad mood? What do you think your heart really needed in that moment?"
