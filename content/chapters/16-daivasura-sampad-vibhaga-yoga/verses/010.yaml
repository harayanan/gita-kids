chapter: 16
verse: 10
speaker: krishna

sanskrit: "काममाश्रित्य दुष्पूरं दम्भमानमदान्विताः। मोहाद्गृहीत्वासद्ग्राहान्प्रवर्तन्तेऽशुचिव्रताः॥"

transliteration: "kāmamāśritya duṣpūraṁ dambhamānamadānvitāḥ | mohādgṛhītvāsadgrāhānpravartante'śucivratāḥ ||"

dhatu_breakdown:
  - word: "कामम्"
    parts: ["kam (to wish, to crave)"]
    meaning: "desire, craving"
  - word: "आश्रित्य"
    parts: ["ā (towards)", "śri (to take shelter in, to lean on)"]
    meaning: "having taken shelter in, leaning on"
  - word: "दुष्पूरम्"
    parts: ["duṣ (hard, difficult)", "pṝ (to fill)"]
    meaning: "hard-to-fill, never satisfied"
  - word: "दम्भमानमदान्विताः"
    parts: ["dambha (show, pretending)", "māna (pride)", "mada (intoxication, conceit)", "anu (along with)", "i (to be joined)"]
    meaning: "filled with showing-off, pride, and conceit"
  - word: "मोहात्"
    parts: ["muh (to be confused, to be deluded)"]
    meaning: "out of delusion, from a confused mind"
  - word: "गृहीत्वा"
    parts: ["grah (to grasp, to seize)"]
    meaning: "having seized, having taken up"
  - word: "असद्ग्राहान्"
    parts: ["a (not)", "sat (true, good)", "grah (to grasp)"]
    meaning: "false aims, untrue ideas they hold onto"
  - word: "प्रवर्तन्ते"
    parts: ["pra (forth)", "vṛt (to turn, to act)"]
    meaning: "they set to work, they act"
  - word: "अशुचिव्रताः"
    parts: ["a (not)", "śuc (to be pure)", "vrat (to vow, a resolve)"]
    meaning: "those whose vows and resolves are impure"

meaning: >
  Krishna names what fills the grasping heart: a desire that can never be filled,
  no matter how much it gets, along with showing-off, pride, and a kind of
  conceited drunkenness. Confused inside, such people grab onto false ideas and
  then act on impure plans. The picture is of a cup with a hole in it: pour in
  as much as you like, it is never full. The cure is not more pouring; it is
  mending the cup.

story:
  title: "The Cup That Could Not Be Filled"
  source: "original"
  body: |
    Ravana already ruled the richest city in the world. His palace roofs were
    plated with gold; his storehouses overflowed; ten crowns sat upon his ten
    heads. By any measure, he had enough.

    And yet every morning he woke wanting more.

    "Bring me the treasures of the river-king," he ordered. They were brought.
    By evening they bored him. "Bring me the gardens of the gods." They were
    seized. By morning he wanted something else. His want was a cup with a
    crack in the bottom: pour in a kingdom, and it drained away by dusk,
    leaving him as thirsty as before.

    To hide the emptiness, he filled his days with show. He held grand
    parades so the world would admire him. He boasted in every hall — of his
    strength, his cleverness, his ten clever heads — and the boasting was a
    kind of drunkenness; it made him dizzy and pleased with himself, and then
    it wore off and he needed more.

    One night his old, wise brother Vibhishana sat beside him. "Brother," he
    said gently, "you have everything. Why are you never at peace?"

    Ravana could not answer, because he had grabbed onto a false idea long
    ago and never let it go: the idea that the next thing — the next treasure,
    the next victory, the next bit of praise — would finally be the one that
    filled him up. So he kept reaching, and every reach was built on that
    crooked plan, and every plan led him to take what was not his.

    "Do you see the trap, Arjuna?" Krishna said. "His misery did not come
    from having too little. It came from a want that nothing could fill, and
    from the proud show he used to cover it. A person like this works hard,
    very hard. But his resolves are tangled, and they carry him further from
    peace with every step. The way out is not to grab more. It is to mend the
    cup: to want less, and to be honest about the emptiness instead of
    decorating it."

reflection: "Have you ever really wanted a new toy or treat, gotten it, and then wanted something else almost right away? What do you think actually fills the 'cup' inside us?"
