chapter: 16
verse: 12
speaker: krishna

sanskrit: "आशापाशशतैर्बद्धाः कामक्रोधपरायणाः। ईहन्ते कामभोगार्थमन्यायेनार्थसञ्चयान्॥"

transliteration: "āśāpāśaśatairbaddhāḥ kāmakrodhaparāyaṇāḥ | īhante kāmabhogārthamanyāyenārthasañcayān ||"

dhatu_breakdown:
  - word: "आशापाशशतैः"
    parts: ["āśā (hope, longing)", "pāśa (cord, noose)", "śata (hundred)"]
    meaning: "by a hundred cords of hope and longing"
  - word: "बद्धाः"
    parts: ["bandh (to bind, to tie)"]
    meaning: "bound, tied up"
  - word: "कामक्रोधपरायणाः"
    parts: ["kāma (desire)", "krodha (anger)", "para (highest)", "ayana (refuge, resort)"]
    meaning: "given over to desire and anger, taking them as their refuge"
  - word: "ईहन्ते"
    parts: ["īh (to strive, to try hard)"]
    meaning: "they strive, they keep trying"
  - word: "कामभोगार्थम्"
    parts: ["kāma (desire)", "bhuj (to enjoy)", "artha (purpose, for the sake of)"]
    meaning: "for the sake of enjoying their cravings"
  - word: "अन्यायेन"
    parts: ["a (not)", "ni (down)", "i (to go, to lead)"]
    meaning: "by unfair means, through wrong ways"
  - word: "अर्थसञ्चयान्"
    parts: ["artha (wealth, riches)", "sam (together)", "ci (to gather, to heap)"]
    meaning: "heaps of wealth, gathered hoards"

meaning: >
  Krishna draws the last knot in the picture: tied up by a hundred cords of
  longing, and taking desire and anger as the masters they obey, such people
  strain to pile up wealth by unfair means, only to feed their cravings. The image
  is of someone caught in many ropes of "I hope, I hope, I hope" — and the more
  they grab to feel free, the tighter the ropes pull. Freedom comes from cutting
  the cords, not from gathering more.

story:
  title: "A Hundred Ropes of Hope"
  source: "original"
  body: |
    Ravana wanted one thing more than anything: to carry off Sita, the wife
    of Rama, and keep her in his garden in Lanka. It was an unfair wish, a
    wrong wish, and a wise person would have let it go. But Ravana could no
    longer let anything go.

    For years his longings had been tying themselves around him, one by one,
    like ropes. I hope to be the strongest. I hope to be the richest. I hope
    no one ever says no to me. I hope to have whatever I see. A hundred such
    ropes of hope were knotted around the ten-headed king, and though he
    thought himself the freest being alive, he was the most tightly bound.

    Two masters ruled him now: his craving, which whispered take it, and his
    anger, which roared at anyone who stood in the way. He obeyed them both
    like a servant obeys a king.

    So he schemed. To get what he craved, he used a trick — a golden deer to
    lure Rama away, a disguise to fool the kind and trusting Sita. He gathered
    his armies and his gold and his clever plans, all bent toward one unfair
    end. Every treasure he heaped up was heaped for the same reason: to feed
    the craving that never stopped asking.

    His brother Vibhishana begged him: "Return Sita. Cut the rope. You will
    be free, and Lanka will be safe."

    But Ravana could not imagine letting go. He had spent his whole life
    pulling, and he did not know how to open his hands.

    "Here is the picture complete, Arjuna," Krishna said. "A hundred ropes of
    hope, two harsh masters — wanting and anger — and a life spent grabbing by
    crooked means for things that never satisfy. It looks like power. It is
    really bondage. And the way out is the simplest and the hardest thing in
    the world: to open the hands, and let the ropes fall."

reflection: "Have you ever wanted something so much that you couldn't stop thinking about it? What do you think it feels like to gently let a too-big want go?"
