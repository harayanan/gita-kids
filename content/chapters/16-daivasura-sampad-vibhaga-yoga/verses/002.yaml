chapter: 16
verse: 2
speaker: krishna

sanskrit: "अहिंसा सत्यमक्रोधस्त्यागः शान्तिरपैशुनम्। दया भूतेष्वलोलुप्त्वं मार्दवं ह्रीरचापलम्॥"

transliteration: "ahiṁsā satyamakrodhastyāgaḥ śāntirapaiśunam | dayā bhūteṣvaloluptvaṁ mārdavaṁ hrīracāpalam ||"

dhatu_breakdown:
  - word: "अहिंसा"
    parts: ["a (not)", "hiṁs (to harm, to injure)"]
    meaning: "non-violence, not hurting any living thing"
  - word: "सत्यम्"
    parts: ["sat (that which is, real)"]
    meaning: "truth, truthfulness"
  - word: "अक्रोधः"
    parts: ["a (not)", "krudh (to be angry)"]
    meaning: "freedom from anger"
  - word: "त्यागः"
    parts: ["tyaj (to let go, to give up)"]
    meaning: "letting go, renunciation of selfishness"
  - word: "शान्तिः"
    parts: ["śam (to be calm, to be at peace)"]
    meaning: "peace, inner calm"
  - word: "अपैशुनम्"
    parts: ["a (not)", "piśuna (slander, fault-finding)"]
    meaning: "not speaking ill of others, no backbiting"
  - word: "दया"
    parts: ["day (to feel pity, to be kind)"]
    meaning: "compassion, kindness"
  - word: "भूतेषु"
    parts: ["bhū (to be, to exist)"]
    meaning: "towards all living beings"
  - word: "अलोलुप्त्वम्"
    parts: ["a (not)", "lup (to crave, to grab greedily)"]
    meaning: "freedom from greed and grasping"
  - word: "मार्दवम्"
    parts: ["mṛdu (soft, gentle)"]
    meaning: "gentleness, a soft manner"
  - word: "ह्रीः"
    parts: ["hrī (to feel modest shame)"]
    meaning: "modesty, a healthy sense of shame at wrongdoing"
  - word: "अचापलम्"
    parts: ["a (not)", "capala (restless, fickle)"]
    meaning: "steadiness, freedom from fidgeting and fickleness"

meaning: >
  Krishna continues the list of the divine treasure. The good heart practises
  not hurting any creature, speaking the truth, never flaring into anger,
  letting go of selfish wanting, staying at peace, refusing to gossip or pick
  at others' faults, feeling kindness toward every living being, not grabbing
  for things, being gentle in manner, feeling honest shame at doing wrong, and
  staying steady instead of restless. Each of these is a quiet strength, not a
  weakness.

story:
  title: "The Sage Who Would Not Curse"
  source: "Mahabharata tradition"
  body: |
    Deep in the forest, where the river slid cool over smooth stones, there
    lived a sage whom the animals trusted. Deer ate from his hand. Birds
    built nests in the thatch of his hut. Even a tiger, they said, would lie
    in his shade and harm nothing.

    One hot afternoon a proud young prince came riding through, chasing a
    wounded deer. The deer fled straight into the sage's clearing and hid,
    trembling, behind his knee.

    The prince thundered up on his horse. "Old man! A deer ran this way. Tell
    me where it went."

    The sage looked at the frightened animal pressed against him, then at the
    arrow in the prince's hand. He would not point to the deer, for that
    would mean harm. And he would not lie, for that would mean falsehood. So
    he said gently, "Prince, the eyes that saw it cannot speak, and the
    tongue that could speak did not see."

    The prince did not understand the riddle, and his face went red with
    anger. "Do you mock me? I am the son of a king! One word from me and my
    soldiers will burn your hut to the ground."

    Now, this sage had power. With a single curse he could have turned the
    boy to ash, the way other sages in old stories did. The deer waited. The
    forest held its breath.

    But the sage only folded his hands. No anger rose in his eyes — only a
    deep, level calm. "Child," he said softly, "you are tired and thirsty,
    and you have ridden far. Sit. Drink. The deer has done you no wrong, and
    neither have I. Let go of the chase, and let your heart be quiet."

    Something in that gentle voice reached the prince. He had expected a
    curse and met only kindness. He climbed down, drank the cool water the
    sage offered, and felt his anger drain away like heat leaving a stone at
    dusk. He looked at the deer, ashamed, and lowered his bow.

    "I will not hunt here again," he said quietly.

    The sage smiled. He had used no weapon, no curse, no harsh word. Only
    non-violence, truth, calm, and gentleness — the soft strengths Krishna
    calls the divine treasure. And they had turned a hunter into a friend.

reflection: "The sage stopped the prince with gentleness instead of anger or a curse. When has being calm and kind worked better than shouting back?"
