chapter: 16
verse: 19
speaker: krishna

sanskrit: "तानहं द्विषतः क्रूरान्संसारेषु नराधमान्। क्षिपाम्यजस्रमशुभानासुरीष्वेव योनिषु॥"

transliteration: "tānahaṁ dviṣataḥ krūrānsaṁsāreṣu narādhamān | kṣipāmyajasramaśubhānāsurīṣveva yoniṣu ||"

dhatu_breakdown:
  - word: "तान्"
    parts: ["tad (those)"]
    meaning: "those people"
  - word: "अहम्"
    parts: ["aham (I)"]
    meaning: "I"
  - word: "द्विषतः"
    parts: ["dviṣ (to hate)"]
    meaning: "the hateful ones, those full of hate"
  - word: "क्रूरान्"
    parts: ["krūra (cruel, harsh)"]
    meaning: "the cruel ones"
  - word: "संसारेषु"
    parts: ["sam (together)", "sṛ (to flow, to move)"]
    meaning: "in the cycles of birth and rebirth"
  - word: "नराधमान्"
    parts: ["nara (person, human)", "adhama (lowest, basest)"]
    meaning: "the lowest of people"
  - word: "क्षिपामि"
    parts: ["kṣip (to throw, to cast)"]
    meaning: "I cast, I throw"
  - word: "अजस्रम्"
    parts: ["a (not)", "jas (to be exhausted, to cease)"]
    meaning: "again and again, without ceasing"
  - word: "अशुभान्"
    parts: ["a (not)", "śubha (good, lovely, lucky)"]
    meaning: "the unkind ones, those without goodness"
  - word: "आसुरीषु"
    parts: ["asura (a being of the lower, grasping nature)"]
    meaning: "into demonic, grasping conditions"
  - word: "एव"
    parts: ["eva (only, indeed)"]
    meaning: "only, indeed"
  - word: "योनिषु"
    parts: ["yoni (womb, source, birth)"]
    meaning: "into births, into conditions of life"

meaning: >
  Krishna speaks plainly about the saddest path a person can take. When someone
  fills their heart with hate and cruelty and keeps choosing the unkind way, they
  keep being reborn, again and again, into harsh and lightless conditions — the
  kind of life their own grasping nature has shaped. This is not a punishment from
  outside. It is what hatred and cruelty grow into when they are watered every day.
  Krishna is warning us, the way a loving grandparent warns, so that we choose a
  gentler road.

story:
  title: "The Door Prahlada Would Not Walk Through"
  source: "original"
  body: |
    In the great stone palace of King Hiranyakashipu, every wall told the same
    story: I am the strongest, I am the greatest, bow to me. The king had grown
    his pride so tall that he could no longer see the sky beyond it.

    His little son Prahlada lived in that same palace, and the king tried, day
    after day, to pour his own hardness into the boy. "Hate those who do not
    obey us," the king taught. "Crush those who are weaker. Take whatever you
    want. That is what makes a person great."

    Prahlada listened, and Prahlada quietly chose another way.

    When a servant dropped a tray, Prahlada helped pick it up instead of
    scolding. When the palace dogs were hungry, he shared his own bread. When the
    king's soldiers spoke cruelly to the gardeners, Prahlada learned their names
    and thanked them for the flowers.

    His father raged. "Why are you so soft? Hate makes you strong!"

    But Prahlada had noticed something his powerful father could not see. The
    king never rested. Every night he lay awake, certain that someone was
    plotting against him. Every gift made him suspicious. Every friend looked
    like an enemy in waiting. The more he hated, the smaller and darker his
    world became, until the whole palace felt like a locked room with no windows.

    "Father," Prahlada said gently one evening, "you have everything, and you
    are not happy. I have only my small kindnesses, and my heart is light. Which
    of us is truly rich?"

    Krishna, telling this to Arjuna, said: the cruel and hateful ones build their
    own dark rooms, birth after birth, and keep waking up inside them. Not because
    anyone shut them in — but because hatred, fed long enough, becomes the only
    house it knows how to build. There stood a door out of that darkness, the
    same door Prahlada walked through every day. It was open the whole time. Its
    name was kindness.

reflection: "King Hiranyakashipu had power but no peace, while Prahlada had a light heart. When have you noticed that being kind made you feel better inside than being harsh ever could?"
