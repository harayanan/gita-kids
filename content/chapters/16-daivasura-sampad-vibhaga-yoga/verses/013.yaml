chapter: 16
verse: 13
speaker: krishna

sanskrit: "इदमद्य मया लब्धमिमं प्राप्स्ये मनोरथम्। इदमस्तीदमपि मे भविष्यति पुनर्धनम्॥"

transliteration: "idamadya mayā labdhamimaṁ prāpsye manoratham | idamastīdamapi me bhaviṣyati punardhanam ||"

