chapter: 16
verse: 24
speaker: krishna

sanskrit: "तस्माच्छास्त्रं प्रमाणं ते कार्याकार्यव्यवस्थितौ। ज्ञात्वा शास्त्रविधानोक्तं कर्म कर्तुमिहार्हसि॥"

transliteration: "tasmācchāstraṁ pramāṇaṁ te kāryākāryavyavasthitau | jñātvā śāstravidhānoktaṁ karma kartumihārhasi ||"

