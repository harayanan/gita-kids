chapter: 12
verse: 15
speaker: krishna

sanskrit: "यस्मान्नोद्विजते लोको लोकान्नोद्विजते च यः। हर्षामर्षभयोद्वेगैर्मुक्तो यः स च मे प्रियः॥"

transliteration: "yasmānna udvijate loko lokānna udvijate ca yaḥ | harṣāmarṣabhayodvegairmukto yaḥ sa ca me priyaḥ ||"

