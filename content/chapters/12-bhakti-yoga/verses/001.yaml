chapter: 12
verse: 1
speaker: arjuna

sanskrit: "एवं सततयुक्ता ये भक्तास्त्वां पर्युपासते। ये चाप्यक्षरमव्यक्तं तेषां के योगवित्तमाः॥"

transliteration: "evaṁ satatayuktā ye bhaktāstvāṁ paryupāsate | ye cāpyakṣaramavyaktaṁ teṣāṁ ke yogavittamāḥ ||"

