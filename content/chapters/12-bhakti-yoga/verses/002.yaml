chapter: 12
verse: 2
speaker: krishna

sanskrit: "मय्यावेश्य मनो ये मां नित्ययुक्ता उपासते। श्रद्धया परयोपेतास्ते मे युक्ततमा मताः॥"

transliteration: "mayyāveśya mano ye māṁ nityayuktā upāsate | śraddhayā parayopetāste me yuktatamā matāḥ ||"

