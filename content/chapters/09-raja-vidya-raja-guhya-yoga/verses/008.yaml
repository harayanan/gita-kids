chapter: 9
verse: 8
speaker: krishna

sanskrit: "प्रकृतिं स्वामवष्टभ्य विसृजामि पुनः पुनः। भूतग्राममिमं कृत्स्नमवशं प्रकृतेर्वशात्॥"

transliteration: "prakṛtiṁ svāmavaṣṭabhya visṛjāmi punaḥ punaḥ | bhūtagrāmamimaṁ kṛtsnamavaśaṁ prakṛtervaśāt ||"

