chapter: 9
verse: 34
speaker: krishna

sanskrit: "मन्मना भव मद्भक्तो मद्याजी मां नमस्कुरु। मामेवैष्यसि युक्त्वैवमात्मानं मत्परायणः॥"

transliteration: "manmanā bhava madbhakto madyājī māṁ namaskuru | māmevaiṣyasi yuktvaivamātmānaṁ matparāyaṇaḥ ||"

