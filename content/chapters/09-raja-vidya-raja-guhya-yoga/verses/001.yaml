chapter: 9
verse: 1
speaker: krishna

sanskrit: "श्रीभगवानुवाच। इदं तु ते गुह्यतमं प्रवक्ष्याम्यनसूयवे। ज्ञानं विज्ञानसहितं यज्ज्ञात्वा मोक्ष्यसेऽशुभात्॥"

transliteration: "śrībhagavānuvāca | idaṁ tu te guhyatamaṁ pravakṣyāmyanasūyave | jñānaṁ vijñānasahitaṁ yajjñātvā mokṣyase'śubhāt ||"

