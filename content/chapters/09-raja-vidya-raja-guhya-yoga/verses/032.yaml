chapter: 9
verse: 32
speaker: krishna

sanskrit: "मां हि पार्थ व्यपाश्रित्य येऽपि स्युः पापयोनयः। स्त्रियो वैश्यास्तथा शूद्रास्तेऽपि यान्ति परां गतिम्॥"

transliteration: "māṁ hi pārtha vyapāśritya ye'pi syuḥ pāpayonayaḥ | striyo vaiśyāstathā śūdrāste'pi yānti parāṁ gatim ||"

