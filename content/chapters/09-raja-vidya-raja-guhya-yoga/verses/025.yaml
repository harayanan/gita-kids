chapter: 9
verse: 25
speaker: krishna

sanskrit: "यान्ति देवव्रता देवान्पितॄन्यान्ति पितृव्रताः। भूतानि यान्ति भूतेज्या यान्ति मद्याजिनोऽपि माम्॥"

transliteration: "yānti devavratā devānpitṝnyānti pitṛvratāḥ | bhūtāni yānti bhūtejyā yānti madyājino'pi mām ||"

