chapter: 9
verse: 5
speaker: krishna

sanskrit: "न च मत्स्थानि भूतानि पश्य मे योगमैश्वरम्। भूतभृन्न च भूतस्थो ममात्मा भूतभावनः॥"

transliteration: "na ca matsthāni bhūtāni paśya me yogamaiśvaram | bhūtabhṛnna ca bhūtastho mamātmā bhūtabhāvanaḥ ||"

