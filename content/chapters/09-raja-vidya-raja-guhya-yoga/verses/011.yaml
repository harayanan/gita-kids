chapter: 9
verse: 11
speaker: krishna

sanskrit: "अवजानन्ति मां मूढा मानुषीं तनुमाश्रितम्। परं भावमजानन्तो मम भूतमहेश्वरम्॥"

transliteration: "avajānanti māṁ mūḍhā mānuṣīṁ tanumāśritam | paraṁ bhāvamajānanto mama bhūtamaheśvaram ||"

