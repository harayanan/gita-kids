chapter: 9
verse: 4
speaker: krishna

sanskrit: "मया ततमिदं सर्वं जगदव्यक्तमूर्तिना। मत्स्थानि सर्वभूतानि न चाहं तेष्ववस्थितः॥"

transliteration: "mayā tatamidaṁ sarvaṁ jagadavyaktamūrtinā | matsthāni sarvabhūtāni na cāhaṁ teṣvavasthitaḥ ||"

