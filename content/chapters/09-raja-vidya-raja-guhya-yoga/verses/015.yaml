chapter: 9
verse: 15
speaker: krishna

sanskrit: "ज्ञानयज्ञेन चाप्यन्ये यजन्तो मामुपासते। एकत्वेन पृथक्त्वेन बहुधा विश्वतोमुखम्॥"

transliteration: "jñānayajñena cāpyanye yajanto māmupāsate | ekatvena pṛthaktvena bahudhā viśvatomukham ||"

