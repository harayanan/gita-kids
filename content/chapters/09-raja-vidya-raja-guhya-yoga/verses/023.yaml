chapter: 9
verse: 23
speaker: krishna

sanskrit: "येऽप्यन्यदेवता भक्ता यजन्ते श्रद्धयान्विताः। तेऽपि मामेव कौन्तेय यजन्त्यविधिपूर्वकम्॥"

transliteration: "ye'pyanyadevatā bhaktā yajante śraddhayānvitāḥ | te'pi māmeva kaunteya yajantyavidhipūrvakam ||"

dhatu_breakdown:
  - word: "ये"
    parts: ["yad (who)"]
    meaning: "who, those who"
  - word: "अपि"
    parts: ["api (even, also)"]
    meaning: "even"
  - word: "अन्यदेवताः"
    parts: ["anya (other)", "devatā (deity, god)"]
    meaning: "other gods, other deities"
  - word: "भक्ताः"
    parts: ["bhaj (to love, to be devoted)"]
    meaning: "devotees, the loving ones"
  - word: "यजन्ते"
    parts: ["yaj (to worship, to offer)"]
    meaning: "they worship"
  - word: "श्रद्धया"
