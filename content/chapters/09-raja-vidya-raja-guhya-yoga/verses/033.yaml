chapter: 9
verse: 33
speaker: krishna

sanskrit: "किं पुनर्ब्राह्मणाः पुण्या भक्ता राजर्षयस्तथा। अनित्यमसुखं लोकमिमं प्राप्य भजस्व माम्॥"

transliteration: "kiṁ punarbrāhmaṇāḥ puṇyā bhaktā rājarṣayastathā | anityamasukhaṁ lokamimaṁ prāpya bhajasva mām ||"

dhatu_breakdown:
  - word: "किम्"
    parts: ["kim (what, how)"]
    meaning: "how much, what"
  - word: "पुनः"
    parts: ["punar (again, then, moreover)"]
    meaning: "then, moreover"
  - word: "ब्राह्मणाः"
    parts: ["bṛh (to grow great); brahman (the sacred, the holy)"]
    meaning: "the holy ones, those devoted to the sacred"
  - word: "पुण्याः"
    parts: ["puṇya (virtuous, of good merit)"]
    meaning: "virtuous, full of good merit"
  - word: "भक्ताः"
    parts: ["bhaj (to love, to be devoted)"]
    meaning: "devotees, the loving ones"
  - word: "राजर्षयः"
    parts: ["rājan (king)", "ṛṣi (sage, seer)"]
    meaning: "royal sages, kings who are also wise seers"
  - word: "तथा"
    parts: ["tathā (likewise, and)"]
    meaning: "likewise, as well"
  - word: "अनित्यम्"
    parts: ["a (not)", "nitya (eternal, lasting)"]
    meaning: "impermanent, fleeting, not lasting"
  - word: "असुखम्"
    parts: ["a (not)", "sukha (happiness, ease)"]
    meaning: "joyless, without lasting happiness"
  - word: "लोकम्"
    parts: ["lok (to see); loka (world)"]
    meaning: "world"
  - word: "इमम्"
    parts: ["ima (this)"]
    meaning: "this"
  - word: "प्राप्य"
    parts: ["pra (forth)", "āp (to reach, to obtain)"]
    meaning: "having reached, having come into"
  - word: "भजस्व"
    parts: ["bhaj (to love, to worship)"]
    meaning: "love, worship, turn to with devotion"
  - word: "माम्"
    parts: ["mām (Me)"]
    meaning: "Me"

meaning: >
  Krishna says: "If even those of humble birth reach Me, then how much more
  surely do the holy, the good-hearted, and the wise royal sages who love Me!
  So, having come into this fleeting world where no joy lasts forever, turn to
  Me with love." Krishna's point is simple: every kind of person can reach him,
  so while you are here in this short, changing life, fill it with love for God.

story:
  title: "The Gathering Under the Banyan"
  source: "Jeeva of the Warli village"
  body: |
    On the night of the full moon after the first rains, the whole village
    gathered under the great banyan tree at the edge of the fields. It was the
    one night of the year when everyone came — everyone, with no exceptions.

    Jeeva sat cross-legged on a mat, watching them arrive. The village headman
    came in his good white cloth. So did Sakhu the potter, his hands still
    stained with clay. The wealthy grain merchant from the next hamlet came on
    his cart, and right behind him walked old Mhatari, who had nothing at all
    and slept by the temple steps. Mothers came with babies on their hips.
    Farmers came straight from the muddy paddies. Even the children too small
    to understand anything came, half-asleep, and were laid down on folded
    shawls.

    A lamp was lit before the wall where Aaji had painted God in white — the
    figure surrounded by the sun, the trees, the animals, and the dancing
    people, all in one great circle.

    Then they sang. And here was the thing that made Jeeva's chest feel wide and
    full: everyone sang the same song. The headman and the beggar. The rich
    merchant and the potter. The old and the very young. And when the song was
    over, every single person — without anyone telling them to — folded their
    hands and bowed their heads at the same moment, toward the same lamp, toward
    the same God.

    Jeeva leaned toward Aaji. "Everyone is here," he whispered. "Even people who
    never talk to each other any other day."

    Aaji nodded, her eyes on the lamp. "That is the secret of this path,
    child," she said quietly. "It does not ask who your father was, or how much
    grain is in your store, or whether you can read the old books. It only asks
    whether you love. And so there is room in it for every single one of us —
    the wise and the simple, the grand and the small. We all bow under the same
    tree."

    The lamp flickered. The bowed heads rose. And above the banyan, the full
    moon poured its light down equally on every upturned face.

reflection: "Think of a place where all kinds of people come together as equals. Why do you think love for God makes room for everyone, no matter who they are?"
