chapter: 9
verse: 2
speaker: krishna

sanskrit: "राजविद्या राजगुह्यं पवित्रमिदमुत्तमम्। प्रत्यक्षावगमं धर्म्यं सुसुखं कर्तुमव्ययम्॥"

transliteration: "rājavidyā rājaguhyaṁ pavitramidamuttamam | pratyakṣāvagamaṁ dharmyaṁ susukhaṁ kartumavyayam ||"

dhatu_breakdown:
  - word: "राजविद्या"
    parts: ["rājan (king)", "vid (to know)"]
    meaning: "the king of all knowledge, the royal wisdom"
  - word: "राजगुह्यम्"
    parts: ["rājan (king)", "guh (to hide, to conceal)"]
    meaning: "the king of all secrets, the royal secret"
  - word: "पवित्रम्"
    parts: ["pū (to make pure, to cleanse)"]
    meaning: "pure, purifying, cleansing"
  - word: "इदम्"
    parts: ["ida (this)"]
    meaning: "this"
  - word: "उत्तमम्"
    parts: ["ud (up)", "tama (most)"]
    meaning: "the highest, the very best"
  - word: "प्रत्यक्षावगमम्"
    parts: ["prati (toward)", "akṣa (eye)", "ava (down)", "gam (to go, to grasp)"]
    meaning: "directly known, grasped right before your own eyes"
  - word: "धर्म्यम्"
    parts: ["dhṛ (to hold, to uphold)"]
    meaning: "in keeping with what is right, full of goodness"
  - word: "सुसुखम्"
    parts: ["su (easy, well)", "sukha (happiness, ease)"]
    meaning: "very easy and joyful, pleasant to do"
  - word: "कर्तुम्"
    parts: ["kṛ (to do, to act)"]
    meaning: "to do, to practise"
  - word: "अव्ययम्"
    parts: ["a (not)", "vi (apart)", "i (to go, to perish)"]
    meaning: "imperishable, never wearing out"

meaning: >
  Krishna says this teaching is the king of all knowledge and the king of all
  secrets — the highest and most cleansing of all. The best part? You don't have
  to take it on someone else's word. You can know it directly, right before your
  own eyes. It is full of goodness, it is easy and joyful to practise, and it
  never wears out.

story:
  title: "The Crown Among Jewels"
  source: "original"
  body: |
    In a forest school long ago, a wise old guru sat under a banyan tree with
    his students gathered around him on the swept earth. The boys had been
    learning all kinds of things — how to read the stars, how to chant the old
    verses, how to count the seasons and name the herbs that heal.

    One bright morning, the eldest student asked, "Teacher, of everything you
    have taught us, which is the most important to learn?"

    The guru smiled. He reached into the cloth bag beside him and took out a
    handful of stones. He laid them on the ground one by one.

    "Here," he said, "is the knowledge of the stars. Useful. Here is the
    knowledge of medicine. Precious. Here is the knowledge of music, of
    farming, of building. Each one is a jewel, and each one shines."

    The students nodded. The stones did look like little jewels in the
    morning light.

    Then the guru reached into his bag once more and took out a single shining
    gem, and he set it gently above all the others.

    "But this," he said, "is the king of all knowing. This is the secret of the
    one truth that holds up everything else — the Divine that lives inside all
    things and inside you. Call it the crown jewel. All the other jewels are
    real and good, but this one sits above them all, and it makes the others
    shine brighter too."

    "Why is it the king, Teacher?" a small boy asked.

    "Three reasons," said the guru, holding up three fingers. "First — you do
    not have to believe it because I say so. You can come to know it yourself,
    right in your own heart, as plainly as you see this gem before your eyes.
    Second — it is not hard and joyless. It is easy and full of gladness; doing
    it feels like coming home. And third — it never wears out. The other jewels
    can be lost or broken or used up. This one never runs out, never dims, not
    in a thousand years."

    The boy reached out and touched the bright gem with one finger.

    "Then I want to learn that one most of all," he whispered.

    The guru closed the boy's hand around it. "That," he said, "is exactly why
    Krishna saved it for the friend he loved best."

reflection: "Out of all the things you are learning, which one feels like it makes everything else better? What would it mean for you to have a 'crown jewel' kind of knowing?"
