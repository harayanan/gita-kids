chapter: 9
verse: 17
speaker: krishna

sanskrit: "पिताहमस्य जगतो माता धाता पितामहः। वेद्यं पवित्रमोंकार ऋक्साम यजुरेव च॥"

transliteration: "pitāhamasya jagato mātā dhātā pitāmahaḥ | vedyaṁ pavitramoṁkāra ṛksāma yajureva ca ||"

