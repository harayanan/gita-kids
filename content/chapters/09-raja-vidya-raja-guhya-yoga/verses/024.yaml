chapter: 9
verse: 24
speaker: krishna

sanskrit: "अहं हि सर्वयज्ञानां भोक्ता च प्रभुरेव च। न तु मामभिजानन्ति तत्त्वेनातश्च्यवन्ति ते॥"

transliteration: "ahaṁ hi sarvayajñānāṁ bhoktā ca prabhureva ca | na tu māmabhijānanti tattvenātaścyavanti te ||"

