chapter: 9
verse: 9
speaker: krishna

sanskrit: "न च मां तानि कर्माणि निबध्नन्ति धनञ्जय। उदासीनवदासीनमसक्तं तेषु कर्मसु॥"

transliteration: "na ca māṁ tāni karmāṇi nibadhnanti dhanañjaya | udāsīnavadāsīnamasaktaṁ teṣu karmasu ||"

