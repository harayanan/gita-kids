chapter: 9
verse: 27
speaker: krishna

sanskrit: "यत्करोषि यदश्नासि यज्जुहोषि ददासि यत्। यत्तपस्यसि कौन्तेय तत्कुरुष्व मदर्पणम्॥"

transliteration: "yatkaroṣi yadaśnāsi yajjuhoṣi dadāsi yat | yattapasyasi kaunteya tatkuruṣva madarpaṇam ||"

dhatu_breakdown:
  - word: "यत्"
    parts: ["yad (whatever)"]
    meaning: "whatever"
  - word: "करोषि"
    parts: ["kṛ (to do, to make)"]
