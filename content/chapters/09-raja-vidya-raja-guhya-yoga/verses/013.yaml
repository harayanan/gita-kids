chapter: 9
verse: 13
speaker: krishna

sanskrit: "महात्मानस्तु मां पार्थ दैवीं प्रकृतिमाश्रिताः। भजन्त्यनन्यमनसो ज्ञात्वा भूतादिमव्ययम्॥"

transliteration: "mahātmānastu māṁ pārtha daivīṁ prakṛtimāśritāḥ | bhajantyananyamanaso jñātvā bhūtādimavyayam ||"

