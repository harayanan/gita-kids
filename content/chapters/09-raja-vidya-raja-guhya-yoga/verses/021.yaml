chapter: 9
verse: 21
speaker: krishna

sanskrit: "ते तं भुक्त्वा स्वर्गलोकं विशालं क्षीणे पुण्ये मर्त्यलोकं विशन्ति। एवं त्रयीधर्ममनुप्रपन्ना गतागतं कामकामा लभन्ते॥"

transliteration: "te taṁ bhuktvā svargalokaṁ viśālaṁ kṣīṇe puṇye martyalokaṁ viśanti | evaṁ trayīdharmamanuprapannā gatāgataṁ kāmakāmā labhante ||"

