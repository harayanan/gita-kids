chapter: 9
verse: 20
speaker: krishna

sanskrit: "त्रैविद्या मां सोमपाः पूतपापा यज्ञैरिष्ट्वा स्वर्गतिं प्रार्थयन्ते। ते पुण्यमासाद्य सुरेन्द्रलोकमश्नन्ति दिव्यान्दिवि देवभोगान्॥"

transliteration: "traividyā māṁ somapāḥ pūtapāpā yajñairiṣṭvā svargatiṁ prārthayante | te puṇyamāsādya surendralokamaśnanti divyāndivi devabhogān ||"

