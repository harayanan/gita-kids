transliterated_name: Rāja Vidyā Rāja Guhya Yoga
verse_count: 34
folk_art_style: warli
summary: >
  Krishna shares the king of all secrets — the most wonderful knowledge there
  is. He says that he holds the entire universe like a thread holds together
  the beads of a necklace. Even a small offering made with true love — a leaf,
  a flower, a fruit, or just water — reaches him and makes him happy.
