chapter: 3
verse: 12
speaker: krishna

sanskrit: "इष्टान्भोगान्हि वो देवा दास्यन्ते यज्ञभाविताः। तैर्दत्तानप्रदायैभ्यो यो भुङ्क्ते स्तेन एव सः॥"

transliteration: "iṣṭānbhogānhi vo devā dāsyante yajñabhāvitāḥ | tairdattānapradāyaibhyo yo bhuṅkte stena eva saḥ ||"

