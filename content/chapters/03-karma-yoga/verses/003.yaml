chapter: 3
verse: 3
speaker: krishna

sanskrit: "लोकेऽस्मिन्द्विविधा निष्ठा पुरा प्रोक्ता मयानघ। ज्ञानयोगेन साङ्ख्यानां कर्मयोगेन योगिनाम्॥"

transliteration: "loke'smindvividhā niṣṭhā purā proktā mayānagha | jñānayogena sāṅkhyānāṁ karmayogena yoginām ||"

