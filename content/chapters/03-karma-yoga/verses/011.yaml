chapter: 3
verse: 11
speaker: krishna

sanskrit: "देवान्भावयतानेन ते देवा भावयन्तु वः। परस्परं भावयन्तः श्रेयः परमवाप्स्यथ॥"

transliteration: "devānbhāvayatānena te devā bhāvayantu vaḥ | parasparaṁ bhāvayantaḥ śreyaḥ paramavāpsyatha ||"

