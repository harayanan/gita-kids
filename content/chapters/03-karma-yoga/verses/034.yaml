chapter: 3
verse: 34
speaker: krishna

sanskrit: "इन्द्रियस्येन्द्रियस्यार्थे रागद्वेषौ व्यवस्थितौ। तयोर्न वशमागच्छेत्तौ ह्यस्य परिपन्थिनौ॥"

transliteration: "indriyasyendriyasyārthe rāgadveṣau vyavasthitau | tayorna vaśamāgacchettau hyasya paripanthinau ||"

