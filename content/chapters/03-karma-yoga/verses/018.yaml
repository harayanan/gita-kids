chapter: 3
verse: 18
speaker: krishna

sanskrit: "नैव तस्य कृतेनार्थो नाकृतेनेह कश्चन। न चास्य सर्वभूतेषु कश्चिदर्थव्यपाश्रयः॥"

transliteration: "naiva tasya kṛtenārtho nākṛteneha kaścana | na cāsya sarvabhūteṣu kaścidarthavyapāśrayaḥ ||"

