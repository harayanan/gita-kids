chapter: 3
verse: 10
speaker: krishna

sanskrit: "सहयज्ञाः प्रजाः सृष्ट्वा पुरोवाच प्रजापतिः। अनेन प्रसविष्यध्वमेष वोऽस्त्विष्टकामधुक्॥"

transliteration: "sahayajñāḥ prajāḥ sṛṣṭvā purovāca prajāpatiḥ | anena prasaviṣyadhvameṣa vo'stviṣṭakāmadhuk ||"

