chapter: 3
verse: 2
speaker: arjuna

sanskrit: "व्यामिश्रेणेव वाक्येन बुद्धिं मोहयसीव मे। तदेकं वद निश्चित्य येन श्रेयोऽहमाप्नुयाम्॥"

transliteration: "vyāmiśreṇeva vākyena buddhiṁ mohayasīva me | tadekaṁ vada niścitya yena śreyo'hamāpnuyām ||"

