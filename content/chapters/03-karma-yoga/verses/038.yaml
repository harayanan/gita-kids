chapter: 3
verse: 38
speaker: krishna

sanskrit: "धूमेनाव्रियते वह्निर्यथादर्शो मलेन च। यथोल्बेनावृतो गर्भस्तथा तेनेदमावृतम्॥"

transliteration: "dhūmenāvriyate vahniryathādarśo malena ca | yatholbenāvṛto garbhastathā tenedamāvṛtam ||"

dhatu_breakdown:
  - word: "धूमेन"
    parts: ["dhūma (smoke)"]
    meaning: "by smoke"
  - word: "आव्रियते"
    parts: ["ā (towards)", "vṛ (to cover, to conceal)"]
