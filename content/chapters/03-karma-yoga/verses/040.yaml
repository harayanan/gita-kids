chapter: 3
verse: 40
speaker: krishna

sanskrit: "इन्द्रियाणि मनो बुद्धिरस्याधिष्ठानमुच्यते। एतैर्विमोहयत्येष ज्ञानमावृत्य देहिनम्॥"

transliteration: "indriyāṇi mano buddhirasyādhiṣṭhānamucyate | etairvimohayatyeṣa jñānamāvṛtya dehinam ||"

