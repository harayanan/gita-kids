chapter: 3
verse: 23
speaker: krishna

sanskrit: "यदि ह्यहं न वर्तेयं जातु कर्मण्यतन्द्रितः। मम वर्त्मानुवर्तन्ते मनुष्याः पार्थ सर्वशः॥"

transliteration: "yadi hyahaṁ na varteyaṁ jātu karmaṇyatandritaḥ | mama vartmānuvartante manuṣyāḥ pārtha sarvaśaḥ ||"

