chapter: 3
verse: 13
speaker: krishna

sanskrit: "यज्ञशिष्टाशिनः सन्तो मुच्यन्ते सर्वकिल्बिषैः। भुञ्जते ते त्वघं पापा ये पचन्त्यात्मकारणात्॥"

transliteration: "yajñaśiṣṭāśinaḥ santo mucyante sarvakilbiṣaiḥ | bhuñjate te tvaghaṁ pāpā ye pacantyātmakāraṇāt ||"

