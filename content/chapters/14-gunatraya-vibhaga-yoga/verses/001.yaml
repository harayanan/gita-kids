chapter: 14
verse: 1
speaker: krishna

sanskrit: "परं भूयः प्रवक्ष्यामि ज्ञानानां ज्ञानमुत्तमम्। यज्ज्ञात्वा मुनयः सर्वे परां सिद्धिमितो गताः॥"

transliteration: "paraṁ bhūyaḥ pravakṣyāmi jñānānāṁ jñānamuttamam | yajjñātvā munayaḥ sarve parāṁ siddhimito gatāḥ ||"

