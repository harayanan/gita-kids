chapter: 14
verse: 4
speaker: krishna

sanskrit: "सर्वयोनिषु कौन्तेय मूर्तयः संभवन्ति याः। तासां ब्रह्म महद्योनिरहं बीजप्रदः पिता॥"

transliteration: "sarvayoniṣu kaunteya mūrtayaḥ sambhavanti yāḥ | tāsāṁ brahma mahadyonirahaṁ bījapradaḥ pitā ||"

