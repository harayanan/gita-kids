chapter: 14
verse: 14
speaker: krishna

sanskrit: "यदा सत्त्वे प्रवृद्धे तु प्रलयं याति देहभृत्। तदोत्तमविदां लोकानमलान्प्रतिपद्यते॥"

transliteration: "yadā sattve pravṛddhe tu pralayaṁ yāti dehabhṛt | tadottamavidāṁ lokānamalānpratipadyate ||"

