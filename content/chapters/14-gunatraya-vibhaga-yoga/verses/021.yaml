chapter: 14
verse: 21
speaker: arjuna

sanskrit: "कैर्लिङ्गैस्त्रीन्गुणानेतानतीतो भवति प्रभो। किमाचारः कथं चैतांस्त्रीन्गुणानतिवर्तते॥"

transliteration: "kairliṅgaistrīnguṇānetānatīto bhavati prabho | kimācāraḥ kathaṁ caitāṁstrīnguṇānativartate ||"

