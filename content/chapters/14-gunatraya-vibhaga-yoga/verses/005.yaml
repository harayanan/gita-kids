chapter: 14
verse: 5
speaker: krishna

sanskrit: "सत्त्वं रजस्तम इति गुणाः प्रकृतिसंभवाः। निबध्नन्ति महाबाहो देहे देहिनमव्ययम्॥"

transliteration: "sattvaṁ rajastama iti guṇāḥ prakṛtisambhavāḥ | nibadhnanti mahābāho dehe dehinamavyayam ||"

dhatu_breakdown:
  - word: "सत्त्वम्"
    parts: ["as (to be — sat, what is true, real, pure)", "-tva (-ness)"]
    meaning: "sattva — the quality of light, calm, and clearness"
  - word: "रजः"
    parts: ["rañj (to color, to be stirred, to be excited)"]
    meaning: "rajas — the quality of restlessness and busy action"
  - word: "तमः"
    parts: ["tam (to grow dark, to be still, to faint)"]
    meaning: "tamas — the quality of heaviness, dullness, and sleep"
  - word: "इति"
    parts: ["iti (thus, so-called)"]
    meaning: "these, so named"
  - word: "गुणाः"
    parts: ["guṇa (strand, thread, quality)"]
    meaning: "the gunas — the three qualities, like three threads"
  - word: "प्रकृतिसंभवाः"
    parts: ["pra (forth)", "kṛ (to make, to do — prakṛti, Nature)", "sam (together)", "bhū (to be, to become)"]
    meaning: "born of Nature, arising from prakriti"
  - word: "निबध्नन्ति"
    parts: ["ni (down, fast)", "bandh (to bind, to tie)"]
    meaning: "they bind, they tie down"
  - word: "महाबाहो"
    parts: ["mahā (great)", "bāhu (arm)"]
    meaning: "O mighty-armed one (Arjuna)"
  - word: "देहे"
    parts: ["dih (to smear, to form — deha, the body)"]
    meaning: "in the body"
  - word: "देहिनम्"
    parts: ["dih (to smear, to form — dehin, the one who wears a body)"]
    meaning: "the embodied one, the Self who lives inside the body"
  - word: "अव्ययम्"
    parts: ["a (not)", "vi (apart)", "i (to go — vyaya, to wear away)"]
    meaning: "the unchanging, the one that never wears out or dies"

meaning: >
  Krishna names the three qualities, called gunas, that all of Nature is woven
  from, like three threads twisted together: sattva, which is calm and bright;
  rajas, which is restless and busy; and tamas, which is heavy and sleepy. These
  three are born from Nature, and they wrap themselves around the true Self who
  lives inside your body. That Self never changes and never dies — yet the three
  threads tie it down, the way ropes can hold even a strong, free creature.

story:
  title: "The Three Threads That Tied the Swan"
  source: "Upanishadic image / Vedantic allegory"
  body: |
    Krishna told Arjuna of a swan — a bright white swan, a hamsa, who in the old
    stories stands for the Self that lives inside every person.

    "Picture this swan," Krishna said. "She is made of light. She cannot be hurt.
    She cannot grow old. She cannot die. By her own nature she belongs to the
    open sky, free to fly anywhere she pleases, forever."

    Arjuna pictured her: shining, weightless, longing for the wide blue air.

    "But the swan has come down to rest upon the earth — to live for a while
    inside a body, the way you and I do," said Krishna. "And the earth is the
    home of great Nature, who is woven from three fine threads."

    "What are the threads like?" Arjuna asked.

    "The first thread is white and clear, like a ribbon of morning light," said
    Krishna. "That is sattva — calm, happy, full of knowing. The second thread is
    red and quick, always tugging, never still, like a restless little fire.
    That is rajas — the busy thread, full of wanting and doing. And the third
    thread is dark and heavy, like a wet woollen blanket. That is tamas — the
    sleepy thread, dull and slow."

    "And the swan?" said Arjuna.

    "The three threads gently wrap around her feet," Krishna said. "Even the
    white thread, even the lovely shining one. One by one they loop and knot, and
    soon the swan, who could fly anywhere in all the heavens, sits tied to the
    ground, forgetting that she ever had the sky."

    Arjuna frowned. "But she is made of light. She cannot be hurt. Why doesn't
    she just fly away?"

    "That," said Krishna softly, "is the great riddle. The swan is never truly
    harmed — not for one moment. The threads cannot change what she is. But while
    she forgets herself, while she lets them wrap around her, she feels tied, and
    she stays upon the ground, and she cries that she cannot fly."

    He looked kindly at Arjuna.

    "Every person carries that swan inside — your true, shining, undying Self.
    And the three threads of Nature are always near, ready to wind around it. To
    understand the threads," he said, "is the first step to slipping free of
    them."

reflection: "The swan was made of light and could never really be harmed — yet three soft threads kept her on the ground because she forgot she could fly. What is something small that sometimes keeps you from doing what you truly can?"
