chapter: 14
verse: 11
speaker: krishna

sanskrit: "सर्वद्वारेषु देहेऽस्मिन्प्रकाश उपजायते। ज्ञानं यदा तदा विद्याद्विवृद्धं सत्त्वमित्युत॥"

transliteration: "sarvadvāreṣu dehe'sminprakāśa upajāyate | jñānaṁ yadā tadā vidyādvivṛddhaṁ sattvamityuta ||"

