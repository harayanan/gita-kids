chapter: 14
verse: 15
speaker: krishna

sanskrit: "रजसि प्रलयं गत्वा कर्मसङ्गिषु जायते। तथा प्रलीनस्तमसि मूढयोनिषु जायते॥"

transliteration: "rajasi pralayaṁ gatvā karmasaṅgiṣu jāyate | tathā pralīnastamasi mūḍhayoniṣu jāyate ||"

dhatu_breakdown:
  - word: "रजसि"
    parts: ["raj (to be coloured, to be excited, to be stirred)"]
    meaning: "in rajas, in the restless, passionate quality"
  - word: "प्रलयम्"
    parts: ["pra (forth, away)", "lī (to dissolve, to melt away)"]
    meaning: "dissolving away, death, the body's ending"
  - word: "गत्वा"
    parts: ["gam (to go)"]
    meaning: "having gone, having reached"
  - word: "कर्मसङ्गिषु"
    parts: ["kṛ (to do, to act)", "sañj (to cling, to be attached)"]
    meaning: "among those attached to action, among the busy doers"
  - word: "जायते"
    parts: ["jan (to be born)"]
    meaning: "is born"
  - word: "तथा"
    parts: ["tathā (so, in the same way)"]
    meaning: "so too, likewise"
  - word: "प्रलीनः"
    parts: ["pra (forth, away)", "lī (to dissolve, to merge)"]
    meaning: "one who has dissolved away, one who has passed on"
  - word: "तमसि"
    parts: ["tam (to be dark, to grow dim)"]
    meaning: "in tamas, in the heavy, dark quality"
  - word: "मूढयोनिषु"
    parts: ["muh (to be confused, to be deluded)", "yoni (womb, source, kind of birth)"]
    meaning: "among the deluded kinds of birth, among confused, dull beings"

meaning: >
  Krishna continues describing how the quality strong at death shapes what
  comes next. If a person dies while rajas, the restless, craving, busy
  quality, is on top, they are reborn among people attached to endless doing
  and getting. And if a person dies while tamas, the heavy, dark, confused
  quality, is on top, they are reborn among dull, deluded beings. The mood you
  leave by tends to be the mood you arrive into.

story:
  title: "The King and the Sleeper at the River"
  source: "Bhagavata-style telling of the gunas"
  body: |
    In an old tale, two travellers came at the very same hour to the great
    river that the wise say souls cross between one life and the next. The
    ferryman, who had carried countless travellers, watched them closely, for
    he could read the weather of a heart.

    The first was a merchant-king named Vrisha. Even here, at the river's edge,
    he could not sit still. He paced. He counted on his fingers. "I had three
    more ships to send," he muttered, "two more palaces to build, a hundred
    more deals to close. So much left undone! I must get back to it, I must,
    I must —" His whole body leaned forward, hungry, restless, reaching for
    work that was no longer there.

    The second was a man named Tundi, who had spent his days in a heavy fog,
    sleeping past noon, forgetting his promises, never quite awake to his own
    life. Even now his eyes were half-shut. "Where... am I?" he murmured. "Is
    it morning? Let me sleep a little more..." and he sank down dull and
    confused, not even noticing the great shining river before him.

    The ferryman sighed kindly. "I do not judge you," he said. "I only carry
    you to the shore your heart is already pointing toward."

    He turned to Vrisha. "You leave reaching for busyness — so to a busy,
    grasping life you will go, among people who never stop doing and wanting."

    He turned to Tundi. "And you leave wrapped in fog — so to a dull, confused
    life you will go, among the heavy and half-asleep."

    Then a third traveller arrived — calm, clear-eyed, unhurried — and simply
    sat watching the bright water with a peaceful smile. The ferryman bowed to
    that one. "Ah," he said. "You I will carry to the shining shore."

    "It is not a punishment," the ferryman told them all as the boat slid out.
    "It is only this: the weather you carry inside becomes the country you wake
    up in. So tend your weather while you can."

reflection: "Krishna says the mood you live in becomes the life you grow into — restless, foggy, or calm. Which of the three travellers feels most like you on a busy day? What would help you arrive at the 'shining shore' more often?"
