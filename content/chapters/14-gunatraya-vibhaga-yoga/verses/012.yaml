chapter: 14
verse: 12
speaker: krishna

sanskrit: "लोभः प्रवृत्तिरारम्भः कर्मणामशमः स्पृहा। रजस्येतानि जायन्ते विवृद्धे भरतर्षभ॥"

transliteration: "lobhaḥ pravṛttirārambhaḥ karmaṇāmaśamaḥ spṛhā | rajasyetāni jāyante vivṛddhe bharatarṣabha ||"

dhatu_breakdown:
  - word: "लोभः"
    parts: ["lubh (to desire greedily, to covet)"]
    meaning: "greed, the wish to grab and keep more"
  - word: "प्रवृत्तिः"
    parts: ["pra (forth, forward)", "vṛt (to turn, to move, to be active)"]
    meaning: "busyness, throwing oneself into activity, restless going-forth"
  - word: "आरम्भः"
    parts: ["ā (toward)", "rabh (to begin, to take hold of)"]
    meaning: "starting things, launching new undertakings"
  - word: "कर्मणाम्"
    parts: ["kṛ (to do, to act)"]
    meaning: "of actions, of works and tasks"
  - word: "अशमः"
    parts: ["a (not)", "śam (to be calm, to be at peace, to rest)"]
    meaning: "restlessness, no peace, an inability to be still"
  - word: "स्पृहा"
    parts: ["spṛh (to long for, to crave, to yearn)"]
    meaning: "longing, hankering, reaching out for what one does not have"
  - word: "रजसि"
    parts: ["rañj (to colour, to be excited)"]
    meaning: "in rajas, when the restless quality is present"
  - word: "एतानि"
    parts: ["etad (this, these)"]
    meaning: "these (the things just listed)"
  - word: "जायन्ते"
    parts: ["jan (to be born, to arise)"]
    meaning: "are born, arise, spring up"
  - word: "विवृद्धे"
    parts: ["vi (apart, fully)", "vṛdh (to grow, to increase)"]
    meaning: "when it has grown strong, when it has increased"
  - word: "भरतर्षभ"
    parts: ["bharata (Bharata, ancestor of Arjuna's line)", "ṛṣabha (bull, the best, the chief)"]
    meaning: "O bull among the Bharatas, O best of Bharata's line (Arjuna)"

meaning: >
  Just as a clear light is the sign of sattva, Krishna lists the signs of rajas
  grown strong. When the restless quality fills you, five things spring up: greed,
  the wish to grab more and more; busyness, throwing yourself into activity;
  starting lots of new projects all at once; never feeling calm or at rest; and a
  constant longing, reaching out for what you do not yet have. When you notice
  these crowding in, you can know that rajas has become strong inside you.

story:
  title: "The Merchant Who Started a Hundred Things"
  source: "puranic tradition"
  body: |
    In a busy river town there once lived a merchant named Dhanapati, and his
    courtyard was the most crowded place in the whole region. Camels knelt at one
    gate while boats unloaded at the other. Sacks of pepper leaned against bales
    of silk; stacks of copper pots towered beside baskets of pearls. Servants ran
    in every direction, and Dhanapati ran fastest of all.

    "Begin the new warehouse!" he cried to one man. "Buy the eastern orchard!" he
    cried to another. "Send ships to the southern ports! No — also the northern!
    And start the spice trade, and the salt trade, and build me a second house,
    bigger than the first!"

    He had more gold than he could ever count, yet his hand was always reaching
    for more. He had a hundred tasks half-finished, and could not rest until he
    had begun a hundred more. At night he lay awake, his mind racing through deals
    and plans, unable to grow calm even for a moment. Whatever he had, he longed
    for the thing just beyond it.

    A quiet old trader, who had known Dhanapati's father, came to visit and sat
    in the whirling courtyard, watching.

    "My friend," the old trader said at last, "may I tell you what I see?"

    "Quickly, quickly," said Dhanapati, already glancing at a passing cart.

    "I see five guests living in your heart," said the old man. "Greed, who always
    wants more. Busyness, who can never sit. New-Beginnings, who starts what he
    will not finish. Restlessness, who steals your sleep. And Longing, who reaches
    for what is not yet yours. These five came in together, all at once, when the
    racing quality grew strong in you. They are not wicked. But they are loud, and
    they have filled the house so full that there is no quiet room left for you."

    Dhanapati paused — truly paused — for the first time in years. In the sudden
    stillness he heard the five guests clamouring inside him, and for a single
    breath he saw them clearly, and was amazed at how crowded his own heart had
    become.

reflection: "Greed, busyness, starting too many things, never resting, always wanting more — these are the signs of rajas grown strong. Have you ever felt your heart get this crowded and busy? What helps you make a little quiet room inside again?"
