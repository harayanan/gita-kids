chapter: 14
verse: 27
speaker: krishna

sanskrit: "ब्रह्मणो हि प्रतिष्ठाहममृतस्याव्ययस्य च। शाश्वतस्य च धर्मस्य सुखस्यैकान्तिकस्य च॥"

transliteration: "brahmaṇo hi pratiṣṭhāhamamṛtasyāvyayasya ca | śāśvatasya ca dharmasya sukhasyaikāntikasya ca ||"

dhatu_breakdown:
  - word: "ब्रह्मणः"
    parts: ["bṛh (to grow, to swell, to be vast)"]
    meaning: "of Brahman, of the vast and boundless truth"
  - word: "हि"
    parts: ["hi (indeed, for, surely)"]
    meaning: "indeed, for surely"
  - word: "प्रतिष्ठा"
    parts: ["prati (toward, firmly)", "sthā (to stand, to rest upon)"]
    meaning: "the firm ground, the resting-place, the foundation"
  - word: "अहम्"
    parts: ["aham (I)"]
    meaning: "I"
  - word: "अमृतस्य"
    parts: ["a- (not, un-)", "mṛ (to die)", "-ta (that which is)"]
    meaning: "of the deathless, of the immortal"
  - word: "अव्ययस्य"
    parts: ["a- (not, un-)", "vi (apart, away)", "i (to go, to pass)"]
    meaning: "of the unchanging, of that which never wears away"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"
  - word: "शाश्वतस्य"
    parts: ["śaśvat (perpetual, again and again, everlasting)"]
    meaning: "of the eternal, of that which lasts forever"
  - word: "धर्मस्य"
    parts: ["dhṛ (to hold, to uphold, to bear)"]
    meaning: "of dharma, of the truth that holds all things up"
  - word: "सुखस्य"
    parts: ["su (good, well)", "kha (space, opening — a heart at ease)"]
    meaning: "of happiness, of joy"
  - word: "ऐकान्तिकस्य"
    parts: ["eka (one, single)", "anta (end, limit)", "-ika (belonging to)"]
    meaning: "of the absolute, of the unbroken, of the one-and-only kind"

meaning: >
  Krishna ends the chapter with the deepest secret of all. "I am the ground that
  Brahman itself rests upon," he says — the firm place beneath the vast and
  boundless truth. He is the deathless that never dies, the unchanging that never
  wears away, the eternal that lasts forever. He is the dharma that holds all
  things up, and he is the one perfect happiness — the joy that is whole and
  unbroken, that has no opposite and never runs out. Under every changing mood,
  beneath every up and down of life, this is what is always there.

story:
  title: "The Happiness Beneath Every Mood"
  source: "original"
  body: |
    It had been a strange day for Jeeva. In the bright morning he had felt
    wonderful, clear and curious, helping Aaji mix paste and asking a hundred
    questions. By the busy midday he had felt itchy and cross, racing about,
    wanting things he could not have. And in the heavy, sleepy afternoon he had
    felt dull and grumpy, not wanting to do anything at all.

    Now it was evening. He sat with Aaji on the cool mud floor of her hut, where
    a single oil lamp burned. On the wall above them spread her great Warli
    mural — hundreds of tiny white figures dancing, farming, marrying, dying, all
    in one endless spiral.

    "Aaji," Jeeva said, "I don't understand myself. This morning I was so happy.
    Then I was cross. Then I was sleepy and grumpy. Which one is really me?"

    Aaji watched the lamp flame lean and straighten in the breeze from the door.

    "Look at the flame," she said. "See how it bends one way, then the other,
    then stands tall? Bright, low, flickering — all in a minute. Your moods are
    like that, little one. Happy, restless, sleepy — they come and go all day
    long, like weather, like the bending of the flame."

    "Then there's no real me," Jeeva said sadly. "Just moods coming and going."

    "Ah," said Aaji, and she pressed her warm palm flat against his chest. "Be
    very still and feel underneath the moods. Underneath the happy. Underneath
    the cross. Underneath the sleepy. There is something that was *there all
    day* — quiet, watching, never bending, never flickering. The one who *noticed*
    the morning and the midday and the afternoon. That one did not change at all.
    That stillness under everything — that is the most real you. And it is not
    only inside you. It is the same stillness under the whole spinning world."

    She lifted her hand toward the great spiral of dancers on the wall. "All these
    little figures — born, dancing, dying, born again, round and round. They
    change. But the wall they are painted on does not move. It just holds them,
    quietly, forever."

    Jeeva looked at the steady wall behind the swirling figures, and at the calm
    flame standing straight now in the still air.

    "Krishna says," Aaji whispered, "that beneath every changing thing there is
    one happiness that does not change — that never dies, never wears out, never
    runs dry. It holds up everything, the way the wall holds up the painting. It
    was under your happy morning and your grumpy afternoon, the same the whole
    time. That unchanging happiness, holding up the whole world — *that* is God.
    And, my little one, you have never once been outside it."

    Jeeva closed his eyes. Beneath the tired end of a strange long day, very
    quietly, he felt it — something that had been peaceful all along, holding him,
    the way the still wall holds the dancing figures. And he smiled.

reflection: "Your moods change all day — happy, restless, sleepy, calm — but something quiet watches them all come and go. Can you sit still for a moment and feel the steady part of you that was there the whole time?"
