chapter: 14
verse: 2
speaker: krishna

sanskrit: "इदं ज्ञानमुपाश्रित्य मम साधर्म्यमागताः। सर्गेऽपि नोपजायन्ते प्रलये न व्यथन्ति च॥"

transliteration: "idaṁ jñānamupāśritya mama sādharmyamāgatāḥ | sarge'pi nopajāyante pralaye na vyathanti ca ||"

dhatu_breakdown:
  - word: "इदम्"
    parts: ["idam (this)"]
    meaning: "this"
  - word: "ज्ञानम्"
    parts: ["jñā (to know)"]
    meaning: "knowledge"
  - word: "उपाश्रित्य"
    parts: ["upa (near, close)", "ā (toward)", "śri (to take shelter, to lean on)", "-ya (having done)"]
    meaning: "having taken refuge in, leaning closely on"
  - word: "मम"
    parts: ["mad (me, my)"]
    meaning: "my, of me"
  - word: "साधर्म्यम्"
    parts: ["sa (with, same)", "dhṛ (to hold, to bear — dharma, nature)"]
    meaning: "sharing my own nature, having the same being as me"
  - word: "आगताः"
    parts: ["ā (toward)", "gam (to go, to come)", "-ta (gone, come)"]
    meaning: "have come to, have arrived at"
  - word: "सर्गे"
    parts: ["sṛj (to pour out, to create)"]
    meaning: "at the creation, when the world is made"
  - word: "अपि"
    parts: ["api (even, also)"]
    meaning: "even"
  - word: "न"
    parts: ["na (not)"]
    meaning: "not"
  - word: "उपजायन्ते"
    parts: ["upa (near, into)", "jan (to be born, to arise)"]
    meaning: "they are born, they come into being"
  - word: "प्रलये"
    parts: ["pra (forth, completely)", "lī (to dissolve, to melt away)"]
    meaning: "at the dissolution, when the world melts away"
  - word: "व्यथन्ति"
    parts: ["vyath (to tremble, to be troubled)"]
    meaning: "they tremble, they are troubled"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"

meaning: >
  Krishna explains what happens to those who really hold this knowledge close.
  They come to share his own nature — they become calm and free and steady like
  him. So when whole new worlds are made, they are not pulled back to be born
  again into fear and forgetting; and when worlds dissolve and melt away at the
  end of time, they do not tremble or worry. They rest, safe and unshaken, in
  what never ends.

story:
  title: "Markandeya in the Endless Water"
  source: "Markandeya Purana"
  body: |
    There was once a boy-sage named Markandeya who had loved truth so much, and
    held it so close, that he could not really be harmed by anything — not even
    by the end of the world.

    And one day the world did end.

    The sun grew terribly hot, then went dark. The rivers dried, then the seas
    rose. Rain fell for a hundred years, and the mountains crumbled, and at last
    everything — every village, every forest, every star — melted away into one
    vast, dark, endless ocean. There was nothing left anywhere. No earth. No
    sky. Only water, stretching forever in every direction.

    Anyone else would have been terrified. But Markandeya floated on that great
    water, awake and calm, his heart quiet. He was sad to see the world go, yes —
    but he did not tremble. Deep inside he knew that what truly mattered could
    never be drowned.

    He floated for a long, long time. And then, in the middle of all that
    emptiness, he saw something small and bright: a single banyan leaf, drifting.
    And on the leaf lay a baby — a shining blue baby, peaceful and smiling, with
    one tiny toe held to his lips.

    Markandeya swam closer, wondering. As he came near, the baby breathed in —
    and the old sage was gently drawn inside the baby's body. And there, inside
    that little child, Markandeya saw the whole universe: all the rivers and
    hills and people and worlds that had melted away, kept safe and whole. The
    baby was holding everything, the way the sky holds the wind.

    Then he breathed out, and Markandeya floated again on the dark water. But now
    he understood. The baby was the Lord himself, resting between worlds. When
    the world was made, it would come out of him. When it dissolved, it would
    rest inside him.

    "Those who hold the highest knowledge," Krishna told Arjuna, finishing the
    tale, "become like Markandeya. When new worlds are born, they are not dragged
    back into fear. When worlds dissolve, they do not tremble. They share my own
    calm, and they rest in what never, ever ends."

reflection: "Markandeya floated through the end of the whole world without trembling, because he knew the most important thing could never be lost. When something around you changes or ends, what is the quiet thing inside you that stays the same?"
