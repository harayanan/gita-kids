chapter: 14
verse: 23
speaker: krishna

sanskrit: "उदासीनवदासीनो गुणैर्यो न विचाल्यते। गुणा वर्तन्त इत्येव योऽवतिष्ठति नेङ्गते॥"

transliteration: "udāsīnavadāsīno guṇairyo na vicālyate | guṇā vartanta ityeva yo'vatiṣṭhati neṅgate ||"

