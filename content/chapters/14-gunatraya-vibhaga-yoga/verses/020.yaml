chapter: 14
verse: 20
speaker: krishna

sanskrit: "गुणानेतानतीत्य त्रीन्देही देहसमुद्भवान्। जन्ममृत्युजरादुःखैर्विमुक्तोऽमृतमश्नुते॥"

transliteration: "guṇānetānatītya trīndehī dehasamudbhavān | janmamṛtyujarāduḥkhairvimukto'mṛtamaśnute ||"

dhatu_breakdown:
  - word: "गुणान्"
    parts: ["guṇa (quality, strand of nature)"]
    meaning: "the gunas, the qualities"
  - word: "एतान्"
    parts: ["etad (this, these)"]
    meaning: "these"
  - word: "अतीत्य"
    parts: ["ati (beyond, past, over)", "i (to go)"]
    meaning: "having risen beyond, having crossed over"
  - word: "त्रीन्"
    parts: ["tri (three)"]
    meaning: "the three"
  - word: "देही"
    parts: ["deha (body)", "in (the one who has, the owner)"]
    meaning: "the embodied one, the Self living in a body"
  - word: "देहसमुद्भवान्"
    parts: ["deha (body)", "sam (together, fully)", "ud (up, forth)", "bhū (to be, to arise)"]
    meaning: "arising from the body, springing up out of the body"
  - word: "जन्ममृत्युजरादुःखैः"
    parts: ["jan (to be born)", "mṛ (to die)", "jṝ (to grow old, to wear away)", "duḥkha (pain, sorrow)"]
    meaning: "by birth, death, old age, and pain"
  - word: "विमुक्तः"
    parts: ["vi (away, completely)", "muc (to release, to set free)"]
    meaning: "fully freed, completely released"
  - word: "अमृतम्"
    parts: ["a (not, un-)", "mṛ (to die)"]
    meaning: "the deathless, the undying, immortal life"
  - word: "अश्नुते"
    parts: ["aś (to reach, to attain, to enjoy)"]
    meaning: "attains, comes to, enjoys"

meaning: >
  Krishna tells what happens when the Self rises above the three gunas that
  spring up out of the body: sattva, rajas, and tamas. The one who climbs
  beyond all three is set free from being born and dying, from growing old,
  and from pain. Going past the weather of the body, that one reaches the
  deathless, a life that never ends.

story:
  title: "Markandeya and the Endless Life"
  source: "Markandeya Purana"
  body: |
    There was once a boy named Markandeya whose parents had been given a hard
    choice by the sages: they could have a brilliant son who would live only
    sixteen years, or a dull one who would live long. They chose the brilliant
    boy, and they loved him, and every year they grew sadder as his sixteenth
    birthday came near.

    Markandeya saw their faces grow heavy. "Why are you sad?" he asked. When
    they finally told him the truth, he did not weep. He sat very quietly, the
    way the river sits between its banks, and then he said, "Then I will go to
    the Lord."

    On his sixteenth birthday he went to the shrine and wrapped his small arms
    around the smooth stone, and he prayed, not for a longer body, but for
    the One beyond all bodies.

    When the appointed hour came, the dark messenger arrived with his rope to
    carry the boy away. But Markandeya did not let go of the stone, and his
    heart was not on his body at all. It had already climbed past the three
    weathers of the mind, past wanting and fearing and dullness, up to the
    Lord himself.

    And so the messenger could not take him. From the shrine the Lord appeared,
    bright as ten thousand dawns, and laid a hand on the boy's head.

    "You have crossed beyond the three gunas," he said. "You no longer cling
    to the body that is born and grows old and dies. You have found what does
    not die. So you shall not be touched by birth or death or age or pain — not
    now, not ever."

    Markandeya rose. He felt no older and no younger; he felt simply *awake*,
    in a life that had no edges. They say he lives still, the deathless boy,
    wandering the world, smiling at children — because long ago he climbed above
    the weather of the body and reached the One who never ends.

reflection: "Everything around you changes — you grow taller, things get old, seasons turn. Can you imagine a part of you, deep inside, that never changes and never ends at all?"
