chapter: 14
verse: 17
speaker: krishna

sanskrit: "सत्त्वात्सञ्जायते ज्ञानं रजसो लोभ एव च। प्रमादमोहौ तमसो भवतोऽज्ञानमेव च॥"

transliteration: "sattvātsañjāyate jñānaṁ rajaso lobha eva ca | pramādamohau tamaso bhavato'jñānameva ca ||"

dhatu_breakdown:
  - word: "सत्त्वात्"
    parts: ["sat (being, real, good)", "tva (the quality of)"]
    meaning: "from sattva, from the calm, bright quality"
  - word: "सञ्जायते"
    parts: ["sam (fully, together)", "jan (to be born, to arise)"]
    meaning: "arises, is fully born, springs up"
  - word: "ज्ञानम्"
    parts: ["jñā (to know)"]
    meaning: "knowledge, clear understanding"
  - word: "रजसः"
    parts: ["raj (to be coloured, to be stirred, to be excited)"]
    meaning: "from rajas, from the restless, passionate quality"
  - word: "लोभः"
    parts: ["lubh (to crave, to be greedy)"]
    meaning: "greed, grabbing, wanting more and more"
  - word: "एव"
    parts: ["eva (indeed, surely)"]
    meaning: "indeed, surely"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"
  - word: "प्रमादमोहौ"
    parts: ["pra (forth, fully)", "mad (to be careless, to be heedless)", "muh (to be confused, to be deluded)"]
    meaning: "carelessness and confusion, heedlessness and a muddled mind"
  - word: "तमसः"
    parts: ["tam (to be dark, to grow dim)"]
    meaning: "from tamas, from the heavy, dark quality"
  - word: "भवतः"
    parts: ["bhū (to be, to become, to arise)"]
    meaning: "the two arise, the two come to be"
  - word: "अज्ञानम्"
    parts: ["a (not)", "jñā (to know)"]
    meaning: "not-knowing, ignorance"

meaning: >
  Krishna gives a simple map of where each quality leads inside the mind. From
  sattva, the calm and bright quality, clear knowledge grows: you understand
  things. From rajas, the restless quality, greed grows: you keep wanting and
  grabbing. And from tamas, the heavy quality, two dark things grow together:
  carelessness and confusion, plus a deeper not-knowing. The weather of your
  mind decides what fruit it grows.

story:
  title: "Three Afternoons with the Same Book"
  source: "original"
  body: |
    Aaji had given Jeeva a small book about the stars, and over three days he
    discovered something strange: the very same book felt completely different
    depending on what kind of day he was having.

    On the first day, a calm and easy morning, Jeeva sat on the cool veranda
    with the book open in his lap. His mind was quiet and clear, like the still
    pond by the temple. He read slowly, looked up at the sky, traced the shapes
    of the constellations with his finger, and asked Aaji gentle questions. By
    evening he understood how the Pole Star stays put while the others wheel
    around it. "I actually *get* it," he said, eyes shining. "It makes sense
    now."

    The second day was a buzzing, restless one. There was a market, and Jeeva
    wanted everything — sweets, a kite, a clay whistle, a turn on his cousin's
    new cart. He grabbed the star book too, but only to race through it. "How
    many stars do I know now? How many pages have I read? More, more —" He
    flipped pages without reading them, hunting for the next thing, then tossed
    the book aside to chase something else. At day's end his head was full of
    wanting and his hands were empty of any new understanding.

    The third day was heavy and sleepy, a thick grey afternoon. Jeeva flopped
    on his mat with the book on his chest, but his eyes kept sliding shut. He
    forgot he was even reading. He couldn't be bothered to turn a page, and when
    Aaji asked what the book was about, he blinked, confused. "I... don't really
    remember," he mumbled.

    That evening Aaji sat beside him and tapped the little book. "Same book, my
    Jeeva. Same boy. Three different harvests. When your mind was calm and
    bright, it grew *understanding*. When it was restless and grabby, it grew
    only more *wanting*. When it was heavy and foggy, it grew *forgetting and
    muddle*."

    She smiled. "Krishna said it just so: from calm comes knowing, from
    restlessness comes grabbing, from heaviness comes forgetting. The book never
    changed. Your weather did. So when you really want to learn something,
    first find your calm morning."

reflection: "Jeeva read the same book three ways: calm and learning, restless and grabbing, sleepy and forgetting. Which 'weather' is best for learning something new? Next time you sit down to learn, how could you find your calm-morning mind first?"
