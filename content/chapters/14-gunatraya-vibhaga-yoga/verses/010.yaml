chapter: 14
verse: 10
speaker: krishna

sanskrit: "रजस्तमश्चाभिभूय सत्त्वं भवति भारत। रजः सत्त्वं तमश्चैव तमः सत्त्वं रजस्तथा॥"

transliteration: "rajastamaścābhibhūya sattvaṁ bhavati bhārata | rajaḥ sattvaṁ tamaścaiva tamaḥ sattvaṁ rajastathā ||"

dhatu_breakdown:
