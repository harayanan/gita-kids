    parts: ["rañj (to colour, to be excited)"]
    meaning: "rajas, the restless quality of activity"
  - word: "तमः"
    parts: ["tam (to be dark, to grow faint)"]
    meaning: "tamas, the heavy quality of dullness"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"
  - word: "अभिभूय"
    parts: ["abhi (over, against)", "bhū (to be, to become, to overpower)"]
    meaning: "having overpowered, having risen over, having mastered"
  - word: "सत्त्वम्"
    parts: ["as (to be, to exist)", "tva (the quality of being)"]
    meaning: "sattva, the bright quality of harmony and light"
  - word: "भवति"
    parts: ["bhū (to be, to become)"]
    meaning: "comes to be, becomes strong, rises up"
  - word: "भारत"
    parts: ["bharata (Bharata, ancestor of Arjuna's line)"]
    meaning: "O descendant of Bharata (Arjuna)"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and (joined within 'caiva')"
  - word: "एव"
    parts: ["eva (indeed, just, only)"]
    meaning: "indeed, just so (joined within 'caiva')"
  - word: "तथा"
    parts: ["tathā (so, in the same way, likewise)"]
    meaning: "likewise, in the same way"

meaning: >
  Krishna shows that the three qualities are not fixed: they take turns, like
  changing weather inside us. Sometimes sattva rises up and rises over rajas and
  tamas, and we feel calm and clear. At another moment rajas pushes past sattva
  and tamas, and we feel restless and busy. And at still another moment tamas
  covers both sattva and rajas, and we feel heavy and dull. Round and round they
  go, first one and then another taking the lead, all through a single day.

story:
  title: "Aaji and the Day's Three Weathers"
  source: "original"
  body: |
    It had been a strange day for Jeeva. In the morning he had felt wonderful,
    clear-headed and happy, helping Aaji grind the rice, humming a little tune,
    everything making sense. By the hot middle of the day he had been all
    fidgets, racing about the courtyard, wanting to do ten things at once and
    finishing none. And now, in the sleepy late afternoon, he sat slumped against
    the wall, not wanting to do anything at all.

    "Aaji," he said, puzzled, "what is wrong with me? This morning I felt so good
    and bright. Then I felt all jumpy. Now I feel like a wet sack again. It's the
    same me, all in one day!"

    Aaji was painting a long white Warli wall — a row of stick-figures dancing in
    a spiral. She did not stop her brush.

    "Nothing is wrong with you, little one," she said. "Come, look at the sky
    today. What did it do?"

    Jeeva thought. "In the morning it was clear and golden. At midday big white
    clouds came racing across. And just now it's gone grey and still, like it
    might rain."

    "Three weathers in one sky, in one day," said Aaji, dipping her brush. "And
    your mind has three weathers too. The clear bright feeling — that is sattva.
    The racing, jumpy, busy feeling — that is rajas. The heavy, dull, sleepy
    feeling — that is tamas. They take turns, little one. They rise up over one
    another, all day long. First one is on top, then the next pushes it aside,
    then the third covers them both."

    "So I'm not broken?" said Jeeva.

    "Not broken at all," Aaji laughed. "You are weather. Everyone is. The sky
    does not feel ashamed when clouds come, and it does not get proud when the
    sun shines. It just lets the weathers pass through. The clever thing" — she
    pointed her dripping brush at the still, blue patch high above the clouds —
    "is to notice the wide open sky that all three weathers move across. That part
    of you never changes. That part just watches."

    Jeeva tipped his head back and looked at the blue patch between the grey
    clouds. The heavy feeling was still there — but now he was watching it, the
    way Aaji watched the sky, and that made all the difference.

reflection: "Have you noticed your moods changing through a single day — bright, then busy, then sleepy? They take turns like weather. Can you find the quiet 'sky' part of you that simply watches all the weathers come and go?"
