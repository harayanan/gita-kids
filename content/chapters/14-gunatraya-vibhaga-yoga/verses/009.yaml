chapter: 14
verse: 9
speaker: krishna

sanskrit: "सत्त्वं सुखे सञ्जयति रजः कर्मणि भारत। ज्ञानमावृत्य तु तमः प्रमादे सञ्जयत्युत॥"

transliteration: "sattvaṁ sukhe sañjayati rajaḥ karmaṇi bhārata | jñānamāvṛtya tu tamaḥ pramāde sañjayatyuta ||"

dhatu_breakdown:
  - word: "सत्त्वम्"
    parts: ["as (to be, to exist)", "tva (the quality of being)"]
    meaning: "sattva, the pure and shining quality of harmony and light"
  - word: "सुखे"
    parts: ["su (good, easy)", "kha (space, opening)"]
    meaning: "in happiness, in pleasant ease"
  - word: "सञ्जयति"
    parts: ["sam (fully, together)", "sañj (to cling, to attach, to join)"]
    meaning: "makes one cling, fastens, attaches"
  - word: "रजः"
    parts: ["rañj (to colour, to be excited)"]
    meaning: "rajas, the restless quality of passion and activity"
  - word: "कर्मणि"
    parts: ["kṛ (to do, to act)"]
    meaning: "in action, in doing and working"
  - word: "भारत"
