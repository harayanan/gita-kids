meaning: >
  Krishna shares a secret about who is really doing all the doing. Everything
  that happens in the world — running, building, thinking, growing — is the
  work of the three gunas, the three weathers of nature, not of the quiet Self
  who watches. When the wise one truly sees this, that the gunas are the only
  doers, and also knows the Self that rests beyond all three, then that person
  reaches Krishna's own being.

story:
  title: "Bhishma Watches the Wheel Turn"
  source: "Mahabharata"
  body: |
    On the great battlefield, after the fighting had ended for him, old
    Bhishma lay on a bed of arrows, waiting for the right hour to leave his
    body. Around him the war went on — chariots thundered, conches roared,
    dust rose like a brown storm. But Bhishma was very still.

    A young warrior, kneeling beside him, could not understand it. "Grandsire,"
    he whispered, "you were the mightiest of us all. Your arrows fell like
    rain. You held the whole army together. How can you lie here so calm, as
    if none of it was yours?"

    Bhishma opened his eyes. They were clear and unhurried, like a pond at
    dawn. "Listen, child," he said softly. "For many years I thought *I* was
    the doer. I am strong, I told myself. I am brave. I win. But on this bed,
    with the noise all around me, I have been watching. And do you know what I
    see now?"

    The young man leaned closer.

    "I see that it was never truly *me* doing anything," Bhishma said. "It was
    the gunas. When my mind was bright and calm, knowledge came — that was
    sattva working. When I burned to act, to fight, to win, that was rajas
    pushing my arms. When I grew heavy and dull and made my mistakes, that was
    tamas. All the doing was theirs. They rose and fell in me like wind and
    weather."

    He turned his eyes to the wide sky above the dust. "And inside all that
    weather there was something that never moved at all. Something that only
    watched. That is the real me — the seer. Not the strong arms, not the
    racing heart. The quiet one behind them, who belongs to God."

    The young warrior looked at the old man on his hard bed of arrows, and at
    the wild battle still turning all around them, and he felt something open
    in his chest.

    "When you see that the gunas are the doers," Bhishma murmured, "and you
    rest as the quiet one who watches them — then, little one, you have already
    begun to walk home to the Lord."

reflection: "Think of something you 'did' today — running fast, getting cross, feeling sleepy. Can you imagine a quiet watcher inside you who simply saw all of it happen, calm the whole time?"
