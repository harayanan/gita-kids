chapter: 14
verse: 19
speaker: krishna

sanskrit: "नान्यं गुणेभ्यः कर्तारं यदा द्रष्टानुपश्यति। गुणेभ्यश्च परं वेत्ति मद्भावं सोऽधिगच्छति॥"

transliteration: "nānyaṁ guṇebhyaḥ kartāraṁ yadā draṣṭānupaśyati | guṇebhyaśca paraṁ vetti madbhāvaṁ so'dhigacchati ||"

