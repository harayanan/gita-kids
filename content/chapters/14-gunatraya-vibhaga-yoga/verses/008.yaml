chapter: 14
verse: 8
speaker: krishna

sanskrit: "तमस्त्वज्ञानजं विद्धि मोहनं सर्वदेहिनाम्। प्रमादालस्यनिद्राभिस्तन्निबध्नाति भारत॥"

transliteration: "tamastvajñānajaṁ viddhi mohanaṁ sarvadehinām | pramādālasyanidrābhistannibadhnāti bhārata ||"

dhatu_breakdown:
  - word: "तमः"
    parts: ["tam (to be dark, to be still, to grow faint)"]
    meaning: "tamas, the heavy quality of darkness and dullness"
  - word: "तु"
    parts: ["tu (but, and, however)"]
    meaning: "but, now (turning to the next quality)"
  - word: "अज्ञानजम्"
    parts: ["a (not)", "jñā (to know)", "jan (to be born, to arise)"]
    meaning: "born of not-knowing, arising from ignorance"
  - word: "विद्धि"
    parts: ["vid (to know)"]
    meaning: "know! understand this"
  - word: "मोहनम्"
    parts: ["muh (to be confused, to be deluded)"]
    meaning: "deluding, clouding the mind, causing confusion"
  - word: "सर्वदेहिनाम्"
    parts: ["sarva (all)", "dih (to smear, to form a body)", "in (one who has)"]
    meaning: "of all the embodied ones, of every soul living in a body"
  - word: "प्रमादालस्यनिद्राभिः"
    parts: ["pra (forth, away)", "mad (to be careless, to be intoxicated)", "a (not)", "las (to be active, to shine)", "nidrā (sleep)"]
    meaning: "by heedlessness, by laziness, and by sleep"
  - word: "तत्"
    parts: ["tad (that, it)"]
    meaning: "that, it (tamas)"
  - word: "निबध्नाति"
    parts: ["ni (down, firmly)", "bandh (to bind, to tie)"]
    meaning: "binds firmly, ties down"
  - word: "भारत"
    parts: ["bharata (Bharata, ancestor of Arjuna's line)"]
    meaning: "O descendant of Bharata (Arjuna)"

meaning: >
  Now Krishna names the third quality: tamas. It is born of not-knowing, a heavy,
  foggy darkness that confuses every living being. Tamas does not pull you toward
  things like rajas does; instead it makes you not bother at all. It ties the soul
  down with three soft, sticky ropes: not paying attention, being too lazy to act,
  and sleeping when it is time to be awake. The mind grows dim, and the bright,
  clear Self is hidden behind a grey cloud.

story:
  title: "Jeeva's Heavy Afternoon"
  source: "original"
  body: |
    The Warli village lay flat and quiet under the white afternoon sun. Even the
    crows had gone silent. The heat pressed down like a thick brown blanket, and
    Jeeva lay sprawled on the cool mud floor of the veranda, doing absolutely
    nothing.

    He had meant to do many things. He had meant to fetch water for Aaji. He had
    meant to finish the little Warli drawing of a peacock he had started yesterday.
    He had meant to feed the brown calf tied under the mango tree.

    But the afternoon was so heavy. His arms felt like wet sacks of grain. His
    eyes kept sliding half-shut. Every time a thought floated up — *the water,
    the peacock, the calf* — it sank again into a warm grey fog before he could
    catch it.

    "Jeeva," called Aaji from inside, "did you bring the water?"

    "In a little while, Aaji," he mumbled. He did not move. A fly landed on his
    foot. He could not even be bothered to shake it off.

    Aaji came out, wiping her hands, and looked at her grandson lying like a
    dropped puppet. She did not scold. She sat down on the step beside him.

    "Do you feel the heaviness, little one?" she asked softly.

    "Mm," said Jeeva. "I want to do things. But I can't. I just... don't."

    "I know this feeling," said Aaji. "It has a name. Krishna calls it tamas. It
    comes like a grey cloud and sits on top of the mind. It doesn't make you want
    too much, the way a busy day does. It makes you not care at all. You forget
    what you meant to do. You feel too tired to start. Your eyes want only to
    close. And all the while" — she tapped his chest gently — "the bright little
    you is hiding behind the cloud, waiting."

    Jeeva blinked up at her. "How do I make the cloud go away?"

    Aaji smiled and stood, holding out her hand. "Sometimes you just take one
    small step. Stand up. Splash water on your face. The first little movement is
    a door in the grey wall. Shall we?"

    Jeeva groaned, and then, slowly, he took her hand. He stood. The fog tugged
    at him, but the moment his bare feet hit the warm courtyard and the water
    touched his face, a little corner of the grey cloud lifted, and he could
    think clearly again.

reflection: "Have you ever felt so heavy and sleepy that even fun things felt like too much trouble? That foggy not-bothered feeling is tamas. What is one small first step that helps you wake up out of it?"
