chapter: 14
verse: 16
speaker: krishna

sanskrit: "कर्मणः सुकृतस्याहुः सात्त्विकं निर्मलं फलम्। रजसस्तु फलं दुःखमज्ञानं तमसः फलम्॥"

transliteration: "karmaṇaḥ sukṛtasyāhuḥ sāttvikaṁ nirmalaṁ phalam | rajasastu phalaṁ duḥkhamajñānaṁ tamasaḥ phalam ||"

