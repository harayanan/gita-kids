chapter: 14
verse: 3
speaker: krishna

sanskrit: "मम योनिर्महद्ब्रह्म तस्मिन्गर्भं दधाम्यहम्। संभवः सर्वभूतानां ततो भवति भारत॥"

transliteration: "mama yonirmahadbrahma tasmingarbhaṁ dadhāmyaham | sambhavaḥ sarvabhūtānāṁ tato bhavati bhārata ||"

dhatu_breakdown:
  - word: "मम"
    parts: ["mad (me, my)"]
    meaning: "my, of me"
  - word: "योनिः"
    parts: ["yu (to join, to bring forth — yoni, womb, source)"]
    meaning: "the womb, the source from which things are born"
  - word: "महत्"
    parts: ["mah (great, mighty)"]
    meaning: "great, vast"
  - word: "ब्रह्म"
    parts: ["bṛh (to grow, to swell, to be vast)"]
