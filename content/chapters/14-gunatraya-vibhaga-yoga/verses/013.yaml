chapter: 14
verse: 13
speaker: krishna

sanskrit: "अप्रकाशोऽप्रवृत्तिश्च प्रमादो मोह एव च। तमस्येतानि जायन्ते विवृद्धे कुरुनन्दन॥"

transliteration: "aprakāśo'pravṛttiśca pramādo moha eva ca | tamasyetāni jāyante vivṛddhe kurunandana ||"

dhatu_breakdown:
  - word: "अप्रकाशः"
    parts: ["a (not)", "pra (forth)", "kāś (to shine, to give light)"]
    meaning: "no light, dimness, a dull unlit feeling"
  - word: "अप्रवृत्तिः"
    parts: ["a (not)", "pra (forth)", "vṛt (to turn, to set going)"]
    meaning: "no activity, not getting started, sluggishness"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"
  - word: "प्रमादः"
    parts: ["pra (forth, fully)", "mad (to be careless, to be heedless)"]
    meaning: "carelessness, heedlessness, forgetting what matters"
  - word: "मोहः"
    parts: ["muh (to be confused, to be deluded)"]
    meaning: "confusion, muddled thinking, delusion"
  - word: "एव"
    parts: ["eva (indeed, surely)"]
    meaning: "indeed, surely"
  - word: "तमसि"
    parts: ["tam (to be dark, to grow dim)"]
    meaning: "in tamas, in the heavy, dark quality"
  - word: "एतानि"
    parts: ["etad (this, these)"]
    meaning: "these things"
  - word: "जायन्ते"
    parts: ["jan (to be born, to arise)"]
    meaning: "are born, arise, spring up"
  - word: "विवृद्धे"
    parts: ["vi (intensely, greatly)", "vṛdh (to grow, to increase)"]
    meaning: "when it has grown strong, when it has increased"
  - word: "कुरुनन्दन"
    parts: ["kuru (the Kuru family)", "nand (to delight, to gladden)"]
    meaning: "O joy of the Kurus (Krishna's name for Arjuna)"

meaning: >
  Krishna names the signs of the heavy, dark quality called tamas. When tamas
  grows strong inside a person, four things appear together: a dimness, as if
  no light is shining; a stuckness, where nothing gets started; carelessness,
  forgetting the things that matter; and a muddled confusion that clouds the
  mind. "When you feel dull, lazy, forgetful, and foggy all at once," he tells
  Arjuna, "know that tamas has grown big inside you."

story:
  title: "The Lamp That Would Not Light"
  source: "Bhagavata-style telling of the gunas"
  body: |
    In the old stories there once lived a king named Bahula, in a palace where
    a great lamp burned in the council hall, a wide brass lamp with a hundred
    wicks that lit the whole room gold.

    For years King Bahula ruled well. But slowly a heaviness crept over him. He
    began to sleep late, then later, then half the day. When ministers brought
    him scrolls to read, his eyes slid off the words; the letters seemed dim,
    as though a grey cloth lay over them. "Later," he would mumble. "Tomorrow."
    But tomorrow he did nothing either.

    The roads cracked and no one was sent to mend them. The granary doors hung
    open and no one was told to shut them. When a servant asked, "Maharaja,
    what shall we do?" the king only blinked, confused, as if he had forgotten
    there was a kingdom at all.

    One evening an old wandering teacher came to the hall and found the great
    hundred-wick lamp gone dark. Dust had clogged the wicks. No one had thought
    to clean or light it.

    "Maharaja," said the teacher gently, "look at your lamp. It is not broken.
    The oil is still in it, the wicks are still there. But dust has covered it,
    and no hand has lit it, and so the whole hall sits in shadow."

    The king stared at the cold lamp.

    "That is tamas," the teacher said. "The heavy quality. It does not break
    you — it covers you. The light is still inside, but it stops shining. You
    stop starting things. You forget what is dear to you. Your thoughts go
    foggy, like a room with no lamp lit. Dimness, stuckness, carelessness,
    confusion — these four come knocking together."

    King Bahula rose slowly, took a cloth, and wiped the dust from one single
    wick. He set a flame to it. A small steady light bloomed in the dark hall.

    "One wick," murmured the teacher, smiling. "That is how you begin to come
    back. You do not fight the dark. You light one small lamp, and then the
    next."

reflection: "Sometimes everything feels dim and heavy, and you can't be bothered to start anything or even remember what you wanted to do. Krishna calls that tamas. What is one tiny thing — one 'wick' — you could light to start coming out of a foggy, heavy mood?"
