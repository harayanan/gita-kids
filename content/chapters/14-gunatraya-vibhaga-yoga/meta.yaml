slug: 14-gunatraya-vibhaga-yoga
name: The Yoga of the Three Qualities
sanskrit_name: गुणत्रयविभागयोग
transliterated_name: Gunatraya Vibhāga Yoga
verse_count: 27
folk_art_style: warli
summary: >
  Krishna explains that everything in nature is made of three qualities, like
  three colors mixing together. Sattva is calm and bright like sunshine. Rajas
  is restless and energetic like a storm. Tamas is heavy and sleepy like a
  dark cloud. The goal is to rise above all three and become truly free.
