chapter: 4
verse: 33
speaker: krishna

sanskrit: "श्रेयान्द्रव्यमयाद्यज्ञाज्ज्ञानयज्ञः परन्तप। सर्वं कर्माखिलं पार्थ ज्ञाने परिसमाप्यते॥"

transliteration: "śreyāndravyamayādyajñājjñānayajñaḥ parantapa | sarvaṁ karmākhilaṁ pārtha jñāne parisamāpyate ||"

dhatu_breakdown:
  - word: "श्रेयान्"
    parts: ["śrī (to be excellent, to surpass)"]
    meaning: "better, more excellent"
  - word: "द्रव्यमयात्"
    parts: ["dru (substance, material thing)", "maya (made of)"]
    meaning: "than the one made of material things"
  - word: "यज्ञात्"
    parts: ["yaj (to sacrifice, to worship)"]
    meaning: "than the sacrifice"
  - word: "ज्ञानयज्ञः"
    parts: ["jñā (to know)", "yaj (to sacrifice, to worship)"]
    meaning: "the sacrifice of knowledge"
  - word: "परन्तप"
    parts: ["para (enemy, other)", "tap (to burn, to scorch)"]
    meaning: "O scorcher of enemies — a name for Arjuna"
  - word: "सर्वम्"
    parts: ["sarva (all)"]
    meaning: "all"
  - word: "कर्म"
