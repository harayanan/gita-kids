chapter: 4
verse: 12
speaker: krishna

sanskrit: "काङ्क्षन्तः कर्मणां सिद्धिं यजन्त इह देवताः। क्षिप्रं हि मानुषे लोके सिद्धिर्भवति कर्मजा॥"

transliteration: "kāṅkṣantaḥ karmaṇāṁ siddhiṁ yajanta iha devatāḥ | kṣipraṁ hi mānuṣe loke siddhirbhavati karmajā ||"

