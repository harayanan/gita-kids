chapter: 4
verse: 5
speaker: krishna

sanskrit: "श्रीभगवानुवाच। बहूनि मे व्यतीतानि जन्मानि तव चार्जुन। तान्यहं वेद सर्वाणि न त्वं वेत्थ परन्तप॥"

transliteration: "śrībhagavānuvāca | bahūni me vyatītāni janmāni tava cārjuna | tānyahaṁ veda sarvāṇi na tvaṁ vettha parantapa ||"

