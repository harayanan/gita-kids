chapter: 4
verse: 42
speaker: krishna

sanskrit: "तस्मादज्ञानसम्भूतं हृत्स्थं ज्ञानासिनात्मनः। छित्त्वैनं संशयं योगमातिष्ठोत्तिष्ठ भारत॥"

transliteration: "tasmādajñānasambhūtaṁ hṛtsthaṁ jñānāsinātmanaḥ | chittvainaṁ saṁśayaṁ yogamātiṣṭhottiṣṭha bhārata ||"

