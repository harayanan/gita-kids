chapter: 4
verse: 13
speaker: krishna

sanskrit: "चातुर्वर्ण्यं मया सृष्टं गुणकर्मविभागशः। तस्य कर्तारमपि मां विद्ध्यकर्तारमव्ययम्॥"

transliteration: "cāturvarṇyaṁ mayā sṛṣṭaṁ guṇakarmavibhāgaśaḥ | tasya kartāramapi māṁ viddhyakartāramavyayam ||"

