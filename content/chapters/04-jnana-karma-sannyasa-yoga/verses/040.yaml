    parts: ["sam (around, back and forth)", "śī (to lie, to waver)", "ātman (self, mind)"]
    meaning: "one whose mind is full of doubt"
  - word: "विनश्यति"
    parts: ["vi (apart, away)", "naś (to perish, to be lost)"]
    meaning: "is lost, comes to ruin"
