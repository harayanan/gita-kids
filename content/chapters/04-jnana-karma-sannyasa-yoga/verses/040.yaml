chapter: 4
verse: 40
speaker: krishna

sanskrit: "अज्ञश्चाश्रद्दधानश्च संशयात्मा विनश्यति। नायं लोकोऽस्ति न परो न सुखं संशयात्मनः॥"

transliteration: "ajñaścāśraddadhānaśca saṁśayātmā vinaśyati | nāyaṁ loko'sti na paro na sukhaṁ saṁśayātmanaḥ ||"

dhatu_breakdown:
  - word: "अज्ञः"
    parts: ["a (not)", "jñā (to know)"]
    meaning: "the one who does not know, the ignorant"
  - word: "अश्रद्दधानः"
    parts: ["a (not)", "śrat (heart, trust)", "dhā (to place, to hold)"]
    meaning: "the one who holds no faith, the faithless"
