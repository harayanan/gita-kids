chapter: 4
verse: 4
speaker: arjuna

sanskrit: "अर्जुन उवाच। अपरं भवतो जन्म परं जन्म विवस्वतः। कथमेतद्विजानीयां त्वमादौ प्रोक्तवानिति॥"

transliteration: "arjuna uvāca | aparaṁ bhavato janma paraṁ janma vivasvataḥ | kathametadvijānīyāṁ tvamādau proktavāniti ||"

