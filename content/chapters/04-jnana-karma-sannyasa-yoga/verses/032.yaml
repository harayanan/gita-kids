chapter: 4
verse: 32
speaker: krishna

sanskrit: "एवं बहुविधा यज्ञा वितता ब्रह्मणो मुखे। कर्मजान्विद्धि तान्सर्वानेवं ज्ञात्वा विमोक्ष्यसे॥"

transliteration: "evaṁ bahuvidhā yajñā vitatā brahmaṇo mukhe | karmajānviddhi tānsarvānevaṁ jñātvā vimokṣyase ||"

