chapter: 4
verse: 28
speaker: krishna

sanskrit: "द्रव्ययज्ञास्तपोयज्ञा योगयज्ञास्तथापरे। स्वाध्यायज्ञानयज्ञाश्च यतयः संशितव्रताः॥"

transliteration: "dravyayajñāstapoyajñā yogayajñāstathāpare | svādhyāyajñānayajñāśca yatayaḥ saṁśitavratāḥ ||"

dhatu_breakdown:
  - word: "द्रव्ययज्ञाः"
    parts: ["dru (to flow, to be fluid — root of dravya, substance/wealth)", "yaj (to offer, to sacrifice)"]
    meaning: "those whose sacrifice is the giving of wealth and goods"
  - word: "तपोयज्ञाः"
    parts: ["tap (to heat, to burn, to practice austerity)", "yaj (to offer, to sacrifice)"]
    meaning: "those whose sacrifice is austerity — hard, simple self-discipline"
  - word: "योगयज्ञाः"
    parts: ["yuj (to join, to yoke, to unite)", "yaj (to offer, to sacrifice)"]
    meaning: "those whose sacrifice is the practice of yoga (steady inner union)"
  - word: "तथा"
    parts: ["tathā (likewise, in the same way)"]
    meaning: "and likewise"
  - word: "अपरे"
    parts: ["apara (other, some others)"]
    meaning: "still others"
  - word: "स्वाध्यायज्ञानयज्ञाः"
    parts: ["sva (one's own)", "adhi (over, upon)", "i (to go — root of adhyāya, study)", "jñā (to know — root of jñāna, knowledge)", "yaj (to offer, to sacrifice)"]
    meaning: "those whose sacrifice is the study of sacred wisdom and the pursuit of knowledge"
  - word: "यतयः"
    parts: ["yat (to strive, to make effort)"]
    meaning: "strivers, those who try hard on the path"
  - word: "संशितव्रताः"
    parts: ["sam (fully, completely)", "śo (to sharpen, to make keen)", "vrata (vow, sacred resolve)"]
    meaning: "those whose vows are kept sharp and firm"

meaning: >
  Krishna lists yet more kinds of offering, because there are so many honest ways
  to give. Some people offer their wealth and goods to help others. Some offer the
  comfort of an easy life and choose simple, hard discipline instead. Some offer
  through steady yoga practice. And some offer through study and the patient
  gathering of wisdom. All of these are strivers who hold their promises sharp and
  firm, never letting them go dull.

story:
  title: "Four Travellers on One Road"
  source: "original"
  body: |
    "I have named offering after offering," Krishna said as the first grey light
    touched the eastern sky, "and you may wonder how to remember them all. So let
    me show you four travellers I once met on a single road, each carrying a
    different gift."

    Arjuna sat up. The camp was beginning to wake.

    "The first traveller was a merchant," Krishna said, "with a cart heavy with
    grain and cloth. But he did not hoard it. At every village he gave — to the
    hungry, to the old, to the family whose roof had fallen in. His sacrifice was
    his wealth. He offered his goods, and his cart grew lighter, and his heart grew
    lighter with it."

    "The second?" Arjuna asked.

    "A thin, sun-browned woman who owned almost nothing. She had chosen a hard,
    plain life on purpose — little food, little comfort, sleeping on the bare
    ground. Not to punish herself, but to grow strong and simple inside. Her
    sacrifice was austerity. She offered up ease, and gained a quiet she would not
    trade for any soft bed."

    A bird began to sing somewhere in the brightening dark.

    "The third traveller sat unmoving beneath a tree, eyes half-closed, breath
    slow, gathering his whole scattered self into one steady stillness. His
    sacrifice was the practice of yoga — the long, patient work of holding the
    mind in union. He gave his restlessness and received his calm."

    "And the last?"

    "A young scholar," Krishna smiled, "with a worn bundle of texts and ink stains
    on his fingers. Day after day he studied the old wisdom, turning each teaching
    over until it became truly his own. His sacrifice was study and knowledge. He
    offered his idle hours to learning, and grew wiser with every page."

    Krishna looked at Arjuna.

    "Four travellers, four gifts — wealth, hardship, stillness, study. They walked
    different parts of the road, but all of them were strivers, and all of them
    kept their vows sharp and bright, never letting their promises grow dull. That
    is what they shared, and that is what matters."

    The sun lifted over the rim of the world, and the whole plain turned to gold.

reflection: "Some people help by giving things, some by working hard, some by being calm, some by learning. Which of these four ways feels most like you — and which would you like to grow better at?"
