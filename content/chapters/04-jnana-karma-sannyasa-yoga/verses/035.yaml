chapter: 4
verse: 35
speaker: krishna

sanskrit: "यज्ज्ञात्वा न पुनर्मोहमेवं यास्यसि पाण्डव। येन भूतान्यशेषेण द्रक्ष्यस्यात्मन्यथो मयि॥"

transliteration: "yajjñātvā na punarmohamevaṁ yāsyasi pāṇḍava | yena bhūtānyaśeṣeṇa drakṣyasyātmanyatho mayi ||"

