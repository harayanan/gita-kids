chapter: 4
verse: 22
speaker: krishna

sanskrit: "यदृच्छालाभसन्तुष्टो द्वन्द्वातीतो विमत्सरः। समः सिद्धावसिद्धौ च कृत्वापि न निबध्यते॥"

transliteration: "yadṛcchālābhasantuṣṭo dvandvātīto vimatsaraḥ | samaḥ siddhāvasiddhau ca kṛtvāpi na nibadhyate ||"

dhatu_breakdown:
  - word: "यदृच्छा"
    parts: ["yad (which, whatever)", "ṛch (to come, to arrive)"]
    meaning: "whatever comes of its own accord, unsought"
  - word: "लाभ"
    parts: ["labh (to gain, to obtain)"]
    meaning: "gain, what is received"
  - word: "सन्तुष्टः"
    parts: ["sam (fully, completely)", "tuṣ (to be satisfied, to be content)"]
    meaning: "fully content, satisfied"
  - word: "द्वन्द्वातीतः"
    parts: ["dvandva (pair of opposites)", "ati (beyond)", "i (to go)"]
    meaning: "gone beyond the pairs of opposites (like hot and cold, pleasure and pain)"
  - word: "विमत्सरः"
    parts: ["vi (free from, away from)", "matsara (envy, jealousy)"]
    meaning: "free from envy"
  - word: "समः"
    parts: ["sam (even, equal)"]
    meaning: "even-minded, the same"
  - word: "सिद्धौ"
    parts: ["sidh (to succeed, to accomplish)"]
    meaning: "in success"
  - word: "असिद्धौ"
    parts: ["a (not)", "sidh (to succeed, to accomplish)"]
    meaning: "in failure"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"
  - word: "कृत्वा"
    parts: ["kṛ (to do, to act)"]
    meaning: "having acted, having done"
  - word: "अपि"
    parts: ["api (even, also)"]
    meaning: "even (even having acted)"
  - word: "न"
    parts: ["na (not)"]
    meaning: "not"
  - word: "निबध्यते"
    parts: ["ni (down, firmly)", "bandh (to bind, to tie)"]
    meaning: "is bound, is tied down"

meaning: >
  Krishna describes the person who has found peace. Such a person is happy with
  whatever comes to them on its own, without grabbing or grasping for more. They
  stay calm whether things are warm or cold, easy or hard, and they never feel
  jealous of others. Win or lose, they treat both the same — and because of this,
  even when they act, the action never traps them.

story:
  title: "The Boatman Who Took the River As It Came"
  source: "original"
  body: |
    On the slow bend of a river near the camps, there lived a boatman named
    Devala. Krishna once spoke of him to Arjuna while the horses drank at the
    water's edge.

    "Every morning," Krishna said, "Devala pushed his boat from the bank and
    asked the river for nothing. Some days travellers came and filled his boat
    with coins. Some days no one came at all, and he ate only the rice he had.
    He did not chase the busy days or sulk through the empty ones. He simply
    rowed."

    Arjuna listened, watching the current pull at the reeds.

    "One summer," Krishna went on, "the heat cracked the mud and the river
    shrank to a thread. The next monsoon it swelled so wide it swallowed three
    fields. Heat and flood, drought and storm — Devala met them all with the
    same steady arms. He did not curse the sun, and he did not boast about the
    rains. To him they were two faces of the one river he had always loved."

    A heron lifted off the far bank.

    "There was a richer boatman downstream," Krishna said, "with a finer boat
    and a brighter sail. The other villagers praised that boat often. But Devala
    felt no sting when they did. He looked at the fine sail the way he looked at
    a cloud, something pretty passing by, no concern of his. There was no room
    for envy in a heart already full."

    "And his work?" Arjuna asked.

    "He worked hard. He rowed against currents that would tire a strong man. He
    repaired his boat and carried heavy loads. Yet the work never owned him.
    When a crossing went well, he did not swell with pride. When a passenger
    slipped and the coins fell into the water, he did not break with grief. He
    untied his boat each dawn and tied it each dusk, and in between he was free."

    Krishna turned the reins gently in his hands.

    "That, Arjuna, is the secret. It is not that Devala did nothing. He did a
    great deal. But he took each gain as it floated to him, stayed level through
    every opposite, envied no one, and weighed success and failure on the same
    quiet scale. So the rope of his work never tightened around him."

    The river moved on, indifferent and kind, the way it always had.

reflection: "When you don't get something you wanted — a turn in a game, a treat, a prize — can you let it go as easily as Devala let the empty days pass?"
