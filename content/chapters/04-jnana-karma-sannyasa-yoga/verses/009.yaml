chapter: 4
verse: 9
speaker: krishna

sanskrit: "जन्म कर्म च मे दिव्यमेवं यो वेत्ति तत्त्वतः। त्यक्त्वा देहं पुनर्जन्म नैति मामेति सोऽर्जुन॥"

transliteration: "janma karma ca me divyamevaṁ yo vetti tattvataḥ | tyaktvā dehaṁ punarjanma naiti māmeti so'rjuna ||"

