chapter: 4
verse: 23
speaker: krishna

sanskrit: "गतसङ्गस्य मुक्तस्य ज्ञानावस्थितचेतसः। यज्ञायाचरतः कर्म समग्रं प्रविलीयते॥"

transliteration: "gatasaṅgasya muktasya jñānāvasthitacetasaḥ | yajñāyācarataḥ karma samagraṁ pravilīyate ||"

dhatu_breakdown:
  - word: "गतसङ्गस्य"
    parts: ["gam (to go, to depart)", "sañj (to cling, to attach)"]
    meaning: "of one whose attachment has gone away"
  - word: "मुक्तस्य"
    parts: ["muc (to release, to free)"]
    meaning: "of the freed one, of the liberated"
  - word: "ज्ञान"
    parts: ["jñā (to know)"]
    meaning: "knowledge, wisdom"
  - word: "अवस्थित"
    parts: ["ava (down, firmly)", "sthā (to stand, to be established)"]
    meaning: "firmly established, settled"
  - word: "चेतसः"
    parts: ["cit (to be aware, to think)"]
    meaning: "of one whose mind or awareness"
  - word: "यज्ञाय"
    parts: ["yaj (to offer, to sacrifice, to worship)"]
    meaning: "for the sake of sacrifice (an act of selfless offering)"
  - word: "आचरतः"
    parts: ["ā (toward, fully)", "car (to move, to perform)"]
    meaning: "of one who performs, who acts"
  - word: "कर्म"
    parts: ["kṛ (to do, to act)"]
    meaning: "action, the deed"
  - word: "समग्रम्"
    parts: ["sam (together, wholly)", "agra (front, whole extent)"]
    meaning: "entirely, completely, in full"
  - word: "प्रविलीयते"
    parts: ["pra (forth, away)", "vi (apart)", "lī (to dissolve, to melt)"]
    meaning: "dissolves away completely, melts entirely"

meaning: >
  Krishna explains what happens to the actions of a truly free person. When
  someone has let go of clinging, has become free inside, keeps their mind
  steady in wisdom, and does everything as an offering rather than for selfish
  reward — then all of their actions simply melt away. The deeds leave no sticky
  trace behind, the way warm sun melts a knot of ice until no ice is left.

story:
  title: "The Salt Doll and the Sea"
  source: "original"
  body: |
    That evening Arjuna asked, "You say a freed person's deeds dissolve. How can
    a deed dissolve? It is done. It stays done."

    Krishna smiled and told him an old story.

    "Long ago, a doll made of salt set out to measure the depth of the sea. She
    was a curious little thing, proud of her senses, certain she could weigh and
    count the whole world. She marched down to the shore. 'I will walk in,' she
    declared, 'and tell everyone exactly how deep the ocean is.'"

    The horses had been unyoked; the camp was settling into firelight.

    "The salt doll stepped into the shallows. At once a little of her foot
    softened and joined the water. She did not notice. She went deeper. Her
    ankles, then her knees, dissolved into the sea — and a strange thing happened.
    The further she went, the less of her was left to cling to fear, to pride, to
    the wish to come back and boast. Each step let go of her."

    Arjuna leaned closer.

    "By the time she reached the deep water, there was no doll at all. Only sea.
    The measuring was complete, you might say — but there was no one separate left
    to carry the measurement home. Her whole self had melted into the very thing
    she went to know."

    "So she failed," Arjuna said.

    "She succeeded," said Krishna, "more completely than she dreamed. She wanted
    to know the sea. In the end she did not stand apart and study it — she became
    it. That is the freed person and their actions. When a person has dropped
    clinging, rests firm in knowing, and offers each deed up instead of hoarding
    its reward, the deed does not pile up behind them like a wall. It dissolves,
    the way the salt dissolved, until there is nothing left to bind and nowhere
    left to hide."

    The fire popped. Somewhere a sentry called the watch.

    "Do your work as an offering, Arjuna, and your work will not chain you to it.
    The salt that returns to the sea was never lost. It only came home."

reflection: "When you help someone and don't tell anyone you did it, the good deed feels light and quiet. Can you remember a time you did something kind just for the doing, not the praise?"
