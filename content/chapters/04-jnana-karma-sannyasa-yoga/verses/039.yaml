chapter: 4
verse: 39
speaker: krishna

sanskrit: "श्रद्धावाँल्लभते ज्ञानं तत्परः संयतेन्द्रियः। ज्ञानं लब्ध्वा परां शान्तिमचिरेणाधिगच्छति॥"

transliteration: "śraddhāvāṁllabhate jñānaṁ tatparaḥ saṁyatendriyaḥ | jñānaṁ labdhvā parāṁ śāntimacireṇādhigacchati ||"

dhatu_breakdown:
  - word: "श्रद्धावान्"
    parts: ["śrat (heart, trust)", "dhā (to place, to hold)"]
    meaning: "one who holds faith, the trusting one"
  - word: "लभते"
    parts: ["labh (to gain, to obtain)"]
    meaning: "gains, obtains"
  - word: "ज्ञानम्"
    parts: ["jñā (to know)"]
    meaning: "knowledge"
  - word: "तत्परः"
    parts: ["tat (that)", "para (devoted to, intent on)"]
    meaning: "devoted to that, wholly set on it"
  - word: "संयतेन्द्रियः"
    parts: ["sam (together)", "yam (to hold, to restrain)", "indriya (the senses)"]
    meaning: "one who holds the senses steady"
  - word: "लब्ध्वा"
    parts: ["labh (to gain, to obtain)"]
    meaning: "having gained"
  - word: "पराम्"
    parts: ["para (highest, supreme)"]
    meaning: "supreme, highest"
  - word: "शान्तिम्"
    parts: ["śam (to be calm, to be at peace)"]
    meaning: "peace"
  - word: "अचिरेण"
    parts: ["a (not)", "cira (long while)"]
    meaning: "before long, soon"
  - word: "अधिगच्छति"
    parts: ["adhi (towards, upon)", "gam (to go, to reach)"]
    meaning: "reaches, attains"

meaning: >
  Krishna explains who actually receives this knowledge. It comes to the person
  who trusts with an open heart, who keeps their attention set on the truth, and
  who holds their restless senses steady instead of being pulled this way and that.
  And once such a person has found knowledge, Krishna says, they very soon reach
  the highest peace of all.

story:
  title: "The Three Lamps of Nala"
  source: "original"
  body: |
    There was once a student named Nala who wished, more than anything, to
    understand. He went from teacher to teacher, but the wisdom never
    seemed to stay with him. At last he came to a forest hermit who knew
    Krishna's teaching, and asked why understanding always slipped through
    his fingers.

    The hermit handed him three small clay lamps and a flask of oil.
    "Light these," he said, "and we will see."

    Nala lit the first lamp. "This flame," said the hermit, "is trust.
    When you listen to a teaching, do you listen with an open heart — or
    do you cross your arms and wait to argue? A doubting heart blows its
    own lamp out before the lesson is even finished."

    Nala thought of all the times he had half-listened, already sure he
    knew better. He lit the second lamp more carefully.

    "This flame," said the hermit, "is attention. Where does your mind go
    while you study? Does it stay on the truth before you, or does it
    wander to your supper and your worries and the noise outside? A
    scattered mind is a lamp set in a draught."

    Nala remembered a hundred lessons he had let drift past him while his
    thoughts ran elsewhere. He cupped his hand around the third lamp.

    "And this flame," said the hermit, "is a steady hold on the senses.
    Your eyes chase every pretty thing, your ears chase every sound, and
    they drag your mind along behind them like a calf on a rope. Quiet
    them, and the flame stands tall and still."

    The three little lamps burned together now, steady and bright, and
    their light filled the hut.

    "When all three burn at once," the hermit said, "knowledge comes to
    you and stays. And the one who truly comes to know — listen well,
    Nala — does not have to wait long after that. Very soon a great peace
    settles over him, the highest peace there is, the kind nothing in the
    world can shake."

    Nala looked at the three steady flames, and for the first time none of
    them flickered. He understood that he had been trying to grasp wisdom
    with his hands, when all along he needed only to keep his three small
    lamps burning.

    Outside, the forest was very quiet, as though it too were listening.

reflection: "Of the three lamps — an open and trusting heart, steady attention, and calm senses — which one is hardest for you to keep lit, and what makes it flicker?"
