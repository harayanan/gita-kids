chapter: 4
verse: 6
speaker: krishna

sanskrit: "अजोऽपि सन्नव्ययात्मा भूतानामीश्वरोऽपि सन्। प्रकृतिं स्वामधिष्ठाय सम्भवाम्यात्ममायया॥"

transliteration: "ajo'pi sannavyayātmā bhūtānāmīśvaro'pi san | prakṛtiṁ svāmadhiṣṭhāya sambhavāmyātmamāyayā ||"

