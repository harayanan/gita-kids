chapter: 4
verse: 31
speaker: krishna

sanskrit: "यज्ञशिष्टामृतभुजो यान्ति ब्रह्म सनातनम्। नायं लोकोऽस्त्ययज्ञस्य कुतोऽन्यः कुरुसत्तम॥"

transliteration: "yajñaśiṣṭāmṛtabhujo yānti brahma sanātanam | nāyaṁ loko'styayajñasya kuto'nyaḥ kurusattama ||"

