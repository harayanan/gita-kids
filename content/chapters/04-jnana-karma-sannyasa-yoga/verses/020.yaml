chapter: 4
verse: 20
speaker: krishna

sanskrit: "त्यक्त्वा कर्मफलासङ्गं नित्यतृप्तो निराश्रयः। कर्मण्यभिप्रवृत्तोऽपि नैव किञ्चित्करोति सः॥"

transliteration: "tyaktvā karmaphalāsaṅgaṁ nityatṛpto nirāśrayaḥ | karmaṇyabhipravṛtto'pi naiva kiñcitkaroti saḥ ||"

dhatu_breakdown:
  - word: "त्यक्त्वा"
    parts: ["tyaj (to give up, to let go)", "tvā (having done — gerund ending)"]
    meaning: "having let go, having abandoned"
  - word: "कर्मफलासङ्गम्"
    parts: ["kṛ (to do, to act)", "phala (fruit, reward)", "ā (toward)", "sañj (to cling, to attach)"]
    meaning: "the clinging to the fruits of action"
  - word: "नित्यतृप्तः"
    parts: ["nitya (always, ever)", "tṛp (to be satisfied, to be content)"]
    meaning: "ever content, always satisfied"
  - word: "निराश्रयः"
    parts: ["nir (without, free of)", "ā (toward)", "śri (to lean on, to depend on)"]
    meaning: "depending on nothing, leaning on no support"
  - word: "कर्मणि"
    parts: ["kṛ (to do, to act)"]
    meaning: "in action, in work"
  - word: "अभिप्रवृत्तः"
    parts: ["abhi (toward, fully)", "pra (forth)", "vṛt (to turn, to engage)"]
    meaning: "fully engaged, busily occupied"
  - word: "अपि"
    parts: ["api (even, although)"]
    meaning: "even though"
  - word: "न"
    parts: ["na (not)"]
    meaning: "not"
  - word: "एव"
    parts: ["eva (indeed, at all)"]
    meaning: "at all (emphasis)"
  - word: "किञ्चित्"
    parts: ["kiñcit (anything, something)"]
    meaning: "anything"
  - word: "करोति"
    parts: ["kṛ (to do, to act)"]
    meaning: "does, performs"
  - word: "सः"
    parts: ["saḥ (he, that one)"]
    meaning: "he, that person"

meaning: >
  When someone lets go of clinging to the rewards of their work, they become
  always content and need to lean on nothing outside themselves. Even when
  such a person is busy doing all sorts of things, deep inside it is as if
  they are not doing anything at all: they stay calm, free, and untouched.

story:
  title: "The Hands That Stay Free"
  source: "original"
  body: |
    "There is a kind of freedom," Krishna said, "that you can carry with you
    even when your hands are full."

    Arjuna looked down at his own hands, calloused from years of holding a
    bow.

    "Once," Krishna went on, "I knew a gardener who tended the grounds of a
    great temple. From sunrise he worked: pulling weeds, carrying water,
    trimming the flowering vines, sweeping the stone paths until they shone.
    He never stopped moving. A traveller watching him might say, *what a
    busy man, what a heavy load he carries.*"

    "But here was his secret. The gardener had long ago let go of grabbing
    at the fruit of his work. He did not toil for praise. He did not fret,
    *will the master thank me, will I be paid more, will people admire my
    roses.* He simply did the work in front of him, well and gladly, and
    then let it go."

    The cooking fire across the field had burned down to glowing coals.

    "And because he wanted nothing in return," Krishna said, "he was always
    content. Each day was already enough. He did not need to lean on this
    reward or that compliment to feel whole. He leaned on nothing, depended
    on nothing, and so nothing could knock him over. Praise did not puff him
    up. Scorn did not crush him. He was free."

    Arjuna frowned, puzzled. "But he worked from dawn to dusk. How can you
    say he was free of work?"

    "Ah," said Krishna. "His body worked, yes. But inside, where it truly
    matters, he was so unburdened, so untroubled, so utterly at peace, that
    it was as if he did nothing at all. The work passed through him like
    water through open fingers. It never stuck. It never weighed him down.
    Though he was busy from morning to night, in his heart he carried no
    heavy load."

    Krishna looked out at the waiting armies.

    "That is the freedom I want for you, Arjuna. Not empty hands — but hands
    that stay free even while they are full."

reflection: "Have you ever helped someone without wanting anything back, and felt light and happy afterward? What made that feeling possible?"
