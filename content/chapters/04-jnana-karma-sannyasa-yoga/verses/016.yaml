chapter: 4
verse: 16
speaker: krishna

sanskrit: "किं कर्म किमकर्मेति कवयोऽप्यत्र मोहिताः। तत्ते कर्म प्रवक्ष्यामि यज्ज्ञात्वा मोक्ष्यसेऽशुभात्॥"

transliteration: "kiṁ karma kimakarmeti kavayo'pyatra mohitāḥ | tatte karma pravakṣyāmi yajjñātvā mokṣyase'śubhāt ||"

