chapter: 4
verse: 3
speaker: krishna

sanskrit: "स एवायं मया तेऽद्य योगः प्रोक्तः पुरातनः। भक्तोऽसि मे सखा चेति रहस्यं ह्येतदुत्तमम्॥"

transliteration: "sa evāyaṁ mayā te'dya yogaḥ proktaḥ purātanaḥ | bhakto'si me sakhā ceti rahasyaṁ hyetaduttamam ||"

