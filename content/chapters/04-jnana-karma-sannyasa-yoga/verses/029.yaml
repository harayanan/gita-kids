    parts: ["apa (down, away)", "an (to breathe)"]
    meaning: "in the outgoing, downward breath"
  - word: "जुह्वति"
    parts: ["hu (to offer, to pour as an offering)"]
    meaning: "they offer, they pour as a sacrifice"
