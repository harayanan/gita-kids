chapter: 4
verse: 29
speaker: krishna

sanskrit: "अपाने जुह्वति प्राणं प्राणेऽपानं तथापरे। प्राणापानगती रुद्ध्वा प्राणायामपरायणाः॥"

transliteration: "apāne juhvati prāṇaṁ prāṇe'pānaṁ tathāpare | prāṇāpānagatī ruddhvā prāṇāyāmaparāyaṇāḥ ||"

