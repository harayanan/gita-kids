chapter: 4
verse: 1
speaker: krishna

sanskrit: "श्रीभगवानुवाच। इमं विवस्वते योगं प्रोक्तवानहमव्ययम्। विवस्वान्मनवे प्राह मनुरिक्ष्वाकवेऽब्रवीत्॥"

transliteration: "śrībhagavānuvāca | imaṁ vivasvate yogaṁ proktavānahamavyayam | vivasvānmanave prāha manurikṣvākave'bravīt ||"

