    parts: ["abhi (toward, up)", "ud (up)", "sthā (to stand, to rise)"]
    meaning: "a rising up, a swelling"
  - word: "अधर्मस्य"
    parts: ["a (not, against)", "dhṛ (to hold, to uphold)"]
    meaning: "of adharma, of wrongdoing that tears the world apart"
  - word: "तदा"
    parts: ["tadā (then, at that time)"]
    meaning: "then, at that very time"
  - word: "आत्मानम्"
    parts: ["ātman (self)"]
