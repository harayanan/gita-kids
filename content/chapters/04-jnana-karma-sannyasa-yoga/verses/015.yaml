chapter: 4
verse: 15
speaker: krishna

sanskrit: "एवं ज्ञात्वा कृतं कर्म पूर्वैरपि मुमुक्षुभिः। कुरु कर्मैव तस्मात्त्वं पूर्वैः पूर्वतरं कृतम्॥"

transliteration: "evaṁ jñātvā kṛtaṁ karma pūrvairapi mumukṣubhiḥ | kuru karmaiva tasmāttvaṁ pūrvaiḥ pūrvataraṁ kṛtam ||"

