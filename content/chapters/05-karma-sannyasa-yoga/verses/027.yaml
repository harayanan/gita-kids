chapter: 5
verse: 27
speaker: krishna

sanskrit: "स्पर्शान्कृत्वा बहिर्बाह्यांश्चक्षुश्चैवान्तरे भ्रुवोः। प्राणापानौ समौ कृत्वा नासाभ्यन्तरचारिणौ॥"

transliteration: "sparśānkṛtvā bahirbāhyāṁścakṣuścaivāntare bhruvoḥ | prāṇāpānau samau kṛtvā nāsābhyantaracāriṇau ||"

