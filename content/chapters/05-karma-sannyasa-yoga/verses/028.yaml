chapter: 5
verse: 28
speaker: krishna

sanskrit: "यतेन्द्रियमनोबुद्धिर्मुनिर्मोक्षपरायणः। विगतेच्छाभयक्रोधो यः सदा मुक्त एव सः॥"

transliteration: "yatendriyamanobuddhirmunirmokṣaparāyaṇaḥ | vigatecchābhayakrodho yaḥ sadā mukta eva saḥ ||"

dhatu_breakdown:
  - word: "यतेन्द्रियमनोबुद्धिः"
    parts: ["yam (to restrain, to hold)", "indriya (sense)", "manas (mind)", "buddhi (intellect)"]
    meaning: "whose senses, mind, and intellect are held steady"
  - word: "मुनिः"
    parts: ["man (to think, to be silent)"]
    meaning: "the sage, the silent thinker"
  - word: "मोक्षपरायणः"
    parts: ["muc (to release, to free)", "para (highest)", "ayana (going, refuge)"]
    meaning: "wholly devoted to freedom, whose goal is liberation"
  - word: "विगतेच्छाभयक्रोधः"
    parts: ["vi (apart)", "gam (to go)", "icchā (desire)", "bhaya (fear)", "krodha (anger)"]
    meaning: "from whom desire, fear, and anger have gone away"
  - word: "यः"
    parts: ["yaḥ (who)"]
    meaning: "who, the one who"
  - word: "सदा"
    parts: ["sadā (always)"]
    meaning: "always, forever"
  - word: "मुक्तः"
    parts: ["muc (to release, to free)"]
    meaning: "freed, liberated"
  - word: "एव"
    parts: ["eva (indeed)"]
    meaning: "indeed, truly"
  - word: "सः"
    parts: ["saḥ (he, that one)"]
    meaning: "he, that person"

meaning: >
  Krishna continues: the sage who holds the senses, mind, and thinking steady,
  who keeps their heart set on freedom, and who has let go of desire, fear, and
  anger, that person is already free, always and forever. Once those three
  things no longer rule you, no chain can hold you.

story:
  title: "The Three Restless Visitors"
  source: "original"
  body: |
    "Let me finish the picture of the quiet one," Krishna said, and
    Arjuna leaned closer, for he did not want to miss it.

    "When the sage sits steady — senses gathered, mind gathered, thinking
    gathered, her whole heart turned toward freedom like a sunflower
    toward the sun — three restless visitors come knocking. They always
    do. Their names are Wanting, Fear, and Anger."

    The morning was bright now. The two armies waited, but on the
    chariot there was only the soft sound of Krishna's voice.

    "First comes Wanting. It whispers, 'If only you had this. If only you
    had that. You cannot be happy until you do.' Most people leap up at
    once and run after whatever Wanting names. But the sage simply
    notices it, the way you notice a knock at the door, and does not
    rise. And after a while, finding no one to chase it, Wanting grows
    tired and drifts away."

    "Then comes Fear. It whispers, 'What if you lose everything? What if
    it all goes wrong?' Fear is loud and cold. But the sage has set her
    heart on freedom, not on safety, and so she does not let Fear pull
    her this way and that. She breathes. She stays. And Fear, finding no
    one trembling, also grows quiet and leaves."

    "Last comes Anger, hottest of the three, blazing up red. It shouts,
    'You have been wronged! Strike back!' Anger wants you to forget
    yourself entirely. But the sage's mind is held steady as a deep
    lake, and the fire of Anger cannot find dry wood to catch on. So it
    too burns down, and goes out, and is gone."

    Arjuna realized he had been holding his breath, and let it out.

    "When Wanting, Fear, and Anger no longer rule you," Krishna said,
    "no one needs to come and set you free. You are free already, always,
    not just sometimes. That is the quiet sage, Arjuna: forever
    unbound, even while sitting perfectly still beneath a tree."

reflection: "Wanting, fear, and anger come knocking for everyone. Which of these three visits you the most — and what might help you stay steady when it knocks?"
