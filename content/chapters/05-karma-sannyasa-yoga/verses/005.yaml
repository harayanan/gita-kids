chapter: 5
verse: 5
speaker: krishna

sanskrit: "यत्सांख्यैः प्राप्यते स्थानं तद्योगैरपि गम्यते। एकं सांख्यं च योगं च यः पश्यति स पश्यति॥"

transliteration: "yatsāṅkhyaiḥ prāpyate sthānaṁ tadyogairapi gamyate | ekaṁ sāṅkhyaṁ ca yogaṁ ca yaḥ paśyati sa paśyati ||"

