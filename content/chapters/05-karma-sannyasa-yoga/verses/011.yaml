    parts: ["kāya (body)"]
    meaning: "with the body"
  - word: "मनसा"
    parts: ["man (to think)"]
    meaning: "with the mind"
  - word: "बुद्ध्या"
    parts: ["budh (to know, to awaken)"]
    meaning: "with the intellect, with understanding"
  - word: "केवलैः"
