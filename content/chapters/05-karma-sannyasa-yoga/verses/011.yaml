chapter: 5
verse: 11
speaker: krishna

sanskrit: "कायेन मनसा बुद्ध्या केवलैरिन्द्रियैरपि। योगिनः कर्म कुर्वन्ति सङ्गं त्यक्त्वात्मशुद्धये॥"

transliteration: "kāyena manasā buddhyā kevalairindriyairapi | yoginaḥ karma kurvanti saṅgaṁ tyaktvātmaśuddhaye ||"

