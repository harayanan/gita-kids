chapter: 5
verse: 13
speaker: krishna

sanskrit: "सर्वकर्माणि मनसा संन्यस्यास्ते सुखं वशी। नवद्वारे पुरे देही नैव कुर्वन्न कारयन्॥"

transliteration: "sarvakarmāṇi manasā saṁnyasyāste sukhaṁ vaśī | navadvāre pure dehī naiva kurvanna kārayan ||"

