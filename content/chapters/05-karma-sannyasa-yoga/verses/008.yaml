chapter: 5
verse: 8
speaker: krishna

sanskrit: "नैव किञ्चित्करोमीति युक्तो मन्येत तत्त्ववित्। पश्यञ्शृण्वन्स्पृशञ्जिघ्रन्नश्नन्गच्छन्स्वपञ्श्वसन्॥"

transliteration: "naiva kiñcitkaromīti yukto manyeta tattvavit | paśyañśṛṇvanspṛśañjighrannaśnangacchansvapañśvasan ||"

