chapter: 5
verse: 4
speaker: krishna

sanskrit: "सांख्ययोगौ पृथग्बालाः प्रवदन्ति न पण्डिताः। एकमप्यास्थितः सम्यगुभयोर्विन्दते फलम्॥"

transliteration: "sāṅkhyayogau pṛthagbālāḥ pravadanti na paṇḍitāḥ | ekamapyāsthitaḥ samyagubhayorvindate phalam ||"

