  - word: "अपि"
    parts: ["api (even)"]
    meaning: "even, only"
  - word: "आस्थितः"
    parts: ["ā (toward, fully)", "sthā (to stand, to be established)"]
    meaning: "firmly established, settled in"
  - word: "सम्यक्"
    parts: ["sam (well, completely)", "añc (to go, to reach)"]
    meaning: "properly, rightly, fully"
  - word: "उभयोः"
    parts: ["ubha (both)"]
    meaning: "of both, of the two paths"
  - word: "विन्दते"
    parts: ["vid (to find, to obtain)"]
    meaning: "he finds, he gains"
  - word: "फलम्"
