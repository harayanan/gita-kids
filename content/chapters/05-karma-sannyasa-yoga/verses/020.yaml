chapter: 5
verse: 20

speaker: krishna

sanskrit: "न प्रहृष्येत्प्रियं प्राप्य नोद्विजेत्प्राप्य चाप्रियम्। स्थिरबुद्धिरसम्मूढो ब्रह्मविद्ब्रह्मणि स्थितः॥"

transliteration: "na prahṛṣyetpriyaṁ prāpya nodvijetprāpya cāpriyam | sthirabuddhirasammūḍho brahmavidbrahmaṇi sthitaḥ ||"

dhatu_breakdown:
  - word: "न"
    parts: ["na (not)"]
    meaning: "not"
  - word: "प्रहृष्येत्"
    parts: ["pra (greatly, forth)", "hṛṣ (to thrill, to be overjoyed)"]
    meaning: "would be carried away with delight"
  - word: "प्रियम्"
    parts: ["prī (to please, to love)"]
    meaning: "something pleasant, something liked"
  - word: "प्राप्य"
    parts: ["pra (forth)", "āp (to obtain, to reach)"]
    meaning: "on getting, having obtained"
  - word: "उद्विजेत्"
    parts: ["ud (up, away)", "vij (to tremble, to be disturbed)"]
    meaning: "would be shaken, would be distressed"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"
  - word: "अप्रियम्"
    parts: ["a (not)", "prī (to please)"]
    meaning: "something unpleasant, something disliked"
  - word: "स्थिरबुद्धिः"
    parts: ["sthā (to stand, to be firm)", "budh (to know, to understand)"]
    meaning: "one of steady understanding"
  - word: "असम्मूढः"
    parts: ["a (not)", "sam (fully)", "muh (to be confused, to be deluded)"]
    meaning: "unconfused, undeluded"
  - word: "ब्रह्मवित्"
    parts: ["brahman (the vast one Self)", "vid (to know)"]
    meaning: "a knower of Brahman"
  - word: "ब्रह्मणि"
    parts: ["bṛh (to grow, to expand vastly)"]
    meaning: "in Brahman"
  - word: "स्थितः"
    parts: ["sthā (to stand, to abide)"]
    meaning: "settled, abiding"

meaning: >
  Krishna says that a person of steady mind does not leap up wild with joy
  when something nice happens, and does not crumble when something unpleasant
  comes. Clear-headed and unconfused, knowing the one Self within, such a
  person already lives in that calm vastness. Good news and bad news come and
  go, but their quiet does not tip over.

story:
  title: "The Steady Boatman"
  source: "original"
  body: |
    On the river that bordered the war-plain there worked a boatman named
    Tunga, and the village children loved to ride with him because nothing
    ever rattled him.

    One spring the river was kind. Trade was busy, coins filled Tunga's
    pouch, and a wealthy traveller, delighted by the smooth crossing, pressed
    a gold ring into his hand. The children expected Tunga to whoop and dance.
    He only thanked the man, tucked the ring away, and pushed off for the next
    crossing, humming the same low tune as always.

    "Aren't you happy?" asked a girl named Ila.

    "I am pleased," Tunga said. "But the river gave it, and the river can take
    it. Why let my heart fly up so high it has far to fall?"

    Later that summer the river turned cruel. A storm smashed his boat against
    the rocks, and he lost nearly everything. The children crept down to the
    bank, afraid they would find him weeping. Instead they found Tunga calmly
    lashing new planks together, humming the same low tune.

    "Aren't you sad?" Ila whispered.

    "I am sorry for the boat," he said. "But I am not drowning, and you are
    here, and the river is still the river. If I did not leap up when it gave,
    why should I fall down when it takes?"

    Ila sat with him a long while, watching his steady hands, and felt
    something settle in her own chest like a stone finding the bottom of a
    pond.

    In a chariot far upriver, Krishna was describing exactly such a heart to
    Arjuna. "The one who does not get giddy when good things come, and does
    not collapse when hard things come — clear, unconfused, knowing the Self
    within — that one already lives in the great calm. Pleasant and unpleasant
    are only the river's moods."

    Tunga fitted the last plank, tested it with his weight, and pushed his
    mended boat back into the current. The water rocked him.

    He did not rock back.

reflection: "Think of the last time you were super excited or really upset. How long did the feeling last? What might it be like to enjoy good things and survive hard things without being tossed all the way up or all the way down?"
