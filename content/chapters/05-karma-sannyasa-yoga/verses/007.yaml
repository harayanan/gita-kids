chapter: 5
verse: 7
speaker: krishna

sanskrit: "योगयुक्तो विशुद्धात्मा विजितात्मा जितेन्द्रियः। सर्वभूतात्मभूतात्मा कुर्वन्नपि न लिप्यते॥"

transliteration: "yogayukto viśuddhātmā vijitātmā jitendriyaḥ | sarvabhūtātmabhūtātmā kurvannapi na lipyate ||"

dhatu_breakdown:
  - word: "योगयुक्तः"
    parts: ["yuj (to yoke, to join)", "yuj (to join, to be united)"]
    meaning: "steady in yoga, joined to selfless action"
  - word: "विशुद्धात्मा"
    parts: ["vi (fully)", "śudh (to be pure, to be clean)", "ātman (self)"]
    meaning: "one whose mind is completely pure"
  - word: "विजितात्मा"
    parts: ["vi (fully)", "ji (to conquer, to win)", "ātman (self)"]
    meaning: "one who has mastered himself"
  - word: "जितेन्द्रियः"
    parts: ["ji (to conquer, to win)", "indriya (the senses)"]
    meaning: "one who has won command over the senses"
  - word: "सर्वभूतात्मभूतात्मा"
    parts: ["sarva (all)", "bhūta (beings)", "ātman (self)", "bhū (to become, to be)", "ātman (self)"]
    meaning: "one whose self has become one with the self of all beings"
  - word: "कुर्वन्"
    parts: ["kṛ (to do, to act)"]
    meaning: "while doing, even while acting"
  - word: "अपि"
    parts: ["api (even)"]
    meaning: "even, although"
  - word: "न"
    parts: ["na (not)"]
    meaning: "not"
  - word: "लिप्यते"
    parts: ["lip (to smear, to stick to)"]
    meaning: "is stained, is stuck to, is tainted"

meaning: >
  Krishna describes the calm worker: "Someone who is steady in selfless action,
  with a clear pure mind, who is master of himself and his senses, who feels every
  living being as part of his own self — that person acts all day long and yet
  nothing sticks to him." He stays clean and free even in the middle of work.

story:
  title: "The Lotus Leaf"
  source: "original"
  body: |
    Krishna pointed toward a still pond that lay just off the edge of the
    battlefield, half-hidden by reeds. On its surface floated wide green lotus
    leaves, beaded all over with last night's rain.

    "Watch the leaf," he said.

    Arjuna looked. As he watched, a drop of water rolled across one of the
    leaves — gathering, sliding, gleaming like a little pearl — and then tipped
    off the edge and vanished into the pond. The leaf stayed perfectly dry.

    "All night the rain fell on that leaf," said Krishna. "All night the water
    touched it, ran across it, sat upon it. And yet at dawn the leaf is dry.
    The water never soaked in. It never stained the green. The leaf lives in
    the water and is not made wet by it."

    Arjuna watched another drop roll free.

    "There is a kind of person who lives like that leaf," Krishna went on. "His
    mind is washed clean. He is master of himself — his temper, his cravings,
    his restless senses all answer to him like trained horses to the rein. And
    because he has stopped thinking only of his own small self, he has begun to
    feel every creature — the soldier, the horse, the bird in the reeds — as
    part of who he is."

    "And he still acts?" Arjuna asked.

    "All day," said Krishna. "He fights, he plans, he works, he serves. His
    hands are never idle. But the worry, the pride, the guilt, the grabbing —
    none of it soaks into him. It rolls across his heart and slides away, like
    rain off the lotus leaf. He does everything and is stained by nothing."

    A dragonfly skimmed the pond and was gone.

    "That is what I am asking of you, Arjuna. Not to flee the rain. To become
    the leaf the rain cannot wet. Stand in the middle of all this — and let it
    roll off you, bright and harmless, into the water below."

reflection: "Have you ever stayed calm and kind in the middle of something stressful, while it seemed to upset everyone around you? How did you manage to let it roll off?"
