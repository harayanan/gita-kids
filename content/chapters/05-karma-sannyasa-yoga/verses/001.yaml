chapter: 5
verse: 1
speaker: arjuna

sanskrit: "संन्यासं कर्मणां कृष्ण पुनर्योगं च शंससि। यच्छ्रेय एतयोरेकं तन्मे ब्रूहि सुनिश्चितम्॥"

transliteration: "saṁnyāsaṁ karmaṇāṁ kṛṣṇa punaryogaṁ ca śaṁsasi | yacchreya etayorekaṁ tanme brūhi suniścitam ||"

dhatu_breakdown:
  - word: "संन्यासम्"
    parts: ["sam (fully, completely)", "ni (down)", "as (to throw, to cast off)"]
    meaning: "the giving up of action, renunciation"
  - word: "कर्मणाम्"
    parts: ["kṛ (to do, to act)"]
    meaning: "of actions, of deeds"
  - word: "कृष्ण"
    parts: ["kṛṣ (to draw, to attract)"]
    meaning: "O Krishna — the all-attractive one"
