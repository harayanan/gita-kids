chapter: 5
verse: 29
speaker: krishna

sanskrit: "भोक्तारं यज्ञतपसां सर्वलोकमहेश्वरम्। सुहृदं सर्वभूतानां ज्ञात्वा मां शान्तिमृच्छति॥"

transliteration: "bhoktāraṁ yajñatapasāṁ sarvalokamaheśvaram | suhṛdaṁ sarvabhūtānāṁ jñātvā māṁ śāntimṛcchati ||"

dhatu_breakdown:
  - word: "भोक्तारम्"
    parts: ["bhuj (to enjoy, to receive)"]
    meaning: "the enjoyer, the one who receives"
  - word: "यज्ञतपसाम्"
    parts: ["yaj (to offer, to worship)", "tap (to be austere, to glow with effort)"]
    meaning: "of sacrifices and austerities"
  - word: "सर्वलोकमहेश्वरम्"
    parts: ["sarva (all)", "loka (world)", "mahā (great)", "īśvara (lord)"]
    meaning: "the great Lord of all the worlds"
  - word: "सुहृदम्"
    parts: ["su (good, loving)", "hṛd (heart)"]
    meaning: "the good-hearted one, the loving friend"
  - word: "सर्वभूतानाम्"
    parts: ["sarva (all)", "bhūta (beings)"]
    meaning: "of all beings"
  - word: "ज्ञात्वा"
    parts: ["jñā (to know)"]
    meaning: "having known"
  - word: "माम्"
    parts: ["mām (me)"]
    meaning: "me — Krishna speaking"
  - word: "शान्तिम्"
    parts: ["śam (to be calm, to be at peace)"]
    meaning: "peace"
  - word: "ऋच्छति"
    parts: ["ṛch (to reach, to attain)"]
    meaning: "reaches, attains"

meaning: >
  Krishna gives the last word of the chapter. He says: whoever knows me as the
  one who lovingly receives every offering and every act of effort, as the great
  Lord of all the worlds, and as the warm-hearted friend of every single living
  being, that person comes to rest in peace. To know that the heart of all things wishes you well is itself the deepest peace. And that friend is the very Self living at your own centre.

story:
  title: "The Friend at the Center of Everything"
  source: "original"
  body: |
    The mist was gone. The whole plain of Kurukshetra lay open under a
    clear morning sky, and for a moment neither army moved. Krishna
    turned from the field and looked at Arjuna directly, and his voice
    when he spoke was very gentle, the way you speak to someone you love.

    "Arjuna," he said, "I have told you of the river of desire and anger,
    and the lamp that burns within, and the peace that waits on every
    side, and the quiet way of sitting still. But now I will tell you
    the simplest thing of all, and it is the thing that holds the rest
    together."

    Arjuna waited.

    "Every offering anyone has ever made — every act of kindness, every
    bit of hard and patient effort, every quiet prayer whispered in the
    dark — all of it is received with love. None of it is wasted. None
    of it falls into emptiness. There is One who gathers it all in, the
    way a mother gathers in everything her child makes and keeps it
    safe."

    The horses stood perfectly still.

    "That same One is the great Lord of all the worlds: the stars, the
    rivers, the mountains, the seas, and every kingdom under the sky.
    Nothing is outside that care. And here is the part I most want you
    to carry with you, Arjuna." Krishna's eyes were kind. "That Lord is the
    very Self awake in your own heart, never distant, never stern. He is the friend of every living being. Yours.
    Your brothers'. Your enemies'. The smallest sparrow's. The heart at
    the center of everything wishes you well."

    Arjuna felt something loosen in his chest that had been tight for
    days.

    "When you truly know this," Krishna said softly, "the fear goes out
    of you. For what is there to dread, if the One who holds the whole
    world is your friend? Knowing me in this way, Arjuna — as the
    receiver of all you offer, the Lord of all that is, and the friend
    of all that lives — a person comes home at last to peace."

    And there, in the hush before the great battle, Arjuna felt the
    first true stillness he had known in many days settle quietly over
    his heart.

reflection: "How does it feel to imagine that the heart of everything — the whole wide world — is on your side, like a friend who wishes you well?"
