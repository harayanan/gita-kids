name: The Yoga of Letting Go
sanskrit_name: कर्मसंन्यासयोग
transliterated_name: Karma Sannyāsa Yoga
verse_count: 29
folk_art_style: kalamkari
summary: >
  Arjuna asks Krishna a great question — is it better to stop doing things
  or to keep doing them? Krishna smiles and says both paths lead to happiness,
  but doing good work with a cheerful heart is easier and better. A wise person
  stays calm and peaceful like a still lake, even in the middle of a busy life.
