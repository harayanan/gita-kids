name: Arjuna's Sorrow
sanskrit_name: अर्जुनविषादयोग
transliterated_name: Arjuna Vishāda Yoga
verse_count: 47
folk_art_style: pichwai
summary: >
  The story begins on the battlefield of Kurukshetra. As the two great armies
  face each other, Arjuna asks Krishna to drive his chariot between them.
  When he sees his own family, teachers, and friends on both sides, his heart
  breaks. He drops his bow and refuses to fight. This chapter is about the
  courage it takes to face an impossible choice.
