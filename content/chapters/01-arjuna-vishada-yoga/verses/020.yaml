    parts: ["atha (then, now)"]
    meaning: "then, at that moment"
  - word: "व्यवस्थितान्"
    parts: ["vi (arranged)", "ava (down)", "sthā (to stand)"]
    meaning: "drawn up, arrayed in formation"
