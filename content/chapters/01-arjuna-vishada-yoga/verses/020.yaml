chapter: 1
verse: 20
speaker: sanjaya

sanskrit: "अथ व्यवस्थितान्दृष्ट्वा धार्तराष्ट्रान् कपिध्वजः। प्रवृत्ते शस्त्रसम्पाते धनुरुद्यम्य पाण्डवः। हृषीकेशं तदा वाक्यमिदमाह महीपते॥"

transliteration: "atha vyavasthitān dṛṣṭvā dhārtarāṣṭrān kapidhvajaḥ | pravṛtte śastrasampāte dhanur udyamya pāṇḍavaḥ | hṛṣīkeśaṁ tadā vākyam idam āha mahīpate ||"

dhatu_breakdown:
