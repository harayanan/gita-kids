chapter: 1
verse: 25
speaker: sanjaya

sanskrit: "भीष्मद्रोणप्रमुखतः सर्वेषां च महीक्षिताम्। उवाच पार्थ पश्यैतान् समवेतान् कुरूनिति॥"

transliteration: "bhīṣmadroṇapramukhataḥ sarveṣāṁ ca mahīkṣitām | uvāca pārtha paśyaitān samavetān kurūn iti ||"

