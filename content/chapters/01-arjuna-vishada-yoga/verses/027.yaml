chapter: 1
verse: 27
speaker: sanjaya

sanskrit: "श्वशुरान्सुहृदश्चैव सेनयोरुभयोरपि। तान्समीक्ष्य स कौन्तेयः सर्वान्बन्धूनवस्थितान्। कृपया परयाविष्टो विषीदन्निदमब्रवीत्॥"

transliteration: "śvaśurān suhṛdaścaiva senayorubhayorapi | tān samīkṣya sa kaunteyaḥ sarvān bandhūn avasthitān | kṛpayā parayāviṣṭo viṣīdann idam abravīt ||"

