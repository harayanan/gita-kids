chapter: 1
verse: 12
speaker: sanjaya

sanskrit: "तस्य सञ्जनयन्हर्षं कुरुवृद्धः पितामहः। सिंहनादं विनद्योच्चैः शङ्खं दध्मौ प्रतापवान्॥"

transliteration: "tasya sañjanayan harṣaṁ kuruvṛddhaḥ pitāmahaḥ | siṁhanādaṁ vinadyoccaiḥ śaṅkhaṁ dadhmau pratāpavān ||"

