chapter: 1
verse: 47
speaker: sanjaya

sanskrit: "सञ्जय उवाच। एवमुक्त्वा हृषीकेशं गुडाकेशः परन्तपः। विषीदन्निव भारत संग्रामे न युयुत्सुरथ तस्थौ॥"

transliteration: "sañjaya uvāca | evamuktvā hṛṣīkeśaṁ guḍākeśaḥ parantapaḥ | viṣīdanniva bhārata saṅgrāme na yuyutsuratha tasthau ||"

