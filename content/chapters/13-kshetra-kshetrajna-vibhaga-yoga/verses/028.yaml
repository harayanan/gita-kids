chapter: 13
verse: 28
speaker: krishna

sanskrit: "समं सर्वेषु भूतेषु तिष्ठन्तं परमेश्वरम्। विनश्यत्स्वविनश्यन्तं यः पश्यति स पश्यति॥"

transliteration: "samaṁ sarveṣu bhūteṣu tiṣṭhantaṁ parameśvaram | vinaśyatsvavinaśyantaṁ yaḥ paśyati sa paśyati ||"

