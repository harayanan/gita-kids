chapter: 13
verse: 5
speaker: krishna

sanskrit: "ऋषिभिर्बहुधा गीतं छन्दोभिर्विविधैः पृथक्। ब्रह्मसूत्रपदैश्चैव हेतुमद्भिर्विनिश्चितैः॥"

transliteration: "ṛṣibhirbahudhā gītaṁ chandobhirvividhaiḥ pṛthak | brahmasūtrapadaiścaiva hetumadbhirviniścitaiḥ ||"

