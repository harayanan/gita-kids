chapter: 13
verse: 19
speaker: krishna

sanskrit: "इति क्षेत्रं तथा ज्ञानं ज्ञेयं चोक्तं समासतः। मद्भक्त एतद्विज्ञाय मद्भावायोपपद्यते॥"

transliteration: "iti kṣetraṁ tathā jñānaṁ jñeyaṁ coktaṁ samāsataḥ | madbhakta etad vijñāya madbhāvāyopapadyate ||"

