chapter: 13
verse: 6
speaker: krishna

sanskrit: "महाभूतान्यहंकारो बुद्धिरव्यक्तमेव च। इन्द्रियाणि दशैकं च पञ्च चेन्द्रियगोचराः॥"

transliteration: "mahābhūtānyahaṁkāro buddhiravyaktameva ca | indriyāṇi daśaikaṁ ca pañca cendriyagocarāḥ ||"

