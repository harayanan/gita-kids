chapter: 13
verse: 2
speaker: krishna

sanskrit: "इदं शरीरं कौन्तेय क्षेत्रमित्यभिधीयते। एतद्यो वेत्ति तं प्राहुः क्षेत्रज्ञ इति तद्विदः॥"

transliteration: "idaṁ śarīraṁ kaunteya kṣetramityabhidhīyate | etadyo vetti taṁ prāhuḥ kṣetrajña iti tadvidaḥ ||"

