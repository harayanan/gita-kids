chapter: 13
verse: 20
speaker: krishna

sanskrit: "प्रकृतिं पुरुषं चैव विद्ध्यनादी उभावपि। विकारांश्च गुणांश्चैव विद्धि प्रकृतिसम्भवान्॥"

transliteration: "prakṛtiṁ puruṣaṁ caiva viddhy anādī ubhāv api | vikārāṁś ca guṇāṁś caiva viddhi prakṛtisambhavān ||"

