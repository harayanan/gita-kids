chapter: 13
verse: 16
speaker: krishna

sanskrit: "बहिरन्तश्च भूतानामचरं चरमेव च। सूक्ष्मत्वात्तदविज्ञेयं दूरस्थं चान्तिके च तत्॥"

transliteration: "bahir antaś ca bhūtānām acaraṁ caram eva ca | sūkṣmatvāt tad avijñeyaṁ dūrasthaṁ cāntike ca tat ||"

