chapter: 13
verse: 29
speaker: krishna

sanskrit: "समं पश्यन्हि सर्वत्र समवस्थितमीश्वरम्। न हिनस्त्यात्मनात्मानं ततो याति परां गतिम्॥"

transliteration: "samaṁ paśyanhi sarvatra samavasthitamīśvaram | na hinastyātmanātmānaṁ tato yāti parāṁ gatim ||"

