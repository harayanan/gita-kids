chapter: 13
verse: 18
speaker: krishna

sanskrit: "ज्योतिषामपि तज्ज्योतिस्तमसः परमुच्यते। ज्ञानं ज्ञेयं ज्ञानगम्यं हृदि सर्वस्य विष्ठितम्॥"

transliteration: "jyotiṣām api taj jyotis tamasaḥ param ucyate | jñānaṁ jñeyaṁ jñānagamyaṁ hṛdi sarvasya viṣṭhitam ||"

