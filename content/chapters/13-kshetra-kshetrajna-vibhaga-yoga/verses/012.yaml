chapter: 13
verse: 12
speaker: krishna

sanskrit: "अध्यात्मज्ञाननित्यत्वं तत्त्वज्ञानार्थदर्शनम्। एतज्ज्ञानमिति प्रोक्तमज्ञानं यदतोऽन्यथा॥"

transliteration: "adhyātmajñānanityatvaṁ tattvajñānārthadarśanam | etajjñānamiti proktamajñānaṁ yadato'nyathā ||"

