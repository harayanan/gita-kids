chapter: 13
verse: 35
speaker: krishna

sanskrit: "क्षेत्रक्षेत्रज्ञयोरेवमन्तरं ज्ञानचक्षुषा। भूतप्रकृतिमोक्षं च ये विदुर्यान्ति ते परम्॥"

transliteration: "kṣetrakṣetrajñayorevamantaraṁ jñānacakṣuṣā | bhūtaprakṛtimokṣaṁ ca ye viduryānti te param ||"

