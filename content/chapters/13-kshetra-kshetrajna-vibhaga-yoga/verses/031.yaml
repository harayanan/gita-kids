chapter: 13
verse: 31
speaker: krishna

sanskrit: "यदा भूतपृथग्भावमेकस्थमनुपश्यति। तत एव च विस्तारं ब्रह्म सम्पद्यते तदा॥"

transliteration: "yadā bhūtapṛthagbhāvamekasthamanupaśyati | tata eva ca vistāraṁ brahma sampadyate tadā ||"

