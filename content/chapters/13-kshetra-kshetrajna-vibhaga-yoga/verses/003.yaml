chapter: 13
verse: 3
speaker: krishna

sanskrit: "क्षेत्रज्ञं चापि मां विद्धि सर्वक्षेत्रेषु भारत। क्षेत्रक्षेत्रज्ञयोर्ज्ञानं यत्तज्ज्ञानं मतं मम॥"

transliteration: "kṣetrajñaṁ cāpi māṁ viddhi sarvakṣetreṣu bhārata | kṣetrakṣetrajñayorjñānaṁ yattajjñānaṁ mataṁ mama ||"

