chapter: 13
verse: 33
speaker: krishna

sanskrit: "यथा सर्वगतं सौक्ष्म्यादाकाशं नोपलिप्यते। सर्वत्रावस्थितो देहे तथात्मा नोपलिप्यते॥"

transliteration: "yathā sarvagataṁ saukṣmyādākāśaṁ nopalipyate | sarvatrāvasthito dehe tathātmā nopalipyate ||"

