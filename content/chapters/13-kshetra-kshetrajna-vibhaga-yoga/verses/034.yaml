chapter: 13
verse: 34
speaker: krishna

sanskrit: "यथा प्रकाशयत्येकः कृत्स्नं लोकमिमं रविः। क्षेत्रं क्षेत्री तथा कृत्स्नं प्रकाशयति भारत॥"

transliteration: "yathā prakāśayatyekaḥ kṛtsnaṁ lokamimaṁ raviḥ | kṣetraṁ kṣetrī tathā kṛtsnaṁ prakāśayati bhārata ||"

