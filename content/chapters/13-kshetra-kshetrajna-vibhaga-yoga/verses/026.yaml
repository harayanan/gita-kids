chapter: 13
verse: 26
speaker: krishna

sanskrit: "अन्ये त्वेवमजानन्तः श्रुत्वान्येभ्य उपासते। तेऽपि चातितरन्त्येव मृत्युं श्रुतिपरायणाः॥"

transliteration: "anye tvevamajānantaḥ śrutvānyebhya upāsate | te'pi cātitarantyeva mṛtyuṁ śrutiparāyaṇāḥ ||"

