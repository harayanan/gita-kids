chapter: 13
verse: 4
speaker: krishna

sanskrit: "तत्क्षेत्रं यच्च यादृक्च यद्विकारि यतश्च यत्। स च यो यत्प्रभावश्च तत्समासेन मे शृणु॥"

transliteration: "tatkṣetraṁ yacca yādṛkca yadvikāri yataśca yat | sa ca yo yatprabhāvaśca tatsamāsena me śṛṇu ||"

