chapter: 13
verse: 25
speaker: krishna

sanskrit: "ध्यानेनात्मनि पश्यन्ति केचिदात्मानमात्मना। अन्ये साङ्ख्येन योगेन कर्मयोगेन चापरे॥"

transliteration: "dhyānenātmani paśyanti kecidātmānamātmanā | anye sāṅkhyena yogena karmayogena cāpare ||"

