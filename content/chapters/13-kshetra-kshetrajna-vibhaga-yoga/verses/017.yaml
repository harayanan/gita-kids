chapter: 13
verse: 17
speaker: krishna

sanskrit: "अविभक्तं च भूतेषु विभक्तमिव च स्थितम्। भूतभर्तृ च तज्ज्ञेयं ग्रसिष्णु प्रभविष्णु च॥"

transliteration: "avibhaktaṁ ca bhūteṣu vibhaktam iva ca sthitam | bhūtabhartṛ ca taj jñeyaṁ grasiṣṇu prabhaviṣṇu ca ||"

