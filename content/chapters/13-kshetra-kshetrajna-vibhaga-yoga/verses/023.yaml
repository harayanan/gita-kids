chapter: 13
verse: 23
speaker: krishna

sanskrit: "उपद्रष्टानुमन्ता च भर्ता भोक्ता महेश्वरः। परमात्मेति चाप्युक्तो देहेऽस्मिन्पुरुषः परः॥"

transliteration: "upadraṣṭānumantā ca bhartā bhoktā maheśvaraḥ | paramātmeti cāpyukto dehe'smin puruṣaḥ paraḥ ||"

