chapter: 13
verse: 8
speaker: krishna

sanskrit: "अमानित्वमदम्भित्वमहिंसा क्षान्तिरार्जवम्। आचार्योपासनं शौचं स्थैर्यमात्मविनिग्रहः॥"

transliteration: "amānitvamadambhitvamahiṁsā kṣāntirārjavam | ācāryopāsanaṁ śaucaṁ sthairyamātmavinigrahaḥ ||"

dhatu_breakdown:
  - word: "अमानित्वम्"
    parts: ["a (not)", "man (to think highly, to take pride)", "tva (-ness)"]
    meaning: "humility, not demanding respect for oneself"
  - word: "अदम्भित्वम्"
    parts: ["a (not)", "dambh (to deceive, to show off)", "tva (-ness)"]
    meaning: "unpretentiousness, not putting on a show"
  - word: "अहिंसा"
    parts: ["a (not)", "hiṁs (to harm, to hurt)"]
    meaning: "non-violence, not hurting any creature"
  - word: "क्षान्तिः"
    parts: ["kṣam (to be patient, to forbear)"]
    meaning: "patience, forgiving forbearance"
  - word: "आर्जवम्"
    parts: ["ṛju (straight, upright)", "a (-ness)"]
    meaning: "straightness, sincerity of heart"
  - word: "आचार्योपासनम्"
    parts: ["ācārya (teacher)", "upa (near)", "ās (to sit, to serve)"]
    meaning: "service of the teacher, sitting near and learning"
  - word: "शौचम्"
    parts: ["śuc (to be clean, to be pure)"]
    meaning: "purity, cleanness inside and out"
  - word: "स्थैर्यम्"
    parts: ["sthā (to stand, to stay firm)", "ya (-ness)"]
    meaning: "steadiness, not wobbling from the path"
  - word: "आत्मविनिग्रहः"
    parts: ["ātman (self)", "vi (apart)", "ni (down)", "grah (to grasp, to hold)"]
    meaning: "self-control, holding one's own mind steady"

meaning: >
  Krishna begins to describe what real knowledge looks like — and it is not
  facts you memorise. It is how you live. To be humble, to never show off, to
  hurt no one, to be patient, to be honest and straight, to serve your teacher,
  to keep yourself clean and pure, to stay steady, and to hold your own mind in
  check — all of this, Krishna says, IS knowledge. A wise person is known by
  these qualities, not by clever words.

story:
  title: "The Boy Who Carried the Water"
  source: "upanishad"
  body: |
    In a forest ashram, long ago, the cooking fires had not yet been lit when
    young Upamanyu rose in the grey light before dawn.

    He was a new student. He had come to the great sage's hermitage hoping to
    learn the deepest secrets of the Vedas — the hymns that held the truth of
    the whole universe. He had imagined sitting at the master's feet, hearing
    grand teachings, learning sacred words no ordinary person knew.

    Instead, his teacher handed him an empty clay pot and pointed to the river.

    So that was Upamanyu's first lesson. He carried water. He swept the leaf-strewn
    courtyard with a twig broom until his back ached. He gathered firewood, his
    arms scratched by thorns. He grazed the ashram's cows in the heat and brought
    them home at dusk, counting each one. When older students spoke sharply to
    him, he did not snap back. When he was tired, he did not complain. When the
    teacher walked by, Upamanyu bowed and asked, "Is there anything you need?"

    Weeks passed. Then months. The boy never once asked, "When will you teach me
    something important?"

    One evening the sage called him close. "Tell me," the teacher said gently,
    "what do you think you have been learning all this time, carrying water and
    minding cows?"

    Upamanyu thought carefully. "I have learned to wake before I am told. To do
    plain work without sulking. To speak softly even when I am tired. To keep my
    pot — and my heart — clean. To stay, when staying is hard."

    The old sage smiled, and his eyes shone. "Then you have already learned the
    hardest lesson of all. The Veda is not only words, child. Humility, honesty,
    patience, gentleness, steadiness — these are knowledge wearing its working
    clothes. A proud man can recite a thousand hymns and understand none of them.
    A humble one who carries water with a quiet heart is closer to the truth than
    he knows."

    Then, at last, the teacher began to teach him the hidden meaning of the
    hymns. And Upamanyu found he could hear them now in a way he never could
    have before — because the carrying of the water had made room in him for
    the truth to land.

reflection: "Which is harder for you — learning something new from a book, or being patient and kind when you are tired? Why do you think Krishna calls the second one 'knowledge' too?"
