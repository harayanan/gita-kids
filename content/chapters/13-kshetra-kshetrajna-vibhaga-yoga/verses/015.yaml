chapter: 13
verse: 15
speaker: krishna

sanskrit: "सर्वेन्द्रियगुणाभासं सर्वेन्द्रियविवर्जितम्। असक्तं सर्वभृच्चैव निर्गुणं गुणभोक्तृ च॥"

transliteration: "sarvendriyaguṇābhāsaṁ sarvendriyavivarjitam | asaktaṁ sarvabhṛc caiva nirguṇaṁ guṇabhoktṛ ca ||"

