chapter: 13
verse: 13
speaker: krishna

sanskrit: "ज्ञेयं यत्तत्प्रवक्ष्यामि यज्ज्ञात्वामृतमश्नुते। अनादिमत्परं ब्रह्म न सत्तन्नासदुच्यते॥"

transliteration: "jñeyaṁ yattatpravakṣyāmi yajjñātvāmṛtamaśnute | anādimatparaṁ brahma na sattannāsaducyate ||"

