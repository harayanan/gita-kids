slug: 13-kshetra-kshetrajna-vibhaga-yoga
name: The Yoga of the Field and the Knower
sanskrit_name: क्षेत्रक्षेत्रज्ञविभागयोग
transliterated_name: Kshetra Kshetrajna Vibhāga Yoga
verse_count: 35
folk_art_style: pattachitra
summary: >
  Krishna uses a beautiful example — think of your body as a garden (the field)
  and your soul as the gardener (the knower of the field). The gardener watches
  over the garden but is different from it. When you understand that you are
  the wise gardener and not just the garden, you see life in a whole new way.
