chapter: 11
verse: 16
speaker: arjuna

sanskrit: "अनेकबाहूदरवक्त्रनेत्रं पश्यामि त्वां सर्वतोऽनन्तरूपम्। नान्तं न मध्यं न पुनस्तवादिं पश्यामि विश्वेश्वर विश्वरूप॥"

transliteration: "anekabāhūdaravaktranetraṁ paśyāmi tvāṁ sarvato'nantarūpam | nāntaṁ na madhyaṁ na punastavādiṁ paśyāmi viśveśvara viśvarūpa ||"

