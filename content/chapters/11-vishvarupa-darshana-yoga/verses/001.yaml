chapter: 11
verse: 1
speaker: arjuna

sanskrit: "मदनुग्रहाय परमं गुह्यमध्यात्मसंज्ञितम्। यत्त्वयोक्तं वचस्तेन मोहोऽयं विगतो मम॥"

transliteration: "madanugrahāya paramaṁ guhyamadhyātmasaṁjñitam | yattvayoktaṁ vacastena moho'yaṁ vigato mama ||"

dhatu_breakdown:
  - word: "मत्"
    parts: ["mad (me, my)"]
    meaning: "for me, to me"
  - word: "अनुग्रहाय"
    parts: ["anu (towards)", "grah (to grasp, to favour)"]
    meaning: "for the sake of grace, as a kindness"
  - word: "परमम्"
    parts: ["para (highest, supreme)"]
    meaning: "supreme, highest"
  - word: "गुह्यम्"
    parts: ["guh (to hide, to conceal)"]
    meaning: "secret, the hidden teaching"
  - word: "अध्यात्मसंज्ञितम्"
    parts: ["adhi (over, concerning)", "ātman (the Self)", "sam (fully)", "jñā (to know, to name)"]
    meaning: "known as the supreme Self, called the teaching of the Self"
  - word: "यत्"
    parts: ["yad (which, that)"]
    meaning: "which, that which"
  - word: "त्वया"
    parts: ["tvad (you)"]
    meaning: "by you"
  - word: "उक्तम्"
    parts: ["vac (to speak)"]
    meaning: "spoken, said"
  - word: "वचः"
    parts: ["vac (to speak)"]
    meaning: "word, speech"
  - word: "तेन"
    parts: ["tad (that, it)"]
    meaning: "by that, through that"
  - word: "मोहः"
    parts: ["muh (to be confused, to be deluded)"]
    meaning: "confusion, delusion"
  - word: "अयम्"
    parts: ["idam (this)"]
    meaning: "this"
  - word: "विगतः"
    parts: ["vi (away)", "gam (to go)"]
    meaning: "gone away, vanished"
  - word: "मम"
    parts: ["mad (my)"]
    meaning: "my, of mine"

meaning: >
  Arjuna says: out of pure kindness to me, you have spoken the highest secret:
  the teaching about the true Self. And because of those words, the confusion
  that was clouding my heart has completely gone away. He is thanking Krishna:
  the fog has lifted, and now he can see clearly again.

story:
  title: "The Fog on the Battlefield"
  source: "original"
  body: |
    When the war was about to begin, Arjuna had stood between the two armies
    with a heart full of fog. He could not tell up from down. His bow had
    slipped from his hand. His knees had given way. Everything he looked at
    seemed wrong, and he could not see a single path forward.

    Now, many words later, the fog was lifting.

    Krishna had spoken to him through the long pause before battle — about
    the Self that is never born and never dies, about doing one's duty without
    grabbing at the reward, about steadiness of mind, about love that holds
    the whole world. Verse after verse, like a lamp carried slowly through a
    dark house, light had reached every room of Arjuna's worry.

    He looked at Krishna now, his friend, his charioteer, holding the reins
    so calmly between the waiting armies.

    "You did this for me," Arjuna said quietly. "Not because you had to. Out
    of kindness. You took the deepest, most hidden secret there is — the truth
    about who I really am, the Self that lives behind everything, and you
    placed it in my hands as a gift."

    He pressed his palm to his chest, where the fear had sat so heavily that
    morning.

    "And the confusion is gone. Truly gone. It was like a thick mist over my
    eyes, and your words were the sun that burned it away. I can see again.
    I know who I am."

    Krishna said nothing, only smiled the small smile of a teacher who watches
    a student finally understand.

    But Arjuna's wonder did not stop there. Once the fog clears, the eyes grow
    hungry. Having heard about the One who is the source and end of all beings,
    Arjuna found a new longing rising in him: not to hear about the Lord any
    longer, but to *see* him. To behold, with his own eyes, the form behind
    all the words.

    He did not know yet what he was asking for. He only knew that his heart,
    no longer afraid, was ready to look.

reflection: "Has someone ever explained something so well that a worry you'd been carrying simply melted away? What did it feel like when the confusion lifted?"
