chapter: 11
verse: 22
speaker: arjuna

sanskrit: "रुद्रादित्या वसवो ये च साध्या विश्वेऽश्विनौ मरुतश्चोष्मपाश्च। गन्धर्वयक्षासुरसिद्धसङ्घा वीक्षन्ते त्वां विस्मिताश्चैव सर्वे॥"

transliteration: "rudrādityā vasavo ye ca sādhyā viśve'śvinau marutaścoṣmapāśca | gandharvayakṣāsurasiddhasaṅghā vīkṣante tvāṁ vismitāścaiva sarve ||"

