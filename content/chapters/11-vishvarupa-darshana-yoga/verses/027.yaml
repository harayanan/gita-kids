chapter: 11
verse: 27
speaker: arjuna

sanskrit: "वक्त्राणि ते त्वरमाणा विशन्ति दंष्ट्राकरालानि भयानकानि। केचिद्विलग्ना दशनान्तरेषु सन्दृश्यन्ते चूर्णितैरुत्तमाङ्गैः॥"

transliteration: "vaktrāṇi te tvaramāṇā viśanti daṁṣṭrākarālāni bhayānakāni | kecidvilagnā daśanāntareṣu sandṛśyante cūrṇitairuttamāṅgaiḥ ||"

dhatu_breakdown:
  - word: "वक्त्राणि"
    parts: ["vac (to speak) → vaktra (mouth)"]
    meaning: "the mouths"
  - word: "ते"
    parts: ["tvam (you)"]
    meaning: "Your"
  - word: "त्वरमाणाः"
    parts: ["tvar (to hurry, to hasten)"]
    meaning: "hurrying, rushing"
  - word: "विशन्ति"
    parts: ["viś (to enter)"]
    meaning: "they enter"
  - word: "दंष्ट्राकरालानि"
    parts: ["daṁś (to bite) → daṁṣṭrā (fang)", "karāla (gaping, terrible)"]
    meaning: "terrible with fangs"
  - word: "भयानकानि"
    parts: ["bhī (to fear) → bhaya (fear)", "anaka (causing)"]
    meaning: "fearsome, fear-causing"
  - word: "केचित्"
    parts: ["kim (who) + cit (some)"]
    meaning: "some, certain ones"
  - word: "विलग्नाः"
    parts: ["vi (apart)", "lag (to cling, to stick)"]
    meaning: "caught fast, stuck"
  - word: "दशनान्तरेषु"
    parts: ["daṁś (to bite) → daśana (tooth)", "antara (the space between)"]
    meaning: "in the gaps between the teeth"
  - word: "सन्दृश्यन्ते"
    parts: ["sam (together)", "dṛś (to see)"]
    meaning: "they are seen, they appear"
  - word: "चूर्णितैः"
    parts: ["cūrṇ (to crush, to grind to powder)"]
    meaning: "with crushed, with pulverised"
  - word: "उत्तमाङ्गैः"
    parts: ["uttama (highest, topmost)", "aṅga (limb)"]
    meaning: "with their heads (the topmost limb)"

meaning: >
  Arjuna keeps watching as the warriors he knew a moment ago rush quickly into
  Krishna's fearsome, fang-rimmed mouths. Some of them, he sees, are caught fast
  in the gaps between the great teeth, their heads already crushed. It is the
  most frightening thing Arjuna has ever seen. The vision shows him plainly
  that everything that lives must one day pass into the One who made it.

story:
  title: "Into the Great Mouths"
  source: "original"
  body: |
    Arjuna had asked, only a moment before, what would happen when the warriors
    reached the mouths of the cosmic form. Now the vision answered him, and the
    answer took his breath away.

    They did not stop at the edge. They rushed in — twaramāṇā, hurrying,
    hastening, as though pulled by something they could not resist. The proud
    sons of Dhritarashtra, the allied kings in their gleaming crowns, the great
    teachers and the great rivals, all poured forward into the blazing,
    fang-rimmed mouths of the One who held the universe.

    It was the most fearsome thing Arjuna had ever beheld. He wanted to cry out,
    to warn them, to pull them back. But this was no ordinary battle he could
    join. This was the deep truth of how the world is made: that everything which
    is born must one day return to its source, the way a wave that rises from the
    sea must one day sink back into it.

    Some of the warriors, Arjuna saw, were caught between the enormous teeth,
    their proud heads bowed at last before something far greater than any king.
    The old stories he had heard as a boy — about how all things end, how even
    the mightiest empires turn to dust, how time swallows every age — were no
    longer just stories. He was watching the truth of them with his own divine
    eye.

    And yet, even in his fear, Arjuna understood something he had never quite
    grasped before. These warriors were not being destroyed by a monster. They
    were being gathered home by the very Lord they had all, in their own ways,
    come from. The mouths were terrible, yes. But they belonged to Krishna — the
    same Krishna who steadied his chariot, who spoke to him as a friend.

    Arjuna did not look away. He let the great vision teach him the hardest
    lesson it had to give: that everything passes, and that even the passing
    rests in the hands of God. It made him tremble. It also, in a strange deep
    way he could not yet name, made him bow.

reflection: "Everything in the world changes and ends one day — leaves, seasons, even the games we play. Does knowing that make those things feel less precious, or more?"
