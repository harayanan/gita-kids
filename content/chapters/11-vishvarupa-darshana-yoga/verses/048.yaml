chapter: 11
verse: 48
speaker: krishna

sanskrit: "न वेदयज्ञाध्ययनैर्न दानैर्न च क्रियाभिर्न तपोभिरुग्रैः। एवंरूपः शक्य अहं नृलोके द्रष्टुं त्वदन्येन कुरुप्रवीर॥"

transliteration: "na vedayajñādhyayanairna dānairna ca kriyābhirna tapobhirugraiḥ | evaṁrūpaḥ śakya ahaṁ nṛloke draṣṭuṁ tvadanyena kurupravīra ||"

