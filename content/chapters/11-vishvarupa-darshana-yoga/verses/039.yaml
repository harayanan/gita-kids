chapter: 11
verse: 39
speaker: arjuna

sanskrit: "वायुर्यमोऽग्निर्वरुणः शशाङ्कः प्रजापतिस्त्वं प्रपितामहश्च। नमो नमस्तेऽस्तु सहस्रकृत्वः पुनश्च भूयोऽपि नमो नमस्ते॥"

transliteration: "vāyuryamo'gnirvaruṇaḥ śaśāṅkaḥ prajāpatistvaṁ prapitāmahaśca | namo namaste'stu sahasrakṛtvaḥ punaśca bhūyo'pi namo namaste ||"

