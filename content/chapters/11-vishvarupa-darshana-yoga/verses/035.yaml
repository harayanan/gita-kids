chapter: 11
verse: 35

speaker: sanjaya

sanskrit: "एतच्छ्रुत्वा वचनं केशवस्य कृताञ्जलिर्वेपमानः किरीटी। नमस्कृत्वा भूय एवाह कृष्णं सगद्गदं भीतभीतः प्रणम्य॥"

transliteration: "etacchrutvā vacanaṁ keśavasya kṛtāñjalirvepamānaḥ kirīṭī | namaskṛtvā bhūya evāha kṛṣṇaṁ sagadgadaṁ bhītabhītaḥ praṇamya ||"

