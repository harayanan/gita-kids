chapter: 11
verse: 53
speaker: krishna

sanskrit: "नाहं वेदैर्न तपसा न दानेन न चेज्यया। शक्य एवंविधो द्रष्टुं दृष्टवानसि मां यथा॥"

transliteration: "nāhaṁ vedairna tapasā na dānena na cejyayā | śakya evaṁvidho draṣṭuṁ dṛṣṭavānasi māṁ yathā ||"

