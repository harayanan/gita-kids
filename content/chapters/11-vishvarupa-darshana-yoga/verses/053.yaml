    parts: ["evam (thus)", "vidha (kind, sort)"]
    meaning: "of this kind, in this manner"
  - word: "द्रष्टुम्"
    parts: ["dṛś (to see)", "tum (to)"]
    meaning: "to see, to behold"
  - word: "दृष्टवान्"
    parts: ["dṛś (to see)", "tavat (one who has)"]
    meaning: "have seen"
  - word: "असि"
    parts: ["as (to be)"]
    meaning: "you are"
  - word: "माम्"
    parts: ["mad (me)"]
    meaning: "Me"
  - word: "यथा"
    parts: ["yathā (as, in the way that)"]
    meaning: "as, in the way that"

meaning: >
  Krishna says plainly: not by reciting the Vedas, not by hard penance, not by
  giving gifts, and not by ritual sacrifice can I be seen in the form in which you
  have just seen Me. All the study, all the effort, all the offerings in the world
  cannot, by themselves, make this vision happen. There is only one thing that can,
  and Krishna is about to name it.

story:
  title: "What Money and Books Could Not Buy"
  source: "original"
  body: |
    Ravi had been counting his coins on the courtyard step. He had been saving for
    weeks — a coin here, a coin there — and now he spread them out proudly in the
    sun. "Nani," he said, "what's the most special thing in the whole world? I want
    to know what to save up for."

    Nani set down her paintbrush. She was working on a peacock that morning, its
    tail full of careful Madhubani dots.

    "The most special things," she said, "are the ones you cannot buy at all."

    Ravi frowned at his little pile of coins.

    "Think about it," Nani said. "Could you buy the way Moti runs to the gate the
    second he hears your footsteps? You could have all the money in Bihar and you
    could not buy that. He gives it because he loves you."

    "But you could buy other things," Ravi argued. "Books. You could read every
    book and become the wisest person ever."

    "You could read a thousand books about the taste of a mango," Nani said,
    smiling, "and still not know it the way you know it the first time the juice
    runs down your chin. Some things books simply cannot hand you." She picked up
    her brush again. "Could you study your way into a friend truly trusting you?
    Could you do a hundred hard exercises and *force* someone to love you? Could
    you pay a teacher to make your mother proud of you? No. None of it. Not money,
    not study, not effort, not even gifts."

    Ravi was quiet, watching the peacock's tail grow under her hand.

    "There are things in this world," Nani said, "that cannot be bought, cannot be
    studied, cannot be earned with hard work or won with offerings. They can only
    be *loved* into being seen. You don't grab them. You open your heart, and they
    show themselves."

    That, Krishna told Arjuna in the chariot, is exactly how it is with His
    deepest form. "Not by the Vedas, not by penance, not by gifts, not by
    sacrifice can I be seen as you have seen Me." All the books and rituals and
    great efforts in the world cannot pull back that final curtain. Only one thing
    can. And Krishna was about to tell Arjuna its name.

reflection: "Can you think of something wonderful that money cannot buy and books cannot teach — something that only love or care can bring into your life? What is it?"
