chapter: 11
verse: 33

speaker: krishna

sanskrit: "तस्मात्त्वमुत्तिष्ठ यशो लभस्व जित्वा शत्रून्भुङ्क्ष्व राज्यं समृद्धम्। मयैवैते निहताः पूर्वमेव निमित्तमात्रं भव सव्यसाचिन्॥"

transliteration: "tasmāttvamuttiṣṭha yaśo labhasva jitvā śatrūnbhuṅkṣva rājyaṁ samṛddham | mayaivaite nihatāḥ pūrvameva nimittamātraṁ bhava savyasācin ||"

