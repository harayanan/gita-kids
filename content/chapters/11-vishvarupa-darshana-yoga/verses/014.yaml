chapter: 11
verse: 14
speaker: sanjaya

sanskrit: "ततः स विस्मयाविष्टो हृष्टरोमा धनञ्जयः। प्रणम्य शिरसा देवं कृताञ्जलिरभाषत॥"

transliteration: "tataḥ sa vismayāviṣṭo hṛṣṭaromā dhanañjayaḥ | praṇamya śirasā devaṁ kṛtāñjalirabhāṣata ||"

