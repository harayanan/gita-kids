    parts: ["śiras (head)"]
    meaning: "with his head"
  - word: "देवम्"
    parts: ["div (to shine)", "deva (god)"]
    meaning: "to the God"
  - word: "कृताञ्जलिः"
    parts: ["kṛ (to do, to make)", "añjali (folded hands, cupped palms)"]
