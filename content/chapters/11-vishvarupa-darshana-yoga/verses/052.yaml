chapter: 11
verse: 52
speaker: krishna

sanskrit: "सुदुर्दर्शमिदं रूपं दृष्टवानसि यन्मम। देवा अप्यस्य रूपस्य नित्यं दर्शनकाङ्क्षिणः॥"

transliteration: "sudurdarśamidaṁ rūpaṁ dṛṣṭavānasi yanmama | devā apyasya rūpasya nityaṁ darśanakāṅkṣiṇaḥ ||"

