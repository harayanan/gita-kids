chapter: 11
verse: 50
speaker: sanjaya

sanskrit: "इत्यर्जुनं वासुदेवस्तथोक्त्वा स्वकं रूपं दर्शयामास भूयः। आश्वासयामास च भीतमेनं भूत्वा पुनः सौम्यवपुर्महात्मा॥"

transliteration: "ityarjunaṁ vāsudevastathoktvā svakaṁ rūpaṁ darśayāmāsa bhūyaḥ | āśvāsayāmāsa ca bhītamenaṁ bhūtvā punaḥ saumyavapurmahātmā ||"

