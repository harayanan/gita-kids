meaning: >
  Sanjaya tells the blind king what happened next. Having spoken to Arjuna in this
  way, Krishna folded away the vast, blazing cosmic form and showed His own familiar
  shape again. Then the great soul, becoming gentle once more, comforted the
  frightened Arjuna with His kind and pleasing face. The storm of light had passed,
  and the friend Arjuna knew was standing before him again.

story:
  title: "The Folding of the Light"
  source: "original"
  body: |
    Sanjaya sat in the great hall of Hastinapura, his eyes seeing a battlefield
    far away, his voice telling it all to the blind king Dhritarashtra.

    "Listen," Sanjaya said softly. "The terrible vision is ending."

    On the field, between the two armies, the air had been on fire. For long
    moments Arjuna had stood trembling in the chariot, staring at a form too
    enormous to hold in the mind — a thousand suns, countless faces, mouths like
    furnaces swallowing the worlds. He had begged, with his hands shaking and his
    voice cracking, "Show me the shape I know. Be gentle with me again."

    And Krishna heard him.

    Sanjaya described it as gently as he could, the way you might describe a great
    wave drawing back from the shore. The blinding suns dimmed. The countless arms
    drew in. The roaring fell quiet. The whole universe that had blazed across the
    sky seemed to fold, the way Nani folds an enormous painted cloth, edge to edge,
    smaller and smaller, until it fits in two cupped hands. Where a moment before
    there had been a being filling all of heaven and earth, now there stood only a
    friend — dark as a rain cloud, a peacock feather in His hair, His hand resting
    easy on the chariot rail.

    "The great soul became gentle once more," Sanjaya said. "He took back His own
    quiet form, the one Arjuna had ridden beside all his life."

    Then Krishna did the thing Arjuna needed most. He did not lecture. He did not
    say, *Now you have seen My power.* He simply turned His kind, ordinary,
    beloved face to His frightened friend and steadied him — the way you put a hand
    on the shoulder of someone who has woken from a hard dream and say, without
    words, *It's me. You're safe. I'm here.*

    Sanjaya paused. "Do you understand, O King? The same one who is all the worlds
    is also the gentle friend who comforts a single shaking heart. He showed Arjuna
    the whole universe — and then He showed him kindness. And of the two, the
    kindness was what Arjuna most needed to see."

reflection: "After something overwhelming or scary, what helps you feel calm again — a familiar face, a kind voice, a quiet room? Why do those gentle, ordinary things matter so much right after a big fright?"
