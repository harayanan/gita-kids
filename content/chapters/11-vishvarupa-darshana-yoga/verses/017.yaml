chapter: 11
verse: 17
speaker: arjuna

sanskrit: "किरीटिनं गदिनं चक्रिणं च तेजोराशिं सर्वतो दीप्तिमन्तम्। पश्यामि त्वां दुर्निरीक्ष्यं समन्ताद्दीप्तानलार्कद्युतिमप्रमेयम्॥"

transliteration: "kirīṭinaṁ gadinaṁ cakriṇaṁ ca tejorāśiṁ sarvato dīptimantam | paśyāmi tvāṁ durnirīkṣyaṁ samantāddīptānalārkadyutimaprameyam ||"

