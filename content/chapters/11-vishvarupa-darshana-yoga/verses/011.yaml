chapter: 11
verse: 11
speaker: sanjaya

sanskrit: "दिव्यमाल्याम्बरधरं दिव्यगन्धानुलेपनम्। सर्वाश्चर्यमयं देवमनन्तं विश्वतोमुखम्॥"

transliteration: "divyamālyāmbaradharaṁ divyagandhānulepanam | sarvāścaryamayaṁ devamanantaṁ viśvatomukham ||"

