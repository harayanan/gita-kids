chapter: 11
verse: 8
speaker: krishna

sanskrit: "न तु मां शक्यसे द्रष्टुमनेनैव स्वचक्षुषा। दिव्यं ददामि ते चक्षुः पश्य मे योगमैश्वरम्॥"

transliteration: "na tu māṁ śakyase draṣṭumanenaiva svacakṣuṣā | divyaṁ dadāmi te cakṣuḥ paśya me yogamaiśvaram ||"

