chapter: 11
verse: 42
speaker: arjuna

sanskrit: "यच्चावहासार्थमसत्कृतोऽसि विहारशय्यासनभोजनेषु। एकोऽथवाप्यच्युत तत्समक्षं तत्क्षामये त्वामहमप्रमेयम्॥"

transliteration: "yaccāvahāsārthamasatkṛto'si vihāraśayyāsanabhojaneṣu | eko'thavāpyacyuta tatsamakṣaṁ tatkṣāmaye tvāmahamaprameyam ||"

