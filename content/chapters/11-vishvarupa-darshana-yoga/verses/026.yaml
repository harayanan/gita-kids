chapter: 11
verse: 26
speaker: arjuna

sanskrit: "अमी च त्वां धृतराष्ट्रस्य पुत्राः सर्वे सहैवावनिपालसङ्घैः। भीष्मो द्रोणः सूतपुत्रस्तथासौ सहास्मदीयैरपि योधमुख्यैः॥"

transliteration: "amī ca tvāṁ dhṛtarāṣṭrasya putrāḥ sarve sahaivāvanipālasaṅghaiḥ | bhīṣmo droṇaḥ sūtaputrastathāsau sahāsmadīyairapi yodhamukhyaiḥ ||"

