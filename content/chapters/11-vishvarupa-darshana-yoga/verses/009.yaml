chapter: 11
verse: 9
speaker: sanjaya

sanskrit: "एवमुक्त्वा ततो राजन्महायोगेश्वरो हरिः। दर्शयामास पार्थाय परमं रूपमैश्वरम्॥"

transliteration: "evamuktvā tato rājanmahāyogeśvaro hariḥ | darśayāmāsa pārthāya paramaṁ rūpamaiśvaram ||"

dhatu_breakdown:
  - word: "एवम्"
    parts: ["evam (thus, in this way)"]
    meaning: "thus, having said this"
  - word: "उक्त्वा"
    parts: ["vac (to speak)"]
    meaning: "having spoken"
  - word: "ततः"
    parts: ["tatas (then, thereupon)"]
    meaning: "then"
  - word: "राजन्"
    parts: ["rājan (king)"]
    meaning: "O King (Dhritarashtra)"
  - word: "महायोगेश्वरः"
    parts: ["mahā (great)", "yoga (yoga, mystic power)", "īśvara (lord)"]
    meaning: "the great Lord of yoga"
  - word: "हरिः"
    parts: ["hṛ (to take away, to remove)"]
    meaning: "Hari, the remover of sorrow (Krishna)"
  - word: "दर्शयामास"
    parts: ["dṛś (to see, to show)"]
    meaning: "showed, revealed"
  - word: "पार्थाय"
    parts: ["pṛthā (Kunti)", "a (son of)"]
    meaning: "to Partha, the son of Kunti (Arjuna)"
  - word: "परमम्"
    parts: ["para (supreme, highest)"]
    meaning: "supreme, highest"
  - word: "रूपम्"
    parts: ["rūp (form, shape)"]
    meaning: "form"
  - word: "ऐश्वरम्"
    parts: ["īśvara (lord)"]
    meaning: "lordly, sovereign"

meaning: >
  Sanjaya tells the blind king Dhritarashtra what is happening far away on the
  battlefield, seen through his divine sight: having spoken those words, Hari —
  the great Lord of yoga — showed Partha His supreme, sovereign form. The
  moment of the great vision had come.

story:
  title: "What Sanjaya Saw"
  source: "original"
  body: |
    Far from the battlefield, in a quiet palace chamber, the blind King
    Dhritarashtra sat very still. Beside him sat Sanjaya, his charioteer and
    counsellor, who had been given a wondrous gift: divine sight, so that he
    could watch everything happening on the distant field of Kurukshetra and
    tell the king word for word.

    "Sanjaya," the old king said, his voice low. "You have gone quiet. What is
    happening now?"

    Sanjaya's hands were trembling. For a long moment he could not speak. He had
    been describing two armies, two friends in a chariot, a long and patient
    conversation. But what stood before his inner eye now was nothing he had
    words for.

    "O King," he finally said, "Krishna has finished speaking. And then — then
    he did a thing I never thought to witness. The one we have called a cowherd,
    a charioteer, a friend of the Pandavas... he is the great Lord of yoga
    himself. And to Arjuna, to Partha alone, he has begun to show his supreme
    form."

    Dhritarashtra leaned forward. "His form? He has a form already. I do not
    understand."

    "Nor did I, my king," Sanjaya whispered. "But there are forms beneath forms.
    The shape we see with our eyes is like the cover of a book. Krishna has
    opened the book. He has set aside the gentle blue figure holding the reins
    and let his true, boundless, blazing Self come forward — the form that holds
    all things. He gave Arjuna a divine eye first, for no ordinary eye could bear
    it. And now Arjuna is seeing it."

    The king was silent. Then he asked the question that had gnawed at him for so
    long. "And my sons? Does this great Lord favour my sons, or theirs?"

    Sanjaya did not answer at once. He only said, "My king, when you have seen
    what I am about to see, you will stop asking whose side God is on. You will
    only fall silent, as I have fallen silent. Let me watch. Let me tell you
    everything. The vision is beginning."

reflection: "Sanjaya had to describe something almost too big for words. Have you ever seen something so amazing or so beautiful that you struggled to explain it to someone else? What did you say?"
