chapter: 11
verse: 19
speaker: arjuna

sanskrit: "अनादिमध्यान्तमनन्तवीर्यमनन्तबाहुं शशिसूर्यनेत्रम्। पश्यामि त्वां दीप्तहुताशवक्त्रं स्वतेजसा विश्वमिदं तपन्तम्॥"

transliteration: "anādimadhyāntamanantavīryamanantabāhuṁ śaśisūryanetram | paśyāmi tvāṁ dīptahutāśavaktraṁ svatejasā viśvamidaṁ tapantam ||"

