    parts: ["an (not)", "ādi (beginning)", "madhya (middle)", "anta (end)"]
    meaning: "without beginning, middle, or end"
  - word: "अनन्तवीर्यम्"
    parts: ["an (not)", "anta (end)", "vīra (hero) → vīrya (strength, power)"]
    meaning: "of endless power, infinite in strength"
  - word: "अनन्तबाहुम्"
    parts: ["an (not)", "anta (end)", "bāhu (arm)"]
    meaning: "with countless arms"
  - word: "शशिसूर्यनेत्रम्"
    parts: ["śaśin (the moon, the hare-marked one)", "sūrya (the sun)", "nī (to lead) → netra (eye)"]
    meaning: "having the moon and the sun for eyes"
  - word: "पश्यामि"
    parts: ["dṛś (to see)"]
    meaning: "I see"
  - word: "त्वाम्"
    parts: ["tvad (you)"]
    meaning: "you"
  - word: "दीप्तहुताशवक्त्रम्"
    parts: ["dīp (to blaze)", "hu (to offer oblation)", "aś (to eat) → hutāśa (fire, the eater of offerings)", "vac (to speak) → vaktra (mouth)"]
    meaning: "with a mouth of blazing fire"
  - word: "स्वतेजसा"
    parts: ["sva (own)", "tij (to be sharp, to blaze) → tejas (radiance, heat)"]
    meaning: "by Your own radiance, with Your own heat"
  - word: "विश्वम्"
    parts: ["viś (to enter, to pervade) → viśva (all, universe)"]
    meaning: "the universe, the whole world"
  - word: "इदम्"
    parts: ["idam (this)"]
    meaning: "this"
  - word: "तपन्तम्"
    parts: ["tap (to heat, to burn)"]
    meaning: "scorching, heating, blazing upon"

meaning: >
  Arjuna sees the form even more fiercely now. "You have no beginning, no middle,
  no end. Your strength is endless and Your arms are countless. The moon and the
  sun are Your two eyes, and Your mouth is a blazing fire." With Your own heat,
  he says, You warm and scorch this whole universe. The Lord is so immense that
  the sun and moon themselves are merely His eyes looking out.

story:
  title: "The Sun and Moon for Eyes"
  source: "mythological"
  body: |
    Arjuna had thought he was beginning to understand the vision. Then it
    grew larger still, and he understood how little he had grasped.

    He looked once more for the edges of the form, and once more found none.
    No beginning where it started. No end where it stopped. No middle to mark
    the centre. And from this endless body radiated a strength that made the
    armies on the field below, all those famous warriors, all those mighty
    kings, look like toy soldiers carved from wood.

    Arjuna's gaze travelled up toward the great face. And there he stopped,
    his heart turning over.

    For the two eyes of that vast countenance were not eyes as men have eyes.
    One eye was the moon — the very moon Arjuna had watched rise a thousand
    nights, cool and silver, lighting the world while it slept. The other eye
    was the sun — the same sun that blazed each morning over the mountains and
    woke the birds. The two great lights of the sky, the lamps by which all
    living things saw, were simply the eyes in this enormous face, looking
    down upon the worlds.

    And the mouth — Arjuna's breath stilled — the mouth was fire. Not a torch,
    not a hearth, but a blazing furnace, the sacred fire into which the whole
    world's offerings are poured, roaring and bright.

    Then Arjuna felt it: heat. Not from the sun above him, but from the form
    itself. By its own light, by its own burning power, this immense being was
    warming and scorching the entire universe, the way the noonday sun beats
    down on a wide and shadeless plain. Every world, every star, every
    creature lived inside that heat.

    Arjuna pressed his hands together. "You have no beginning, no middle, no
    end," he said. "Your power and Your arms are without number. The moon and
    the sun are Your eyes, and Your mouth is a blaze of fire. And with Your own
    radiance, O Lord, You set this whole universe aglow."

    He had asked the sky itself to look back at him — and now it was.

reflection: "Think of the sun and the moon as if they were two great eyes watching over the world. Does that make the sky feel friendlier, or more amazing, or a little frightening? Why?"
