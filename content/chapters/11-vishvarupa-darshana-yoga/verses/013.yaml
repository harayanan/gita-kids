chapter: 11
verse: 13
speaker: sanjaya

sanskrit: "तत्रैकस्थं जगत्कृत्स्नं प्रविभक्तमनेकधा। अपश्यद्देवदेवस्य शरीरे पाण्डवस्तदा॥"

transliteration: "tatraikasthaṁ jagatkṛtsnaṁ pravibhaktamanekadhā | apaśyaddevadevasya śarīre pāṇḍavastadā ||"

