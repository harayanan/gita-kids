chapter: 11
verse: 24
speaker: arjuna

sanskrit: "नभःस्पृशं दीप्तमनेकवर्णं व्यात्ताननं दीप्तविशालनेत्रम्। दृष्ट्वा हि त्वां प्रव्यथितान्तरात्मा धृतिं न विन्दामि शमं च विष्णो॥"

transliteration: "nabhaḥspṛśaṁ dīptamanekavarṇaṁ vyāttānanaṁ dīptaviśālanetram | dṛṣṭvā hi tvāṁ pravyathitāntarātmā dhṛtiṁ na vindāmi śamaṁ ca viṣṇo ||"

