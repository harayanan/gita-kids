chapter: 11
verse: 3
speaker: arjuna

sanskrit: "एवमेतद्यथात्थ त्वमात्मानं परमेश्वर। द्रष्टुमिच्छामि ते रूपमैश्वरं पुरुषोत्तम॥"

transliteration: "evametadyathāttha tvamātmānaṁ parameśvara | draṣṭumicchāmi te rūpamaiśvaraṁ puruṣottama ||"

