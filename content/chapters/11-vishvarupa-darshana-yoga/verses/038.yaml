chapter: 11
verse: 38
speaker: arjuna

sanskrit: "त्वमादिदेवः पुरुषः पुराणस्त्वमस्य विश्वस्य परं निधानम्। वेत्तासि वेद्यं च परं च धाम त्वया ततं विश्वमनन्तरूप॥"

transliteration: "tvamādidevaḥ puruṣaḥ purāṇastvamasya viśvasya paraṁ nidhānam | vettāsi vedyaṁ ca paraṁ ca dhāma tvayā tataṁ viśvamanantarūpa ||"

