chapter: 11
verse: 6
speaker: krishna

sanskrit: "पश्यादित्यान्वसून्रुद्रानश्विनौ मरुतस्तथा। बहून्यदृष्टपूर्वाणि पश्याश्चर्याणि भारत॥"

transliteration: "paśyādityānvasūnrudrānaśvinau marutastathā | bahūnyadṛṣṭapūrvāṇi paśyāścaryāṇi bhārata ||"

