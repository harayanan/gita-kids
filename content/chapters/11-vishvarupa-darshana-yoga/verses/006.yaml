meaning: >
  Krishna says: behold the Adityas, the Vasus, the Rudras, the two Ashvins,
  and the Maruts too — and behold many marvels never seen before, Arjuna. Inside
  his one form, Krishna is showing whole families of shining gods, and wonder
  upon wonder that no human eye had ever looked upon.

story:
  title: "All the Shining Families"
  source: "original"
  body: |
    Krishna's voice grew warm with welcome, like someone throwing open the
    doors of a great house and inviting a guest to meet the whole family at
    once.

    "Look, Arjuna," he said. "Look closely now."

    And there, gathered within Krishna's single form, were the bright hosts of
    heaven — every god that the ancient songs had ever named.

    "These are the Adityas," Krishna said, and Arjuna saw twelve great beings
    of pure light, the lords of the sun, one for each turning of the year,
    blazing like twelve dawns standing side by side.

    "And these are the Vasus." Eight shining ones, the keepers of the elements
    — the earth, the water, the fire, the wind, the wide sky, and the lights
    of the heavens — each holding its piece of the world.

    "And these," said Krishna, as a deeper, rolling sound filled the air, "are
    the Rudras." Eleven mighty gods of the storm, roaring like thunder over
    distant hills, fierce and grand.

    "Here are the two Ashvins" — the divine twins, the horsemen of the morning
    and evening, riders who race ahead of the sunrise carrying healing in their
    hands.

    "And these are the Maruts" — the wind-gods, dozens of them, gleaming and
    swift, the gusts that bend the trees and chase the clouds across the
    monsoon sky.

    Arjuna's eyes went wide. He had grown up hearing the names of all these
    gods in the temple chants and the grandmothers' tales. He had imagined
    them his whole life. But no one — no sage, no king, no rishi in his cave —
    had ever actually *seen* them gathered together in one place.

    "Many wonders," Krishna said softly. "Marvels no one has ever beheld
    before. They are all here, Arjuna. Not far away in some distant heaven.
    Here. In me."

    Arjuna understood, with a shiver of awe, what Krishna was teaching him.
    All the countless gods that people worshipped at their countless shrines
    — the sun-gods and the storm-gods and the wind-gods and the healers — were
    not rivals scattered across the sky. They were all faces of the One. Like
    the many rooms of a single great house, all opening off the same shining
    hall.

    And the hall was Krishna himself.

reflection: "Have you ever met a whole big family at once — grandparents, aunts, cousins — and realised they all belong together? What does it feel like to see many different people who are really all one family?"
