chapter: 11
verse: 40
speaker: arjuna

sanskrit: "नमः पुरस्तादथ पृष्ठतस्ते नमोऽस्तु ते सर्वत एव सर्व। अनन्तवीर्यामितविक्रमस्त्वं सर्वं समाप्नोषि ततोऽसि सर्वः॥"

transliteration: "namaḥ purastādatha pṛṣṭhataste namo'stu te sarvata eva sarva | anantavīryāmitavikramastvaṁ sarvaṁ samāpnoṣi tato'si sarvaḥ ||"

