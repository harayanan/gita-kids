chapter: 11
verse: 29

speaker: arjuna

sanskrit: "यथा प्रदीप्तं ज्वलनं पतङ्गा विशन्ति नाशाय समृद्धवेगाः। तथैव नाशाय विशन्ति लोकास्तवापि वक्त्राणि समृद्धवेगाः॥"

transliteration: "yathā pradīptaṁ jvalanaṁ pataṅgā viśanti nāśāya samṛddhavegāḥ | tathaiva nāśāya viśanti lokāstavāpi vaktrāṇi samṛddhavegāḥ ||"

dhatu_breakdown:
  - word: "यथा"
    parts: ["yathā (just as)"]
    meaning: "just as, in the way that"
  - word: "प्रदीप्तम्"
    parts: ["pra (forth)", "dīp (to blaze, to flame)"]
    meaning: "blazing, brightly flaming"
  - word: "ज्वलनम्"
    parts: ["jval (to burn, to flame)"]
    meaning: "a fire, a flame"
  - word: "पतङ्गाः"
    parts: ["pat (to fly, to fall)", "ga (going)"]
    meaning: "moths, flying insects"
  - word: "विशन्ति"
    parts: ["viś (to enter)"]
    meaning: "they enter, they rush in"
  - word: "नाशाय"
    parts: ["naś (to perish, to be destroyed)"]
    meaning: "to their destruction, for perishing"
  - word: "समृद्धवेगाः"
    parts: ["sam (fully)", "ṛdh (to grow, to increase)", "vega (speed, rush)"]
    meaning: "with full, headlong speed"
  - word: "तथा"
    parts: ["tathā (so, thus)"]
    meaning: "so, in the same way"
  - word: "एव"
    parts: ["eva (just, exactly)"]
    meaning: "exactly, just"
  - word: "लोकाः"
    parts: ["lok (to see, world)"]
    meaning: "the worlds, the peoples"
  - word: "तव"
    parts: ["tava (your)"]
    meaning: "your"
  - word: "अपि"
    parts: ["api (also, even)"]
    meaning: "also, too"
  - word: "वक्त्राणि"
    parts: ["vac (to speak)", "tra (instrument — mouth)"]
    meaning: "mouths"

meaning: >
  Arjuna says: just as moths come flying out of the dark and dive straight
  into a blazing flame, faster and faster, rushing to their own end — in
  exactly the same way all these worlds and all these people pour headlong
  into Your fiery mouths. They cannot stop themselves. Nothing escapes the
  great fire that You are.

story:
  title: "The Moths and the Lamp"
  source: "original"
  body: |
    Arjuna had been given a divine eye, and with it he could see what no
    ordinary person had ever seen. Krishna was no longer the friend holding
    the reins of the chariot. He had become the whole universe, a being
    with countless faces and countless arms, taller than the sky, brighter
    than a thousand suns. And in His enormous faces were enormous mouths,
    open and burning.

    Arjuna's hands shook on the chariot rail. He searched his memory for
    something, anything, that looked like what he was seeing. And one small
    picture came to him from his childhood.

    He remembered summer nights in the palace, when the oil lamps were lit
    in the long hallways. He remembered lying near a lamp on a hot evening,
    watching the moths arrive. They came out of the darkness, dozens of them,
    their soft wings whirring. And every single one flew straight toward the
    flame. The little boy Arjuna had tried to wave them away. "Stop," he had
    whispered. "It will burn you." But they would not stop. Faster and faster
    they spun toward the fire, as if the light were pulling them in, until
    one by one they vanished into it.

    Now, standing before the cosmic form, Arjuna understood that the lamp had
    been showing him something true all along. The flame in the hallway and
    the burning mouths of God were the same kind of thing — a fire so bright
    that everything is drawn into it and nothing comes back out.

    "Yathā pradīptaṁ jvalanaṁ pataṅgāḥ," he said aloud, his voice trembling.
    "Just as moths rush into a blazing flame to their death — so do all these
    worlds rush into Your mouths."

    He was watching kings, armies, whole peoples being carried forward, the
    way the moths had been carried, faster than they could choose. He was a
    moth too, he realised. So was everyone he had ever loved. The lamp of his
    childhood had grown until it filled the entire sky, and now he could not
    look away.

reflection: "Have you ever watched a moth circle a light, or seen something small drawn toward something huge and bright? What did it make you feel — wonder, fear, or both at once?"
