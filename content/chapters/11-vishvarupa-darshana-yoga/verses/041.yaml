chapter: 11
verse: 41
speaker: arjuna

sanskrit: "सखेति मत्वा प्रसभं यदुक्तं हे कृष्ण हे यादव हे सखेति। अजानता महिमानं तवेदं मया प्रमादात्प्रणयेन वापि॥"

transliteration: "sakheti matvā prasabhaṁ yaduktaṁ he kṛṣṇa he yādava he sakheti | ajānatā mahimānaṁ tavedaṁ mayā pramādātpraṇayena vāpi ||"

