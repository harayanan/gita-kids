chapter: 11
verse: 46
speaker: arjuna

sanskrit: "किरीटिनं गदिनं चक्रहस्तमिच्छामि त्वां द्रष्टुमहं तथैव। तेनैव रूपेण चतुर्भुजेन सहस्रबाहो भव विश्वमूर्ते॥"

transliteration: "kirīṭinaṁ gadinaṁ cakrahastamicchāmi tvāṁ draṣṭumahaṁ tathaiva | tenaiva rūpeṇa caturbhujena sahasrabāho bhava viśvamūrte ||"

