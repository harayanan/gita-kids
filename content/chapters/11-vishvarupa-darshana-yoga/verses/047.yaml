chapter: 11
verse: 47
speaker: krishna

sanskrit: "मया प्रसन्नेन तवार्जुनेदं रूपं परं दर्शितमात्मयोगात्। तेजोमयं विश्वमनन्तमाद्यं यन्मे त्वदन्येन न दृष्टपूर्वम्॥"

transliteration: "mayā prasannena tavārjunedaṁ rūpaṁ paraṁ darśitamātmayogāt | tejomayaṁ viśvamanantamādyaṁ yanme tvadanyena na dṛṣṭapūrvam ||"

