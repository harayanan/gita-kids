chapter: 11
verse: 44
speaker: arjuna

sanskrit: "तस्मात्प्रणम्य प्रणिधाय कायं प्रसादये त्वामहमीशमीड्यम्। पितेव पुत्रस्य सखेव सख्युः प्रियः प्रियायार्हसि देव सोढुम्॥"

transliteration: "tasmātpraṇamya praṇidhāya kāyaṁ prasādaye tvāmahamīśamīḍyam | piteva putrasya sakheva sakhyuḥ priyaḥ priyāyārhasi deva soḍhum ||"

