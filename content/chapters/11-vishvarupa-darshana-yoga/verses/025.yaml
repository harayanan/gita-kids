chapter: 11
verse: 25
speaker: arjuna

sanskrit: "दंष्ट्राकरालानि च ते मुखानि दृष्ट्वैव कालानलसन्निभानि। दिशो न जाने न लभे च शर्म प्रसीद देवेश जगन्निवास॥"

transliteration: "daṁṣṭrākarālāni ca te mukhāni dṛṣṭvaiva kālānalasannibhāni | diśo na jāne na labhe ca śarma prasīda deveśa jagannivāsa ||"

