chapter: 11
verse: 43
speaker: arjuna

sanskrit: "पितासि लोकस्य चराचरस्य त्वमस्य पूज्यश्च गुरुर्गरीयान्। न त्वत्समोऽस्त्यभ्यधिकः कुतोऽन्यो लोकत्रयेऽप्यप्रतिमप्रभाव॥"

transliteration: "pitāsi lokasya carācarasya tvamasya pūjyaśca gururgarīyān | na tvatsamo'styabhyadhikaḥ kuto'nyo lokatraye'pyapratimaprabhāva ||"

