chapter: 11
verse: 21
speaker: arjuna

sanskrit: "अमी हि त्वां सुरसङ्घा विशन्ति केचिद्भीताः प्राञ्जलयो गृणन्ति। स्वस्तीत्युक्त्वा महर्षिसिद्धसङ्घाः स्तुवन्ति त्वां स्तुतिभिः पुष्कलाभिः॥"

transliteration: "amī hi tvāṁ surasaṅghā viśanti kecidbhītāḥ prāñjalayo gṛṇanti | svastītyuktvā maharṣisiddhasaṅghāḥ stuvanti tvāṁ stutibhiḥ puṣkalābhiḥ ||"

