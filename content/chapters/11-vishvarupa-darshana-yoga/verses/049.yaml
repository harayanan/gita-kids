chapter: 11
verse: 49
speaker: krishna

sanskrit: "मा ते व्यथा मा च विमूढभावो दृष्ट्वा रूपं घोरमीदृङ्ममेदम्। व्यपेतभीः प्रीतमनाः पुनस्त्वं तदेव मे रूपमिदं प्रपश्य॥"

transliteration: "mā te vyathā mā ca vimūḍhabhāvo dṛṣṭvā rūpaṁ ghoramīdṛṅmamedam | vyapetabhīḥ prītamanāḥ punastvaṁ tadeva me rūpamidaṁ prapaśya ||"

