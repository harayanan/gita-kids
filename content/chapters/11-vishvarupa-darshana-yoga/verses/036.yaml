chapter: 11
verse: 36
speaker: arjuna

sanskrit: "स्थाने हृषीकेश तव प्रकीर्त्या जगत्प्रहृष्यत्यनुरज्यते च। रक्षांसि भीतानि दिशो द्रवन्ति सर्वे नमस्यन्ति च सिद्धसङ्घाः॥"

transliteration: "sthāne hṛṣīkeśa tava prakīrtyā jagatprahṛṣyatyanurajyate ca | rakṣāṁsi bhītāni diśo dravanti sarve namasyanti ca siddhasaṅghāḥ ||"

dhatu_breakdown:
  - word: "स्थाने"
    parts: ["sthā (to stand, to be fitting)"]
    meaning: "rightly, fittingly, it is proper"
  - word: "हृषीकेश"
    parts: ["hṛṣīka (the senses)", "īśa (lord)"]
    meaning: "O Hrishikesha, Lord of the senses (Krishna)"
  - word: "तव"
    parts: ["tvad (you)"]
    meaning: "your, of you"
  - word: "प्रकीर्त्या"
    parts: ["pra (forth)", "kīrt (to praise, to proclaim)"]
    meaning: "by your praise, through your glory"
  - word: "जगत्"
    parts: ["gam (to go, to move)"]
    meaning: "the world, all that moves"
  - word: "प्रहृष्यति"
    parts: ["pra (greatly)", "hṛṣ (to rejoice, to thrill)"]
    meaning: "rejoices greatly, thrills with joy"
  - word: "अनुरज्यते"
    parts: ["anu (towards)", "rañj (to be coloured, to be delighted, to love)"]
