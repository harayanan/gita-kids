chapter: 11
verse: 23
speaker: arjuna

sanskrit: "रूपं महत्ते बहुवक्त्रनेत्रं महाबाहो बहुबाहूरुपादम्। बहूदरं बहुदंष्ट्राकरालं दृष्ट्वा लोकाः प्रव्यथितास्तथाहम्॥"

transliteration: "rūpaṁ mahatte bahuvaktranetraṁ mahābāho bahubāhūrupādam | bahūdaraṁ bahudaṁṣṭrākarālaṁ dṛṣṭvā lokāḥ pravyathitāstathāham ||"

dhatu_breakdown:
  - word: "रूपम्"
    parts: ["rūp (to form, to shape)"]
    meaning: "form, shape"
  - word: "महत्"
    parts: ["mah (to be great)"]
    meaning: "great, immense"
  - word: "ते"
    parts: ["tvam (you)"]
    meaning: "Your"
  - word: "बहुवक्त्रनेत्रम्"
    parts: ["bahu (many)", "vac (to speak) → vaktra (mouth, face)", "nī (to lead) → netra (eye)"]
    meaning: "with many mouths and eyes"
  - word: "महाबाहो"
    parts: ["mahā (great)", "bāhu (arm)"]
    meaning: "O mighty-armed one"
  - word: "बहुबाहूरुपादम्"
    parts: ["bahu (many)", "bāhu (arm)", "ūru (thigh)", "pad (foot)"]
    meaning: "with many arms, thighs, and feet"
  - word: "बहूदरम्"
    parts: ["bahu (many)", "udara (belly)"]
    meaning: "with many bellies"
  - word: "बहुदंष्ट्राकरालम्"
    parts: ["bahu (many)", "daṁś (to bite) → daṁṣṭrā (fang, tusk)", "karāla (gaping, terrible)"]
    meaning: "terrible with many fangs"
  - word: "दृष्ट्वा"
    parts: ["dṛś (to see)"]
    meaning: "having seen"
  - word: "लोकाः"
    parts: ["lok (to see, to behold) → loka (world)"]
    meaning: "the worlds, the beings of the worlds"
  - word: "प्रव्यथिताः"
    parts: ["pra (forth)", "vyath (to tremble, to be shaken)"]
    meaning: "deeply shaken, trembling"
  - word: "तथा"
    parts: ["tathā (so, likewise)"]
    meaning: "so too, likewise"
  - word: "अहम्"
    parts: ["aham (I)"]
    meaning: "I"

meaning: >
  Arjuna speaks straight to Krishna now: this great form of Yours has so many
  mouths and eyes, so many arms and legs and bellies, and rows of fangs that
  look frightening. Seeing such a vast and powerful shape, all the worlds are
  trembling — and so am I. The wonder has grown so large that it makes even a
  brave warrior shake.

story:
  title: "The Form Too Big to Hold"
  source: "original"
  body: |
    Arjuna had asked to see. He had begged for it, in fact — "Show me Your
    true form," he had said, sure that he was ready. Now the seeing had come,
    and it was nothing like he had imagined.

    The form filled everything. He turned his head to find an edge and could
    not. Wherever he looked there were faces — thousands of them, calm and
    fierce and laughing and grave, all at once. There were eyes beyond
    counting, each one a small sun. Arms reached out in every direction,
    holding weapons, holding flowers, holding worlds. Legs like pillars
    vanished into the deep below. And the mouths — the great gleaming mouths,
    rimmed with rows of fangs — opened and closed like the breathing of
    something older than time.

    A human heart is made to hold human-sized things. A friend's face. A
    chariot. A river you can swim across. But this was the whole universe wearing
    a single body, and Arjuna's heart strained against it the way your eyes
    strain when you try to look straight at the sun.

    He looked down at the gods and beings he had seen a moment before, the
    Rudras and Adityas and all the bright crowds of heaven. They were not
    only amazed now. They were trembling, swaying like trees in a great wind,
    overwhelmed by the very thing they had come to worship.

    "If even they are shaking," Arjuna thought, "then I need not pretend to be
    braver than the gods."

    So he said it plainly, the way an honest person says a hard true thing.
    "O mighty-armed Krishna — seeing this immense form of countless mouths and
    eyes and arms, with its rows of terrible fangs, all the worlds are
    trembling. And I am trembling too."

    There was no shame in his voice. To be small before something vast
    is not weakness. It is the beginning of understanding how vast it really is.

reflection: "Have you ever wanted something very badly, and then felt overwhelmed when you finally got it? Is it brave or honest to admit when something is bigger than you expected?"
