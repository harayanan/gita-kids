chapter: 11
verse: 20
speaker: arjuna

sanskrit: "द्यावापृथिव्योरिदमन्तरं हि व्याप्तं त्वयैकेन दिशश्च सर्वाः। दृष्ट्वाद्भुतं रूपमुग्रं तवेदं लोकत्रयं प्रव्यथितं महात्मन्॥"

transliteration: "dyāvāpṛthivyoridamantaraṁ hi vyāptaṁ tvayaikena diśaśca sarvāḥ | dṛṣṭvādbhutaṁ rūpamugraṁ tavedaṁ lokatrayaṁ pravyathitaṁ mahātman ||"

