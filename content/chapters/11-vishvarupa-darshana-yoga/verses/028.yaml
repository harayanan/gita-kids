chapter: 11
verse: 28
speaker: arjuna

sanskrit: "यथा नदीनां बहवोऽम्बुवेगाः समुद्रमेवाभिमुखा द्रवन्ति। तथा तवामी नरलोकवीरा विशन्ति वक्त्राण्यभिविज्वलन्ति॥"

transliteration: "yathā nadīnāṁ bahavo'mbuvegāḥ samudramevābhimukhā dravanti | tathā tavāmī naralokavīrā viśanti vaktrāṇyabhivijvalanti ||"

