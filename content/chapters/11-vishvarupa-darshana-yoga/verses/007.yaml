chapter: 11
verse: 7
speaker: krishna

sanskrit: "इहैकस्थं जगत्कृत्स्नं पश्याद्य सचराचरम्। मम देहे गुडाकेश यच्चान्यद्द्रष्टुमिच्छसि॥"

transliteration: "ihaikasthaṁ jagatkṛtsnaṁ paśyādya sacarācaram | mama dehe guḍākeśa yaccānyaddraṣṭumicchasi ||"

