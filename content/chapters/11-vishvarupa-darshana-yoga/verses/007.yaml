meaning: >
  Krishna says: behold now, gathered together in one place, the whole universe
  — everything that moves and everything that stands still — here, in my body,
  Arjuna. And whatever else you wish to see, see that here too. The entire
  cosmos, with nothing left out, is held within the single form of the Lord.

story:
  title: "The Whole World in One Body"
  source: "original"
  body: |
    "Now look once more, Arjuna," said Krishna, "and look at everything at
    once."

    He called him by a special name — Gudakesha, the conqueror of sleep, the
    one who stays awake and watchful. It was the right name for this moment,
    because Krishna was about to show him something that would need every bit
    of his attention.

    "Here," Krishna said, "in this one place, gathered together so that nothing
    is left out — behold the whole universe."

    And Arjuna saw.

    He saw everything that moves: the rivers running to the sea, the herds of
    deer leaping across the plains, the birds wheeling overhead, the fish in
    the deep, the armies on the field, the children in the villages, the gods
    striding through the heavens. Everything that walks and swims and flies and
    crawls and dances.

    And he saw everything that does not move: the great mountains standing
    shoulder to shoulder, the ancient forests, the still lakes, the rocks, the
    valleys, the wide and patient earth itself.

    All of it was there. The moving and the unmoving. The whole world, with
    nothing missing.

    And the most astonishing thing of all was *where* it was. It was not spread
    out across the sky in front of him. It was inside Krishna. In his body. The
    entire universe, every star and stone and living thing, was held within
    the single form of his friend, the way a whole forest is held inside one
    seed, the way a whole song is held inside one singer.

    "And whatever else you wish to see," Krishna said gently, "look for it
    here. There is nothing anywhere — not in the past, not in any far-off
    place, not in any hidden corner of creation — that is not contained in me.
    Ask for anything. It is already here."

    Arjuna's mind reeled. He had asked to see a *form*, the way you ask to see
    a person's face. But Krishna was not just a form. He was the place where
    everything lived. The container of all containers. The one body that held
    every other body.

    Krishna had said *yes* to Arjuna's request. But this was a far greater yes
    than Arjuna had ever imagined. The friend who held the reins was about to
    show him that he also held the world.

reflection: "Imagine holding the whole world — every animal, mountain, river, and person — in your two hands at once. What do you think you would feel? Would it be wonderful, frightening, or both?"
