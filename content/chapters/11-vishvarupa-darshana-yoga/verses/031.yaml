chapter: 11
verse: 31

speaker: arjuna

sanskrit: "आख्याहि मे को भवानुग्ररूपो नमोऽस्तु ते देववर प्रसीद। विज्ञातुमिच्छामि भवन्तमाद्यं न हि प्रजानामि तव प्रवृत्तिम्॥"

transliteration: "ākhyāhi me ko bhavānugrarūpo namo'stu te devavara prasīda | vijñātumicchāmi bhavantamādyaṁ na hi prajānāmi tava pravṛttim ||"

