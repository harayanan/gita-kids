chapter: 11
verse: 15
speaker: arjuna

sanskrit: "पश्यामि देवांस्तव देव देहे सर्वांस्तथा भूतविशेषसङ्घान्। ब्रह्माणमीशं कमलासनस्थमृषींश्च सर्वानुरगांश्च दिव्यान्॥"

transliteration: "paśyāmi devāṁstava deva dehe sarvāṁstathā bhūtaviśeṣasaṅghān | brahmāṇamīśaṁ kamalāsanasthamṛṣīṁśca sarvānuragāṁśca divyān ||"

