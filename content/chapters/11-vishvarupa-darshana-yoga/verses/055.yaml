chapter: 11
verse: 55
speaker: krishna

sanskrit: "मत्कर्मकृन्मत्परमो मद्भक्तः सङ्गवर्जितः। निर्वैरः सर्वभूतेषु यः स मामेति पाण्डव॥"

transliteration: "matkarmakṛnmatparamo madbhaktaḥ saṅgavarjitaḥ | nirvairaḥ sarvabhūteṣu yaḥ sa māmeti pāṇḍava ||"

dhatu_breakdown:
  - word: "मत्कर्मकृत्"
    parts: ["mad (My)", "kṛ (to do, to act)"]
    meaning: "one who does My work, who acts for My sake"
  - word: "मत्परमः"
    parts: ["mad (Me)", "parama (highest, supreme)"]
    meaning: "one who holds Me as the supreme goal"
  - word: "मद्भक्तः"
    parts: ["mad (Me)", "bhaj (to love, to be devoted)"]
    meaning: "one devoted to Me, who loves Me"
  - word: "सङ्गवर्जितः"
    parts: ["sam (together)", "gam (to go, to cling)", "vṛj (to shun, to cast off)"]
    meaning: "free from attachment, having let go of clinging"
  - word: "निर्वैरः"
    parts: ["nis (without)", "vaira (enmity, hatred)"]
    meaning: "without enmity, holding no hatred"
  - word: "सर्वभूतेषु"
    parts: ["sarva (all)", "bhū (to be, to become)"]
    meaning: "toward all beings, all creatures"
  - word: "यः"
    parts: ["yad (who)"]
    meaning: "the one who"
  - word: "सः"
    parts: ["tad (he)"]
    meaning: "he, that person"
  - word: "माम्"
    parts: ["mad (me)"]
    meaning: "Me"
  - word: "एति"
    parts: ["i (to go, to come)"]
    meaning: "comes, reaches"
  - word: "पाण्डव"
    parts: ["pāṇḍu (Pandu)", "a (son of)"]
    meaning: "O son of Pandu, Arjuna"

meaning: >
  This is the heart of the whole chapter, the gift Krishna leaves Arjuna with. The
  one who does My work, who holds Me as the highest, who loves Me, who is free from
  clinging, and who carries no hatred toward any living being — that person comes to
  Me, O son of Pandu. Do your work for the Lord, love with your whole heart, and
  hate no one. That is the path home.

story:
  title: "The Heart of It All"
  source: "original"
  body: |
    It was evening in Madhubani. The great fire of the day had cooled into a soft
    pink sky, and Nani had finished her painting — the cosmic one, the whole
    universe held in a single shining figure, faces and suns and worlds spiralling
    out in careful Madhubani lines. Ravi had watched her paint the terrible vision,
    and the gentle face restored. He had heard the whole story now, all the way to
    the end.

    "Nani," he said quietly, "Arjuna saw *everything*. The whole universe. It was
    so big and so frightening. After seeing all that — what is a person even
    supposed to *do*?"

    Nani set down her brush and wiped her hands. She drew Ravi to sit beside her on
    the courtyard step, Moti curling up at their feet. The temple bells were
    beginning, far off and sweet.

    "That," she said, "is the most beautiful part. After showing Arjuna the entire
    blazing universe, do you know what Krishna asks of him at the very end? Nothing
    grand. Nothing impossible. Just three small things, small enough for a boy in
    Madhubani, or a warrior in a chariot, or anyone at all."

    She held up one finger. "First — do your work for God. Whatever your work is —
    your sums, your chores, helping your mother, drawing your peacocks — do it as an
    offering, not for prizes. *Do your work for the Lord.*"

    A second finger. "Second — love. Hold God highest in your heart, and love Him
    the way Moti loves you, with no holding back. Don't cling and grab at things and
    rewards — just love, openly, and let the rest go."

    A third finger. "And third — this is the one I want you to carry your whole
    life. *Hate no one.* Not the boy who teased you. Not the man who pushed past you
    at the fair. Not anyone. Carry no enmity toward any living being — not people,
    not animals, not even the smallest creature. Look at every single thing that
    lives, and wish it well."

    She folded Ravi's small hand inside her own.

    "That is the whole secret, Ravi. Of all eleven chapters, of the entire vision,
    this is the heart. Do your work for God. Love with your whole heart. Hate no
    one. The person who lives like that," Nani said, and her voice was gentle,
    "comes home to God, to the One who was never truly other than their own deepest self. Not after great rituals. Just by working, and loving, and wishing every creature well."

    The bells rang on. Moti sighed in his sleep. And Ravi sat with his Nani in the
    pink evening light, holding, in three small things, the whole of it.

reflection: "Krishna's three things are: do your work as an offering, love with your whole heart, and hold no hatred toward anyone. Which of these feels easiest for you right now — and which one will you have to practise the hardest?"
