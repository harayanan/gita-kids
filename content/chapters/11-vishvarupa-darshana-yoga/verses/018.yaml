chapter: 11
verse: 18
speaker: arjuna

sanskrit: "त्वमक्षरं परमं वेदितव्यं त्वमस्य विश्वस्य परं निधानम्। त्वमव्ययः शाश्वतधर्मगोप्ता सनातनस्त्वं पुरुषो मतो मे॥"

transliteration: "tvamakṣaraṁ paramaṁ veditavyaṁ tvamasya viśvasya paraṁ nidhānam | tvamavyayaḥ śāśvatadharmagoptā sanātanastvaṁ puruṣo mato me ||"

