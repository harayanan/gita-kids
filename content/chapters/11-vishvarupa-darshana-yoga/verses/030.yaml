chapter: 11
verse: 30

speaker: arjuna

sanskrit: "लेलिह्यसे ग्रसमानः समन्ताल्लोकान्समग्रान्वदनैर्ज्वलद्भिः। तेजोभिरापूर्य जगत्समग्रं भासस्तवोग्राः प्रतपन्ति विष्णो॥"

transliteration: "lelihyase grasamānaḥ samantāllokānsamagrānvadanairjvaladbhiḥ | tejobhirāpūrya jagatsamagraṁ bhāsastavogrāḥ pratapanti viṣṇo ||"

