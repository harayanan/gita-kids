chapter: 11
verse: 4
speaker: arjuna

sanskrit: "मन्यसे यदि तच्छक्यं मया द्रष्टुमिति प्रभो। योगेश्वर ततो मे त्वं दर्शयात्मानमव्ययम्॥"

transliteration: "manyase yadi tacchakyaṁ mayā draṣṭumiti prabho | yogeśvara tato me tvaṁ darśayātmānamavyayam ||"

