  - word: "मन्यसे"
    parts: ["man (to think, to consider)"]
    meaning: "you think, you consider"
  - word: "यदि"
    parts: ["yadi (if)"]
    meaning: "if"
  - word: "तत्"
    parts: ["tad (that, it)"]
    meaning: "that, it"
  - word: "शक्यम्"
    parts: ["śak (to be able)"]
    meaning: "possible, able to be done"
  - word: "मया"
    parts: ["mad (me)"]
    meaning: "by me"
  - word: "द्रष्टुम्"
    parts: ["dṛś (to see)"]
    meaning: "to see, to behold"
  - word: "इति"
    parts: ["iti (thus, so)"]
    meaning: "thus, that (marks the thought)"
  - word: "प्रभो"
    parts: ["pra (forth)", "bhū (to be, to become)"]
    meaning: "O Lord, O mighty one"
  - word: "योगेश्वर"
    parts: ["yoga (union, divine power)", "īśvara (Lord)"]
    meaning: "O Lord of yoga, master of all divine power"
  - word: "ततः"
    parts: ["tatas (then, from that)"]
    meaning: "then, in that case"
  - word: "मे"
    parts: ["mad (to me, my)"]
    meaning: "to me"
  - word: "त्वम्"
    parts: ["tvad (you)"]
    meaning: "you"
  - word: "दर्शय"
    parts: ["dṛś (to see, causative: to show)"]
    meaning: "show, reveal"
  - word: "आत्मानम्"
    parts: ["ātman (self)"]
    meaning: "yourself, your own Self"
  - word: "अव्ययम्"
    parts: ["a (not)", "vi (apart)", "i (to go, to perish)"]
    meaning: "imperishable, undying, eternal"

meaning: >
  Arjuna says: if you think it is possible for me to behold it, O Lord of all
  yoga, then show me your eternal, undying Self. He adds a gentle 'if' — he
  knows the vision may be too great for a human to bear, and he leaves the
  choice in Krishna's wise hands.

story:
  title: "If You Think I Can Bear It"
  source: "original"
  body: |
    There was one more thing Arjuna wanted to add to his great request, and
    it was the most humble part of all.

    "If," he said. "Only if."

    He had asked to see Krishna's divine form. But now, before the words had
    even finished settling in the air, he hedged them with care. He did not
    want to demand. He did not want to grab at the vision the way a greedy
    child grabs at a flame, not knowing it can burn.

    "Lord of yoga," Arjuna said — for Krishna was Yogeshvara, the master of
    all the hidden powers of the universe, the one who could fold the whole
    cosmos into a single shape — "if you think it is possible for me to look
    upon it... if you think these eyes of mine, these ordinary human eyes,
    can bear such a sight... then show me. Show me your imperishable Self,
    the form that never fades and never dies."

    He had heard stories, the way every child of his land had heard stories,
    of mortals who asked to see things too bright for them. He knew that the
    sun, which gives life to the whole earth, will also blind the eye that
    stares straight into it. He knew that what we long for most can sometimes
    be more than we are ready to hold.

    So he placed the decision where it belonged — not in his own eager heart,
    but in the wisdom of his friend.

    "You know me better than I know myself," Arjuna said quietly. "You know
    what I can carry and what would crush me. So I will not insist. I only
    ask. If you judge that I am ready — reveal yourself."

    It was the asking of someone who had grown up a little in the last hour.
    The frightened warrior of the morning would have either run from the
    vision or demanded it without thinking. But the Arjuna who spoke now had
    learned something about trust. He wanted the sight with all his heart —
    and he was willing to be told he was not yet ready, if that was the truth.

    Krishna looked at him for a long, still moment. Then, far away inside the
    Lord of yoga, a decision was made. He would show him. He would open the
    whole universe to a single pair of human eyes.

reflection: "When you ask for something big, do you ever leave room for a wiser person to say 'not yet'? Why might trusting someone else's 'if' be a brave and grown-up thing to do?"
