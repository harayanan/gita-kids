chapter: 11
verse: 45
speaker: arjuna

sanskrit: "अदृष्टपूर्वं हृषितोऽस्मि दृष्ट्वा भयेन च प्रव्यथितं मनो मे। तदेव मे दर्शय देव रूपं प्रसीद देवेश जगन्निवास॥"

transliteration: "adṛṣṭapūrvaṁ hṛṣito'smi dṛṣṭvā bhayena ca pravyathitaṁ mano me | tadeva me darśaya deva rūpaṁ prasīda deveśa jagannivāsa ||"

