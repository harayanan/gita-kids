chapter: 11
verse: 34

speaker: krishna

sanskrit: "द्रोणं च भीष्मं च जयद्रथं च कर्णं तथान्यानपि योधवीरान्। मया हतांस्त्वं जहि मा व्यथिष्ठा युध्यस्व जेतासि रणे सपत्नान्॥"

transliteration: "droṇaṁ ca bhīṣmaṁ ca jayadrathaṁ ca karṇaṁ tathānyānapi yodhavīrān | mayā hatāṁstvaṁ jahi mā vyathiṣṭhā yudhyasva jetāsi raṇe sapatnān ||"

