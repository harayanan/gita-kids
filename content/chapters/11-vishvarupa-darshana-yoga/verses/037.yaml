chapter: 11
verse: 37
speaker: arjuna

sanskrit: "कस्माच्च ते न नमेरन्महात्मन्गरीयसे ब्रह्मणोऽप्यादिकर्त्रे। अनन्त देवेश जगन्निवास त्वमक्षरं सदसत्तत्परं यत्॥"

transliteration: "kasmācca te na nameranmahātmangarīyase brahmaṇo'pyādikartre | ananta deveśa jagannivāsa tvamakṣaraṁ sadasattatparaṁ yat ||"

