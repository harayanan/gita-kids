summary: >
  This is the most spectacular chapter! Arjuna asks to see Krishna's true
  form, and Krishna gives him special eyes to see it. Arjuna sees the entire
  universe — all the stars, all living beings, past and future — inside
  Krishna's body. It's so amazing and overwhelming that Arjuna trembles
  with wonder and asks Krishna to return to his gentle, familiar form.
