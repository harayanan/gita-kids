chapter: 10
verse: 37
speaker: krishna

sanskrit: "वृष्णीनां वासुदेवोऽस्मि पाण्डवानां धनञ्जयः। मुनीनामप्यहं व्यासः कवीनामुशना कविः॥"

transliteration: "vṛṣṇīnāṁ vāsudevo'smi pāṇḍavānāṁ dhanañjayaḥ | munīnāmapyahaṁ vyāsaḥ kavīnāmuśanā kaviḥ ||"

