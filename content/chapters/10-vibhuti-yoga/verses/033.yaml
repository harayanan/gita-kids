chapter: 10
verse: 33
speaker: krishna

sanskrit: "अक्षराणामकारोऽस्मि द्वन्द्वः सामासिकस्य च। अहमेवाक्षयः कालो धाताहं विश्वतोमुखः॥"

transliteration: "akṣarāṇāmakāro'smi dvandvaḥ sāmāsikasya ca | ahamevākṣayaḥ kālo dhātāhaṁ viśvatomukhaḥ ||"

