chapter: 10
verse: 18
speaker: arjuna

sanskrit: "विस्तरेणात्मनो योगं विभूतिं च जनार्दन। भूयः कथय तृप्तिर्हि शृण्वतो नास्ति मेऽमृतम्॥"

transliteration: "vistareṇātmano yogaṁ vibhūtiṁ ca janārdana | bhūyaḥ kathaya tṛptirhi śṛṇvato nāsti me'mṛtam ||"

