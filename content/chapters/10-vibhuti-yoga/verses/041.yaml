chapter: 10
verse: 41
speaker: krishna

sanskrit: "यद्यद्विभूतिमत्सत्त्वं श्रीमदूर्जितमेव वा। तत्तदेवावगच्छ त्वं मम तेजोंशसम्भवम्॥"

transliteration: "yadyadvibhūtimatsattvaṁ śrīmadūrjitameva vā | tattadevāvagaccha tvaṁ mama tejoṁśasambhavam ||"

