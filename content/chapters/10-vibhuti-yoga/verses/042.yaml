chapter: 10
verse: 42
speaker: krishna

sanskrit: "अथवा बहुनैतेन किं ज्ञातेन तवार्जुन। विष्टभ्याहमिदं कृत्स्नमेकांशेन स्थितो जगत्॥"

transliteration: "athavā bahunaitena kiṁ jñātena tavārjuna | viṣṭabhyāhamidaṁ kṛtsnamekāṁśena sthito jagat ||"

