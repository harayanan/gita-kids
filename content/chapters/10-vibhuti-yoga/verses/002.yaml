chapter: 10
verse: 2
speaker: krishna

sanskrit: "न मे विदुः सुरगणाः प्रभवं न महर्षयः। अहमादिर्हि देवानां महर्षीणां च सर्वशः॥"

transliteration: "na me viduḥ suragaṇāḥ prabhavaṁ na maharṣayaḥ | ahamādirhi devānāṁ maharṣīṇāṁ ca sarvaśaḥ ||"

