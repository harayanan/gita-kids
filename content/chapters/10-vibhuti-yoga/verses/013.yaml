chapter: 10
verse: 13
speaker: arjuna

sanskrit: "आहुस्त्वामृषयः सर्वे देवर्षिर्नारदस्तथा। असितो देवलो व्यासः स्वयं चैव ब्रवीषि मे॥"

transliteration: "āhustvāmṛṣayaḥ sarve devarṣirnāradastathā | asito devalo vyāsaḥ svayaṁ caiva bravīṣi me ||"

