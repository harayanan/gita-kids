chapter: 10
verse: 16
speaker: arjuna

sanskrit: "वक्तुमर्हस्यशेषेण दिव्या ह्यात्मविभूतयः। याभिर्विभूतिभिर्लोकानिमांस्त्वं व्याप्य तिष्ठसि॥"

transliteration: "vaktumarhasyaśeṣeṇa divyā hyātmavibhūtayaḥ | yābhirvibhūtibhirlokānimāṁstvaṁ vyāpya tiṣṭhasi ||"

