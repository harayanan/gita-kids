chapter: 10
verse: 28
speaker: krishna

sanskrit: "आयुधानामहं वज्रं धेनूनामस्मि कामधुक्। प्रजनश्चास्मि कन्दर्पः सर्पाणामस्मि वासुकिः॥"

transliteration: "āyudhānāmahaṁ vajraṁ dhenūnāmasmi kāmadhuk | prajanaścāsmi kandarpaḥ sarpāṇāmasmi vāsukiḥ ||"

