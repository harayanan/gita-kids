chapter: 10
verse: 1
speaker: krishna

sanskrit: "भूय एव महाबाहो शृणु मे परमं वचः। यत्तेऽहं प्रीयमाणाय वक्ष्यामि हितकाम्यया॥"

transliteration: "bhūya eva mahābāho śṛṇu me paramaṁ vacaḥ | yatte'haṁ prīyamāṇāya vakṣyāmi hitakāmyayā ||"

