chapter: 10
verse: 9
speaker: krishna

sanskrit: "मच्चित्ता मद्गतप्राणा बोधयन्तः परस्परम्। कथयन्तश्च मां नित्यं तुष्यन्ति च रमन्ति च॥"

transliteration: "maccittā madgataprāṇā bodhayantaḥ parasparam | kathayantaśca māṁ nityaṁ tuṣyanti ca ramanti ca ||"

