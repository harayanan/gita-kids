    parts: ["mad (me)", "citta (mind, thought)"]
    meaning: "with minds fixed on Me"
  - word: "मद्गतप्राणाः"
    parts: ["mad (me)", "gata (gone, given)", "prāṇa (life-breath)"]
    meaning: "with their lives given over to Me"
