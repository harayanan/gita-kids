chapter: 10
verse: 15
speaker: arjuna

sanskrit: "स्वयमेवात्मनात्मानं वेत्थ त्वं पुरुषोत्तम। भूतभावन भूतेश देवदेव जगत्पते॥"

transliteration: "svayamevātmanātmānaṁ vettha tvaṁ puruṣottama | bhūtabhāvana bhūteśa devadeva jagatpate ||"

