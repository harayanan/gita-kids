chapter: 10
verse: 4
speaker: krishna

sanskrit: "बुद्धिर्ज्ञानमसम्मोहः क्षमा सत्यं दमः शमः। सुखं दुःखं भवोऽभावो भयं चाभयमेव च॥"

transliteration: "buddhirjñānamasammohaḥ kṣamā satyaṁ damaḥ śamaḥ | sukhaṁ duḥkhaṁ bhavo'bhāvo bhayaṁ cābhayameva ca ||"

