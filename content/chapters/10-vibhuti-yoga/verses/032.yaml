chapter: 10
verse: 32
speaker: krishna

sanskrit: "सर्गाणामादिरन्तश्च मध्यं चैवाहमर्जुन। अध्यात्मविद्या विद्यानां वादः प्रवदतामहम्॥"

transliteration: "sargāṇāmādirantaśca madhyaṁ caivāhamarjuna | adhyātmavidyā vidyānāṁ vādaḥ pravadatāmaham ||"

