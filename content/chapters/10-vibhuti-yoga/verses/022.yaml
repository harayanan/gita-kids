chapter: 10
verse: 22
speaker: krishna

sanskrit: "वेदानां सामवेदोऽस्मि देवानामस्मि वासवः। इन्द्रियाणां मनश्चास्मि भूतानामस्मि चेतना॥"

transliteration: "vedānāṁ sāmavedo'smi devānāmasmi vāsavaḥ | indriyāṇāṁ manaścāsmi bhūtānāmasmi cetanā ||"

