chapter: 10
verse: 24
speaker: krishna

sanskrit: "पुरोधसां च मुख्यं मां विद्धि पार्थ बृहस्पतिम्। सेनानीनामहं स्कन्दः सरसामस्मि सागरः॥"

transliteration: "purodhasāṁ ca mukhyaṁ māṁ viddhi pārtha bṛhaspatim | senānīnāmahaṁ skandaḥ sarasāmasmi sāgaraḥ ||"

