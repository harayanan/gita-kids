chapter: 10
verse: 14
speaker: arjuna

sanskrit: "सर्वमेतदृतं मन्ये यन्मां वदसि केशव। न हि ते भगवन्व्यक्तिं विदुर्देवा न दानवाः॥"

transliteration: "sarvametadṛtaṁ manye yanmāṁ vadasi keśava | na hi te bhagavanvyaktiṁ vidurdevā na dānavāḥ ||"

