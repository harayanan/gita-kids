chapter: 10
verse: 7
speaker: krishna

sanskrit: "एतां विभूतिं योगं च मम यो वेत्ति तत्त्वतः। सोऽविकम्पेन योगेन युज्यते नात्र संशयः॥"

transliteration: "etāṁ vibhūtiṁ yogaṁ ca mama yo vetti tattvataḥ | so'vikampena yogena yujyate nātra saṁśayaḥ ||"

