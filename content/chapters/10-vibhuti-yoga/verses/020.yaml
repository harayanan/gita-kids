chapter: 10
verse: 20
speaker: krishna

sanskrit: "अहमात्मा गुडाकेश सर्वभूताशयस्थितः। अहमादिश्च मध्यं च भूतानामन्त एव च॥"

transliteration: "ahamātmā guḍākeśa sarvabhūtāśayasthitaḥ | ahamādiśca madhyaṁ ca bhūtānāmanta eva ca ||"

