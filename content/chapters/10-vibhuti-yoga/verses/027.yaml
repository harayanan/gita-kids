chapter: 10
verse: 27
speaker: krishna

sanskrit: "उच्चैःश्रवसमश्वानां विद्धि माममृतोद्भवम्। ऐरावतं गजेन्द्राणां नराणां च नराधिपम्॥"

transliteration: "uccaiḥśravasamaśvānāṁ viddhi māmamṛtodbhavam | airāvataṁ gajendrāṇāṁ narāṇāṁ ca narādhipam ||"

