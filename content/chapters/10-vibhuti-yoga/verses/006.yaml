chapter: 10
verse: 6
speaker: krishna

sanskrit: "महर्षयः सप्त पूर्वे चत्वारो मनवस्तथा। मद्भावा मानसा जाता येषां लोक इमाः प्रजाः॥"

transliteration: "maharṣayaḥ sapta pūrve catvāro manavastathā | madbhāvā mānasā jātā yeṣāṁ loka imāḥ prajāḥ ||"

