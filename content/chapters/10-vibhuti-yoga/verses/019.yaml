chapter: 10
verse: 19
speaker: krishna

sanskrit: "हन्त ते कथयिष्यामि दिव्या ह्यात्मविभूतयः। प्राधान्यतः कुरुश्रेष्ठ नास्त्यन्तो विस्तरस्य मे॥"

transliteration: "hanta te kathayiṣyāmi divyā hyātmavibhūtayaḥ | prādhānyataḥ kuruśreṣṭha nāstyanto vistarasya me ||"

