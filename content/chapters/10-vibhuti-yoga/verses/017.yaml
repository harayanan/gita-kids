chapter: 10
verse: 17
speaker: arjuna

sanskrit: "कथं विद्यामहं योगिंस्त्वां सदा परिचिन्तयन्। केषु केषु च भावेषु चिन्त्योऽसि भगवन्मया॥"

transliteration: "kathaṁ vidyāmahaṁ yogiṁstvāṁ sadā paricintayan | keṣu keṣu ca bhāveṣu cintyo'si bhagavanmayā ||"

