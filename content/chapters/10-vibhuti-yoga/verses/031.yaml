chapter: 10
verse: 31
speaker: krishna

sanskrit: "पवनः पवतामस्मि रामः शस्त्रभृतामहम्। झषाणां मकरश्चास्मि स्रोतसामस्मि जाह्नवी॥"

transliteration: "pavanaḥ pavatāmasmi rāmaḥ śastrabhṛtāmaham | jhaṣāṇāṁ makaraścāsmi srotasāmasmi jāhnavī ||"

