chapter: 10
verse: 25
speaker: krishna

sanskrit: "महर्षीणां भृगुरहं गिरामस्म्येकमक्षरम्। यज्ञानां जपयज्ञोऽस्मि स्थावराणां हिमालयः॥"

transliteration: "maharṣīṇāṁ bhṛgurahaṁ girāmasmyekamakṣaram | yajñānāṁ japayajño'smi sthāvarāṇāṁ himālayaḥ ||"

