chapter: 10
verse: 12
speaker: arjuna

sanskrit: "परं ब्रह्म परं धाम पवित्रं परमं भवान्। पुरुषं शाश्वतं दिव्यमादिदेवमजं विभुम्॥"

transliteration: "paraṁ brahma paraṁ dhāma pavitraṁ paramaṁ bhavān | puruṣaṁ śāśvataṁ divyamādidevamajaṁ vibhum ||"

