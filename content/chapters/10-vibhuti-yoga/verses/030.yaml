chapter: 10
verse: 30
speaker: krishna

sanskrit: "प्रह्लादश्चास्मि दैत्यानां कालः कलयतामहम्। मृगाणां च मृगेन्द्रोऽहं वैनतेयश्च पक्षिणाम्॥"

transliteration: "prahlādaścāsmi daityānāṁ kālaḥ kalayatāmaham | mṛgāṇāṁ ca mṛgendro'haṁ vainateyaśca pakṣiṇām ||"

