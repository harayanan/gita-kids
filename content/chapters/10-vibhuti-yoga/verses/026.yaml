chapter: 10
verse: 26
speaker: krishna

sanskrit: "अश्वत्थः सर्ववृक्षाणां देवर्षीणां च नारदः। गन्धर्वाणां चित्ररथः सिद्धानां कपिलो मुनिः॥"

transliteration: "aśvatthaḥ sarvavṛkṣāṇāṁ devarṣīṇāṁ ca nāradaḥ | gandharvāṇāṁ citrarathaḥ siddhānāṁ kapilo muniḥ ||"

