chapter: 10
verse: 39
speaker: krishna

sanskrit: "यच्चापि सर्वभूतानां बीजं तदहमर्जुन। न तदस्ति विना यत्स्यान्मया भूतं चराचरम्॥"

transliteration: "yaccāpi sarvabhūtānāṁ bījaṁ tadahamarjuna | na tadasti vinā yatsyānmayā bhūtaṁ carācaram ||"

