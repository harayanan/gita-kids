chapter: 10
verse: 40
speaker: krishna

sanskrit: "नान्तोऽस्ति मम दिव्यानां विभूतीनां परन्तप। एष तूद्देशतः प्रोक्तो विभूतेर्विस्तरो मया॥"

transliteration: "nānto'sti mama divyānāṁ vibhūtīnāṁ parantapa | eṣa tūddeśataḥ prokto vibhūtervistaro mayā ||"

