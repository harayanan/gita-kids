chapter: 10
verse: 23
speaker: krishna

sanskrit: "रुद्राणां शङ्करश्चास्मि वित्तेशो यक्षरक्षसाम्। वसूनां पावकश्चास्मि मेरुः शिखरिणामहम्॥"

transliteration: "rudrāṇāṁ śaṅkaraścāsmi vitteśo yakṣarakṣasām | vasūnāṁ pāvakaścāsmi meruḥ śikhariṇāmaham ||"

