chapter: 10
verse: 35
speaker: krishna

sanskrit: "बृहत्साम तथा साम्नां गायत्री छन्दसामहम्। मासानां मार्गशीर्षोऽहमृतूनां कुसुमाकरः॥"

transliteration: "bṛhatsāma tathā sāmnāṁ gāyatrī chandasāmaham | māsānāṁ mārgaśīrṣo'hamṛtūnāṁ kusumākaraḥ ||"

