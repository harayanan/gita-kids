chapter: 10
verse: 21
speaker: krishna

sanskrit: "आदित्यानामहं विष्णुर्ज्योतिषां रविरंशुमान्। मरीचिर्मरुतामस्मि नक्षत्राणामहं शशी॥"

transliteration: "ādityānāmahaṁ viṣṇurjyotiṣāṁ raviraṁśumān | marīcirmarutāmasmi nakṣatrāṇāmahaṁ śaśī ||"

