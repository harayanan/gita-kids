chapter: 10
verse: 34
speaker: krishna

sanskrit: "मृत्युः सर्वहरश्चाहमुद्भवश्च भविष्यताम्। कीर्तिः श्रीर्वाक्च नारीणां स्मृतिर्मेधा धृतिः क्षमा॥"

transliteration: "mṛtyuḥ sarvaharaścāhamudbhavaśca bhaviṣyatām | kīrtiḥ śrīrvākca nārīṇāṁ smṛtirmedhā dhṛtiḥ kṣamā ||"

