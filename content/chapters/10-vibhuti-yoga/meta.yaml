name: The Yoga of Divine Glories
sanskrit_name: विभूतियोग
transliterated_name: Vibhūti Yoga
verse_count: 42
folk_art_style: kalamkari
summary: >
  Krishna tells Arjuna about all the amazing ways he shows up in the world.
  Among mountains, he is the mighty Himalayas. Among rivers, he is the Ganga.
  Among animals, he is the lion. Wherever you see something truly wonderful,
  powerful, or beautiful — that's a little spark of Krishna's greatness.
