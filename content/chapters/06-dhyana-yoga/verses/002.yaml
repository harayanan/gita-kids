chapter: 6
verse: 2
speaker: krishna

sanskrit: "यं संन्यासमिति प्राहुर्योगं तं विद्धि पाण्डव। न ह्यसंन्यस्तसङ्कल्पो योगी भवति कश्चन॥"

transliteration: "yaṁ saṁnyāsamiti prāhuryogaṁ taṁ viddhi pāṇḍava | na hyasaṁnyastasaṅkalpo yogī bhavati kaścana ||"

dhatu_breakdown:
  - word: "यम्"
    parts: ["yad (which, that which)"]
    meaning: "that which"
  - word: "संन्यासम्"
    parts: ["sam (fully)", "ni (down)", "as (to cast off)"]
    meaning: "renunciation"
  - word: "इति"
    parts: ["iti (thus, so)"]
    meaning: "thus, so-called"
  - word: "प्राहुः"
    parts: ["pra (forth)", "ah (to say)"]
    meaning: "they call, they declare"
  - word: "योगम्"
