chapter: 6
verse: 3
speaker: krishna

sanskrit: "आरुरुक्षोर्मुनेर्योगं कर्म कारणमुच्यते। योगारूढस्य तस्यैव शमः कारणमुच्यते॥"

transliteration: "ārurukṣormuneryogaṁ karma kāraṇamucyate | yogārūḍhasya tasyaiva śamaḥ kāraṇamucyate ||"

