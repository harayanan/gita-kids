chapter: 6
verse: 46
speaker: krishna

sanskrit: "तपस्विभ्योऽधिको योगी ज्ञानिभ्योऽपि मतोऽधिकः। कर्मिभ्यश्चाधिको योगी तस्माद्योगी भवार्जुन॥"

transliteration: "tapasvibhyo'dhiko yogī jñānibhyo'pi mato'dhikaḥ | karmibhyaścādhiko yogī tasmādyogī bhavārjuna ||"

