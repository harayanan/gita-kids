chapter: 6
verse: 44
speaker: krishna

sanskrit: "पूर्वाभ्यासेन तेनैव ह्रियते ह्यवशोऽपि सः। जिज्ञासुरपि योगस्य शब्दब्रह्मातिवर्तते॥"

transliteration: "pūrvābhyāsena tenaiva hriyate hyavaśo'pi saḥ | jijñāsurapi yogasya śabdabrahmātivartate ||"

