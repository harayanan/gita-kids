chapter: 6
verse: 19
speaker: krishna

sanskrit: "यथा दीपो निवातस्थो नेङ्गते सोपमा स्मृता। योगिनो यतचित्तस्य युञ्जतो योगमात्मनः॥"

transliteration: "yathā dīpo nivātastho neṅgate sopamā smṛtā | yogino yatacittasya yuñjato yogamātmanaḥ ||"

dhatu_breakdown:
  - word: "यथा"
    parts: ["yathā (just as)"]
    meaning: "just as, in the way that"
  - word: "दीपः"
    parts: ["dīp (to shine, to blaze)"]
    meaning: "a lamp, a flame (a diya)"
  - word: "निवातस्थः"
    parts: ["ni (without)", "vāta (wind)", "sthā (to stand)"]
