chapter: 6
verse: 39
speaker: arjuna

sanskrit: "एतन्मे संशयं कृष्ण छेत्तुमर्हस्यशेषतः। त्वदन्यः संशयस्यास्य छेत्ता न ह्युपपद्यते॥"

transliteration: "etanme saṁśayaṁ kṛṣṇa chettumarhasyaśeṣataḥ | tvadanyaḥ saṁśayasyāsya chettā na hyupapadyate ||"

