chapter: 6
verse: 33
speaker: arjuna

sanskrit: "योऽयं योगस्त्वया प्रोक्तः साम्येन मधुसूदन। एतस्याहं न पश्यामि चञ्चलत्वात्स्थितिं स्थिराम्॥"

transliteration: "yo'yaṁ yogastvayā proktaḥ sāmyena madhusūdana | etasyāhaṁ na paśyāmi cañcalatvātsthitiṁ sthirām ||"

