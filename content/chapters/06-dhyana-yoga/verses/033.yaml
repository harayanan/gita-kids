  - word: "अयम्"
    parts: ["ayam (this)"]
    meaning: "this"
  - word: "योगः"
    parts: ["yuj (to yoke, to join)"]
    meaning: "yoga, the path of union"
  - word: "त्वया"
    parts: ["tvad (you)"]
    meaning: "by you"
  - word: "प्रोक्तः"
