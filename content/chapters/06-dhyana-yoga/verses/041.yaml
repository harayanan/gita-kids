    meaning: "years"
  - word: "शुचीनाम्"
    parts: ["śuc (to be pure, to be clean)"]
    meaning: "of the pure, of the good-hearted"
  - word: "श्रीमताम्"
    parts: ["śrī (prosperity, grace)", "mat (possessing)"]
    meaning: "of the prosperous, of the well-blessed"
