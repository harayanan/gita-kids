chapter: 6
verse: 41
speaker: krishna

sanskrit: "प्राप्य पुण्यकृतां लोकानुषित्वा शाश्वतीः समाः। शुचीनां श्रीमतां गेहे योगभ्रष्टोऽभिजायते॥"

transliteration: "prāpya puṇyakṛtāṁ lokānuṣitvā śāśvatīḥ samāḥ | śucīnāṁ śrīmatāṁ gehe yogabhraṣṭo'bhijāyate ||"

dhatu_breakdown:
  - word: "प्राप्य"
    parts: ["pra (forth)", "āp (to reach, to attain)"]
    meaning: "having reached, having attained"
  - word: "पुण्यकृताम्"
    parts: ["puṇya (good, meritorious)", "kṛ (to do)"]
    meaning: "of those who have done good deeds, of the righteous"
  - word: "लोकान्"
