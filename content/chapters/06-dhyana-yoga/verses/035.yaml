    parts: ["a (not)", "sam (together)", "śī (to lie, to rest)"]
    meaning: "without doubt, certainly"
  - word: "महाबाहो"
    parts: ["mahā (great)", "bāhu (arm)"]
    meaning: "O mighty-armed one — a name for Arjuna"
  - word: "मनः"
    parts: ["man (to think)"]
