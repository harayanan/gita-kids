chapter: 6
verse: 20
speaker: krishna

sanskrit: "यत्रोपरमते चित्तं निरुद्धं योगसेवया। यत्र चैवात्मनात्मानं पश्यन्नात्मनि तुष्यति॥"

transliteration: "yatroparamate cittaṁ niruddhaṁ yogasevayā | yatra caivātmanātmānaṁ paśyannātmani tuṣyati ||"

