chapter: 6
verse: 4
speaker: krishna

sanskrit: "यदा हि नेन्द्रियार्थेषु न कर्मस्वनुषज्जते। सर्वसङ्कल्पसंन्यासी योगारूढस्तदोच्यते॥"

transliteration: "yadā hi nendriyārtheṣu na karmasvanuṣajjate | sarvasaṅkalpasaṁnyāsī yogārūḍhastadocyate ||"

