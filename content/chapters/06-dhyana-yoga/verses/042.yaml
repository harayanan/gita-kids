chapter: 6
verse: 42
speaker: krishna

sanskrit: "अथवा योगिनामेव कुले भवति धीमताम्। एतद्धि दुर्लभतरं लोके जन्म यदीदृशम्॥"

transliteration: "athavā yogināmeva kule bhavati dhīmatām | etaddhi durlabhataraṁ loke janma yadīdṛśam ||"

