chapter: 6
verse: 37
speaker: arjuna

sanskrit: "अयतिः श्रद्धयोपेतो योगाच्चलितमानसः। अप्राप्य योगसंसिद्धिं कां गतिं कृष्ण गच्छति॥"

transliteration: "ayatiḥ śraddhayopeto yogāccalitamānasaḥ | aprāpya yogasaṁsiddhiṁ kāṁ gatiṁ kṛṣṇa gacchati ||"

