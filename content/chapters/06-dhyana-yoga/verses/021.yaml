chapter: 6
verse: 21
speaker: krishna

sanskrit: "सुखमात्यन्तिकं यत्तद्बुद्धिग्राह्यमतीन्द्रियम्। वेत्ति यत्र न चैवायं स्थितश्चलति तत्त्वतः॥"

transliteration: "sukhamātyantikaṁ yattadbuddhigrāhyamatīndriyam | vetti yatra na caivāyaṁ sthitaścalati tattvataḥ ||"

