chapter: 6
verse: 40
speaker: krishna

sanskrit: "पार्थ नैवेह नामुत्र विनाशस्तस्य विद्यते। न हि कल्याणकृत्कश्चिद्दुर्गतिं तात गच्छति॥"

transliteration: "pārtha naiveha nāmutra vināśastasya vidyate | na hi kalyāṇakṛtkaścid durgatiṁ tāta gacchati ||"

dhatu_breakdown:
