chapter: 6
verse: 8
speaker: krishna

sanskrit: "ज्ञानविज्ञानतृप्तात्मा कूटस्थो विजितेन्द्रियः। युक्त इत्युच्यते योगी समलोष्टाश्मकाञ्चनः॥"

transliteration: "jñānavijñānatṛptātmā kūṭastho vijitendriyaḥ | yukta ityucyate yogī samaloṣṭāśmakāñcanaḥ ||"

