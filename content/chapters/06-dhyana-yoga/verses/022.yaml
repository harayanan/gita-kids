chapter: 6
verse: 22
speaker: krishna

sanskrit: "यं लब्ध्वा चापरं लाभं मन्यते नाधिकं ततः। यस्मिन्स्थितो न दुःखेन गुरुणापि विचाल्यते॥"

transliteration: "yaṁ labdhvā cāparaṁ lābhaṁ manyate nādhikaṁ tataḥ | yasminsthito na duḥkhena guruṇāpi vicālyate ||"

