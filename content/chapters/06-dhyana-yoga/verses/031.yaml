chapter: 6
verse: 31
speaker: krishna

sanskrit: "सर्वभूतस्थितं यो मां भजत्येकत्वमास्थितः। सर्वथा वर्तमानोऽपि स योगी मयि वर्तते॥"

transliteration: "sarvabhūtasthitaṁ yo māṁ bhajatyekatvamāsthitaḥ | sarvathā vartamāno'pi sa yogī mayi vartate ||"

