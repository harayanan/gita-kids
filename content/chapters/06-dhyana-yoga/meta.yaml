summary: >
  Krishna teaches Arjuna how to sit quietly and calm his mind through
  meditation. Arjuna says, "But Krishna, my mind jumps around like the wind!"
  Krishna agrees that the mind is restless, but with practice and patience,
  anyone can learn to tame it — just like training a playful puppy.
