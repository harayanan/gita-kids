chapter: 17
verse: 24
speaker: krishna

sanskrit: "तस्मादोमित्युदाहृत्य यज्ञदानतपःक्रियाः। प्रवर्तन्ते विधानोक्ताः सततं ब्रह्मवादिनाम्॥"

transliteration: "tasmādomityudāhṛtya yajñadānatapaḥkriyāḥ | pravartante vidhānoktāḥ satataṁ brahmavādinām ||"

