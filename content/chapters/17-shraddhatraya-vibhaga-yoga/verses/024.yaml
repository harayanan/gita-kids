  - word: "यज्ञदानतपःक्रियाः"
    parts: ["yaj (to worship, to sacrifice)", "dā (to give)", "tap (to be austere, to discipline)", "kṛ (to do, to perform)"]
    meaning: "the acts of sacrifice, giving, and discipline"
