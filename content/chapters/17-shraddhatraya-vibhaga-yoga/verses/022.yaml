meaning: >
  Krishna says: "And then there is giving done at the wrong place or the wrong
  time, or handed to people it should not go to, or given rudely, without
  respect, even with a sneer — as if the giver looks down on the one who
  receives. That kind of giving is the lowest, clouded kind, because there is no
  warmth or care in it at all."

story:
  title: "Two Gifts at the Gate"
  source: "original"
  body: |
    On the morning the rains finally came, two neighbours met at the gate of the
    little shelter where flood-stranded families had gathered. Both had come to
    give. But anyone watching would have seen two very different things.

    The first was a wealthy man in fine clothes, with a servant carrying a great
    basket behind him. He arrived loudly, wanting to be seen. He did not look at
    the tired families. He did not ask what they needed. He simply tipped the
    basket over near the doorway, so the bundles tumbled into the mud, and some
    of the food rolled into a puddle. "There," he said, wrinkling his nose at the
    smell of the crowded shelter. "Take it. Be grateful." He spoke to the people
    as if they were stray dogs, never once meeting their eyes, and he turned and
    left before anyone could even answer. The food was real, but the way it was
    thrown down — carelessly, scornfully, into the dirt — made the families feel
    smaller, not safer.

    The second was old Radha Bai, Meera's grandmother, who came a little later
    with far less. She carried only a cloth bundle of warm rotis she had cooked
    that dawn, and a small clay pot of dal. She had no servant and no crowd to
    watch her.

    She did not toss the food down. She stepped inside, greeted an exhausted
    mother by joining her palms, and asked softly, "How many little ones do you
    have? Are they very hungry?" Then she sat on the floor among them — not above
    them — and served the rotis warm into each pair of hands, smiling at each
    child, making sure the smallest ones ate first.

    Meera, who had come with her grandmother, looked from the muddy spilled
    basket to the warm rotis passing gently from hand to hand, and she understood
    something without anyone explaining it.

    "Dadi," she whispered later, "he gave so much more food than you did."

    "He gave more food," Dadi agreed quietly, "but he gave it at the wrong moment,
    in the wrong way, with no respect — flung into the mud as if the people did
    not matter. A gift thrown down with scorn leaves a person poorer in their
    heart. A small gift given with warmth and respect leaves them richer. It is
    not only what your hands give, Meera. It is what your heart gives along with
    it."

reflection: "Have you ever been handed something in a way that made you feel small instead of cared for? What is the difference between giving a thing and giving it with respect?"
