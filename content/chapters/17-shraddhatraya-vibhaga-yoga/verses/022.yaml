chapter: 17
verse: 22
speaker: krishna

sanskrit: "अदेशकाले यद्दानमपात्रेभ्यश्च दीयते। असत्कृतमवज्ञातं तत्तामसमुदाहृतम्॥"

transliteration: "adeśakāle yaddānamapātrebhyaśca dīyate | asatkṛtamavajñātaṁ tattāmasamudāhṛtam ||"

