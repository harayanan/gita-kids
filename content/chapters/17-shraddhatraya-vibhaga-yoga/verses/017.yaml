    parts: ["a (not)", "phal (to bear fruit)", "ā (towards)", "kāṅkṣ (to wish, to long for)"]
    meaning: "by those who long for no reward, wanting no fruit in return"
  - word: "युक्तैः"
    parts: ["yuj (to yoke, to join, to be balanced)"]
    meaning: "by the balanced and steady ones"
