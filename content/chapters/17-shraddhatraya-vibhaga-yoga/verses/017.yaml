chapter: 17
verse: 17
speaker: krishna

sanskrit: "श्रद्धया परया तप्तं तपस्तत्त्रिविधं नरैः। अफलाकाङ्क्षिभिर्युक्तैः सात्त्विकं परिचक्षते॥"

transliteration: "śraddhayā parayā taptaṁ tapas tat trividhaṁ naraiḥ | aphalākāṅkṣibhir yuktaiḥ sāttvikaṁ paricakṣate ||"

