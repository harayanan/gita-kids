chapter: 17
verse: 7

speaker: krishna

sanskrit: "आहारस्त्वपि सर्वस्य त्रिविधो भवति प्रियः। यज्ञस्तपस्तथा दानं तेषां भेदमिमं शृणु॥"

transliteration: "āhārastvapi sarvasya trividho bhavati priyaḥ | yajñastapastathā dānaṁ teṣāṁ bhedamimaṁ śṛṇu ||"

