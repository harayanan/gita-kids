    meaning: "indeed, also"
  - word: "अन्तःशरीरस्थम्"
    parts: ["antar (within, inside)", "śri (to rest on)", "īra (that which moves)", "sthā (to dwell)"]
    meaning: "dwelling within the body"
  - word: "तान्"
    parts: ["tad (them, those)"]
    meaning: "them, those people"
  - word: "विद्धि"
    parts: ["vid (to know)", "dhi (imperative, do!)"]
    meaning: "know, understand"
  - word: "आसुरनिश्चयान्"
    parts: ["asura (un-godly one)", "ni (down, firmly)", "ci (to gather, to determine)"]
    meaning: "of demonic resolve, set on an unwise path"

meaning: >
  Krishna finishes the thought from before: "These people, doing harsh
  hardships for show, wear down the very elements that make up their body — and
  they wear down Me, too, for I dwell within that body. Such people have lost
  their good sense. Know that their resolve is misguided and unwise." Hurting
  yourself in the name of being holy harms the divine spark living inside you.

story:
  title: "The Lamp Inside the House"
  source: "mahabharata"
  body: |
    The old pilgrim's words had stayed with Ugratapa, the fierce hermit, but it
    was a wandering teacher who came the next season that finally helped him
    understand the deepest part.

    The teacher found Ugratapa thinner than ever, swaying on his bed of stones,
    his eyes dull, his body trembling like a dry leaf.

    "Friend," the teacher said, sitting down beside him, "may I tell you what I
    see?"

    Ugratapa, too weak to argue, nodded.

    "Your body is not your enemy," the teacher said. "It is a house. And inside
    every house there lives a small, steady lamp — a flame that does not flicker,
    that was lit before you were born. The wise call it the Self. The Lord
    himself dwells there, in the heart of every creature, in you no less than in
    a king."

    He gestured at Ugratapa's wasted arms, his cracked feet, his ribs like a
    cage. "When you starve the house and pierce its walls and set fires against
    it, you think you are only punishing the house. But the lamp lives inside the
    house. Harm the house carelessly enough, and you crowd and trouble the very
    flame you were meant to tend."

    Ugratapa's lip trembled. "I thought hurting my body would make me holy."

    "No," the teacher said, not unkindly. "A person who torments the body for
    show, with a proud heart and a hungry mind, has lost the way. He troubles the
    divine that lives within him and calls it devotion. But devotion does not
    wage war on the house where God is sleeping. Devotion keeps the house clean
    and warm, so the lamp can shine."

    For a long moment Ugratapa was silent. Then, slowly, he stood — not to pose
    for any crowd, for there was none — and he stepped down off the sharp stones
    onto the soft grass. He drank clean water. He ate a little fruit. He felt,
    very faintly, something inside his chest grow a shade brighter, the way a
    lamp brightens when the wind that troubled it dies down.

    "Tend the house," the teacher said, watching him, "and the lamp will do the
    rest."

reflection: "If there is a quiet light inside you that is worth taking care of, what are some gentle ways you could look after the 'house' it lives in — your body and your mind?"
