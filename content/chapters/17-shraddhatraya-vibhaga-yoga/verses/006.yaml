chapter: 17
verse: 6

speaker: krishna

sanskrit: "कर्शयन्तः शरीरस्थं भूतग्राममचेतसः। मां चैवान्तःशरीरस्थं तान्विद्ध्यासुरनिश्चयान्॥"

transliteration: "karśayantaḥ śarīrasthaṁ bhūtagrāmamacetasaḥ | māṁ caivāntaḥśarīrasthaṁ tānviddhyāsuraniścayān ||"

dhatu_breakdown:
