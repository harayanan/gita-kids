chapter: 17
verse: 10

speaker: krishna

sanskrit: "यातयामं गतरसं पूति पर्युषितं च यत्। उच्छिष्टमपि चामेध्यं भोजनं तामसप्रियम्॥"

transliteration: "yātayāmaṁ gatarasaṁ pūti paryuṣitaṁ ca yat | ucchiṣṭamapi cāmedhyaṁ bhojanaṁ tāmasapriyam ||"

dhatu_breakdown:
  - word: "यातयामम्"
    parts: ["yā (to go, to pass)", "yāma (a watch of time, three hours)"]
    meaning: "stale, cooked long ago, its time gone by"
  - word: "गतरसम्"
    parts: ["gam (to go)", "ras (to taste, juice, flavour)"]
    meaning: "tasteless, with its flavour gone"
  - word: "पूति"
    parts: ["pūy (to rot, to stink)"]
    meaning: "putrid, foul-smelling, rotten"
  - word: "पर्युषितम्"
    parts: ["pari (around, fully)", "vas (to dwell, to stay overnight)"]
    meaning: "kept overnight, gone off"
  - word: "च"
