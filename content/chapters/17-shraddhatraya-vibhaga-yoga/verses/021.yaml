chapter: 17
verse: 21
speaker: krishna

sanskrit: "यत्तु प्रत्युपकारार्थं फलमुद्दिश्य वा पुनः। दीयते च परिक्लिष्टं तद्दानं राजसं स्मृतम्॥"

transliteration: "yattu pratyupakārārthaṁ phalamuddiśya vā punaḥ | dīyate ca parikliṣṭaṁ taddānaṁ rājasaṁ smṛtam ||"

