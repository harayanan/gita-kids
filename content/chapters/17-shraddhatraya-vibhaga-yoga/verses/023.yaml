    parts: ["tri (three)", "vidha (kind, fold)"]
    meaning: "threefold, of three parts"
  - word: "स्मृतः"
    parts: ["smṛ (to remember, to declare)", "ta (past participle)"]
    meaning: "is remembered as, is held to be"
  - word: "ब्राह्मणाः"
    parts: ["bṛh (to grow great)", "man (noun)", "a (born of, belonging to)"]
    meaning: "the brahmins, the knowers of the sacred"
  - word: "तेन"
    parts: ["tad (that)", "ena (instrumental, by)"]
    meaning: "by that, by this threefold name"
  - word: "वेदाः"
    parts: ["vid (to know)", "a (that which is known)"]
    meaning: "the Vedas, the sacred knowledge"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"
  - word: "यज्ञाः"
    parts: ["yaj (to worship, to offer)", "a (noun)"]
    meaning: "the sacrifices, the sacred offerings"
  - word: "विहिताः"
    parts: ["vi (forth, in order)", "dhā (to set, to ordain, to bring forth)", "ta (past participle)"]
    meaning: "were brought forth, were ordained, were established"
  - word: "पुरा"
    parts: ["purā (long ago, of old)"]
    meaning: "in ancient times, of old"

meaning: >
  Krishna says: "There are three sacred words that point toward Brahman, the
  vast Truth behind everything: 'Om — Tat — Sat.' In the very beginning, long
  ago, it was from these three words that the wise ones, the Vedas, and all the
  sacred offerings first came forth. They are like three doorways that all open
  onto the same boundless light."

story:
  title: "The Three Names at the Dawn of Things"
  source: "upanishads"
  body: |
    Before the rivers had names, before the first lamp was lit, before anyone had
    spoken a single word — so the old sages told — there was only Brahman: the
    vast, silent, shining Truth that holds up everything, the way the sky holds
    up the stars.

    The sages would teach this to their students in the cool hour before sunrise,
    sitting beneath a great peepal tree. One morning a boy named Nachiketa asked
    the question that every young seeker eventually asks.

    "Guruji, if the Truth is too big for any name, how can we ever point to it?
    How do we even begin to speak of something so vast?"

    The teacher smiled and held up three fingers.

    "We cannot capture the ocean in a cup," he said, "but we can dip the cup and
    taste the sea. So the ancient ones gave us three sacred words — not to trap
    the Truth, but to point toward it, like three fingers pointing at the same
    rising sun."

    He folded down the first finger. "The first is **Om** — the deep, humming
    sound from which all sounds are born, the note the whole universe seems to be
    singing. When you say Om, you are touching the very beginning of everything."

    He folded the second. "The second is **Tat** — which simply means 'That.' Not
    this little thing or that little thing, but *That* — the one boundless
    Reality beyond all our small wants and names."

    He folded the third. "And the third is **Sat** — 'what truly is.' The Real.
    The Good. The thing that does not fade or break or pretend. When something is
    full of Sat, it is full of truth and goodness."

    Nachiketa's eyes were wide. "And these three came first?"

    "Long, long ago," the teacher said softly, "it was out of these three sacred
    words that the wise ones drew their wisdom, that the Vedas were sung into
    being, and that the first sacred offerings were shaped. Om, Tat, Sat — three
    doorways, all opening onto the same endless light. Whenever you begin a good
    act with these words, you are joining your small life to that great Truth that
    was here before the very first dawn."

    Nachiketa sat very still as the sun finally rose over the trees, and for a
    moment he felt the whole quiet morning humming softly, as if it had always
    been saying those three words all along.

reflection: "The sages said three small words can point toward something far too vast to name. What is something so big or so beautiful that words can only point toward it, never fully hold it?"
