    parts: ["oṁ (the sacred syllable Om)"]
    meaning: "Om, the primal sacred sound"
  - word: "तत्"
    parts: ["tad (that)"]
    meaning: "Tat — 'That', pointing to the boundless Supreme"
  - word: "सत्"
    parts: ["as (to be)", "sat (being, real, good)"]
    meaning: "Sat — 'the Real, the Good, what truly is'"
  - word: "इति"
    parts: ["iti (thus)"]
    meaning: "thus, in these words"
  - word: "निर्देशः"
    parts: ["nis (forth, out)", "diś (to point, to indicate)", "a (noun)"]
    meaning: "the designation, the threefold name or pointing-out"
  - word: "ब्रह्मणः"
    parts: ["bṛh (to grow great, to expand)", "man (noun)", "as (genitive, of)"]
    meaning: "of Brahman, of the vast Supreme Reality"
