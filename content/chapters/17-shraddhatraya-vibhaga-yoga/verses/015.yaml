chapter: 17
verse: 15
speaker: krishna

sanskrit: "अनुद्वेगकरं वाक्यं सत्यं प्रियहितं च यत्। स्वाध्यायाभ्यसनं चैव वाङ्मयं तप उच्यते॥"

transliteration: "anudvegakaraṁ vākyaṁ satyaṁ priyahitaṁ ca yat | svādhyāyābhyasanaṁ caiva vāṅmayaṁ tapa ucyate ||"

