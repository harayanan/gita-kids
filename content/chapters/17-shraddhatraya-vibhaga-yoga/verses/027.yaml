chapter: 17
verse: 27
speaker: krishna

sanskrit: "यज्ञे तपसि दाने च स्थितिः सदिति चोच्यते। कर्म चैव तदर्थीयं सदित्येवाभिधीयते॥"

transliteration: "yajñe tapasi dāne ca sthitiḥ saditi cocyate | karma caiva tadarthīyaṁ sadityevābhidhīyate ||"

