chapter: 17
verse: 20
speaker: krishna

sanskrit: "दातव्यमिति यद्दानं दीयतेऽनुपकारिणे। देशे काले च पात्रे च तद्दानं सात्त्विकं स्मृतम्॥"

transliteration: "dātavyamiti yaddānaṁ dīyate'nupakāriṇe | deśe kāle ca pātre ca taddānaṁ sāttvikaṁ smṛtam ||"

