chapter: 17
verse: 16
speaker: krishna

sanskrit: "मनःप्रसादः सौम्यत्वं मौनमात्मविनिग्रहः। भावसंशुद्धिरित्येतत्तपो मानसमुच्यते॥"

transliteration: "manaḥprasādaḥ saumyatvaṁ maunam ātmavinigrahaḥ | bhāvasaṁśuddhir ity etat tapo mānasam ucyate ||"

dhatu_breakdown:
  - word: "मनःप्रसादः"
    parts: ["man (to think)", "pra (forth)", "sad (to settle, to grow calm and clear)"]
    meaning: "calmness of mind, a settled and clear heart"
  - word: "सौम्यत्वम्"
    parts: ["soma (the gentle moon)", "ya (like)", "tva (the quality of)"]
    meaning: "gentleness, a soft and kindly manner"
  - word: "मौनम्"
    parts: ["man (to think)", "una (the quality of the silent thinker)"]
    meaning: "quietness, silence, holding still inside"
  - word: "आत्मविनिग्रहः"
    parts: ["ātman (the self)", "vi (apart)", "ni (down)", "grah (to hold, to grasp)"]
    meaning: "self-control, holding one's own self steady"
  - word: "भावसंशुद्धिः"
    parts: ["bhū (to be, to feel)", "sam (fully)", "śudh (to make clean, to purify)"]
    meaning: "purity of feeling, a clean and honest heart"
  - word: "इति"
    parts: ["iti (thus)"]
    meaning: "thus, in this way"
  - word: "एतत्"
    parts: ["etad (this)"]
    meaning: "this"
  - word: "तपः"
    parts: ["tap (to glow, to make effort)"]
    meaning: "tapas, the warm glow of discipline"
  - word: "मानसम्"
    parts: ["manas (the mind)", "a (belonging to)"]
    meaning: "of the mind, mental"
  - word: "उच्यते"
    parts: ["vac (to speak, to call)"]
    meaning: "it is called, it is said to be"

meaning: >
  Krishna says: "And now the discipline of the mind, Arjuna. It means a calm,
  settled heart; a gentle and kindly nature; a quiet stillness inside; the power
  to hold your own self steady; and a heart that is clean and honest in its
  feelings. All of this together is called the discipline of the mind."

story:
  title: "One Breath Before"
  source: "modern"
  body: |
    Meera had a temper that arrived faster than she did.

    It came one hot afternoon in the courtyard, where Dadaji's newest Pichwai
    cloth lay drying: Shrinathji under a tree of a hundred painted cows, three
    weeks of careful work. Meera's little cousin Veer, chasing a kite, knocked
    over a cup of water that splashed across one corner.

    Meera felt the heat rush up from her chest to her face. Her mouth opened to
    shout something sharp.

    "Wait," said Dadaji quietly, from where he sat. He did not jump up. He did
    not even raise his voice. "One breath first. Before you say anything, before
    you do anything — give yourself one breath."

    Meera's shout was already loaded, but she held it. She breathed in. She
    breathed out. The breath felt like the longest second of her life.

    And in that one second, three things happened. She saw that Veer's lip was
    already trembling. She saw that the water had only touched the plain border,
    not Shrinathji at all. And she saw that shouting would not dry a single drop.

    The heat in her face cooled, just a little.

    "Run and get a soft cloth," Dadaji told Veer gently, and the boy raced off,
    glad to help. Together the three of them lifted the painting flat and dabbed
    the corner so carefully that, by evening, the water mark had all but vanished.

    Later, sitting on the steps, Meera asked, "How did you not get angry?"

    "Oh, the anger came to me too," Dadaji said, surprising her. "It always
    comes. The discipline is not to never feel it. The discipline is the one
    breath between feeling it and following it." He tapped his chest. "In that
    one quiet breath, the mind has a chance to settle. A settled mind is gentle.
    A gentle mind sees clearly. And a clear mind almost never needs to shout."

    He smiled. "It is the hardest discipline of all, beti, because no one can see
    you doing it. It happens in the silence inside. But it is the one that keeps
    all the others safe."

    After that, when Meera felt the heat rush up, she learned to find the breath
    first. It did not always work. But more and more often, the shout that had
    been loaded simply quieted, and set itself down.

reflection: "Dadaji takes one breath between feeling angry and acting on it. The next time you feel a shout rising, can you try one slow breath first? What might you notice in that quiet moment?"
