  - word: "सत्कारमानपूजार्थम्"
    parts: ["sat (good, real)", "kṛ (to do, to honour)", "man (to think well of, to esteem)", "pūj (to worship, to revere)", "arth (purpose, for the sake of)"]
    meaning: "for the sake of respect, honour, and being worshipped"
