chapter: 17
verse: 18
speaker: krishna

sanskrit: "सत्कारमानपूजार्थं तपो दम्भेन चैव यत्। क्रियते तदिह प्रोक्तं राजसं चलमध्रुवम्॥"

transliteration: "satkāramānapūjārthaṁ tapo dambhena caiva yat | kriyate tad iha proktaṁ rājasaṁ calam adhruvam ||"

