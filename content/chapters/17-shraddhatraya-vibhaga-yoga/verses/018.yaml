    parts: ["pra (forth)", "vac (to speak)"]
    meaning: "is declared, is called"
  - word: "राजसम्"
    parts: ["rajas (restlessness, passion)", "a (made of)"]
    meaning: "rajasic, belonging to restless passion"
  - word: "चलम्"
    parts: ["cal (to move, to shake)"]
    meaning: "shaky, wobbling, unsteady"
