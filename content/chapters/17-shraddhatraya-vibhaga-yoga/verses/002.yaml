meaning: >
  Krishna answers: "The faith that lives in people comes in three kinds, and it
  is born from each person's own nature — the way a plant grows from its own
  seed. There is sattvic faith, which is bright and clear; rajasic faith, which
  is restless and hungry; and tamasic faith, which is dim and heavy. Listen, and
  I will tell you about all three."

story:
  title: "Three Seeds in the Same Soil"
  source: "mahabharata"
  body: |
    Krishna did not answer Arjuna's question all at once. Good teachers rarely
    do. Instead he began the way a gardener begins — with a seed.

    "Faith is not something a person puts on like a borrowed cloak," he said.
    "It grows up from inside, out of who you already are. Every living being who
    wears a body carries faith of some kind. Even the one who says, 'I believe
    in nothing,' believes in that. Faith is simply what your heart leans toward
    when no one is making you do anything."

    Arjuna thought about that. It was true. Even on the battlefield, when his
    hands shook, his heart had leaned somewhere — toward Krishna.

    "And just as people are not all alike," Krishna went on, "their faith is not
    all alike. Imagine three seeds dropped into the very same soil, under the
    very same sun. One grows into a fruit tree, sweet and shading and full of
    birds. One grows into a thorn bush that grabs at everyone who passes. And
    one grows into a pale, drooping weed that never reaches the light at all.
    Same soil. Same rain. Different seeds."

    He lifted one finger. "The first kind of faith is sattvic — bright, clear,
    peaceful. It leans toward what is true and what is kind, and it asks for
    nothing in return."

    A second finger. "The second is rajasic — restless, burning, hungry. It
    leans toward whatever will bring power, or praise, or things to grasp. It is
    full of wanting."

    A third finger. "And the third is tamasic — dim and heavy and confused. It
    leans toward whatever is easy and dull, and it cannot see clearly at all."

    "But Krishna," Arjuna said slowly, "if faith is born from a person's nature,
    can it ever change? Is someone simply stuck with the seed they were given?"

    Krishna's eyes warmed. "Now that," he said, "is exactly the right question.
    Keep it close. Because the whole secret of growing is hidden inside it — and
    I am about to begin telling you the answer."

reflection: "If faith grows from inside us like a seed, what kind of things do you think water that seed and help it grow brighter?"
