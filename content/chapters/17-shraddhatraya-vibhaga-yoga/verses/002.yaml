chapter: 17
verse: 2

speaker: krishna

sanskrit: "त्रिविधा भवति श्रद्धा देहिनां सा स्वभावजा। सात्त्विकी राजसी चैव तामसी चेति तां शृणु॥"

transliteration: "trividhā bhavati śraddhā dehināṁ sā svabhāvajā | sāttvikī rājasī caiva tāmasī ceti tāṁ śṛṇu ||"

