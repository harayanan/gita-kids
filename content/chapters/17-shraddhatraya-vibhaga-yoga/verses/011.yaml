chapter: 17
verse: 11

speaker: krishna

sanskrit: "अफलाकाङ्क्षिभिर्यज्ञो विधिदृष्टो य इज्यते। यष्टव्यमेवेति मनः समाधाय स सात्त्विकः॥"

transliteration: "aphalākāṅkṣibhiryajño vidhidṛṣṭo ya ijyate | yaṣṭavyameveti manaḥ samādhāya sa sāttvikaḥ ||"

