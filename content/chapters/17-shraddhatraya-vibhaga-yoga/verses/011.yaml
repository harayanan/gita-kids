meaning: >
  Krishna says: "When worship is offered the right way, just because it is the
  right thing to do — with the mind held steady and quiet, and with no hope of
  getting anything in return — that worship is pure and bright. It is sattvic."
  The heart simply does its duty and asks for no prize.

story:
  title: "The Yajna That Asked For Nothing"
  source: "mahabharata"
  body: |
    There was once a king named Shvetaketu's father — the sage Uddalaka — though
    in this telling the people simply called him the Quiet King, because of how
    he held his great fire-sacrifice.

    In those days, kings held grand yajnas for all sorts of reasons. Some
    wanted rain. Some wanted sons. Some wanted to defeat a rival, or to be
    praised as the most generous ruler in the land. The fire would blaze, the
    priests would chant, the ghee would pour — and behind every offering sat a
    wish, sharp and hungry: give me this, give me that.

    The Quiet King's yajna was different, and people travelled far to see it.

    He built the altar exactly as the old rule directed — not one brick out of
    place, the measurements true, the chants in their proper order, nothing
    skipped, nothing shortened to save time. Watching him, you could tell he
    cared about doing it correctly, the way a careful person threads a needle.

    But when the priests asked him, before the fire was lit, "Great King, what
    shall we ask the gods to grant you? Victory? Long life? Wealth?" — the king
    only smiled and shook his head.

    "Ask for nothing," he said.

    The priests blinked. "Nothing, lord? Then why hold the sacrifice at all?"

    The king knelt by the fire and let its warmth touch his face. His mind was
    calm and gathered, like a still lake at dawn with no wind on it.

    "Because it is right to offer," he said simply. "The sun does not rise to be
    thanked. The river does not flow to be paid. I offer this fire because
    offering is a good and proper thing to do — and that is enough. If I do it to
    get something, I have turned worship into a marketplace. Let it be clean.
    Let it ask for nothing."

    And so the fire was lit. The chants rose into the morning. The king sat
    perfectly still, his whole mind resting on the single thought — this ought
    to be done — wanting no prize at the end of it.

    Long afterward, the sages said that of all the great sacrifices of that age,
    his was remembered as the purest. Not the largest. Not the most famous. The
    purest — because the man who offered it wanted nothing back.

reflection: "Can you think of a good thing you could do simply because it is right to do — not to be thanked, rewarded, or noticed? How would doing it feel different from doing it to get something?"
