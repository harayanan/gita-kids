chapter: 17
verse: 3

speaker: krishna

sanskrit: "सत्त्वानुरूपा सर्वस्य श्रद्धा भवति भारत। श्रद्धामयोऽयं पुरुषो यो यच्छ्रद्धः स एव सः॥"

transliteration: "sattvānurūpā sarvasya śraddhā bhavati bhārata | śraddhāmayo'yaṁ puruṣo yo yacchraddhaḥ sa eva saḥ ||"

dhatu_breakdown:
  - word: "सत्त्वानुरूपा"
    parts: ["sat (being, real)", "tva (-ness)", "anu (according to)", "rūp (to form, shape)"]
    meaning: "according to one's inner nature, matching the heart"
  - word: "सर्वस्य"
    parts: ["sarva (all, every)", "sya (genitive, of)"]
    meaning: "of everyone, of each person"
  - word: "श्रद्धा"
    parts: ["śrat (heart, trust)", "dhā (to place, to hold)"]
    meaning: "faith"
  - word: "भवति"
    parts: ["bhū (to be, to become)"]
    meaning: "is, becomes"
  - word: "भारत"
    parts: ["bharata (Bharata)", "a (descendant of)"]
    meaning: "O descendant of Bharata, Arjuna"
  - word: "श्रद्धामयः"
    parts: ["śrat (heart, trust)", "dhā (to place, to hold)", "maya (made of)"]
    meaning: "made of faith, formed out of faith"
  - word: "अयम्"
    parts: ["idam (this)"]
    meaning: "this"
  - word: "पुरुषः"
    parts: ["pur (city, the body)", "uṣa (dweller in)"]
    meaning: "person, the one within"
  - word: "यः"
    parts: ["yad (who, which)"]
    meaning: "whoever"
  - word: "यत्श्रद्धः"
    parts: ["yad (which, what)", "śrat (heart, trust)", "dhā (to hold)"]
    meaning: "whatever faith one holds"
  - word: "सः"
    parts: ["tad (he, that one)"]
    meaning: "he, that one"
  - word: "एव"
    parts: ["eva (indeed, only)"]
    meaning: "indeed, exactly"
  - word: "सः"
    parts: ["tad (he, that one)"]
    meaning: "is just that"

meaning: >
  Krishna says: "Everyone's faith matches their inner nature, Arjuna. A person
  is, in the end, made of their faith — whatever you truly believe in and hold
  close, that is what you slowly become." It is one of the most famous lines in
  the whole Gita: as a person's faith is, so is that person. What we quietly
  trust and dwell on shapes who we grow into.

story:
  title: "What You Keep Believing"
  source: "original"
  body: |
    Meera came home from school one afternoon kicking pebbles all the way up
    the lane, because a girl in her class had told her she would never be any
    good at painting.

    She slumped down on the cool stone floor of the workshop, where her
    grandfather sat surrounded by his Pichwai cloths — those great hangings of
    Shrinathji, painted in deep blues and warm golds, that travelled from
    Nathdwara to temples far away.

    "Dadaji," she said, "what's the point. I'll never paint like you."

    Mohanlal did not look up from the lotus he was outlining. "Hand me the fine
    brush," he said. "And tell me — what do you say to yourself, inside, when
    you sit down to paint?"

    Meera shrugged. "That I'm going to mess it up. That my lines will be crooked."

    "Ah." He dipped the brush. "And do they come out crooked?"

    She thought about it. "...Usually."

    Her grandfather smiled and finally looked at her. "Listen. When I was your
    age I had a teacher who told me something I have never forgotten. He said
    that a person is made of what they keep believing. Not what they say once.
    What they believe over and over, quietly, every day."

    He pointed his brush at the window, where her grandmother Radha Bai was
    stringing marigolds for the evening offering, humming, her fingers quick and
    sure. "Your Dadi believes, every single morning, that her hands can make
    something beautiful for the deity. So they do. She has believed it for fifty
    years. She has become it."

    "But that's just garlands," Meera said.

    "It is the same with everything," he said gently. "A girl who believes,
    every day, that she is careless — she slowly becomes careless. A girl who
    believes, every day, that she can learn if she keeps trying — she slowly
    becomes that. You are not born finished, Meera. You are being painted. And
    you are holding the brush."

    He turned the cloth toward her and put it in her hands. "So. What will you
    believe today?"

    Meera looked at the empty corner of the cloth where a leaf needed to go. She
    took a slow breath. Then, instead of the old thought, she tried a new one:
    *I can make this leaf. Line by line.* And she leaned in, and began.

    The first line came out almost straight.

reflection: "What is one thing you often tell yourself about who you are? If you believed it every day, would you be glad to become it?"
