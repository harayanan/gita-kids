chapter: 17
verse: 12

speaker: krishna

sanskrit: "अभिसन्धाय तु फलं दम्भार्थमपि चैव यत्। इज्यते भरतश्रेष्ठ तं यज्ञं विद्धि राजसम्॥"

transliteration: "abhisandhāya tu phalaṁ dambhārthamapi caiva yat | ijyate bharataśreṣṭha taṁ yajñaṁ viddhi rājasam ||"

