meaning: >
  Krishna says: "But listen, Arjuna — whatever is offered, whatever is given,
  whatever discipline is kept, whatever is done, if it is done without faith,
  without any heart in it, then it is called 'Asat' — empty, unreal, as if it
  never was. Such an act helps you nothing, neither here in this world nor in
  the world to come. The heart is what makes an act real."

story:
  title: "The Lamp With No Flame"
  source: "modern-life"
  body: |
    It was the evening of Diwali in Nathdwara, and Meera was in a hurry.

    Her friends were waiting at the end of the lane to see the firecrackers, and
    Dadi had asked her to set out the row of clay lamps along the windowsill
    first. Meera lined them up fast — one, two, three, all the way down — poured
    a little oil in each, dropped in the cotton wicks, and turned to run.

    "Wait," said Dadi gently, from her stool by the kitchen door. "You forgot
    something."

    Meera looked back at the windowsill. The lamps stood in a neat, perfect row.
    "No I didn't, Dadi. Look — they're all there. Oil and wick in every one."

    Dadi did not get up. She just smiled and asked, "Are they giving any light?"

    Meera looked again. The lamps sat dark in the blue dusk. She had filled every
    one — but she had not lit a single flame.

    She came back, a little embarrassed, and Dadi handed her the long match.

    "A lamp with oil and wick but no flame," Dadi said, as Meera bent to light
    the first one, "is exactly like a prayer said with your mouth but not your
    heart. Or a gift handed over while your mind is already down the lane with
    your friends. Everything is there — the words, the oil, the gift — and yet
    nothing happens. No light. No warmth."

    One by one, the little flames caught and steadied, and the windowsill began
    to glow gold.

    "Krishna told Arjuna this very thing," Dadi went on. "He said: whatever you
    offer, whatever you give, whatever good you do — if there is no faith in it,
    no heart in it, it is called 'asat.' Empty. As if it never happened at all.
    It helps you nothing, not here and not later."

    Meera lit the last lamp and stood back. The whole sill was alive with light
    now, the small flames leaning and bowing in the evening air.

    "So it isn't really about the lamp," she said slowly.

    "It never was," said Dadi. "It was always about the flame. Do small things,
    do large things — but put your heart in. An act with heart is real. An act
    without it is just a dark lamp on a windowsill."

    Down the lane, the firecrackers began. But Meera stayed a moment longer,
    watching her flames, learning the difference between an empty thing and a
    living one.

reflection: "Think of something you do often — a prayer, a thank-you, a chore, a gift. Is your heart in it, or is it sometimes a lamp with no flame? What would it take to light the flame?"
