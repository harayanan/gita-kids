chapter: 17
verse: 28
speaker: krishna

sanskrit: "अश्रद्धया हुतं दत्तं तपस्तप्तं कृतं च यत्। असदित्युच्यते पार्थ न च तत्प्रेत्य नो इह॥"

transliteration: "aśraddhayā hutaṁ dattaṁ tapastaptaṁ kṛtaṁ ca yat | asadityucyate pārtha na ca tatpretya no iha ||"

