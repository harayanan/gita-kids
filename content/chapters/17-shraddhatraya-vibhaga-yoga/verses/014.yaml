chapter: 17
verse: 14
speaker: krishna

sanskrit: "देवद्विजगुरुप्राज्ञपूजनं शौचमार्जवम्। ब्रह्मचर्यमहिंसा च शारीरं तप उच्यते॥"

transliteration: "devadvijaguruprājñapūjanaṁ śaucam ārjavam | brahmacaryam ahiṁsā ca śārīraṁ tapa ucyate ||"

