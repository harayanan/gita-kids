meaning: >
  Krishna says: "Now hear what good discipline of the body looks like, Arjuna.
  It means honouring the gods, the wise and learned, your teachers, and all who
  truly know; keeping yourself clean inside and out; being straight and honest;
  living simply and mastering your wants; and never hurting any living thing.
  All of this together is called the discipline of the body."

story:
  title: "What Bhishma's Hands Remembered"
  source: "mahabharata"
  body: |
    Long before the great war, when the princes of Hastinapura were small, the
    grand old guardian Bhishma would walk with them through the palace gardens at
    dawn.

    The boys thought discipline meant only sword practice and sweating in the
    sun. But Bhishma, whose own life was famous for one great vow he never broke,
    showed them something quieter.

    Each morning he bathed in the cold river before the sky turned gold. "A clean
    body," he said, shaking the water from his silver hair, "helps make a clear
    mind. This is the first discipline, and it costs you nothing but the comfort
    of staying in bed."

    When the family priest passed by, Bhishma stopped and bowed — really bowed,
    not a quick nod. He did the same for the old teacher Drona, and once, the
    boys were amazed to see, for a poor blind wisdom-keeper who knew the oldest
    songs. "Honour the wise, the learned, and your teachers," Bhishma told the
    princes. "When you bend your head to someone who knows more than you, you are
    not made smaller. You are made ready to learn."

    Yudhishthira, the eldest, noticed that Bhishma always spoke plainly and kept
    his promises exactly. There was no trick in him, no crookedness. "Be
    straight," Bhishma said simply. "Let your words match your heart."

    One day young Bhima, full of energy, raised his stick to swat a line of ants
    crossing the path. Bhishma's hand closed gently around the boy's wrist.

    "Even these," the old man said. "The discipline of the body is how hard you
    can train, and also how carefully you can refuse to harm. Hurt no
    living thing if you can help it — not the smallest ant, not the weakest
    servant."

    He let go of Bhima's wrist. The ants marched safely on.

    "Cleanliness, respect, honesty, mastering your wants, and harming no one,"
    Bhishma said, counting them on his fingers as the sun finally cleared the
    garden wall. "Train your body in these, and you train it well."

reflection: "Bhishma bowed to his teachers and refused to harm even ants. Which of these body-disciplines — cleanliness, respect, honesty, simple living, or never hurting others — is easiest for you, and which is hardest?"
