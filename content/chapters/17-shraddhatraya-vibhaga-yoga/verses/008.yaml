meaning: >
  Krishna says: "Foods that lengthen life and brighten the mind, that give
  strength and health and happiness and joy — foods that are tasty and smooth,
  that fill you up and leave you steady, that please the heart — these are the
  foods the pure-hearted love." Such food doesn't just fill the stomach; it
  leaves you clear, strong, and glad.

story:
  title: "Dadi's Morning Thali"
  source: "original"
  body: |
    Meera woke to the sound her grandmother made every morning — the soft
    knock-knock of a wooden spoon against a steel pot, and the temple bells
    rising over the rooftops of Nathdwara.

    By the time she padded into the kitchen, Dadi had already been up for an
    hour. Sunlight came in through the small window and lay across the floor in
    a warm yellow square. On the low stove, moong dal simmered, turning soft and
    golden. Beside it, rice steamed in a brass pot. Dadi was rolling out small
    rotis, one by one, and a bowl of curd sat cooling with a few green grapes
    on top.

    "Sit," said Dadi, without turning around. "Eat while it is fresh and warm.
    Food tastes of the morning it is made in."

    Meera sat cross-legged on the floor. Dadi placed a steel thali in front of
    her: the golden dal, soft white rice, a hot roti gleaming with a thin
    brush of ghee, the cool curd, a spoon of pumpkin sabzi, and one ripe
    banana. Nothing was fiery. Nothing was burnt. Nothing came from a packet.

    Meera ate slowly. The dal was gentle and a little sweet. The roti was soft.
    The ghee made everything smooth on her tongue. When she finished, she
    noticed something strange — she did not feel heavy or sleepy the way she did
    after the fried snacks at the fair. She felt the opposite. She felt light,
    awake, and quietly happy, as if someone had wiped a smudge off a window
    inside her.

    "Dadi," she said, "why do I feel so good after eating this?"

    Her grandmother handed her a glass of water and sat down at last, her own
    plate small and plain.

    "There is a kind of food," Dadi said, "that does not fight your body. It
    helps it. It gives you longer life, a clear mind, strength in your arms,
    health in your blood, and a glad heart. It is usually simple — fresh,
    smooth, just enough flavour, made with care and eaten while warm. The old
    book says the pure-hearted love food like this. Not because it is fancy.
    Because of how it leaves you afterwards."

    Meera looked at her empty, shining thali. Outside, the temple opened its
    doors, and the morning poured in.

    "It leaves me feeling like I could do anything good today," she said.

    Dadi smiled. "That," she said, "is exactly what it is for."

reflection: "Think of a meal that left you feeling bright, strong, and clear afterwards — not heavy or sleepy. What was it, and what made it feel that way?"
