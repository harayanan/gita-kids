chapter: 17
verse: 19
speaker: krishna

sanskrit: "मूढग्राहेणात्मनो यत्पीडया क्रियते तपः। परस्योत्सादनार्थं वा तत्तामसमुदाहृतम्॥"

transliteration: "mūḍhagrāheṇātmano yatpīḍayā kriyate tapaḥ | parasyotsādanārthaṁ vā tattāmasamudāhṛtam ||"

