chapter: 17
verse: 4

speaker: krishna

sanskrit: "यजन्ते सात्त्विका देवान्यक्षरक्षांसि राजसाः। प्रेतान्भूतगणांश्चान्ये यजन्ते तामसा जनाः॥"

transliteration: "yajante sāttvikā devānyakṣarakṣāṁsi rājasāḥ | pretānbhūtagaṇāṁścānye yajante tāmasā janāḥ ||"

