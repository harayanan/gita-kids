chapter: 17
verse: 9

speaker: krishna

sanskrit: "कट्वम्ललवणात्युष्णतीक्ष्णरूक्षविदाहिनः। आहारा राजसस्येष्टा दुःखशोकामयप्रदाः॥"

transliteration: "kaṭvamlalavaṇātyuṣṇatīkṣṇarūkṣavidāhinaḥ | āhārā rājasasyeṣṭā duḥkhaśokāmayapradāḥ ||"

