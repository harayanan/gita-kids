meaning: >
  Arjuna asks Krishna a careful question: "Some people don't follow the rules
  written in the scriptures, yet they worship with their whole heart, full of
  faith. So where do they stand? Is their faith bright and clear, or restless,
  or dull?" He wants to know which of the three qualities, sattva, rajas, or
  tamas, guides a person who believes deeply but follows no rulebook.

story:
  title: "The Question About Faith"
  source: "mahabharata"
  body: |
    The teaching had been going on for a long time.

    Across seventeen turns of the conversation, Krishna had spoken to Arjuna
    about the soul, about duty, about working without grasping for rewards. He
    had shown his cosmic form, vast as the night sky. He had spoken of the three
    qualities, sattva, rajas, tamas, that colour everything a person does, the
    way three different dyes colour cloth.

    Arjuna had been listening so hard that his whole body had gone still. But
    something had snagged in his mind, like a thread caught on a thorn, and he
    could not let it go.

    He thought of the people back home. Not the great sages who knew every line
    of the scriptures. He thought of his old nurse, who had never read a holy
    book in her life but lit a small lamp every single evening and folded her
    hands with her eyes shut tight and her lips moving. He thought of the
    cowherds and the potters and the women drawing water at the well, who
    worshipped with everything they had and never once asked whether they were
    doing it the "correct" way.

    What about them?

    "Krishna," he said, and the great archer's voice was almost shy. "Here is
    something I do not understand."

    Krishna turned, the reins loose in his hands, his eyes patient.

    "There are people who set the scripture's rules aside — not out of pride,
    but simply because they never learned them. And yet they worship full of
    faith. Their hearts are completely in it." Arjuna spread his hands. "Where
    do such people stand? Is their faith the bright kind — sattva? Or the
    restless kind — rajas? Or the heavy, dim kind — tamas?"

    The question hung in the still air between the two armies.

    It was a kind question, Krishna noticed. Arjuna was not trying to catch
    anyone out. He was worried for the simple, faithful people he loved, and he
    wanted to know that their faith counted for something.

    Krishna smiled, the way a teacher smiles when a student finally asks the
    question that opens the next door.

    "Ah," he said. "Now we come to faith itself. Listen, Arjuna — for faith,
    too, has three colours, and I will show you all three."

reflection: "Do you think someone who prays or believes with their whole heart, but doesn't know all the 'proper' rules, is doing something real? Why?"
