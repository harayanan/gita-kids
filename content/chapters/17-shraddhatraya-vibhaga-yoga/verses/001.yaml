chapter: 17
verse: 1

speaker: arjuna

sanskrit: "ये शास्त्रविधिमुत्सृज्य यजन्ते श्रद्धयान्विताः। तेषां निष्ठा तु का कृष्ण सत्त्वमाहो रजस्तमः॥"

transliteration: "ye śāstravidhimutsṛjya yajante śraddhayānvitāḥ | teṣāṁ niṣṭhā tu kā kṛṣṇa sattvamāho rajastamaḥ ||"

