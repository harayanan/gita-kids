slug: 17-shraddhatraya-vibhaga-yoga
name: The Yoga of the Three Kinds of Faith
sanskrit_name: श्रद्धात्रयविभागयोग
transliterated_name: Shraddhātraya Vibhāga Yoga
verse_count: 28
folk_art_style: pichwai
summary: >
  Krishna teaches that everyone has faith in something — it's what drives us.
  Just like the three qualities from before, faith also comes in three types.
  The best kind of faith is bright and pure — it leads us to eat well, be
  generous, and live with discipline. Krishna shows how our choices in food,
  giving, and self-control reveal what kind of faith lives in our hearts.
