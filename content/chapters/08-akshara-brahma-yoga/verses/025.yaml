chapter: 8
verse: 25
speaker: krishna

sanskrit: "धूमो रात्रिस्तथा कृष्णः षण्मासा दक्षिणायनम्। तत्र चान्द्रमसं ज्योतिर्योगी प्राप्य निवर्तते॥"

transliteration: "dhūmo rātristathā kṛṣṇaḥ ṣaṇmāsā dakṣiṇāyanam | tatra cāndramasaṁ jyotiryogī prāpya nivartate ||"

