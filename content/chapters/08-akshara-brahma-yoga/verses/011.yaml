chapter: 8
verse: 11
speaker: krishna

sanskrit: "यदक्षरं वेदविदो वदन्ति विशन्ति यद्यतयो वीतरागाः। यदिच्छन्तो ब्रह्मचर्यं चरन्ति तत्ते पदं संग्रहेण प्रवक्ष्ये॥"

transliteration: "yadakṣaraṁ vedavido vadanti viśanti yadyatayo vītarāgāḥ | yadicchanto brahmacaryaṁ caranti tatte padaṁ saṁgraheṇa pravakṣye ||"

