chapter: 8
verse: 12
speaker: krishna

sanskrit: "सर्वद्वाराणि संयम्य मनो हृदि निरुध्य च। मूर्ध्न्याधायात्मनः प्राणमास्थितो योगधारणाम्॥"

transliteration: "sarvadvārāṇi saṁyamya mano hṛdi nirudhya ca | mūrdhnyādhāyātmanaḥ prāṇamāsthito yogadhāraṇām ||"

