chapter: 8
verse: 17
speaker: krishna

sanskrit: "सहस्रयुगपर्यन्तमहर्यद्ब्रह्मणो विदुः। रात्रिं युगसहस्रान्तां तेऽहोरात्रविदो जनाः॥"

transliteration: "sahasrayugaparyantamaharyadbrahmaṇo viduḥ | rātriṁ yugasahasrāntāṁ te'horātravido janāḥ ||"

