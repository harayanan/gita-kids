chapter: 8
verse: 5
speaker: krishna

sanskrit: "अन्तकाले च मामेव स्मरन्मुक्त्वा कलेवरम्। यः प्रयाति स मद्भावं याति नास्त्यत्र संशयः॥"

transliteration: "antakāle ca māmeva smaranmuktvā kalevaram | yaḥ prayāti sa madbhāvaṁ yāti nāstyatra saṁśayaḥ ||"

