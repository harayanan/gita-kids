chapter: 8
verse: 9
speaker: krishna

sanskrit: "कविं पुराणमनुशासितारमणोरणीयांसमनुस्मरेद्यः। सर्वस्य धातारमचिन्त्यरूपमादित्यवर्णं तमसः परस्तात्॥"

transliteration: "kaviṁ purāṇamanuśāsitāramaṇoraṇīyāṁsamanusmaredyaḥ | sarvasya dhātāramacintyarūpamādityavarṇaṁ tamasaḥ parastāt ||"

