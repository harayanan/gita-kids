chapter: 8
verse: 2
speaker: arjuna

sanskrit: "अधियज्ञः कथं कोऽत्र देहेऽस्मिन्मधुसूदन। प्रयाणकाले च कथं ज्ञेयोऽसि नियतात्मभिः॥"

transliteration: "adhiyajñaḥ kathaṁ ko'tra dehe'sminmadhusūdana | prayāṇakāle ca kathaṁ jñeyo'si niyatātmabhiḥ ||"

