chapter: 8
verse: 7
speaker: krishna

sanskrit: "तस्मात्सर्वेषु कालेषु मामनुस्मर युध्य च। मय्यर्पितमनोबुद्धिर्मामेवैष्यस्यसंशयम्॥"

transliteration: "tasmātsarveṣu kāleṣu māmanusmara yudhya ca | mayyarpitamanobuddhirmāmevaiṣyasyasaṁśayam ||"

