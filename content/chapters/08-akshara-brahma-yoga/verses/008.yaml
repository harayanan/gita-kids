chapter: 8
verse: 8
speaker: krishna

sanskrit: "अभ्यासयोगयुक्तेन चेतसा नान्यगामिना। परमं पुरुषं दिव्यं याति पार्थानुचिन्तयन्॥"

transliteration: "abhyāsayogayuktena cetasā nānyagāminā | paramaṁ puruṣaṁ divyaṁ yāti pārthānucintayan ||"

