chapter: 8
verse: 10
speaker: krishna

sanskrit: "प्रयाणकाले मनसाचलेन भक्त्या युक्तो योगबलेन चैव। भ्रुवोर्मध्ये प्राणमावेश्य सम्यक्स तं परं पुरुषमुपैति दिव्यम्॥"

transliteration: "prayāṇakāle manasācalena bhaktyā yukto yogabalena caiva | bhruvormadhye prāṇamāveśya samyaksa taṁ paraṁ puruṣamupaiti divyam ||"

