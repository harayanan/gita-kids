chapter: 8
verse: 23
speaker: krishna

sanskrit: "यत्र काले त्वनावृत्तिमावृत्तिं चैव योगिनः। प्रयाता यान्ति तं कालं वक्ष्यामि भरतर्षभ॥"

transliteration: "yatra kāle tvanāvṛttimāvṛttiṁ caiva yoginaḥ | prayātā yānti taṁ kālaṁ vakṣyāmi bharatarṣabha ||"

