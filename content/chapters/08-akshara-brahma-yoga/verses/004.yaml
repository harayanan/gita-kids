chapter: 8
verse: 4
speaker: krishna

sanskrit: "अधिभूतं क्षरो भावः पुरुषश्चाधिदैवतम्। अधियज्ञोऽहमेवात्र देहे देहभृतां वर॥"

transliteration: "adhibhūtaṁ kṣaro bhāvaḥ puruṣaścādhidaivatam | adhiyajño'hamevātra dehe dehabhṛtāṁ vara ||"

