chapter: 8
verse: 28
speaker: krishna

sanskrit: "वेदेषु यज्ञेषु तपःसु चैव दानेषु यत्पुण्यफलं प्रदिष्टम्। अत्येति तत्सर्वमिदं विदित्वा योगी परं स्थानमुपैति चाद्यम्॥"

transliteration: "vedeṣu yajñeṣu tapaḥsu caiva dāneṣu yatpuṇyaphalaṁ pradiṣṭam | atyeti tatsarvamidaṁ viditvā yogī paraṁ sthānamupaiti cādyam ||"

