chapter: 8
verse: 21
speaker: krishna

sanskrit: "अव्यक्तोऽक्षर इत्युक्तस्तमाहुः परमां गतिम्। यं प्राप्य न निवर्तन्ते तद्धाम परमं मम॥"

transliteration: "avyakto'kṣara ityuktastamāhuḥ paramāṁ gatim | yaṁ prāpya na nivartante taddhāma paramaṁ mama ||"

