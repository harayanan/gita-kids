chapter: 15
verse: 16
speaker: krishna

sanskrit: "द्वाविमौ पुरुषौ लोके क्षरश्चाक्षर एव च। क्षरः सर्वाणि भूतानि कूटस्थोऽक्षर उच्यते॥"

transliteration: "dvāvimau puruṣau loke kṣaraścākṣara eva ca | kṣaraḥ sarvāṇi bhūtāni kūṭastho'kṣara ucyate ||"

