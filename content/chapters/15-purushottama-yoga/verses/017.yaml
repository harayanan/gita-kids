chapter: 15
verse: 17
speaker: krishna

sanskrit: "उत्तमः पुरुषस्त्वन्यः परमात्मेत्युदाहृतः। यो लोकत्रयमाविश्य बिभर्त्यव्यय ईश्वरः॥"

transliteration: "uttamaḥ puruṣastvanyaḥ paramātmetyudāhṛtaḥ | yo lokatrayamāviśya bibhartyavyaya īśvaraḥ ||"

