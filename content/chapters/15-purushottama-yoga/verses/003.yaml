chapter: 15
verse: 3
speaker: krishna

sanskrit: "न रूपमस्येह तथोपलभ्यते नान्तो न चादिर्न च संप्रतिष्ठा। अश्वत्थमेनं सुविरूढमूलमसङ्गशस्त्रेण दृढेन छित्त्वा॥"

transliteration: "na rūpamasyeha tathopalabhyate nānto na cādirna ca saṁpratiṣṭhā | aśvatthamenaṁ suvirūḍhamūlamasaṅgaśastreṇa dṛḍhena chittvā ||"

