chapter: 15
verse: 4
speaker: krishna

sanskrit: "ततः पदं तत्परिमार्गितव्यं यस्मिन्गता न निवर्तन्ति भूयः। तमेव चाद्यं पुरुषं प्रपद्ये यतः प्रवृत्तिः प्रसृता पुराणी॥"

transliteration: "tataḥ padaṁ tatparimārgitavyaṁ yasmingatā na nivartanti bhūyaḥ | tameva cādyaṁ puruṣaṁ prapadye yataḥ pravṛttiḥ prasṛtā purāṇī ||"

