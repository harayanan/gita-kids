chapter: 15
verse: 18
speaker: krishna

sanskrit: "यस्मात्क्षरमतीतोऽहमक्षरादपि चोत्तमः। अतोऽस्मि लोके वेदे च प्रथितः पुरुषोत्तमः॥"

transliteration: "yasmātkṣaramatīto'hamakṣarādapi cottamaḥ | ato'smi loke vede ca prathitaḥ puruṣottamaḥ ||"

