chapter: 15
verse: 13
speaker: krishna

sanskrit: "गामाविश्य च भूतानि धारयाम्यहमोजसा। पुष्णामि चौषधीः सर्वाः सोमो भूत्वा रसात्मकः॥"

transliteration: "gāmāviśya ca bhūtāni dhārayāmyahamojasā | puṣṇāmi cauṣadhīḥ sarvāḥ somo bhūtvā rasātmakaḥ ||"

