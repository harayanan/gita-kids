chapter: 15
verse: 8
speaker: krishna

sanskrit: "शरीरं यदवाप्नोति यच्चाप्युत्क्रामतीश्वरः। गृहीत्वैतानि संयाति वायुर्गन्धानिवाशयात्॥"

transliteration: "śarīraṁ yadavāpnoti yaccāpyutkrāmatīśvaraḥ | gṛhītvaitāni saṁyāti vāyurgandhānivāśayāt ||"

