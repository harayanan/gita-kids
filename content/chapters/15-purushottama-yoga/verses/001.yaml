chapter: 15
verse: 1
speaker: krishna

sanskrit: "ऊर्ध्वमूलमधःशाखमश्वत्थं प्राहुरव्ययम्। छन्दांसि यस्य पर्णानि यस्तं वेद स वेदवित्॥"

transliteration: "ūrdhvamūlamadhaḥśākhamaśvatthaṁ prāhuravyayam | chandāṁsi yasya parṇāni yastaṁ veda sa vedavit ||"

