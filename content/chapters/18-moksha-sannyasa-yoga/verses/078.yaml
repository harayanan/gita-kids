meaning: >
  Here is the very last verse of the whole Bhagavad Gita, and Sanjaya gives us
  its grand conclusion. "Wherever Krishna is — the Lord of yoga — and wherever
  Arjuna stands with his bow," he says, "there, without a doubt, you will find
  good fortune, victory, lasting prosperity, and steady righteousness. This is
  my firm conviction." Where wisdom (Krishna) and willing right action
  (Arjuna) come together, all good things follow.

story:
  title: "The Last Word"
  source: "mythological"
  body: |
    Sanjaya had reached the end. He had remembered the dialogue and the
    vision, the words and the wonder. The blind king was waiting in the
    silence for him to finish. And so Sanjaya gathered everything he had
    seen and heard, his whole heart full, and spoke the final thought of all.

    He did not give the king a prophecy of which side would win the war. He
    gave him something deeper — a truth about how good things come to be at
    all.

    "O King," he said, his voice quiet and sure, "let me tell you what I now
    believe with my whole being. Wherever Krishna is — the Lord of yoga,
    wisdom itself, the Self who lives in every heart — and wherever Arjuna
    stands beside Him, bow in hand, ready to do what is right —" he paused,
    "there, you will surely find fortune. There, you will find victory. There
    will be lasting prosperity, and steady, unbending righteousness. Of this I
    have no doubt at all. This is my firm conviction."

    And in those words lay the secret of the entire Gita.

    For Krishna stands for wisdom, for love, for the quiet divine voice within
    that knows the right path. And Arjuna stands for each of us — uncertain,
    afraid, but willing in the end to pick up our bow and do our honest work
    in the world. When those two come together — when we listen to the wisdom
    within and then act on it with courage — everything good begins to grow.
    Not always the way we expect. But truly, and lastingly.

    That was the whole journey, from the first trembling moment when Arjuna's
    bow slipped from his hands, to this last bright word. A frightened heart
    had asked its questions. A loving teacher had answered. And the doubt had
    melted into trust, the trust into readiness, the readiness into action
    offered up with love.

    "Wherever the two are together," Sanjaya said once more, softly, as if
    sealing it, "there is fortune and victory."

    And with that, the great song was complete — sung once on a battlefield
    long ago, and waiting, ever since, for each new heart that is ready to
    listen.

reflection: "The whole Gita ends with this idea: when we listen to the wisdom inside us (Krishna) and then bravely do what is right (Arjuna), good things follow. After hearing the whole story, what is one thing you will try to remember and carry with you?"
