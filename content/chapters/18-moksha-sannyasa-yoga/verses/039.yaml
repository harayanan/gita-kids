chapter: 18
verse: 39
speaker: krishna

sanskrit: "यदग्रे चानुबन्धे च सुखं मोहनमात्मनः। निद्रालस्यप्रमादोत्थं तत्तामसमुदाहृतम्॥"

transliteration: "yadagre cānubandhe ca sukhaṁ mohanamātmanaḥ | nidrālasyapramādotthaṁ tattāmasamudāhṛtam ||"

