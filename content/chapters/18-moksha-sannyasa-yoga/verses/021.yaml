chapter: 18
verse: 21

speaker: krishna

sanskrit: "पृथक्त्वेन तु यज्ज्ञानं नानाभावान्पृथग्विधान्। वेत्ति सर्वेषु भूतेषु तज्ज्ञानं विद्धि राजसम्॥"

transliteration: "pṛthaktvena tu yajjñānaṁ nānābhāvānpṛthagvidhān | vetti sarveṣu bhūteṣu tajjñānaṁ viddhi rājasam ||"

