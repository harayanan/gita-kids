chapter: 18
verse: 67
speaker: krishna

sanskrit: "इदं ते नातपस्काय नाभक्ताय कदाचन। न चाशुश्रूषवे वाच्यं न च मां योऽभ्यसूयति॥"

transliteration: "idaṁ te nātapaskāya nābhaktāya kadācana | na cāśuśrūṣave vācyaṁ na ca māṁ yo'bhyasūyati ||"

