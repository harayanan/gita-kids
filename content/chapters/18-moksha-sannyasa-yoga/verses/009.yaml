meaning: >
  Now Krishna shows the best kind of letting-go. When you do your duty simply
  because it ought to be done, not for a prize, not for praise, and you let go
  of clinging to it and of grabbing at the reward, that is the clear, sattvic
  way. You still do the work fully and well. You just don't tie your heart to
  what you'll get out of it. Do the whole task, then open your hands and let the
  result go.

story:
  title: "Dadu Mends the Nets"
  source: "original"
  body: |
    Every evening, after the boats came in, Dadu sat on the sand outside
    his house and mended the fishing nets. His fingers, brown and crooked
    as old roots, moved fast over the torn threads — knot, pull, knot,
    pull — even though he had stopped going out to sea years ago.

    Aarav flopped down beside him one evening, watching. "Dadu, why do you
    still mend these? You don't even fish anymore. You won't get any of
    the catch."

    "True," said Dadu, not looking up. Knot, pull. "I won't."

    "Then why work so hard? Sundar Chacha will take these nets out
    tomorrow, and all the fish will be his."

    Dadu smiled and held a torn corner up to the orange light. "Aarav,
    when I mend a net, I mend it as well as I can. Every knot tight. No
    gaps for the fish to slip through. Do you know why?"

    "Because... you'll get a share?"

    "No share. I do it because it is the work in front of me, and it
    ought to be done well. That is the whole reason. A torn net should be
    mended. So I mend it." Knot, pull. "When I finish, I hand it to Sundar
    and I let it go. I don't sit awake wondering if his catch will be big
    or small. That is his sea, his morning, his luck. Not mine."

    Aarav frowned. "But doesn't it feel strange to work and want nothing
    back?"

    "It feels light," said Dadu. "Watch." He tied the last knot, ran his
    thumb along the mended row to check it, and laid the net down folded
    and neat. Then he opened both his empty hands toward the sea and
    laughed softly. "Done. The work was mine. The fish are the sea's. My
    hands are empty and my heart is easy. That, my boy, is the cleanest
    kind of doing there is."

    The next morning, Sundar Chacha's boat came back heavy and silver with
    fish. Aarav ran to tell Dadu. But Dadu only nodded, pleased for
    Sundar, and reached for the next torn net.

    "See?" he said. "His catch was big. My peace last night was the same
    size it always is — because it never depended on the fish at all. Do
    the work fully, Aarav. Then let the rest go. The work is yours to give.
    The fruit was never yours to keep."

    Aarav picked up a frayed net, found a tear, and slowly, carefully,
    tied his first clumsy knot. Knot, pull. He didn't think about fish at
    all.

reflection: "Can you do one job today — homework, a chore, helping someone — fully and well, just because it ought to be done, without waiting for a reward or even a thank-you?"
