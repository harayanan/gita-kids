chapter: 18
verse: 9
speaker: krishna

sanskrit: "कार्यमित्येव यत्कर्म नियतं क्रियतेऽर्जुन। सङ्गं त्यक्त्वा फलं चैव स त्यागः सात्त्विको मतः॥"

transliteration: "kāryam ity eva yat karma niyataṁ kriyate'rjuna | saṅgaṁ tyaktvā phalaṁ caiva sa tyāgaḥ sāttviko mataḥ ||"

