chapter: 18
verse: 36
speaker: krishna

sanskrit: "सुखं त्विदानीं त्रिविधं शृणु मे भरतर्षभ। अभ्यासाद्रमते यत्र दुःखान्तं च निगच्छति॥"

transliteration: "sukhaṁ tvidānīṁ trividhaṁ śṛṇu me bharatarṣabha | abhyāsādramate yatra duḥkhāntaṁ ca nigacchati ||"

