chapter: 18
verse: 47
speaker: krishna

sanskrit: "श्रेयान्स्वधर्मो विगुणः परधर्मात्स्वनुष्ठितात्। स्वभावनियतं कर्म कुर्वन्नाप्नोति किल्बिषम्॥"

transliteration: "śreyānsvadharmo viguṇaḥ paradharmātsvanuṣṭhitāt | svabhāvaniyataṁ karma kurvannāpnoti kilbiṣam ||"

dhatu_breakdown:
  - word: "श्रेयान्"
    parts: ["śrī (good, excellent)", "yas (more, comparative)"]
    meaning: "better, more worthy"
  - word: "स्वधर्मः"
    parts: ["sva (one's own)", "dhṛ (to hold, to uphold)"]
    meaning: "one's own duty, the work that is rightly yours"
  - word: "विगुणः"
    parts: ["vi (without, lacking)", "guṇa (quality, merit)"]
    meaning: "lacking in quality, done imperfectly"
  - word: "परधर्मात्"
    parts: ["para (another's)", "dhṛ (to hold, to uphold)"]
    meaning: "than another's duty"
  - word: "स्वनुष्ठितात्"
    parts: ["su (well)", "anu (along, after)", "sthā (to stand, to carry out)"]
    meaning: "than one well performed"
  - word: "स्वभावनियतम्"
    parts: ["sva (one's own)", "bhāva (nature)", "ni (down)", "yam (to fix, to bind)"]
    meaning: "fixed by one's own nature, born of who you are"
  - word: "कर्म"
    parts: ["kṛ (to do, to act)"]
    meaning: "work, duty"
  - word: "कुर्वन्"
    parts: ["kṛ (to do, to act)"]
    meaning: "doing, performing"
  - word: "न"
    parts: ["na (not)"]
    meaning: "not"
  - word: "आप्नोति"
    parts: ["āp (to reach, to incur)"]
    meaning: "reaches, incurs"
  - word: "किल्बिषम्"
    parts: ["kilbiṣa (fault, sin, stain)"]
    meaning: "fault, sin, a stain on the heart"

meaning: >
  Krishna says something surprising. It is better to do your own work, even
  imperfectly, than to do someone else's work perfectly. The work that is born
  from your own nature is truly yours, and when you do that nature-given work,
  you take on no fault, no stain. So do not look at another person's role and
  wish it were yours. Your own work, done honestly, is the safest and best road
  for you.

story:
  title: "When Aarav Wanted to Be the Drummer"
  source: "original"
  body: |
    The school was preparing for the Rath Yatra festival, and every child had
    been given a part. Aarav had been asked to paint the long banners that
    would hang from the chariot — bright suns and waves and lotus flowers down
    each side.

    But Aarav did not want to paint banners. He wanted to be a drummer.

    Ravi got to be a drummer. Ravi marched at the front with the big dhol
    strapped to his chest, and everyone cheered when he played, and his hands
    flew over the drum like dancing birds. Aarav watched from the back, paintbrush
    in hand, and a hot, sour feeling sat in his stomach.

    "It's not fair," he told Dadu that night. "Ravi gets to drum. Everybody
    looks at him. I just sit in a corner getting paint on my fingers. I wish I
    had his part."

    Dadu was quiet for a while. Then he asked, "When you painted the sun on the
    first banner today — what happened inside you?"

    Aarav blinked. "I... forgot about everything. I forgot the time. I mixed
    this orange that was so warm it almost looked alive. I didn't even hear the
    bell ring."

    "And when you try to drum?"

    Aarav made a face. "I'm terrible. I can't keep the beat. My hands feel like
    wood."

    Dadu smiled gently. "So here is a strange thing, Aarav. You are wishing for
    a part where your hands feel like wood, and turning away from a part where
    you forget the whole world. Ravi forgets the world when he drums. You forget
    it when you paint. You have each been given the work your own nature loves,
    and you are trying to trade it away."

    Aarav looked down at his paint-stained fingers.

    "A copied drummer is never as fine as a true painter," said Dadu. "Even if
    you learned Ravi's part perfectly, you would only ever be a second Ravi. But
    there is only one painter who paints the way you do. Do your own work, even
    if it comes out a little crooked, and your heart stays clean and whole. Chase
    someone else's work, and you lose yourself trying to be them."

    The next morning Aarav went back to his banners. He painted a sun so warm and
    alive that when the chariot rolled past, people pointed and smiled. And at
    the front, Ravi's drum kept the beat — and Aarav found, to his surprise, that
    he was glad. Ravi had his work. Aarav had his own. And his own, he finally
    understood, was exactly enough.

reflection: "Have you ever envied someone else's role and wished it were yours? What is the work or play that makes you forget the whole world — the thing that is truly yours?"
