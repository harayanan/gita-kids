chapter: 18
verse: 30

speaker: krishna

sanskrit: "प्रवृत्तिं च निवृत्तिं च कार्याकार्ये भयाभये। बन्धं मोक्षं च या वेत्ति बुद्धिः सा पार्थ सात्त्विकी॥"

transliteration: "pravṛttiṁ ca nivṛttiṁ ca kāryākārye bhayābhaye | bandhaṁ mokṣaṁ ca yā vetti buddhiḥ sā pārtha sāttvikī ||"

dhatu_breakdown:
  - word: "प्रवृत्तिम्"
    parts: ["pra (forth)", "vṛt (to turn, to proceed)"]
    meaning: "going forward into action, the path of doing"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"
  - word: "निवृत्तिम्"
    parts: ["ni (back, away)", "vṛt (to turn)"]
    meaning: "turning back from action, the path of holding off"
  - word: "कार्याकार्ये"
    parts: ["kṛ (to do)", "a (not)", "kṛ (to do)"]
    meaning: "what should be done and what should not be done"
  - word: "भयाभये"
    parts: ["bhī (to fear)", "a (not)", "bhī (to fear)"]
    meaning: "what to fear and what not to fear"
  - word: "बन्धम्"
    parts: ["bandh (to bind, to tie)"]
    meaning: "bondage — what traps and ties you down"
  - word: "मोक्षम्"
    parts: ["muc (to release, to set free)"]
    meaning: "liberation — what sets you free"
  - word: "या"
    parts: ["yā (which)"]
    meaning: "which (mind)"
  - word: "वेत्ति"
    parts: ["vid (to know)"]
    meaning: "knows, understands"
  - word: "बुद्धिः"
    parts: ["budh (to wake, to understand)"]
    meaning: "the buddhi, the deciding mind"
  - word: "सा"
    parts: ["sā (that, she)"]
    meaning: "that one"
  - word: "पार्थ"
    parts: ["pṛthā (Pṛthā, Arjuna's mother Kuntī)"]
    meaning: "O son of Pṛthā — a name for Arjuna"
  - word: "सात्त्विकी"
    parts: ["sattva (purity, clarity, goodness)"]
    meaning: "sāttvic — clear, calm, and true"

meaning: >
  Krishna describes the best kind of deciding mind. "The buddhi that knows when
  to step forward into action and when to step back, what truly should be done
  and what should not, what is worth fearing and what is not, and which things
  chain you down and which set you free — that clear-seeing mind, O Arjuna, is
  sāttvic." It is the mind that can tell, calmly and honestly, the difference
  between what really helps and what only looks helpful.

story:
  title: "What Truly Helps"
  source: "modern"
  body: |
    Aarav came home from the Puri market grinning, a bright plastic kite under
    his arm and an empty pocket where his week's pocket money used to be.

    "Look, Dadu! It was the last one. The man said if I didn't buy it right
    away, somebody else would. So I had to."

    Dadu was mending a real kite on the veranda — paper and split bamboo, the
    kind he had flown as a boy. He looked at the shiny new one and smiled
    gently. "Had to," he repeated. "Tell me, beta. When the man said hurry,
    what did your stomach feel?"

    Aarav thought. "Kind of… nervous. Like I'd lose something."

    "That nervous feeling," said Dadu, "is a little trick. A clever seller can
    push that button, and your hand reaches for your money before your good
    sense wakes up." He held up his half-finished kite. "Now look closer.
    Yours has no proper spine. The first strong wind off the sea will fold it
    in half. It looked like a kite. It was really just paint."

    Aarav's grin faded a little. "So it only seemed good."

    "Here is the most useful thing your grandfather can teach you," Dadu said,
    setting down his glue. "Before you act, your mind should ask four quiet
    questions. Should I really do this, or should I wait? Is this worth being
    afraid of, or is the fear just a trick? Will this tie me up later — like an
    empty pocket all week — or will it leave me free? A mind that stops to ask
    is a clear mind. A mind that just grabs is a foggy one."

    Aarav turned the plastic kite over in his hands. "Next time," he said
    slowly, "I'll wait one minute before I buy. Just to let the clear part wake
    up."

    "One honest minute," Dadu agreed. "That is where wisdom lives — in the gap
    between the wanting and the doing." He patted the bamboo frame. "Come. The
    wind is good this evening. Let us fly the one that was built to last, and I
    will show you how to tell, by the pull of the string, what is truly holding
    and what is only pretending."

reflection: "Can you think of a time something looked great but turned out not to help you? What questions could you ask yourself before deciding, to tell what truly helps from what only seems to?"
