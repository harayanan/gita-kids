chapter: 18
verse: 37
speaker: krishna

sanskrit: "यत्तदग्रे विषमिव परिणामेऽमृतोपमम्। तत्सुखं सात्त्विकं प्रोक्तमात्मबुद्धिप्रसादजम्॥"

transliteration: "yattadagre viṣamiva pariṇāme'mṛtopamam | tatsukhaṁ sāttvikaṁ proktamātmabuddhiprasādajam ||"

