chapter: 18
verse: 76
speaker: sanjaya

sanskrit: "राजन्संस्मृत्य संस्मृत्य संवादमिममद्भुतम्। केशवार्जुनयोः पुण्यं हृष्यामि च मुहुर्मुहुः॥"

transliteration: "rājansaṁsmṛtya saṁsmṛtya saṁvādamimamadbhutam | keśavārjunayoḥ puṇyaṁ hṛṣyāmi ca muhurmuhuḥ ||"

