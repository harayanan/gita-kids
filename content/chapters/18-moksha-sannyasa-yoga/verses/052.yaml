chapter: 18
verse: 52

speaker: krishna

sanskrit: "विविक्तसेवी लघ्वाशी यतवाक्कायमानसः। ध्यानयोगपरो नित्यं वैराग्यं समुपाश्रितः॥"

transliteration: "viviktasevī laghvāśī yatavākkāyamānasaḥ | dhyānayogaparo nityaṁ vairāgyaṁ samupāśritaḥ ||"

dhatu_breakdown:
  - word: "विविक्तसेवी"
    parts: ["vi (apart)", "vic (to separate)", "vivikta (solitary, secluded)", "sev (to serve, to resort to)"]
    meaning: "one who seeks out quiet, solitary places"
  - word: "लघ्वाशी"
    parts: ["laghu (light, little)", "aś (to eat)"]
    meaning: "one who eats lightly, a moderate eater"
  - word: "यतवाक्कायमानसः"
    parts: ["yam (to restrain)", "yata (controlled)", "vac (to speak)", "vāk (speech)", "kāya (body)", "man (to think)", "mānasa (mind)"]
    meaning: "with speech, body, and mind held under control"
  - word: "ध्यानयोगपरः"
    parts: ["dhyai (to meditate)", "dhyāna (meditation)", "yuj (to join)", "yoga (union, practice)", "para (devoted to, intent on)"]
    meaning: "devoted to the practice of meditation"
  - word: "नित्यम्"
    parts: ["nitya (constant, eternal)"]
    meaning: "always, constantly"
  - word: "वैराग्यम्"
    parts: ["vi (away)", "rañj (to be coloured, to be attached)", "vairāgya (dispassion)"]
    meaning: "dispassion, the calm that does not crave"
  - word: "समुपाश्रितः"
    parts: ["sam (fully)", "upa (near)", "ā (toward)", "śri (to take shelter, to lean on)"]
    meaning: "having taken refuge in, leaning fully upon"

meaning: >
  Krishna paints the daily life of the climbing sage. He chooses quiet, lonely
  places, away from the clamour of the crowd. He eats lightly — just enough, never
  stuffing himself. He keeps his words gentle, his body calm, and his mind from
  racing all over. Always he turns toward meditation, sitting and steadying his
  thoughts. And he leans, like a tired traveller leaning on a strong staff, on
  vairagya — the deep calm of a heart that no longer needs to chase after things
  to feel whole.

story:
  title: "The Cave by the Waterfall"
  source: "mythological"
  body: |
    Devala had cleaned the window of his mind and set down the two heavy stones.
    Now the sage Uddhava sent him for a season to a little cave behind a waterfall,
    high in the hills.

    "Live here a while," the old man said, "and let me tell you how to spend your
    days, for the way you live shapes the way you grow."

    Devala settled into the cool stone cave. The waterfall hung like a silver
    curtain across its mouth, and the roar softened into the sweetest hush.

    "First," Uddhava had told him, "love a quiet place. Not because people are bad,
    but because a still pond shows the stars, while a churned-up pond shows only
    mud." So Devala welcomed the solitude, and listened to the water and the wind.

    "Second, eat lightly." Each evening Devala gathered a small handful of wild
    rice and fruit — just enough to keep him strong, never so much that he grew
    sleepy and dull. He found, to his surprise, that a light body made for a clear
    mind.

    "Third, hold your speech, your body, and your mind." He spoke little, and only
    kindly. He sat without fidgeting. And when his thoughts ran off chasing old
    memories, he gently brought them home, the way a shepherd brings a wandering
    lamb back to the flock.

    "Fourth, always turn toward meditation." Morning and evening Devala sat very
    still, watching his breath, letting his thoughts settle like dust settling in
    a sunbeam after the broom has passed.

    And under all of it lay the last thing Uddhava had named: vairagya, the great
    calm. Devala noticed he no longer ached for the village fair, the praise of
    friends, the taste of sweets. He still loved the world — but he no longer
    needed it to feed an empty hole inside him, for the hole had quietly filled
    with peace.

    When Uddhava came at season's end, he found Devala sitting behind the silver
    water, calm as the stone itself. "You have learned," the old man said softly,
    "that the heart that needs nothing has, in a way, already found everything."

reflection: "When your body and mind feel too busy and noisy, what is one quiet, simple thing you could do to settle them — sit still, breathe, or rest in a calm place?"
