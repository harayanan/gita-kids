chapter: 18
verse: 49
speaker: krishna

sanskrit: "असक्तबुद्धिः सर्वत्र जितात्मा विगतस्पृहः। नैष्कर्म्यसिद्धिं परमां संन्यासेनाधिगच्छति॥"

transliteration: "asaktabuddhiḥ sarvatra jitātmā vigataspṛhaḥ | naiṣkarmyasiddhiṁ paramāṁ saṁnyāsenādhigacchati ||"

dhatu_breakdown:
  - word: "असक्तबुद्धिः"
    parts: ["a (not)", "sañj (to cling, to attach)", "budh (to know, to be aware)"]
    meaning: "one whose mind clings to nothing, an unattached mind"
  - word: "सर्वत्र"
    parts: ["sarva (all)", "tra (in the place of)"]
    meaning: "everywhere, in all things"
  - word: "जितात्मा"
    parts: ["ji (to conquer, to master)", "ātman (self)"]
    meaning: "one who has mastered the self, the self-controlled"
  - word: "विगतस्पृहः"
    parts: ["vi (away)", "gam (to go)", "spṛh (to long for, to crave)"]
    meaning: "one whose cravings have gone away, free of longing"
  - word: "नैष्कर्म्यसिद्धिम्"
    parts: ["niḥ (free from)", "kṛ (to do, to act)", "sidh (to succeed, to become perfect)"]
    meaning: "the perfection of freedom from binding action"
  - word: "परमाम्"
    parts: ["para (highest, supreme)", "amā (most)"]
    meaning: "the highest, the supreme"
  - word: "संन्यासेन"
    parts: ["sam (fully)", "ni (down)", "as (to cast, to renounce)"]
    meaning: "by true renunciation, by letting go within"
  - word: "अधिगच्छति"
    parts: ["adhi (over, towards)", "gam (to go, to reach)"]
    meaning: "reaches, attains, arrives at"

meaning: >
  Krishna describes the person who has become truly free. Their mind does not
  cling to anything, anywhere. They have mastered themselves, and their hungry
  longings have melted away. Such a person, by letting go inside, reaches the
  highest freedom of all — the state where action no longer binds them. They
  still act, but nothing they do can chain them anymore, because their heart has
  released its grip on everything.

story:
  title: "The Sage Who Held Nothing"
  source: "mythological"
  body: |
    On the bank of a wide, slow river lived an old sage whom everyone called
    Mukta — "the freed one." Pilgrims travelled from far away just to sit near
    him, for it was said that nothing in the world could shake his peace.

    A young seeker named Vidur came to him one rainy season, full of questions.
    "Master," he said, "they tell me you are completely free. But you still do
    things. I have watched you. You draw water from the river. You sweep your
    little hut. You feed the birds and care for the sick travellers who pass. If
    you do all these things, how can you be free? Doesn't doing tie you down,
    like everyone else?"

    Mukta smiled and held up his open hand, palm to the sky. "Watch," he said. A
    raindrop fell into his palm, sat there a moment, glittering, then slid off
    and dropped away. "Did my hand hold the raindrop?"

    "No," said Vidur. "It only let it rest, and then let it go."

    "That is how I do all my work," said Mukta. "I draw the water, but I do not
    clutch it. I sweep the hut, but I do not say, 'This is mine, this must stay
    perfect.' I feed the birds and let them fly. My hand stays open, everywhere,
    for everything. Things rest in it for a moment, and then they go, and I am
    not torn when they go."

    "But how did you learn to hold your hand open like that?" asked Vidur.

    "First I had to master myself," said Mukta. "When I was young, my wants
    ruled me — I craved this, I feared losing that, I grasped at every passing
    pleasure. My fist was always closed and aching. So I worked, year after
    year, to quiet those wants, until the grasping fell away like a dry leaf. And
    when the grasping was gone, I found something astonishing. I could still do
    everything I had always done — but none of it could chain me anymore. I
    acted, yet I was free."

    The rain fell softly all around them. Vidur watched the old man scatter
    grain for the sparrows, his hand open and easy, asking nothing back.

    "This is the highest freedom," said Mukta quietly. "Not to stop doing. To go
    on doing, with a heart that clings to nothing, wants nothing, fears nothing.
    Then your every action is light as a raindrop in an open hand. You live in
    the world, and the world cannot hold you. That is the freedom that letting-go
    brings."

reflection: "What is something you find very hard to let go of or share? How might it feel to hold things more lightly, like a raindrop resting in an open hand?"
