chapter: 18
verse: 62

speaker: krishna

sanskrit: "तमेव शरणं गच्छ सर्वभावेन भारत। तत्प्रसादात्परां शान्तिं स्थानं प्राप्स्यसि शाश्वतम्॥"

transliteration: "tameva śaraṇaṁ gaccha sarvabhāvena bhārata | tatprasādātparāṁ śāntiṁ sthānaṁ prāpsyasi śāśvatam ||"

dhatu_breakdown:
  - word: "तम्"
    parts: ["tad (that, him)"]
    meaning: "Him, that very Lord"
  - word: "एव"
    parts: ["eva (only, indeed)"]
    meaning: "alone, only, indeed"
  - word: "शरणम्"
    parts: ["śri (to lean on, to take refuge)", "śaraṇa (refuge, shelter)"]
    meaning: "refuge, shelter, safe harbour"
  - word: "गच्छ"
    parts: ["gam (to go)"]
    meaning: "go to, turn to"
  - word: "सर्वभावेन"
    parts: ["sarva (all, whole)", "bhū (to be)", "bhāva (being, feeling, heart)"]
    meaning: "with your whole being, with all your heart"
  - word: "भारत"
    parts: ["bharata (Bharata)", "bhārata (descendant of Bharata)"]
    meaning: "O descendant of Bharata — a name for Arjuna"
  - word: "तत्प्रसादात्"
    parts: ["tad (that, His)", "pra (forth)", "sad (to settle, to be gracious)", "prasāda (grace, kindness)"]
    meaning: "by His grace, through His kindness"
  - word: "पराम्"
    parts: ["para (highest, supreme)"]
    meaning: "supreme, highest"
  - word: "शान्तिम्"
    parts: ["śam (to be calm, to be at peace)", "śānti (peace, stillness)"]
    meaning: "peace, deep calm"
  - word: "स्थानम्"
    parts: ["sthā (to stand, to abide)", "sthāna (place, abode, home)"]
    meaning: "the abode, the home, the resting place"
  - word: "प्राप्स्यसि"
    parts: ["pra (forth)", "āp (to reach, to obtain)"]
    meaning: "you will reach, you will attain"
  - word: "शाश्वतम्"
    parts: ["śaśvat (perpetual, everlasting)", "śāśvata (eternal, unchanging)"]
    meaning: "eternal, everlasting, never-ending"

meaning: >
  Krishna gives the heart of his counsel: turn to Him for refuge with your whole
  self — not half of you, not just in trouble, but completely. Lean on Him the
  way a tired child leans on a parent, holding nothing back. Do this, he says,
  and by His grace you will come to a peace deeper than any worry can reach, and
  to a home that never crumbles or fades — the eternal resting place where the
  heart finally stops being afraid.

story:
  title: "Gajendra's Last Cry"
  source: "mythological"
  body: |
    In a lake fringed with lotuses, deep in a forest no man had ever seen, there
    lived a mighty elephant king named Gajendra. He was huge and strong and
    proud, the lord of a great herd, and he feared nothing in all the world.

    One blazing afternoon, Gajendra waded into the cool lake to drink and bathe,
    his trunk lifting silver arcs of water over his back. But beneath the calm
    surface waited a crocodile, ancient and enormous, and its jaws closed like a
    trap around the elephant's leg.

    Gajendra pulled. The crocodile pulled harder. The elephant was the strongest
    creature in the forest, but the water was the crocodile's kingdom, and there
    his strength was not enough. Hours passed. Days passed. The great king grew
    weaker and weaker, the lotus-water churning red, and still the jaws would not
    let go.

    At first Gajendra had trusted only in his own power. "I am strong," he had
    thought. "I will free myself." But strength alone was failing him now, and
    he could feel his life slipping into the dark water.

    Then, at the very end of his strength, something in him let go of pride. With
    the last of his breath he tore a lotus from the water, lifted it high in his
    trunk toward the sky, and cried out — not as a mighty king, but as a helpless
    child crying for help — "O Lord, I cannot save myself. I give myself wholly
    to You. Save me!"

    He held nothing back. There was nothing left to hold.

    In that instant the sky opened. Vishnu Himself came riding on the great
    eagle Garuda, swift as a thought, and with one touch the crocodile released
    its grip. The Lord lifted the trembling elephant gently from the bloodied
    water, and a peace washed over Gajendra deeper than any he had ever known —
    not the peace of being strong, but the far greater peace of being held.

    For he had learned the secret in the worst hour of his life: when you let go
    of your half-hearted holding-on and turn for refuge with your whole being,
    grace comes, and carries you home.

reflection: "When something is too big for you to handle alone, what does it feel like to truly ask for help — with your whole heart, holding nothing back? Why is that sometimes the hardest, and bravest, thing to do?"
