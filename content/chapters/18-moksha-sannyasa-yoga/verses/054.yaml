chapter: 18
verse: 54

speaker: krishna

sanskrit: "ब्रह्मभूतः प्रसन्नात्मा न शोचति न काङ्क्षति। समः सर्वेषु भूतेषु मद्भक्तिं लभते पराम्॥"

transliteration: "brahmabhūtaḥ prasannātmā na śocati na kāṅkṣati | samaḥ sarveṣu bhūteṣu madbhaktiṁ labhate parām ||"

dhatu_breakdown:
  - word: "ब्रह्मभूतः"
    parts: ["bṛh (to grow, to expand)", "brahma (Brahman)", "bhū (to become)"]
    meaning: "one who has become Brahman, merged with the Spirit"
  - word: "प्रसन्नात्मा"
    parts: ["pra (forth)", "sad (to settle, to grow clear)", "prasanna (serene, clear)", "ātman (self)"]
    meaning: "serene of self, with a clear and joyful heart"
