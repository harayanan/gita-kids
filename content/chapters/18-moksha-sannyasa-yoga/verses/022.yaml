chapter: 18
verse: 22

speaker: krishna

sanskrit: "यत्तु कृत्स्नवदेकस्मिन्कार्ये सक्तमहैतुकम्। अतत्त्वार्थवदल्पं च तत्तामसमुदाहृतम्॥"

transliteration: "yattu kṛtsnavadekasminkārye saktamahaitukam | atattvārthavadalpaṁ ca tattāmasamudāhṛtam ||"

dhatu_breakdown:
  - word: "यत्"
    parts: ["yad (which, that which)"]
    meaning: "that which"
  - word: "तु"
    parts: ["tu (but)"]
    meaning: "but, however"
  - word: "कृत्स्नवत्"
    parts: ["kṛtsna (whole, entire)", "vat (like, as if)"]
    meaning: "as if it were the whole, as though it were everything"
  - word: "एकस्मिन्"
    parts: ["eka (one)"]
    meaning: "in one, to a single thing"
  - word: "कार्ये"
    parts: ["kṛ (to do)", "kārya (effect, thing to be done, object)"]
    meaning: "to an effect, to one piece of work or thing"
  - word: "सक्तम्"
    parts: ["sañj (to cling, to attach)"]
    meaning: "clinging, stuck, attached"
  - word: "अहैतुकम्"
    parts: ["a (not, without)", "hetu (reason, cause)"]
    meaning: "without reason, baseless, lacking a real cause"
  - word: "अतत्त्वार्थवत्"
    parts: ["a (not)", "tattva (truth, reality)", "artha (meaning, purpose)", "vat (having)"]
    meaning: "not grasping the real truth of things, missing the true point"
  - word: "अल्पम्"
    parts: ["alpa (small, little, trivial)"]
    meaning: "small, narrow, trivial"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"
  - word: "तत्"
    parts: ["tad (that)"]
    meaning: "that"
  - word: "तामसम्"
    parts: ["tamas (darkness, dullness)"]
    meaning: "tamasic, born of dullness and darkness"
  - word: "उदाहृतम्"
    parts: ["ud (up, forth)", "ā (toward)", "hṛ (to carry, to bring)"]
    meaning: "is declared, is called, is given as an example"

meaning: >
  Krishna describes the dullest, darkest kind of knowing. It is the kind
  that grabs hold of one tiny thing and treats it as if it were the whole
  world. It has no good reason behind it, it never reaches the real truth
  of anything, and it stays small and narrow. That sort of clinging,
  reasonless, trivial "knowing" is called tamasic — knowing wrapped in
  darkness.

story:
  title: "The Frog Who Knew Only the Well"
  source: "mythological"
  body: |
    Long ago, in a quiet stone well at the edge of a forest, there lived a
    frog named Kupa. He had been born in that well, and he had never once
    left it. The well was his whole world — the green moss on the walls, the
    little ring of sky far above, the cool dark water at the bottom. To
    Kupa, this was everything that existed.

    "There is nothing wider than my well," Kupa would announce to the
    insects. "I have measured it with my own hops. From this wall to that
    wall is the widest distance there can ever be."

    The insects had seen rivers and fields, but Kupa would not listen. He
    had decided, and that was that.

    One rainy day a traveling frog named Samudra tumbled in over the rim.
    He was from the sea.

    "Welcome!" said Kupa proudly. "You have come to the greatest place in
    the world. Tell me — is the place you come from as big as one hop?" And
    he hopped a little way.

    "Bigger," said Samudra gently.

    "As big as two hops?" Kupa hopped again, sure he was being generous.

    "Friend," said Samudra, "the sea is so wide that you could hop for a
    thousand years and never reach the other side. The sun rises out of it
    and sets into it. Whole rivers pour into it and it does not even fill
    up."

    Kupa puffed himself up, furious. "Lies! There is nothing bigger than my
    well. I have never seen this sea, so it cannot be real. My well is all
    there is."

    He turned his back and would not hear another word.

    Samudra looked at the little frog clinging so tightly to his little
    well, certain that his single small puddle was the entire universe. He
    did not argue. There is no arguing with a mind that has locked its only
    door. Quietly, when the rains rose, Samudra climbed out and went on
    toward the great water, leaving Kupa to rule his kingdom of moss and
    shadow — sure of everything, and knowing almost nothing at all.

reflection: "Have you ever been completely sure about something, only to find out the world was much bigger than you thought? What helped you change your mind — or what stopped you from listening?"
