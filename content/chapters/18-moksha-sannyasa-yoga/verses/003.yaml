chapter: 18
verse: 3
speaker: krishna

sanskrit: "त्याज्यं दोषवदित्येके कर्म प्राहुर्मनीषिणः। यज्ञदानतपःकर्म न त्याज्यमिति चापरे॥"

transliteration: "tyājyaṁ doṣavadityeke karma prāhurmanīṣiṇaḥ | yajñadānatapaḥkarma na tyājyamiti cāpare ||"

