chapter: 18
verse: 43
speaker: krishna

sanskrit: "शौर्यं तेजो धृतिर्दाक्ष्यं युद्धे चाप्यपलायनम्। दानमीश्वरभावश्च क्षात्रं कर्म स्वभावजम्॥"

transliteration: "śauryaṁ tejo dhṛtirdākṣyaṁ yuddhe cāpyapalāyanam | dānamīśvarabhāvaśca kṣātraṁ karma svabhāvajam ||"

