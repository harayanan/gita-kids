meaning: >
  Krishna now describes the work that flows naturally from a warrior-protector,
  a kshatriya. Their nature gives them bravery, blazing energy, firmness that
  will not bend, and skill. In a fight they do not turn and run. They are
  generous, sharing freely with those they protect, and they carry the spirit
  of a leader who guards everyone in their care. All of this, Krishna says,
  springs from a warrior's own inborn nature — it is the right work for them.

story:
  title: "The King Who Would Not Run"
  source: "mythological"
  body: |
    Long ago, in a kingdom ringed by forests, there ruled a young king named
    Satyaratha — which means "the chariot of truth." He had not asked to be
    king. The crown had come to him when he was still a boy, after his father
    died, and many in the court whispered that he was too gentle to wear it.

    Then the famine came.

    For two seasons the rains failed. The riverbeds cracked. The grain stores
    in the palace held just enough to feed the royal family for a year — and no
    more. The ministers bowed low and advised the king to lock the storehouse
    doors and wait the famine out.

    Satyaratha walked to the great window and looked down at the city. He saw
    thin children sitting in doorways. He saw old men leaning on sticks. And he
    made his choice.

    "Open the storehouses," he said. "Every grain. Share it street by street
    until it is gone."

    "But, Majesty," cried a minister, "what will the royal family eat?"

    "The same as everyone else," said the king. "A king who feasts while his
    people starve is not a king. He is only a thief in a fine crown."

    The grain was shared. The royal family grew thin like the rest. And in
    those same weeks, raiders from across the hills, hearing the kingdom was
    weak, came thundering toward the city walls.

    The ministers begged the king to flee to safety. Instead, Satyaratha took
    up his bow. He rode to the front of his small, hungry army, and he did not
    leave it.

    "Stand with me," he called to his soldiers, his voice steady though his
    body was weak. "We protect what we love, or we are nothing."

    They fought through the long, hard day. Satyaratha never once turned his
    chariot away from the fighting. When the raiders saw a king who would
    starve with his people and die before his people, who gave away his own
    bread and would not flee his own field, something in them faltered. By dusk
    they broke and rode back into the hills.

    The bravery, the blazing energy, the firmness, the skill, the refusing to
    run, the open hand, the heart of a guardian — these were not lessons
    Satyaratha had memorised. They had risen out of who he truly was. That, the
    elders said for generations after, is the real work of a king.

reflection: "When something frightening happens, is your first thought to protect the people around you, or to keep yourself safe? When have you stood your ground for someone else?"
