chapter: 18
verse: 51

speaker: krishna

sanskrit: "बुद्ध्या विशुद्धया युक्तो धृत्यात्मानं नियम्य च। शब्दादीन्विषयांस्त्यक्त्वा रागद्वेषौ व्युदस्य च॥"

transliteration: "buddhyā viśuddhayā yukto dhṛtyātmānaṁ niyamya ca | śabdādīnviṣayāṁstyaktvā rāgadveṣau vyudasya ca ||"

