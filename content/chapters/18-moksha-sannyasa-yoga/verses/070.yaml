chapter: 18
verse: 70
speaker: krishna

sanskrit: "अध्येष्यते च य इमं धर्म्यं संवादमावयोः। ज्ञानयज्ञेन तेनाहमिष्टः स्यामिति मे मतिः॥"

transliteration: "adhyeṣyate ca ya imaṁ dharmyaṁ saṁvādamāvayoḥ | jñānayajñena tenāhamiṣṭaḥ syāmiti me matiḥ ||"

