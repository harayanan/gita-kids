chapter: 18
verse: 12

speaker: krishna

sanskrit: "अनिष्टमिष्टं मिश्रं च त्रिविधं कर्मणः फलम्। भवत्यत्यागिनां प्रेत्य न तु संन्यासिनां क्वचित्॥"

transliteration: "aniṣṭam iṣṭaṁ miśraṁ ca trividhaṁ karmaṇaḥ phalam | bhavaty atyāgināṁ pretya na tu saṁnyāsināṁ kvacit ||"

