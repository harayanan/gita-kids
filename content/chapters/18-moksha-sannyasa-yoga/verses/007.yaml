chapter: 18
verse: 7
speaker: krishna

sanskrit: "नियतस्य तु संन्यासः कर्मणो नोपपद्यते। मोहात्तस्य परित्यागस्तामसः परिकीर्तितः॥"

transliteration: "niyatasya tu saṁnyāsaḥ karmaṇo nopapadyate | mohāttasya parityāgastāmasaḥ parikīrtitaḥ ||"

