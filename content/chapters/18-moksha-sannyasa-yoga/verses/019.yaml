chapter: 18
verse: 19

speaker: krishna

sanskrit: "ज्ञानं कर्म च कर्ता च त्रिधैव गुणभेदतः। प्रोच्यते गुणसंख्याने यथावच्छृणु तान्यपि॥"

transliteration: "jñānaṁ karma ca kartā ca tridhaiva guṇabhedataḥ | procyate guṇasaṅkhyāne yathāvacchṛṇu tānyapi ||"

