chapter: 18
verse: 32

speaker: krishna

sanskrit: "अधर्मं धर्ममिति या मन्यते तमसावृता। सर्वार्थान्विपरीतांश्च बुद्धिः सा पार्थ तामसी॥"

transliteration: "adharmaṁ dharmamiti yā manyate tamasāvṛtā | sarvārthānviparītāṁśca buddhiḥ sā pārtha tāmasī ||"

dhatu_breakdown:
  - word: "अधर्मम्"
    parts: ["a (not)", "dhṛ (to hold, to uphold)"]
    meaning: "adharma — what is wrong"
  - word: "धर्मम्"
    parts: ["dhṛ (to hold, to uphold)"]
    meaning: "dharma — what is right"
  - word: "इति"
    parts: ["iti (thus, that)"]
    meaning: "thus, as if"
  - word: "या"
    parts: ["yā (which)"]
    meaning: "which (mind)"
  - word: "मन्यते"
    parts: ["man (to think, to suppose)"]
    meaning: "thinks, supposes"
  - word: "तमसा"
    parts: ["tamas (darkness, dullness)"]
    meaning: "by darkness"
  - word: "आवृता"
    parts: ["ā (around)", "vṛ (to cover, to wrap)"]
    meaning: "wrapped up, covered over"
  - word: "सर्वार्थान्"
    parts: ["sarva (all)", "artha (things, matters, meanings)"]
    meaning: "all things, every matter"
  - word: "विपरीतान्"
    parts: ["vi (apart, away)", "pari (around)", "i (to go)"]
    meaning: "turned the wrong way round, upside down, backwards"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"
  - word: "बुद्धिः"
    parts: ["budh (to wake, to understand)"]
    meaning: "the buddhi, the deciding mind"
  - word: "सा"
    parts: ["sā (that, she)"]
    meaning: "that one"
  - word: "पार्थ"
    parts: ["pṛthā (Pṛthā, Arjuna's mother Kuntī)"]
    meaning: "O son of Pṛthā — a name for Arjuna"
  - word: "तामसी"
    parts: ["tamas (darkness, dullness)"]
    meaning: "tāmasic — dark, dull, and confused"

meaning: >
  Krishna describes the darkest kind of deciding mind. "The buddhi that is
  wrapped up in darkness, that thinks wrong is right and right is wrong, and that
  sees every single thing upside down — that mind, O Arjuna, is tāmasic." This is
  worse than the muddled mind. It does not just bend the truth; it flips it
  completely. It calls poison medicine and medicine poison, and walks confidently
  in exactly the wrong direction.

story:
  title: "The Cave That Turned the World Around"
  source: "mythological"
  body: |
    There was once a demon named Vatapi who lived with his brother in a deep,
    sunless cave. The cave was famous for a strange and frightening thing:
    travellers who wandered too far inside came out changed. They would walk
    backwards thinking they walked forward. They would call the cold fire and
    the fire cold. The deepest dark, they swore, was the brightest light.

    A young traveller named Sumati heard of the cave and laughed. "A mind is a
    mind," he said. "Nothing can flip what I plainly see." And he went in to
    prove it.

    For a while he kept his bearings. But the cave was patient. The darkness
    crept into him slowly, like cold water filling a boat through a tiny crack.
    Soon he passed a clear, sweet spring and thought, "Poisoned — I must not
    drink." He passed a snake coiled to strike and thought, "A rope, harmless,"
    and reached out his hand.

    Worst of all, he no longer knew anything was wrong. He felt sure. He felt
    clever. Every backward step felt like progress.

    Outside the cave sat an old sage named Agastya, who had come to help any
    soul wise enough to call out. He heard Sumati stumbling somewhere within,
    cheerfully announcing all the wrong things as right.

    "Sumati!" the sage called. "Stop walking. Just stand still and listen to my
    voice."

    The traveller froze. Some small true part of him, not yet swallowed by the
    dark, heard the call.

    "When your own mind tells you that down is up and harm is help," Agastya
    called gently, "do not trust your certainty. The most lost person is the one
    who is sure he is found. Follow my voice out, one slow step at a time, and
    do the opposite of whatever your turned-around mind insists."

    Step by careful step, doubting himself now, Sumati came out into the
    daylight. He blinked, and the world stood upright again: the spring sweet,
    the snake dangerous, the sun warm and high.

    "I was so sure," he whispered, trembling.

    "That is the dark mind's deepest trap," said Agastya. "Not that it cannot
    see, but that it feels most certain exactly when it is most wrong. The way
    out is to listen — to a teacher, to the wise, to that small honest voice
    that never quite goes out."

reflection: "Why is it sometimes hardest to notice when we are completely wrong about something? Who is someone whose voice you could listen to when your own thoughts get turned around?"
