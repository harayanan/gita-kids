chapter: 18
verse: 48
speaker: krishna

sanskrit: "सहजं कर्म कौन्तेय सदोषमपि न त्यजेत्। सर्वारम्भा हि दोषेण धूमेनाग्निरिवावृताः॥"

transliteration: "sahajaṁ karma kaunteya sadoṣamapi na tyajet | sarvārambhā hi doṣeṇa dhūmenāgnirivāvṛtāḥ ||"

