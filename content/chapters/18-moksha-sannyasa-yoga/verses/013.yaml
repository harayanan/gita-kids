meaning: >
  Krishna says, "Listen carefully, mighty Arjuna, for I will tell you something
  important." The old wise teaching called Sankhya — the teaching that counts up
  what is real — names five things that must come together for any action to get
  done. Not one of them works alone. In the next verse he will name all five. For
  now he wants Arjuna to pay close attention, because once you see the five, you
  stop thinking "I alone did it all" — and that thought is where pride begins.

story:
  title: "The Five-Part Lesson"
  source: "mahabharata"
  body: |
    Twilight settled over Kurukshetra. The great armies had quieted for a
    moment, and Krishna's voice, steady and warm, was the only sound Arjuna
    truly heard.

    "Mighty-armed one," Krishna said, "let me teach you something the old
    sages worked out long ago, in the teaching they call Sankhya — the
    teaching that counts up the pieces of truth, one by one, like a careful
    merchant counting coins. They asked a simple question: when something
    gets done in this world, what makes it happen?"

    Arjuna frowned. "I would say... the person who does it. The doer makes
    it happen."

    Krishna smiled. "That is what almost everyone says. 'I did it.' And
    that small word, 'I,' is a heavy little stone. It puffs a man up when
    things go well and crushes him when they go badly, because he thinks he
    alone carried everything."

    "Then it is not so?" asked Arjuna.

    "Listen," said Krishna. "The Sankhya sages discovered that no action —
    not one — is ever done by a single cause. Five things must always come
    together. Five. Lift away any one of them, and the action falls apart
    like a wheel with a spoke removed. Tomorrow I will name them for you
    one by one, so you can count them on your own fingers."

    A breeze stirred the chariot's banners. Arjuna sat very still, the way
    a student sits when he senses a door about to open.

    "Why does this matter, Krishna, here, now, with the battle waiting?"

    "Because, Arjuna, when you truly understand that five causes — not your
    'I' alone — bring every deed about, something heavy lifts off your
    chest. You stop boasting after success. You stop drowning in guilt
    after failure. You become like a clear window the light passes
    through, rather than a man straining to hold up the whole sky with two
    tired arms."

    Arjuna let out a slow breath. He had been holding the whole war on his
    shoulders, certain that every life lost would be his doing alone.

    "Tell me the five," he said quietly. "I am listening with my whole
    mind."

    "Then learn them from me," said Krishna, and his eyes were kind. "For
    in knowing these five lies the end of a great and secret burden."

    And Arjuna leaned in, ready, as the first stars pricked the darkening
    sky above the silent field.

reflection: "When something good happens, do you ever say 'I did it all by myself'? Can you think of all the helpers and things that had to come together for it to happen?"
