chapter: 18
verse: 13

speaker: krishna

sanskrit: "पञ्चैतानि महाबाहो कारणानि निबोध मे। साङ्ख्ये कृतान्ते प्रोक्तानि सिद्धये सर्वकर्मणाम्॥"

transliteration: "pañcaitāni mahābāho kāraṇāni nibodha me | sāṅkhye kṛtānte proktāni siddhaye sarvakarmaṇām ||"

