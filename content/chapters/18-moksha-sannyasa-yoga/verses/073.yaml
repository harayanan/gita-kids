chapter: 18
verse: 73
speaker: arjuna

sanskrit: "नष्टो मोहः स्मृतिर्लब्धा त्वत्प्रसादान्मयाच्युत। स्थितोऽस्मि गतसन्देहः करिष्ये वचनं तव॥"

transliteration: "naṣṭo mohaḥ smṛtirlabdhā tvatprasādānmayācyuta | sthito'smi gatasandehaḥ kariṣye vacanaṁ tava ||"

dhatu_breakdown:
  - word: "नष्टः"
    parts: ["naś (to perish, to be destroyed)"]
    meaning: "destroyed, gone"
  - word: "मोहः"
    parts: ["muh (to be confused, to be deluded)"]
    meaning: "delusion, the fog of confusion"
  - word: "स्मृतिः"
    parts: ["smṛ (to remember)"]
    meaning: "memory, the recognition of who I truly am"
  - word: "लब्धा"
    parts: ["labh (to gain, to obtain)"]
    meaning: "regained, recovered"
  - word: "त्वत्प्रसादात्"
    parts: ["tvad (you, your)", "pra (forth)", "sad (to settle, to be gracious)"]
    meaning: "by Your grace, through Your kindness"
  - word: "मया"
    parts: ["mad (I, me)"]
    meaning: "by me"
  - word: "अच्युत"
    parts: ["a (not)", "cyu (to fall, to slip)"]
    meaning: "O Achyuta — the Unfallen, the One who never slips, a name for Krishna"
  - word: "स्थितः"
    parts: ["sthā (to stand, to be firm)"]
    meaning: "standing firm, settled, steady"
  - word: "अस्मि"
    parts: ["as (to be)"]
    meaning: "I am"
  - word: "गतसन्देहः"
    parts: ["gam (to go)", "sam (together)", "dih (to smear, to doubt)"]
    meaning: "with doubts gone, free of all doubt"
  - word: "करिष्ये"
    parts: ["kṛ (to do, to act)"]
    meaning: "I will do, I shall act"
  - word: "वचनम्"
    parts: ["vac (to speak)"]
    meaning: "word, what is spoken"
  - word: "तव"
    parts: ["yuṣmad (you, your)"]
    meaning: "your"

meaning: >
  And now Arjuna answers — the answer the whole Gita has been waiting for.
  "My delusion is destroyed! The fog has lifted. By Your grace, O Achyuta, I
  have remembered who I really am. I stand firm now, steady, with all my doubts
  gone. I will do as You say." After all the questions and the trembling, the
  archer is whole again. He is ready.

story:
  title: "Arjuna Stands Firm"
  source: "mythological"
  body: |
    The dust of Kurukshetra had not settled, but something inside Arjuna had.

    A short while ago he had sat slumped in the chariot, his great bow,
    Gandiva, slipping from his fingers, his eyes wet, his whole body shaking
    like a banner in a storm. He had wanted to run. He had wanted the battle
    to swallow itself before it began. Everything had felt tangled and
    impossible, a knot too tight for any hand to undo.

    Now he sat up straight.

    He looked at Krishna — his friend, his charioteer, the dark-blue Lord who
    had not let him quit, who had spoken to him patiently through all his
    weeping and his clever excuses. The two horses tossed their white manes.
    The flags above the chariot snapped in the wind. And Arjuna felt, for the
    first time since he had stepped onto the field, that he knew exactly where
    he stood.

    "My delusion is gone, Krishna," he said, and his voice did not shake. "The
    fog that was choking me — it has lifted. I can see."

    He pressed his palm to his own chest, as if checking that the trembling
    had truly stopped, and it had.

    "By Your grace, Achyuta, You who never fall, never slip, I have
    remembered who I am. I had forgotten. I was lost in 'mine' and 'I' and
    'how can I bear it.' But now I remember. I am not just this frightened body.
    I am the Self that does not die, set here to do what is right."

    He bent and lifted Gandiva from where it had lain. The great bow felt
    light in his grip, lighter than it had ever felt, as though his arm and his
    will were finally pointing the same way.

    "I stand firm," Arjuna said. "My doubts are gone — every one of them. I do
    not need to argue any more. I do not need to ask one more question." He
    bowed his head to his friend. "I will do as You say. I will do Your word."

    Krishna said nothing. But the corner of his mouth lifted, the quiet smile
    of one whose friend has finally come home to himself. The conch was about
    to sound. The wind carried the smell of the river. And the archer who had
    nearly thrown his life away stood ready, not because he had been ordered,
    but because, at last, he understood.

reflection: "Arjuna says his doubts are gone and he is ready to act. Think of a time you finally felt clear and sure after being confused. What helped the fog inside you lift?"
