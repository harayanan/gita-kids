chapter: 18
verse: 31

speaker: krishna

sanskrit: "यया धर्ममधर्मं च कार्यं चाकार्यमेव च। अयथावत्प्रजानाति बुद्धिः सा पार्थ राजसी॥"

transliteration: "yayā dharmamadharmaṁ ca kāryaṁ cākāryameva ca | ayathāvatprajānāti buddhiḥ sā pārtha rājasī ||"

dhatu_breakdown:
  - word: "यया"
    parts: ["yā (which)"]
    meaning: "by which (mind)"
  - word: "धर्मम्"
    parts: ["dhṛ (to hold, to uphold)"]
    meaning: "dharma — what is right, the way one should live"
  - word: "अधर्मम्"
    parts: ["a (not)", "dhṛ (to hold, to uphold)"]
    meaning: "adharma — what is wrong, against the right way"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"
  - word: "कार्यम्"
    parts: ["kṛ (to do)"]
    meaning: "what should be done"
  - word: "अकार्यम्"
    parts: ["a (not)", "kṛ (to do)"]
    meaning: "what should not be done"
  - word: "एव"
    parts: ["eva (indeed, just)"]
    meaning: "indeed, just so"
  - word: "अयथावत्"
    parts: ["a (not)", "yathāvat (as it really is, correctly)"]
    meaning: "not as it truly is, wrongly, mistakenly"
  - word: "प्रजानाति"
    parts: ["pra (forth)", "jñā (to know)"]
    meaning: "understands, makes out"
  - word: "बुद्धिः"
    parts: ["budh (to wake, to understand)"]
    meaning: "the buddhi, the deciding mind"
  - word: "सा"
    parts: ["sā (that, she)"]
    meaning: "that one"
  - word: "पार्थ"
    parts: ["pṛthā (Pṛthā, Arjuna's mother Kuntī)"]
    meaning: "O son of Pṛthā — a name for Arjuna"
  - word: "राजसी"
    parts: ["rajas (restlessness, passion, dust)"]
    meaning: "rājasic — restless and muddled by wanting"

meaning: >
  Krishna describes the second kind of deciding mind. "The buddhi that gets
  right and wrong mixed up, that cannot clearly tell what should be done from
  what should not — that confused mind, O Arjuna, is rājasic." It is not
  completely blind, but its wanting and its hurry blur its sight. It half-sees
  the truth and then bends it to fit what it already craves, so it keeps calling
  the wrong thing right.

story:
  title: "The King Who Bent the Truth"
  source: "mythological"
  body: |
    Long ago there ruled a king named Vena, the son of a good and gentle
    father. Vena was clever and quick, and in his early years the people had
    high hopes for him. He could argue any case, weigh any quarrel, and his
    judgements came fast.

    But a hunger grew in Vena — a hunger for praise, for gold, for being first
    in everything. And slowly that hunger began to bend his thinking the way
    heat bends a blade.

    A farmer came to court one morning. "Your Majesty, my neighbour moved the
    boundary stone in the night and stole a strip of my field."

    The neighbour was rich and gave fine gifts to the king. So Vena rubbed his
    chin and said, "The stone has been moved, yes, but perhaps it was always
    in the wrong place. Perhaps your neighbour has merely set it right." And he
    gave the strip of land to the rich man.

    The sages of the realm came and stood before him, their faces grave. "King
    Vena," said the eldest, "you are calling theft a correction. You are
    dressing adharma in the clothes of dharma."

    Vena laughed. "Who decides what is right? I am the king. What helps me must
    be right, and what crosses me must be wrong." He truly believed it. That was
    the strange and sorrowful thing — he was not stupid. His mind worked
    swiftly. But every time it neared the truth, his craving turned it aside,
    like a river bending around a great rock.

    "This is the danger," the eldest sage told the younger ones afterward, as
    they walked away from the throne. "A dull mind cannot see. But a restless,
    hungry mind sees, and then twists what it sees to feed its wanting. It knows
    just enough to make a good excuse. Watch your own minds, my sons. When you
    feel yourself eager to call a thing right only because you want it, stop.
    That is rajas, dressing wrong as right."

    Vena's reign ended in ruin, as all such reigns do. But the sages remembered
    his lesson long after: the most dangerous mistakes are not made in the dark.
    They are made by a clever mind that has talked itself into the wrong answer.

reflection: "Have you ever told yourself something was okay to do just because you really wanted to do it? How can you tell when you are seeing clearly versus bending the truth to fit your wishes?"
