    meaning: "will compel you, will set you to it, will harness you to it"

meaning: >
  Krishna looks straight at Arjuna's escape plan and gently takes it apart. "If,
  out of pride, you decide 'I will not fight,'" he says, "that decision is empty;
  it will not hold." A warrior cannot simply wish away the warrior inside him.
  Your own deep nature, the way you are made, will pull you back into your work
  whether you like it or not. You cannot run from what you truly are; you can
  only choose to do it wisely or be dragged into it.

story:
  title: "The Warrior Who Tried to Lay Down His Bow"
  source: "mythological"
  body: |
    On the eve of the great war, Arjuna was not the only one who wished he could
    simply walk away. Long before, in the years of exile, his brother Bhima had
    once said the same thing.

    The Pandavas were hiding in the forest, and Bhima — strongest of them all,
    with arms like tree trunks — had grown sick of fighting. A demon had been
    troubling a village, eating travellers on the forest road, and the people
    came begging for help.

    "Let someone else go," Bhima grumbled, sitting heavily under a sal tree. "I
    am tired of being the one who fights. I will lay down my mace. I want only
    to rest." And he folded his great arms and turned his face away.

    His mother Kunti said nothing. She only waited.

    That night the screams came from the road. A family — a mother, a father, a
    small child — had been caught by the demon at the edge of the trees. Bhima
    heard the child cry out in the dark.

    He did not decide to move. His body was already moving. His feet were already
    running, his hand had already found his mace, before his mind had finished
    its sentence. The forest blurred past him. By the time he reached the road
    he was roaring, and the demon that had terrified a whole village met a force
    it could not stand against.

    Afterward, breathing hard, the rescued child asleep against his shoulder,
    Bhima sat down on the road and laughed — a tired, honest laugh.

    "I told myself I would never fight again," he said to the night. "What a
    foolish promise. The moment a child cried, my own nature answered before I
    could stop it. I am made to protect. Pretending otherwise was like a river
    promising not to flow."

    From that day Bhima stopped fighting his own nature and started guiding it
    — fighting when protecting was needed, resting when it was not. The strength
    was never going to leave him. The only real choice was whether he would
    carry it with wisdom or be carried off by it.

reflection: "Have you ever decided you 'just won't' do something that's really part of who you are — and then found yourself doing it anyway? What is one true part of you that keeps showing up no matter what?"
