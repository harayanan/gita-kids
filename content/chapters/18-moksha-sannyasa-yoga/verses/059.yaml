chapter: 18
verse: 59

speaker: krishna

sanskrit: "यदहंकारमाश्रित्य न योत्स्य इति मन्यसे। मिथ्यैष व्यवसायस्ते प्रकृतिस्त्वां नियोक्ष्यति॥"

transliteration: "yadahaṁkāramāśritya na yotsya iti manyase | mithyaiṣa vyavasāyaste prakṛtistvāṁ niyokṣyati ||"

