chapter: 18
verse: 5
speaker: krishna

sanskrit: "यज्ञदानतपःकर्म न त्याज्यं कार्यमेव तत्। यज्ञो दानं तपश्चैव पावनानि मनीषिणाम्॥"

transliteration: "yajñadānatapaḥkarma na tyājyaṁ kāryameva tat | yajño dānaṁ tapaścaiva pāvanāni manīṣiṇām ||"

