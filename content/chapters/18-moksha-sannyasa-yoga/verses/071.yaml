chapter: 18
verse: 71
speaker: krishna

sanskrit: "श्रद्धावाननसूयश्च शृणुयादपि यो नरः। सोऽपि मुक्तः शुभाँल्लोकान्प्राप्नुयात्पुण्यकर्मणाम्॥"

transliteration: "śraddhāvānanasūyaśca śṛṇuyādapi yo naraḥ | so'pi muktaḥ śubhām̐llokānprāpnuyātpuṇyakarmaṇām ||"

dhatu_breakdown:
  - word: "श्रद्धावान्"
    parts: ["śrat (faith, trust)", "dhā (to place, to hold)", "-vat (possessing)"]
    meaning: "full of faith, one who holds trust in his heart"
  - word: "अनसूयः"
    parts: ["an (not)", "asūyā (fault-finding, envy)"]
    meaning: "free of fault-finding, with goodwill and no jealousy"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"
  - word: "शृणुयात्"
    parts: ["śru (to hear, to listen)"]
    meaning: "should listen, would hear"
  - word: "अपि"
    parts: ["api (even, also)"]
    meaning: "even, merely"
  - word: "यः"
    parts: ["yad (who, which)"]
    meaning: "who, whoever"
  - word: "नरः"
    parts: ["nṛ (man, person)"]
    meaning: "a person, a human being"
  - word: "सः"
    parts: ["tad (that, he)"]
    meaning: "he, that one"
  - word: "मुक्तः"
    parts: ["muc (to free, to release)"]
    meaning: "freed, set loose from sorrow"
  - word: "शुभान्"
    parts: ["śubh (to shine, to be bright, auspicious)"]
    meaning: "bright, happy, auspicious"
  - word: "लोकान्"
    parts: ["lok (to see, world)"]
    meaning: "worlds, realms"
  - word: "प्राप्नुयात्"
    parts: ["pra (forth)", "āp (to reach, to attain)"]
    meaning: "would reach, would attain"
  - word: "पुण्यकर्मणाम्"
    parts: ["puṇya (good, holy, virtuous)", "karman (deeds, action)"]
    meaning: "of those who do good deeds, of the righteous"

meaning: >
  Krishna says something gentle and surprising at the very end of his teaching.
  You do not have to be a great scholar to be touched by this. Even a person who
  simply <em>listens</em> to this conversation, listening with faith, with an open
  heart, finding no fault and feeling no jealousy, even that person is set free
  from sorrow. He goes to the bright, happy worlds where good and kind people live.
  Listening well, with love and trust, is itself a doorway.

story:
  title: "Aarav Listens to the Whole Story"
  source: "modern"
  body: |
    The lamp had burned low. All evening Dadu had been telling the great story
    — the chariot, the two armies, the trembling archer, and the dark-blue
    charioteer who would not let him give up. Aarav had not moved from the
    woven mat. Even the mosquitoes whining near his ankles could not pull his
    attention away.

    Outside, the Puri night was full of small sounds: the sea breathing far
    off, a dog turning in the lane, the temple bell letting go of its last note
    of the day. Inside, there was only Dadu's voice and the slow circle of the
    flame.

    Aarav had not understood every word. Some of it was too big for him —
    talk of the three colours of the mind, of duty and surrender, of a Self
    that never dies. But he had not argued with any of it. He had not rolled
    his eyes once, the way he sometimes did when grown-ups talked too long. He
    had simply listened, the way you listen to the sea, letting it wash over
    you even when you cannot name every wave.

    When Dadu reached the end, where the archer's fear melts away, Aarav let
    out a long breath he did not know he had been holding.

    "Dadu," he said quietly, "I feel different. I don't know why. Nothing
    happened to me. I just sat here. But it's like something inside me got
    bigger, and lighter, both at once."

    Dadu set down the storybook and looked at his grandson for a long moment.

    "You listened with your whole heart, beta," he said. "You didn't fight the
    story. You didn't try to be clever about it or pick holes in it. You let it
    in. That is its own kind of magic. Krishna himself promises it — that the
    one who only <em>hears</em> these words, with faith and goodwill and no
    sour jealousy, is already lighter than before. Already a little free."

    Aarav looked into the small flame. He thought of the trembling archer, no
    longer trembling. He thought of how it felt to trust a story enough to be
    changed by it.

    "Then I'm one of the lucky ones," he whispered, "and I didn't even have to
    do anything except really listen."

    Dadu smiled and pinched out the lamp. In the dark, the sea kept breathing,
    and Aarav fell asleep feeling like he had been given something he could
    never lose.

reflection: "Has a story or a song ever made you feel different inside, even though nothing around you changed? What was it about listening with your whole heart that did that?"
