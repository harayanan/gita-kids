chapter: 18
verse: 6
speaker: krishna

sanskrit: "एतान्यपि तु कर्माणि सङ्गं त्यक्त्वा फलानि च। कर्तव्यानीति मे पार्थ निश्चितं मतमुत्तमम्॥"

transliteration: "etānyapi tu karmāṇi saṅgaṁ tyaktvā phalāni ca | kartavyānīti me pārtha niścitaṁ matamuttamam ||"

