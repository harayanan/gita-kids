meaning: >
  Krishna now joins the two ideas into one perfect rule. He says: "Even these
  good actions — sacrifice, giving, and discipline — must be done, but done in
  a special way: by giving up the sticky attachment to them, and by giving up
  the rewards you hope they will bring. Do them, O son of Pṛthā, but hold them
  loosely. This is my settled and highest view." Keep the work; drop the
  clinging.

story:
  title: "The Lamp Carried with an Open Hand"
  source: "mythological"
  body: |
    In a temple high on a hill, an old priest taught a boy how to carry the
    evening lamp up the long stone stairs to the shrine. The boy had watched
    others do it and thought it simple.

    "Grip it tightly," the boy said, taking the brass lamp. "I won't let the
    flame go out."

    He squeezed the lamp hard and rushed up the steps, his knuckles white, his
    shoulders tight. Halfway up he stumbled, the oil sloshed, and the little
    flame guttered and nearly died.

    The old priest caught his arm gently. "You are holding it as if it were
    yours to keep," he said. "But the lamp is not yours, and the flame is not
    yours. They belong to the shrine. Your task is only to carry them well."

    He took the lamp and showed the boy. He held it on an open palm, steady but
    loose, his arm relaxed, his eyes calm. "I am still carrying it," he said.
    "I have not put it down. I climb every step with care. But I am not
    clutching, and I am not thinking, 'When I reach the top, everyone will
    praise me, what a fine lamp-bearer he is.' I have let go of the clutching
    and let go of the reward. And see — the flame burns straight and tall."

    Up the stairs he went, the flame steady as a star, and the boy followed,
    open-handed now, breathing slowly.

    On the battlefield, Krishna told Arjuna the same secret. "Even the holiest
    work, Arjuna — sacrifice, giving, discipline — must still be done. I do not
    say put it down. But do it the way the priest carries the lamp: let go of
    your tight grip, let go of the prize you hope to win at the top of the
    stairs. Carry the work with an open hand. This is my highest and most
    settled conviction."

    The boy reached the shrine and set the lamp before the silent stone. The
    flame had never once gone out. And he understood that the secret had not
    been to stop carrying — only to stop squeezing.

reflection: "Can you think of a time you wanted something so badly that holding on too tight actually made it harder? What might it feel like to do your best while holding the result with an open hand?"
