chapter: 18
verse: 40
speaker: krishna

sanskrit: "न तदस्ति पृथिव्यां वा दिवि देवेषु वा पुनः। सत्त्वं प्रकृतिजैर्मुक्तं यदेभिः स्यात्त्रिभिर्गुणैः॥"

transliteration: "na tadasti pṛthivyāṁ vā divi deveṣu vā punaḥ | sattvaṁ prakṛtijairmuktaṁ yadebhiḥ syāttribhirguṇaiḥ ||"

