chapter: 18
verse: 1
speaker: arjuna

sanskrit: "संन्यासस्य महाबाहो तत्त्वमिच्छामि वेदितुम्। त्यागस्य च हृषीकेश पृथक्केशिनिषूदन॥"

transliteration: "saṁnyāsasya mahābāho tattvamicchāmi veditum | tyāgasya ca hṛṣīkeśa pṛthakkeśiniṣūdana ||"

dhatu_breakdown:
  - word: "संन्यासस्य"
    parts: ["sam (fully)", "ni (down)", "as (to throw, to cast)"]
    meaning: "of sannyāsa — the full giving up of selfish action"
  - word: "महाबाहो"
    parts: ["mahā (great)", "bāhu (arm)"]
    meaning: "O mighty-armed one — a name for Krishna"
  - word: "तत्त्वम्"
    parts: ["tat (that)", "tva (-ness)"]
    meaning: "the true nature, the real truth of a thing"
  - word: "इच्छामि"
    parts: ["iṣ (to wish, to desire)"]
    meaning: "I wish, I desire"
  - word: "वेदितुम्"
    parts: ["vid (to know)"]
    meaning: "to know, to understand"
  - word: "त्यागस्य"
    parts: ["tyaj (to let go, to give up)"]
    meaning: "of tyāga — the giving up of the fruits of action"
  - word: "च"
