chapter: 18
verse: 20

speaker: krishna

sanskrit: "सर्वभूतेषु येनैकं भावमव्ययमीक्षते। अविभक्तं विभक्तेषु तज्ज्ञानं विद्धि सात्त्विकम्॥"

transliteration: "sarvabhūteṣu yenaikaṁ bhāvamavyayamīkṣate | avibhaktaṁ vibhakteṣu tajjñānaṁ viddhi sāttvikam ||"

