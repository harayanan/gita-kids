chapter: 18
verse: 44
speaker: krishna

sanskrit: "कृषिगौरक्ष्यवाणिज्यं वैश्यकर्म स्वभावजम्। परिचर्यात्मकं कर्म शूद्रस्यापि स्वभावजम्॥"

transliteration: "kṛṣigaurakṣyavāṇijyaṁ vaiśyakarma svabhāvajam | paricaryātmakaṁ karma śūdrasyāpi svabhāvajam ||"

