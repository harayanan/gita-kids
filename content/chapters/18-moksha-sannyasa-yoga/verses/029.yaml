chapter: 18
verse: 29

speaker: krishna

sanskrit: "बुद्धेर्भेदं धृतेश्चैव गुणतस्त्रिविधं शृणु। प्रोच्यमानमशेषेण पृथक्त्वेन धनञ्जय॥"

transliteration: "buddherbhedaṁ dhṛteścaiva guṇatastrividhaṁ śṛṇu | procyamānamaśeṣeṇa pṛthaktvena dhanañjaya ||"

