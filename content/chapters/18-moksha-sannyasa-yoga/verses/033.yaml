    parts: ["sattva (purity, clarity, goodness)"]
    meaning: "sāttvic — clear, calm, and true"

meaning: >
  Krishna describes the best kind of firmness. "The dhṛti by which a person holds
  the mind, the breath, and the senses steady — through unwavering yoga, through
  practice that never strays off course — that firmness, O Arjuna, is sāttvic."
  It is not a tight, forced clinging but a quiet, even grip, the grip of someone
  who practises a little every day, so that mind and body settle and stay pointed
  in one steady direction.

story:
  title: "A Little Every Day"
  source: "modern"
  body: |
    Aarav decided he was going to learn to hold his breath underwater longer
    than anyone in his class. He sat at the edge of the Puri shore, puffed up his
    cheeks, and tried with all his might. His face went red. His shoulders shook.
    He lasted eight seconds and came up gasping and cross.

    "I'll never do it," he announced to Dadu. "Meera can do thirty. I tried so
    hard."

    Dadu was sitting cross-legged, perfectly still, the way he sat every single
    morning. "You tried hard once," he said. "That is not the same as trying
    steadily."

    "What's the difference?"

    Dadu picked up a small smooth stone and balanced it on the back of his quiet
    hand. The hand did not tremble. "Watch. I am not gripping the stone. I am not
    straining. I am only holding still. Straining tires you out in a minute.
    Holding steady can last all morning." He smiled. "I learned this hand the
    way I want you to learn your breath — not in one big burst, but in small,
    calm pieces, the same time each day."

    He laid out a plan, simple as rope. "Every morning, before the heat, you sit
    here with me. Three slow breaths. Then you hold once — only as long as is
    easy. Tomorrow, the same. The day after, the same. You do not yank at it. You
    do not skip a day because you feel lazy or because you feel like a champion.
    Same little practice, rain or shine."

    "That sounds too slow," Aarav grumbled.

    "Slow that never stops beats fast that gives up," said Dadu. "The mind is a
    restless fish, beta, and the breath is the line. You are not trying to drag
    the fish out by force. You are learning to hold the line gently, every day,
    until the fish grows calm and stays."

    Aarav was doubtful. But he came the next morning. And the next. He held his
    breath only as long as was easy and did not strain. Some mornings he did not
    feel like it; he came anyway, because Dadu said the not-skipping was the
    whole secret.

    Weeks later, almost without noticing, he came up from the water and Meera
    stared. "How long was that?"

    Aarav grinned. "I didn't even count. I just held steady."

reflection: "What is something you would like to get better at? Could you do a small bit of it every single day — even when you don't feel like it — instead of one giant try?"
