chapter: 18
verse: 33

speaker: krishna

sanskrit: "धृत्या यया धारयते मनःप्राणेन्द्रियक्रियाः। योगेनाव्यभिचारिण्या धृतिः सा पार्थ सात्त्विकी॥"

transliteration: "dhṛtyā yayā dhārayate manaḥprāṇendriyakriyāḥ | yogenāvyabhicāriṇyā dhṛtiḥ sā pārtha sāttvikī ||"

dhatu_breakdown:
  - word: "धृत्या"
    parts: ["dhṛ (to hold, to keep firm)"]
    meaning: "by firmness, by steady holding"
  - word: "यया"
    parts: ["yā (which)"]
    meaning: "by which"
  - word: "धारयते"
    parts: ["dhṛ (to hold, to support)"]
