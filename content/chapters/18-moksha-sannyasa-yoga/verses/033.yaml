    meaning: "through yoga — steady, joined practice"
  - word: "अव्यभिचारिण्या"
    parts: ["a (not)", "vi (apart)", "abhi (toward)", "car (to move, to stray)"]
    meaning: "unwavering, never straying off course"
  - word: "धृतिः"
    parts: ["dhṛ (to hold, to keep firm)"]
    meaning: "dhṛti — firmness, the inner grip that holds you steady"
  - word: "सा"
    parts: ["sā (that, she)"]
    meaning: "that one"
  - word: "पार्थ"
    parts: ["pṛthā (Pṛthā, Arjuna's mother Kuntī)"]
    meaning: "O son of Pṛthā — a name for Arjuna"
