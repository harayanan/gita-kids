chapter: 18
verse: 60

speaker: krishna

sanskrit: "स्वभावजेन कौन्तेय निबद्धः स्वेन कर्मणा। कर्तुं नेच्छसि यन्मोहात्करिष्यस्यवशोऽपि तत्॥"

transliteration: "svabhāvajena kaunteya nibaddhaḥ svena karmaṇā | kartuṁ necchasi yanmohātkariṣyasyavaśo'pi tat ||"

