chapter: 18
verse: 27

speaker: krishna

sanskrit: "रागी कर्मफलप्रेप्सुर्लुब्धो हिंसात्मकोऽशुचिः। हर्षशोकान्वितः कर्ता राजसः परिकीर्तितः॥"

transliteration: "rāgī karmaphalaprepsurlubdho hiṁsātmako'śuciḥ | harṣaśokānvitaḥ kartā rājasaḥ parikīrtitaḥ ||"

dhatu_breakdown:
  - word: "रागी"
    parts: ["rañj (to be coloured, to be attached)", "rāga (passion, craving)", "rāgin (full of passion)"]
    meaning: "full of craving, passionately attached"
  - word: "कर्मफलप्रेप्सुः"
    parts: ["kṛ (to do)", "karma (action)", "phala (fruit, result)", "pra (forth)", "āp (to obtain)", "epsu (eager to get)"]
    meaning: "greedy for the fruits of his actions, hungry for results"
  - word: "लुब्धः"
    parts: ["lubh (to be greedy, to covet)"]
    meaning: "greedy, grasping"
  - word: "हिंसात्मकः"
    parts: ["hiṁs (to harm, to injure)", "hiṁsā (harm)", "ātmaka (made of, by nature)"]
    meaning: "harmful by nature, ready to hurt others to get what he wants"
  - word: "अशुचिः"
    parts: ["a (not)", "śuci (pure, clean)"]
    meaning: "impure, not clean (inside and out)"
  - word: "हर्षशोकान्वितः"
    parts: ["hṛṣ (to be thrilled, to rejoice)", "harṣa (joy, elation)", "śuc (to grieve)", "śoka (sorrow)", "anvita (joined with)"]
    meaning: "tossed about by joy and grief, up one moment and down the next"
  - word: "कर्ता"
    parts: ["kṛ (to do)", "kartṛ (doer, agent)"]
    meaning: "the doer, the one who acts"
  - word: "राजसः"
    parts: ["rajas (passion, restlessness)"]
    meaning: "rajasic, of restless passion"
  - word: "परिकीर्तितः"
    parts: ["pari (around, fully)", "kīrt (to declare, to proclaim)"]
    meaning: "is declared to be, is described as"

meaning: >
  Krishna now describes the restless kind of doer. This is a person on
  fire with craving, always hungry for the rewards of what they do, greedy
  and grasping, willing to push or hurt others to get their way, unclean in
  habit, and forever bouncing between wild delight when things go well and
  deep gloom when they don't. Such a doer is described as rajasic — a doer
  of restless passion.

story:
  title: "The Gambler Prince"
  source: "mythological"
  body: |
    Among the many princes of the old kingdoms there was one named Subala,
    famous not for his battles but for his hunger. He hungered for winning —
    for prizes, for praise, for piles of gold — and the hunger never let him
    rest.

    When Subala set his heart on a thing, nothing else existed. He would
    enter a chariot race and think of nothing but the laurel at the end. If a
    rival's wheel ran close to his, Subala would crowd him toward the ditch,
    careless of who got hurt, so long as he, Subala, crossed first. "The
    prize is mine," he would mutter through clenched teeth. "Mine, mine."

    And when he won — oh, how he soared! He would leap and roar and feast for
    days, drunk on his own glory, certain he was the greatest man alive. The
    whole palace had to celebrate or feel his temper.

    But the wheel of fortune turns. One season Subala lost a great wager. In
    a single afternoon his joy curdled into black despair. He would not eat.
    He would not speak. He tore at his clothes and wept and swore the gods
    had cheated him, and his gloom hung over the palace like smoke. Where his
    joy had been wild, his grief was bottomless, and both came from the very
    same place: his desperate clinging to results.

    An old minister who had served three kings watched the prince swing from
    feast to fury and back again, year after year.

    "Look at him," the minister said quietly to a young attendant. "He is
    never simply himself. When he wins, he is too high to touch the ground.
    When he loses, he is too low to lift his head. He grasps at every prize
    as if his life depended on it, and so every prize and every loss owns
    him in turn. He is the busiest man in the kingdom, and the least free."

    "What does he lack, master?" asked the attendant.

    "Stillness," said the old man. "He has never once done a thing for the
    sake of doing it well. Only for the winning. And the winning, like the
    tide, always goes back out, and takes his peace with it every time."

reflection: "Think of a time you wanted to win so badly that losing felt awful and winning made you feel on top of the world. What is the difference between wanting to do something well and needing to win it?"
