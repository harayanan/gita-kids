chapter: 18
verse: 34

speaker: krishna

sanskrit: "यया तु धर्मकामार्थान्धृत्या धारयतेऽर्जुन। प्रसङ्गेन फलाकाङ्क्षी धृतिः सा पार्थ राजसी॥"

transliteration: "yayā tu dharmakāmārthāndhṛtyā dhārayate'rjuna | prasaṅgena phalākāṅkṣī dhṛtiḥ sā pārtha rājasī ||"

dhatu_breakdown:
  - word: "यया"
    parts: ["yā (which)"]
    meaning: "by which"
  - word: "तु"
    parts: ["tu (but, however)"]
    meaning: "but, on the other hand"
  - word: "धर्मकामार्थान्"
    parts: ["dhṛ (to uphold) → dharma (right living)", "kam (to desire) → kāma (pleasure)", "artha (wealth, gain)"]
    meaning: "duty, pleasure, and wealth — the three things people chase"
  - word: "धृत्या"
    parts: ["dhṛ (to hold, to keep firm)"]
    meaning: "by firmness, by steady holding"
