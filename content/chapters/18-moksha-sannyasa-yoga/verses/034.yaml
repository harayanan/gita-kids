  - word: "प्रसङ्गेन"
    parts: ["pra (forth)", "sañj (to cling, to attach)"]
    meaning: "with clinging attachment, hanging on tightly"
  - word: "फलाकाङ्क्षी"
    parts: ["phala (fruit, result)", "ā (toward)", "kāṅkṣ (to long for, to crave)"]
    meaning: "craving the fruit, always wanting the reward"
  - word: "धृतिः"
    parts: ["dhṛ (to hold, to keep firm)"]
    meaning: "dhṛti — firmness"
  - word: "सा"
    parts: ["sā (that, she)"]
    meaning: "that one"
  - word: "पार्थ"
    parts: ["pṛthā (Pṛthā, Arjuna's mother Kuntī)"]
    meaning: "O son of Pṛthā — a name for Arjuna"
  - word: "राजसी"
    parts: ["rajas (restlessness, passion, dust)"]
    meaning: "rājasic — restless and grasping"

meaning: >
  Krishna describes the second kind of firmness. "But the dhṛti with which a
  person clings tightly to duty, pleasure, and wealth — always craving their
  rewards, always hanging on — that firmness, O Arjuna, is rājasic." It really is
  a kind of holding-on; it can be strong and stubborn. But it grips for the
  sake of the prize. It keeps going only as long as it expects to get something
  back.

story:
  title: "The Charioteer Who Held the Reins Too Tight"
  source: "mythological"
  body: |
    Before he became Arjuna's teacher, the master archer Drona once trained a
    young charioteer named Sudeva, who had the strongest hands in the kingdom.
    Sudeva could hold a team of four wild horses through a storm. Nobody doubted
    his firmness.

    But there was a thing about Sudeva. He never raced for the joy of it, nor
    served for the love of his king. He held the reins so fiercely only because
    of what each victory brought him — the prize purse, the praise of the crowd,
    the gleaming gold cup raised over his head.

    One day Drona set two races. In the first, a great festival, gold and glory
    waited at the finish. Sudeva drove like a thunderbolt, gripping the reins
    until his knuckles whitened, and he won. The crowd roared his name. He stood
    taller than the temple.

    In the second race there was no prize — only an old, sick villager who needed
    to be carried swiftly to a healer in the next town. Drona asked Sudeva to
    drive.

    Sudeva's grip went slack. "There is nothing in it for me," he muttered. "No
    cup. No crowd." Halfway there he slowed, then stopped to rest his horses,
    then wandered off the road entirely, and the villager nearly did not make it.

    Drona watched, and his face was grave. He called Sudeva to him afterward.

    "Your hands are mighty," the teacher said. "But your firmness has a string
    tied to it, and the other end of that string is held by a prize. Pull the
    prize away, and your grip falls open. That is a restless firmness, my boy. It
    looks like strength, but it is really hunger wearing strength's armour."

    "Is wanting to win so wrong?" Sudeva asked.

    "Wanting is not the whole of it," said Drona. "The question is whether you can
    hold steady when there is nothing to win — when the only reward is that the
    right thing was done. A true firmness keeps its grip in both races. Learn to
    drive the second race as hard as the first, and then your hands will be worth
    their strength."

reflection: "Do you work just as hard at things when there is no prize or praise at the end? What is something worth doing well even when nobody is watching and nothing is given back?"
