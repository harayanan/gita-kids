chapter: 18
verse: 61

speaker: krishna

sanskrit: "ईश्वरः सर्वभूतानां हृद्देशेऽर्जुन तिष्ठति। भ्रामयन्सर्वभूतानि यन्त्रारूढानि मायया॥"

transliteration: "īśvaraḥ sarvabhūtānāṁ hṛddeśe'rjuna tiṣṭhati | bhrāmayansarvabhūtāni yantrārūḍhāni māyayā ||"

dhatu_breakdown:
  - word: "ईश्वरः"
    parts: ["īś (to rule, to own)", "īśvara (Lord, ruler)"]
    meaning: "the Lord, the divine ruler within"
  - word: "सर्वभूतानाम्"
    parts: ["sarva (all)", "bhū (to be, to become)", "bhūta (being, creature)"]
    meaning: "of all beings, of every creature"
  - word: "हृद्देशे"
    parts: ["hṛd (heart)", "diś (to point, to show)", "deśa (place, region)"]
    meaning: "in the region of the heart, in the heart-place"
  - word: "अर्जुन"
    parts: ["arjuna (bright, clear, silver-white)"]
    meaning: "O Arjuna"
  - word: "तिष्ठति"
    parts: ["sthā (to stand, to abide)"]
    meaning: "abides, dwells, stands"
  - word: "भ्रामयन्"
    parts: ["bhram (to whirl, to spin, to wander)"]
    meaning: "causing to turn, making them go round and round"
  - word: "सर्वभूतानि"
    parts: ["sarva (all)", "bhū (to be)", "bhūta (being)"]
    meaning: "all beings, all creatures"
  - word: "यन्त्रारूढानि"
    parts: ["yam (to hold, to control)", "yantra (machine, contrivance, wheel)", "ā (toward)", "ruh (to mount, to climb on)", "ārūḍha (mounted, seated upon)"]
    meaning: "as if mounted on a machine, set upon a turning wheel"
  - word: "मायया"
    parts: ["mā (to measure, to form)", "māyā (the wondrous power that shapes appearances)"]
    meaning: "by Maya, by His wondrous power that spins the world"

meaning: >
  Krishna shares a tender secret: the one Self, the Lord, dwells in the heart
  of every single being, yours and mine and every creature's, one and the same
  in all. What sets beings spinning round and round, as if fixed to a turning
  wheel, is Maya, the wondrous power that makes each of us feel like a small
  separate doer steering alone. But at the still centre of everyone is that one
  Self. To grow quiet and wake up to it as your own deepest being is to step off
  the spinning wheel into peace. You are never a separate speck alone: the centre
  of you is the centre of all.

story:
  title: "The Hand at the Centre of the Wheel"
  source: "original"
  body: |
    On the long Puri beach, Aarav and Dadu watched a fisherman's cart roll past,
    its big wooden wheels squeaking over the hard sand.

    "Dadu," Aarav said, "you keep telling me God is far away, high up somewhere.
    But then how does He know about me, one small boy on one small beach?"

    Dadu pointed at the cart wheel. "Watch the wheel. What turns it?"

    "The ox," said Aarav.

    "Look closer at the wheel itself. The outer rim goes whirling around — it
    sees the sand, the sky, the water, all rushing past. The spokes spin. But
    here —" Dadu drew a small circle in the air at the centre, "— at the very
    middle, there is a still point, the hub, and that is what holds everything
    and turns it. The rim cannot turn without the centre."

    Aarav watched the wheel until it disappeared down the beach.

    "God is not really far away at all, my boy," Dadu went on. "Look again at the
    hub. The rim goes whirling — that is the busy, spinning life, full of wanting
    and worrying. But the still centre that holds it all does not whirl. That
    stillness is what the Gita calls the Self, the Lord, and it is not a stranger
    sitting outside you. It is the quiet centre of that fisherman, and the ox, and
    the little crab in its hole, and you — one and the same stillness in every
    single one. The whirling makes us feel like separate little riders going round
    alone. But the centre was never separate."

    "All of them at the same time?" Aarav asked.

    "All of them, all the time, and none of them too small to notice." Dadu put
    his weathered hand flat against Aarav's chest. "So you are never one small
    boy alone on a beach. The same still centre that turns the stars is right
    here, at the heart of you — your own deepest self. You only have to grow
    quiet enough, now and then, to feel it."

    Aarav stood very still, and for a moment, in the squeak of the far-off cart
    and the slow roll of the waves, he thought he almost could.

reflection: "If a loving presence lives quietly at the centre of you — and of every person and creature around you — how might that change the way you treat the next living thing you meet today?"
