chapter: 18
verse: 68
speaker: krishna

sanskrit: "य इदं परमं गुह्यं मद्भक्तेष्वभिधास्यति। भक्तिं मयि परां कृत्वा मामेवैष्यत्यसंशयः॥"

transliteration: "ya idaṁ paramaṁ guhyaṁ madbhakteṣvabhidhāsyati | bhaktiṁ mayi parāṁ kṛtvā māmevaiṣyatyasaṁśayaḥ ||"

