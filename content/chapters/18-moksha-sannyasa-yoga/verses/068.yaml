meaning: >
  Now Krishna turns the secret around. If sharing it carelessly is wrong, then
  sharing it lovingly is one of the most beautiful things a person can do. The
  one who gives this teaching to others who love Krishna — and gives it with the
  highest love in their own heart — that person, Krishna says, will surely come
  to Him. No doubt about it. To pass on something true, with love, is itself a
  way home.

story:
  title: "The Lamp That Lit Others"
  source: "mythological"
  body: |
    On the night of the new moon, the little temple by the river stood in
    darkness. A single old woman came with one small clay lamp, its flame
    cupped against the wind.

    Long ago, a teacher had given her the secret teaching — the one Krishna
    called the most precious of all. She had carried it in her heart for
    fifty years. And every evening, she came to the temple and shared it,
    softly, with whoever came to love the Lord.

    Tonight a young man knelt at the back, lost and grieving. He had heard she
    knew something that gave people peace.

    The old woman did not lecture him. She simply sat beside him and, in a
    voice worn smooth by years of love, she told him the secret — gently, the
    way you hand someone a lit lamp. She told it not to seem wise, but because
    her heart overflowed with love for Krishna and could not help but spill.

    As she spoke, the young man's grief loosened. Something in him steadied,
    the way a boat steadies when it finds its anchor. When she finished, he
    had tears in his eyes — but they were good tears now.

    "How can I ever repay you?" he whispered.

    "You cannot," she smiled. "And you do not need to. The teaching was never
    mine to keep. It was given to me with love, so I give it with love. That
    is all."

    Later, walking home along the dark riverbank, she thought of something her
    own teacher had told her: that the one who shares this supreme secret with
    other lovers of the Lord — sharing it from the highest love, not for
    praise or reward — that one comes to the Lord without any doubt at all.

    She looked at her little clay lamp. It had lit a hundred other lamps over
    the years, and its own flame had never grown smaller. If anything, the
    whole riverbank glowed brighter for it.

    "That is how love works," she murmured to the night. "You give it away,
    and you find you are walking home." And the river carried her quiet words
    out toward the sea.

reflection: "Have you ever taught someone something kind or true that mattered to you? How did it feel to pass it on — did giving it make it smaller, or bigger?"
