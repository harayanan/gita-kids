    parts: ["kṛ (to do)", "karaṇa (instrument, means)"]
    meaning: "the instrument, the tool or means"
  - word: "कर्म"
    parts: ["kṛ (to do, to act)"]
    meaning: "the deed itself, the action done"
  - word: "कर्ता"
