chapter: 18
verse: 18

speaker: krishna

sanskrit: "ज्ञानं ज्ञेयं परिज्ञाता त्रिविधा कर्मचोदना। करणं कर्म कर्तेति त्रिविधः कर्मसंग्रहः॥"

transliteration: "jñānaṁ jñeyaṁ parijñātā trividhā karmacodanā | karaṇaṁ karma karteti trividhaḥ karmasaṅgrahaḥ ||"

dhatu_breakdown:
  - word: "ज्ञानम्"
    parts: ["jñā (to know)", "jñāna (knowledge)"]
    meaning: "knowledge, the act of knowing"
  - word: "ज्ञेयम्"
    parts: ["jñā (to know)"]
    meaning: "the known, the thing to be known"
  - word: "परिज्ञाता"
    parts: ["pari (around, fully)", "jñā (to know)"]
    meaning: "the knower, the one who knows fully"
  - word: "त्रिविधा"
