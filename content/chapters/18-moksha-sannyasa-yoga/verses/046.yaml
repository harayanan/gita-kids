meaning: >
  Krishna now reveals how ordinary work becomes the highest worship. The One
  from whom all living beings spring, the One who spreads through every corner
  of this whole world. A person can worship that very God simply by doing their
  own work well and offering it up. You do not need a special temple or a
  special day. Do your own honest work as a gift to the God who is everywhere,
  and through it you reach perfection.

story:
  title: "The Potter's Offering"
  source: "mythological"
  body: |
    In an old town there lived a potter named Kumbha, whose hands had shaped
    clay since he was a child. He was not rich. He could not give gold to the
    temple, nor travel to far holy rivers, nor sit all day in prayer, for his
    wheel had to turn or his family would not eat.

    This made Kumbha sad. "Everyone else seems to worship God," he said to a
    passing sage one evening. "The rich give jewels. The learned chant the
    scriptures. The pilgrims walk a thousand miles. And I? I only sit at my
    wheel and make pots all day long. I have nothing to offer."

    The sage sat down on the worn bench beside the potter's wheel. "Tell me,"
    he said, "where does the clay come from?"

    "From the earth," said Kumbha.

    "And the earth — where does it come from? And the water you mix in, and the
    fire that hardens the pots, and the very breath in your chest as you shape
    them?"

    Kumbha grew quiet. "From God, I suppose. From the One who made everything."

    "From the One," said the sage, "who is in everything. The clay is His. Your
    hands are His. The skill in your fingers is His gift. So when you sit at
    your wheel and shape an honest, beautiful pot — a pot that will hold a poor
    family's water, that will cool a thirsty traveller — what are you doing but
    giving God's gift back to God, made lovely by your care?"

    The sage rose. "Make your next pot," he said, "not for the coin, but as an
    offering. Lay your whole heart into the curve of it. That wheel is your
    altar. That clay is your flower. That is worship as true as any chant ever
    sung."

    Kumbha sat alone after the sage had gone. Then, slowly, he wet his hands and
    set the wheel spinning. As the clay rose between his palms, he whispered, "For
    You, who are in this clay and these hands and this turning world. For You."

    And something changed. The pot he shaped that night was the finest of his
    life, not because his skill had grown, but because his heart had. He
    understood, at last, that he had been standing in the temple all along. His
    work had always been his worship. He had only needed to remember whom it was
    for.

reflection: "If you imagined that everything you do — your schoolwork, your chores, your play — was a gift to something larger than yourself, would you do it any differently?"
