chapter: 18
verse: 53

speaker: krishna

sanskrit: "अहंकारं बलं दर्पं कामं क्रोधं परिग्रहम्। विमुच्य निर्ममः शान्तो ब्रह्मभूयाय कल्पते॥"

transliteration: "ahaṅkāraṁ balaṁ darpaṁ kāmaṁ krodhaṁ parigraham | vimucya nirmamaḥ śānto brahmabhūyāya kalpate ||"

dhatu_breakdown:
  - word: "अहंकारम्"
    parts: ["aham (I)", "kṛ (to do, to make)", "ahaṅkāra (the I-maker, ego)"]
    meaning: "egotism, the proud sense of 'I'"
  - word: "बलम्"
    parts: ["bal (to be strong)", "bala (force, strength)"]
    meaning: "force, bullying strength"
  - word: "दर्पम्"
    parts: ["dṛp (to be arrogant)", "darpa (pride, conceit)"]
    meaning: "arrogance, showing-off pride"
  - word: "कामम्"
    parts: ["kam (to desire)", "kāma (desire)"]
    meaning: "craving, greedy desire"
  - word: "क्रोधम्"
    parts: ["krudh (to be angry)", "krodha (anger)"]
    meaning: "anger"
  - word: "परिग्रहम्"
    parts: ["pari (around)", "grah (to grasp, to seize)"]
    meaning: "grasping, hoarding, clutching at possessions"
  - word: "विमुच्य"
    parts: ["vi (apart, away)", "muc (to release, to let go)"]
    meaning: "having let go of, having released"
  - word: "निर्ममः"
    parts: ["nir (without)", "mama (mine)"]
    meaning: "free of 'mine', without the grip of ownership"
  - word: "शान्तः"
    parts: ["śam (to be calm, to cease)", "śānta (peaceful)"]
    meaning: "peaceful, calm"
  - word: "ब्रह्मभूयाय"
    parts: ["bṛh (to grow, to expand)", "brahma (Brahman)", "bhū (to become)", "bhūya (becoming, the state of being)"]
    meaning: "for becoming one with Brahman"
  - word: "कल्पते"
    parts: ["kḷp (to be fit, to be ready)"]
    meaning: "becomes fit, becomes ready"

meaning: >
  Krishna names the last bundle of heavy things the sage lets go. He sets down
  egotism — the loud, puffed-up "I, me, mine." He drops force, the urge to push
  others around. He drops show-off pride, greedy craving, hot anger, and the habit
  of grabbing and hoarding. Free of all that, no longer saying "mine, mine" about
  everything, and grown deeply peaceful, such a person becomes ready — ripe and
  fit — to merge into Brahman, the great calm Spirit.

story:
  title: "The Sage Who Emptied His Bundle"
  source: "mythological"
  body: |
    There was once a wandering sage named Pippalada who came down from the
    mountains to cross the great plains and reach the holy river. On his back he
    carried an enormous bundle, lumpy and bulging, tied with many knots. It was so
    heavy that he stooped under it and could barely walk.

    At the first village, a child asked, "Holy one, what is in your big bundle?"

    Pippalada wiped his brow. "Ah," he sighed, "let me show you, for I have carried
    it so long I had almost forgotten." He untied the first knot and pulled out a
    great brass mirror. "This is my Ego — I stop at every pond to admire myself."
    He set it down by the road. "Take it, if anyone wants it. I am tired of it."

    He untied the next knot. Out came a heavy iron club. "This is Force — I used to
    shove and shout to get my way." He laid it down. Then a peacock-feather crown:
    "Arrogance — I loved to be praised." Down it went. Then a sticky pot of honey
    that he could never stop licking: "Craving — always wanting more." Down. Then a
    hissing coal he kept in a clay jar: "Anger — it burned my own hands most of
    all." He buried it in the sand. Then a tangle of ropes and locks and keys:
    "Grabbing and hoarding — clutching at things and calling them mine." He let the
    whole tangle fall.

    With each thing he set down, Pippalada stood up a little straighter. By the time
    the bundle was empty, he stood tall and easy, breathing the open air, smiling
    like a man twenty years younger.

    The child stared. "Now your bag is empty. Aren't you sad?"

    "Sad?" laughed Pippalada. "Child, I am free. A heart that says 'mine' about
    nothing has room for everything. A heart with no anger, no greed, no proud
    'I' is so quiet that the great Spirit can move through it like wind through an
    open door." He bowed to the child and walked on toward the river — light,
    peaceful, and at last truly ready for what waited at the end of the road.

reflection: "Imagine you had a bundle of heavy 'things' like anger, showing-off, or always wanting more. Which one would you most like to set down by the road and leave behind?"
