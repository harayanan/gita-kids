chapter: 18
verse: 35

speaker: krishna

sanskrit: "यया स्वप्नं भयं शोकं विषादं मदमेव च। न विमुञ्चति दुर्मेधा धृतिः सा पार्थ तामसी॥"

transliteration: "yayā svapnaṁ bhayaṁ śokaṁ viṣādaṁ madameva ca | na vimuñcati durmedhā dhṛtiḥ sā pārtha tāmasī ||"

