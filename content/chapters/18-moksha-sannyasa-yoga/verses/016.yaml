chapter: 18
verse: 16

speaker: krishna

sanskrit: "तत्रैवं सति कर्तारमात्मानं केवलं तु यः। पश्यत्यकृतबुद्धित्वान्न स पश्यति दुर्मतिः॥"

transliteration: "tatraivaṁ sati kartāramātmānaṁ kevalaṁ tu yaḥ | paśyatyakṛtabuddhitvānna sa paśyati durmatiḥ ||"

