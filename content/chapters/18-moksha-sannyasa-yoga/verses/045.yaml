meaning: >
  Krishna gives a wonderful promise. A person who loves and is devoted to their
  own work — whatever kind it is — reaches the very highest perfection. You do
  not need someone else's job to become great. You become great by pouring your
  whole heart into the work that is truly yours. "Listen," says Krishna, "and I
  will tell you how a person absorbed in their own work finds this perfection."

story:
  title: "Everyone Has Their Own Way"
  source: "original"
  body: |
    It was festival morning in Puri, and the whole town was awake before the
    sun. Aarav walked through the lanes with Dadu, and everywhere he looked,
    someone was busy.

    The flower-seller knelt over baskets of marigolds, threading them into long
    orange garlands with flying fingers. The drummer tightened the skin of his
    drum and tapped it, listening, until the sound was just right. A woman swept
    the temple steps with slow, careful strokes, making the worn stone shine. A
    boy not much older than Aarav carried trays of sweets, balancing them so
    perfectly that not one rolled off.

    "Dadu," said Aarav, "who is doing the most important job today?"

    Dadu stopped and looked around, as if seeing it all fresh. "The most
    important?" he said. "Watch closely, and tell me yourself."

    Aarav watched. He saw that without the flower-seller, the gods would have no
    garlands. Without the drummer, the procession would have no heartbeat.
    Without the woman with the broom, the worshippers would walk through dust.
    Without the sweet-seller, no child would taste joy at the end of the day.

    "I can't pick," Aarav admitted. "If even one of them stopped, something
    would be missing."

    "Now you see it," said Dadu. "The flower-seller is not trying to drum. The
    drummer is not trying to sweep. Each one has found the work that fits their
    own hands, and each one is doing it with their whole heart. And here is the
    secret, Aarav." He bent close. "Every single one of them can become great —
    truly great, all the way to the top — without ever once doing somebody
    else's job."

    Aarav frowned. "But how can sweeping steps make a person as great as, say, a
    famous warrior or a wise king?"

    "Because greatness is not in the job," said Dadu. "It is in the love you put
    into it. A king who rules carelessly is small. A sweeper who sweeps with a
    full and joyful heart is large. The work is just the door. Whoever walks
    through their own door with all their love walks all the way home."

    They moved on through the bright morning. Aarav looked at the busy town
    differently now. It was not a place of big jobs and small jobs. It was a
    place full of people, each devoted to their own work, each quietly walking
    toward the very same perfection, by their own road.

reflection: "What is something you love to do that might be different from what your friends love? How might pouring your whole heart into your own thing make you great at it?"
