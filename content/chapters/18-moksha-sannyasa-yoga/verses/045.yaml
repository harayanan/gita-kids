chapter: 18
verse: 45
speaker: krishna

sanskrit: "स्वे स्वे कर्मण्यभिरतः संसिद्धिं लभते नरः। स्वकर्मनिरतः सिद्धिं यथा विन्दति तच्छृणु॥"

transliteration: "sve sve karmaṇyabhirataḥ saṁsiddhiṁ labhate naraḥ | svakarmanirataḥ siddhiṁ yathā vindati tacchṛṇu ||"

