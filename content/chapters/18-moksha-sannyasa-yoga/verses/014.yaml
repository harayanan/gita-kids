chapter: 18
verse: 14

speaker: krishna

sanskrit: "अधिष्ठानं तथा कर्ता करणं च पृथग्विधम्। विविधाश्च पृथक्चेष्टा दैवं चैवात्र पञ्चमम्॥"

transliteration: "adhiṣṭhānaṁ tathā kartā karaṇaṁ ca pṛthagvidham | vividhāś ca pṛthakceṣṭā daivaṁ caivātra pañcamam ||"

