chapter: 18
verse: 38
speaker: krishna

sanskrit: "विषयेन्द्रियसंयोगाद्यत्तदग्रेऽमृतोपमम्। परिणामे विषमिव तत्सुखं राजसं स्मृतम्॥"

transliteration: "viṣayendriyasaṁyogādyattadagre'mṛtopamam | pariṇāme viṣamiva tatsukhaṁ rājasaṁ smṛtam ||"

