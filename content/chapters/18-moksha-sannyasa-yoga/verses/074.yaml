chapter: 18
verse: 74
speaker: sanjaya

sanskrit: "इत्यहं वासुदेवस्य पार्थस्य च महात्मनः। संवादमिममश्रौषमद्भुतं रोमहर्षणम्॥"

transliteration: "ityahaṁ vāsudevasya pārthasya ca mahātmanaḥ | saṁvādamimamaśrauṣamadbhutaṁ romaharṣaṇam ||"

dhatu_breakdown:
  - word: "इति"
    parts: ["iti (thus)"]
    meaning: "thus, in this way"
  - word: "अहम्"
    parts: ["aham (I)"]
    meaning: "I (Sanjaya)"
  - word: "वासुदेवस्य"
    parts: ["vasu (one who dwells)", "deva (shining one)"]
    meaning: "of Vāsudeva, the son of Vasudeva — a name for Krishna"
  - word: "पार्थस्य"
    parts: ["pṛthā (Pritha, Arjuna's mother)"]
    meaning: "of Pārtha, the son of Pritha — Arjuna"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"
  - word: "महात्मनः"
    parts: ["mahā (great)", "ātman (soul)"]
    meaning: "of the great-souled one"
  - word: "संवादम्"
    parts: ["sam (together)", "vad (to speak)"]
    meaning: "the conversation, the dialogue"
  - word: "इमम्"
    parts: ["idam (this)"]
    meaning: "this"
  - word: "अश्रौषम्"
    parts: ["śru (to hear)"]
    meaning: "I have heard"
  - word: "अद्भुतम्"
    parts: ["adbhuta (wonderful, marvellous)"]
    meaning: "wondrous, full of wonder"
  - word: "रोमहर्षणम्"
    parts: ["roma (hair of the body)", "harṣaṇa (causing to bristle, thrilling)"]
    meaning: "hair-raising, thrilling — that made my hair stand on end"

meaning: >
  Sanjaya, who has been watching the whole battlefield with a special inner
  sight given to him, finally speaks his own heart. "This," he tells the blind
  king Dhritarashtra, "is the conversation I have heard — the talk between
  Krishna and the great-souled Arjuna. It was so wonderful that as I listened,
  every hair on my body stood up with awe." After all the teaching, this is a
  witness telling us how it felt to be there.

story:
  title: "The Listener at the King's Side"
  source: "mythological"
  body: |
    In the palace at Hastinapura, far from the dust of Kurukshetra, an old
    king sat very still. Dhritarashtra was blind, and had been since birth.
    He could not see the great army gathered on the plain, nor his hundred
    sons standing ready for war. He could only wait, and listen.

    Beside him sat Sanjaya, his trusted charioteer and adviser. The sage
    Vyasa had given Sanjaya a marvellous gift: from this quiet room, Sanjaya
    could see and hear everything happening on the distant battlefield, as
    clearly as if he stood upon Krishna's own chariot.

    For a long while Sanjaya had reported the gathering of the armies, the
    blowing of the conches, the rolling forward of the chariots. But then
    something unexpected had happened. Instead of the battle beginning, two
    figures had begun to speak — Krishna, holding the reins, and Arjuna, who
    had let his great bow slip from his hands.

    And Sanjaya had listened.

    He had heard Arjuna's fear and grief. He had heard Krishna answer, word
    after word, opening up the deepest secrets of life and death, of the soul
    that never dies, of duty done without grasping, of love that carries a
    person all the way home. Sanjaya had heard things no one in that palace
    had ever heard before.

    Now the dialogue was over. Arjuna had taken up his bow again, his doubts
    gone. And Sanjaya found he could not simply go back to reporting troop
    movements. His heart was too full.

    He turned toward the blind king. His voice was not steady; it shook a
    little, the way a voice does when something too large has just passed
    through it.

    "O King," he said, "I have heard it. The whole of it. This wonderful
    conversation between Krishna and the noble Arjuna — I heard every word.
    And as I listened, I felt my whole body tremble. The hair on my arms
    stood straight up. I have heard many things in my years, but never
    anything like this."

    Dhritarashtra said nothing. But in the dim room, the old king tilted his
    sightless face toward Sanjaya, as if straining to catch the wonder his
    servant had just touched.

reflection: "Have you ever heard or read something so amazing that it gave you goosebumps? What was it, and why did it move you so much?"
