meaning: >
  Now Krishna steps in to settle the argument. He says: "O best of the
  Bharatas, listen carefully to my own firm verdict about tyāga, the giving
  up of the fruits of action. O tiger among men, hear this — tyāga itself is
  not a single thing. It comes in three kinds, and I will show them all to
  you clearly." He promises Arjuna a real answer, not just more debate.

story:
  title: "The Teacher Settles the Court"
  source: "mythological"
  body: |
    In the old stories, when the sages of the forest could not agree, they
    would carry their question to the wisest among them and let that one
    speak the final word. The arguing would stop, the staffs would rest, and
    everyone would lean in to listen.

    On the battlefield of Kurukshetra, the chariot had become just such a
    court — but with only one student and one teacher. Arjuna had heard that
    even great sages quarrelled over whether action should be given up. Now he
    waited, his head tilted, for Krishna to be the wise one who speaks last.

    Krishna did not raise his voice. He spoke the way a king speaks when he
    finally rises from his throne and the whole hall falls silent.

    "Best of the Bharatas," he said, "you have heard the two sides. Now hear
    mine. I will give you my own settled conclusion — not a guess, not one
    opinion among many, but the truth as I have decided it. Listen well."

    Arjuna sat up. There is a special kind of attention a student gives when
    a teacher says, *now I will tell you what is really so.*

    "Tyāga," Krishna went on, "the giving up of the fruits of what we do — it
    is not a single, simple thing, as you might suppose. People imagine that
    'letting go' is always the same act. It is not. There are three kinds of
    letting go, O tiger among men. Three. One of them is muddled by darkness.
    One of them is driven by fear. And only one of them is true and clear. If
    you cannot tell them apart, you may think you are letting go when you are
    only running away."

    A hush settled over the chariot. The horses stood without stamping. Even
    the distant noise of the two armies seemed to draw back, as if to let the
    teaching through.

    "So count with me," said Krishna, almost gently. "Three kinds of tyāga.
    I will hold each one up to the light, one after another, and you will see
    which is real gold and which is only painted to look like it."

    And Arjuna, who had asked to have two words taken apart, now found himself
    promised three — and was glad, for he could feel the answer coming, the way
    a traveller feels the cool air just before the river comes into view.

reflection: "When someone promises to explain something properly, how does it feel to wait and listen? Why is a careful answer often worth more than a quick one?"
