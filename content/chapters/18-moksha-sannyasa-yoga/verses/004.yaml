chapter: 18
verse: 4
speaker: krishna

sanskrit: "निश्चयं शृणु मे तत्र त्यागे भरतसत्तम। त्यागो हि पुरुषव्याघ्र त्रिविधः सम्प्रकीर्तितः॥"

transliteration: "niścayaṁ śṛṇu me tatra tyāge bharatasattama | tyāgo hi puruṣavyāghra trividhaḥ samprakīrtitaḥ ||"

