chapter: 18
verse: 17

speaker: krishna

sanskrit: "यस्य नाहंकृतो भावो बुद्धिर्यस्य न लिप्यते। हत्वापि स इमाँल्लोकान्न हन्ति न निबध्यते॥"

transliteration: "yasya nāhaṅkṛto bhāvo buddhiryasya na lipyate | hatvāpi sa imāṁllokānna hanti na nibadhyate ||"

