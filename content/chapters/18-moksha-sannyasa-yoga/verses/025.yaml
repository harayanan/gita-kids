chapter: 18
verse: 25

speaker: krishna

sanskrit: "अनुबन्धं क्षयं हिंसामनवेक्ष्य च पौरुषम्। मोहादारभ्यते कर्म यत्तत्तामसमुच्यते॥"

transliteration: "anubandhaṁ kṣayaṁ hiṁsāmanavekṣya ca pauruṣam | mohādārabhyate karma yattattāmasamucyate ||"

dhatu_breakdown:
  - word: "अनुबन्धम्"
    parts: ["anu (after, along)", "bandh (to bind)"]
    meaning: "the consequence, what comes after, the binding result"
  - word: "क्षयम्"
    parts: ["kṣi (to waste away, to destroy)"]
    meaning: "loss, ruin, waste"
  - word: "हिंसाम्"
    parts: ["hiṁs (to harm, to injure)"]
    meaning: "harm, injury done to others"
  - word: "अनवेक्ष्य"
    parts: ["an (not)", "ava (down)", "īkṣ (to see, to look)"]
    meaning: "without looking at, without considering"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"
  - word: "पौरुषम्"
    parts: ["puruṣa (person, man)", "pauruṣa (one's own power, capacity)"]
    meaning: "one's own ability, what one is actually able to do"
  - word: "मोहात्"
    parts: ["muh (to be confused, to be deluded)", "moha (delusion)"]
    meaning: "out of delusion, from a confused mind"
  - word: "आरभ्यते"
    parts: ["ā (toward)", "rabh (to begin, to undertake)"]
    meaning: "is begun, is undertaken"
  - word: "कर्म"
    parts: ["kṛ (to do)"]
    meaning: "action, deed"
  - word: "यत्"
    parts: ["yad (which)"]
    meaning: "which"
  - word: "तत्"
    parts: ["tad (that)"]
    meaning: "that"
  - word: "तामसम्"
    parts: ["tamas (darkness, dullness)"]
    meaning: "tamasic, born of darkness"
  - word: "उच्यते"
    parts: ["vac (to speak)"]
    meaning: "is called, is said to be"

meaning: >
  Krishna describes the most reckless kind of action. It is the work
  someone rushes into out of pure confusion, never stopping to think what
  will come of it, how much will be wasted or ruined, who might be hurt, or
  whether they can even manage it at all. Action begun blindly like that,
  in delusion, is called tamasic, action born of darkness.

story:
  title: "The Demon Who Forgot to Think"
  source: "mythological"
  body: |
    The demon Bhasmasura was hungry for power, and he was not a patient
    creature. He performed harsh penances until the great god Shiva appeared
    before him, pleased.

    "Ask for a boon," said Shiva.

    Now, a wiser being might have paused. He might have thought about what he
    truly needed, or what such a gift might cost, or whether he could be
    trusted with it. But Bhasmasura's mind was a fog of greed and confusion.
    He blurted out the first enormous thing that came to him.

    "Grant me this," he said. "Let any head I place my hand upon instantly
    burn to ashes!"

    He never once considered the consequence. He never thought of the harm
    such a power would unleash, or the ruin it would bring, or whether his
    own clouded mind could handle it. He saw only the shiny prize and
    grabbed it.

    Shiva, bound by his word, granted the terrible boon.

    And then Bhasmasura did the most foolish thing of all. The very moment
    he had the power, a wild thought seized his fogged brain: "Why not test
    it on Shiva himself? Then I shall be the mightiest of all!" Without a
    second of thought for who had just helped him, he lunged, hand
    outstretched, to burn the very god who had given him the gift.

    Shiva fled, and the deluded demon chased him across the world, never
    stopping to ask where this mad race could possibly end.

    It ended the only way blind action can. Lord Vishnu appeared in the form
    of the beautiful Mohini and challenged the demon to copy her graceful
    dance. Lost in his own foolishness, Bhasmasura imitated every move — and
    when Mohini placed her hand upon her own head, the demon, mindlessly
    copying, placed his hand upon his.

    He turned, in an instant, to a small heap of ash.

    He had been given the power to destroy anyone, and the only one he had
    failed to consider — the consequence, the harm, his own foolishness —
    destroyed him. That is what happens, the sages say, when action begins
    in darkness, with the eyes of the mind shut tight.

reflection: "Have you ever rushed into something exciting without thinking about what might happen next? What is one question you could ask yourself before you begin, to keep from making a Bhasmasura-sized mistake?"
