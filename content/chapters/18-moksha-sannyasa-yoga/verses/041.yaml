chapter: 18
verse: 41
speaker: krishna

sanskrit: "ब्राह्मणक्षत्रियविशां शूद्राणां च परन्तप। कर्माणि प्रविभक्तानि स्वभावप्रभवैर्गुणैः॥"

transliteration: "brāhmaṇakṣatriyaviśāṁ śūdrāṇāṁ ca parantapa | karmāṇi pravibhaktāni svabhāvaprabhavairguṇaiḥ ||"

