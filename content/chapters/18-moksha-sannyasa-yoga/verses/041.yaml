    parts: ["brāhmaṇa (one devoted to sacred knowledge)", "kṣatriya (warrior, protector)", "viś (the merchant-farmer folk)"]
    meaning: "of the brāhmaṇas, the kṣatriyas, and the vaiśyas"
  - word: "शूद्राणाम्"
    parts: ["śūdra (one who serves)"]
    meaning: "of the śūdras, those who serve"
  - word: "च"
