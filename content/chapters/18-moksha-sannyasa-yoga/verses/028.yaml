chapter: 18
verse: 28

speaker: krishna

sanskrit: "अयुक्तः प्राकृतः स्तब्धः शठो नैष्कृतिकोऽलसः। विषादी दीर्घसूत्री च कर्ता तामस उच्यते॥"

transliteration: "ayuktaḥ prākṛtaḥ stabdhaḥ śaṭho naiṣkṛtiko'lasaḥ | viṣādī dīrghasūtrī ca kartā tāmasa ucyate ||"

