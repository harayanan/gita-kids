chapter: 18
verse: 56

speaker: krishna

sanskrit: "सर्वकर्माण्यपि सदा कुर्वाणो मद्व्यपाश्रयः। मत्प्रसादादवाप्नोति शाश्वतं पदमव्ययम्॥"

transliteration: "sarvakarmāṇyapi sadā kurvāṇo madvyapāśrayaḥ | matprasādādavāpnoti śāśvataṁ padamavyayam ||"

dhatu_breakdown:
  - word: "सर्वकर्माणि"
    parts: ["sarva (all)", "kṛ (to do, to act)", "karma (action, work)"]
    meaning: "all actions, every kind of work"
  - word: "अपि"
    parts: ["api (even, also)"]
    meaning: "even, also"
  - word: "सदा"
    parts: ["sadā (always)"]
    meaning: "always, at all times"
  - word: "कुर्वाणः"
    parts: ["kṛ (to do, to act)"]
    meaning: "doing, performing"
  - word: "मद्व्यपाश्रयः"
    parts: ["mad (My, Me)", "vi (apart)", "apa (away)", "ā (toward)", "śri (to take shelter)", "vyapāśraya (taking full refuge)"]
    meaning: "taking complete refuge in Me, leaning wholly on Me"
  - word: "मत्प्रसादात्"
    parts: ["mad (My)", "pra (forth)", "sad (to settle, to be gracious)", "prasāda (grace, kindness)"]
    meaning: "by My grace, through My kindness"
  - word: "अवाप्नोति"
    parts: ["ava (down, fully)", "āp (to reach, to attain)"]
    meaning: "attains, reaches"
  - word: "शाश्वतम्"
    parts: ["śaśvat (perpetual, everlasting)", "śāśvata (eternal)"]
    meaning: "eternal, everlasting"
  - word: "पदम्"
    parts: ["pad (to go, to step)", "pada (step, place, abode)"]
    meaning: "the abode, the resting-place, the goal"
  - word: "अव्ययम्"
    parts: ["a (not)", "vi (apart)", "i (to go, to perish)", "avyaya (imperishable)"]
    meaning: "changeless, undying, never wearing away"

meaning: >
  Krishna gives the gentlest news of all. You do not have to flee the world or
  stop all your work to reach the highest goal. Even while doing all your
  actions, all day, every day, you can lean your whole weight on Krishna — taking
  refuge in him the way a child rests against a parent. Do your work, but trust in
  him completely. And then, by his grace — not by your strength alone — you reach
  the eternal, changeless home, the resting-place that never fades or wears away.

story:
  title: "The Boatman Who Carried Him Home"
  source: "mythological"
  body: |
    Devala had touched the great Spirit and entered the sea of the Lord's love.
    But before Uddhava finished his teaching, the old sage wanted to give Devala one
    last picture to carry with him for the rest of his days.

    They walked together to the wide river at evening, where a ferryman waited
    beside his boat to carry travellers to the far shore — the shore of home.

    "Watch the travellers," said Uddhava.

    The first traveller refused the boat. "I will swim across by my own strength,"
    he boasted, and threw himself into the current. The river was vast and tireless,
    and soon he was struggling, far from both shores.

    The second traveller stepped into the boat but could not stop fretting. He
    grabbed an oar, then dropped it; he leaned this way and that, sure he must do
    everything himself. He wore himself out and never noticed the boatman at all.

    The third traveller was an old woman with a basket of work — mending, weaving,
    a meal to cook for her grandchildren. She climbed calmly into the boat and kept
    right on with her tasks, her fingers busy the whole way across. But all the
    while, she trusted the ferryman completely. She did her work; he did the
    carrying. And so, without strain or fear, she was brought safe and gentle to the
    far shore — to home.

    "There," said Uddhava. "You need not stop your work and leap into the river
    alone. Keep doing all your tasks, every day, the way that old woman kept
    weaving. But lean your whole weight on the Boatman. Take refuge in the Lord. Do
    your part, and trust him for the crossing."

    Devala watched the old woman step out onto the home shore, smiling, her basket
    full.

    "It is His grace that carries us across," said the sage. "Not the splashing of
    our own arms. Work with all your heart — and trust him all the way to the
    eternal home that never fades."

reflection: "When you have a job to do but someone you trust is helping you, you can work calmly without worrying. Who is someone you trust so much that you feel safe even when things are hard?"
