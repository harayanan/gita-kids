chapter: 18
verse: 75
speaker: sanjaya

sanskrit: "व्यासप्रसादाच्छ्रुतवानेतद्गुह्यमहं परम्। योगं योगेश्वरात्कृष्णात्साक्षात्कथयतः स्वयम्॥"

transliteration: "vyāsaprasādācchrutavānetadguhyamahaṁ param | yogaṁ yogeśvarātkṛṣṇātsākṣātkathayataḥ svayam ||"

