chapter: 18
verse: 2
speaker: krishna

sanskrit: "काम्यानां कर्मणां न्यासं संन्यासं कवयो विदुः। सर्वकर्मफलत्यागं प्राहुस्त्यागं विचक्षणाः॥"

transliteration: "kāmyānāṁ karmaṇāṁ nyāsaṁ saṁnyāsaṁ kavayo viduḥ | sarvakarmaphalatyāgaṁ prāhustyāgaṁ vicakṣaṇāḥ ||"

dhatu_breakdown:
  - word: "काम्यानाम्"
    parts: ["kam (to desire)"]
    meaning: "of actions done out of desire, done to get something"
  - word: "कर्मणाम्"
    parts: ["kṛ (to do, to act)"]
    meaning: "of actions, of deeds"
  - word: "न्यासम्"
    parts: ["ni (down)", "as (to throw, to cast)"]
    meaning: "the casting away, the laying down"
  - word: "संन्यासम्"
    parts: ["sam (fully)", "ni (down)", "as (to throw, to cast)"]
    meaning: "sannyāsa — full renunciation"
  - word: "कवयः"
    parts: ["kavi (seer, wise poet)"]
    meaning: "the seers, the wise ones"
  - word: "विदुः"
    parts: ["vid (to know)"]
    meaning: "they know, they understand"
  - word: "सर्वकर्मफलत्यागम्"
    parts: ["sarva (all)", "karma (action)", "phala (fruit, result)", "tyaj (to let go, to give up)"]
    meaning: "the giving up of the fruits of all actions"
  - word: "प्राहुः"
    parts: ["pra (forth)", "ah (to say, to declare)"]
    meaning: "they call it, they declare it to be"
  - word: "त्यागम्"
    parts: ["tyaj (to let go, to give up)"]
    meaning: "tyāga — relinquishment"
  - word: "विचक्षणाः"
    parts: ["vi (apart, clearly)", "cakṣ (to see, to perceive)"]
    meaning: "the clear-seeing ones, those of keen sight"

meaning: >
  Krishna takes the two words apart, just as Arjuna asked. He says: "The wise
  seers tell us that sannyāsa means letting go of all actions that you do
  only to get something for yourself — actions driven by craving. And the
  clear-seeing ones say that tyāga means something a little different: it
  means doing your actions, but giving up your grip on the rewards. You still
  act — you simply stop clinging to what the action will bring you."

story:
  title: "The Potter and His Two Lessons"
  source: "mythological"
  body: |
    In a town beside a slow brown river there once lived a master potter
    named Kumbhaka, and to his workshop came two young students on the same
    morning, each eager to learn.

    Kumbhaka set them down on the cool clay floor. "Before you ever touch the
    wheel," he said, "you must understand two ways of letting go. The seers of
    old knew them both."

    He held up one finger. "The first is this. Some people make pots only to
    grow rich. Every lump of clay is a coin to them; every jar is a sack of
    grain. Their hearts are full of wanting before their hands are even dirty.
    To put down that grasping kind of work — the work you do only to feed your
    own hunger — the wise ones call sannyāsa, the full setting-aside of selfish
    doing."

    The two students nodded slowly.

    Kumbhaka held up a second finger. "But the clear-seeing ones speak of
    another letting go, and it is subtler. Watch." He took a wet handful of
    clay and centred it on the wheel. With his foot he set the wheel spinning,
    and his thumbs sank into the turning earth, and a graceful bowl rose up as
    if by magic.

    "I am working," he said, not lifting his eyes. "My hands are busy. I have
    not put the work down at all. And yet — I am not thinking about whether
    this bowl will sell, or who will praise it, or what it will buy me. I make
    it well because making it well is right. The result I leave to the world.
    That," he said, lifting the finished bowl gently free, "is tyāga — the
    giving up not of the work, but of the grasping after its fruit."

    The wheel slowed and stopped.

    "Remember the two," said the old potter. "Sannyāsa lets go of selfish
    doing. Tyāga keeps the doing, and lets go only of the hungry hand that
    waits at the end for its reward. One empties the deed. The other empties
    the heart of greed while the deed goes on."

    The students looked at the bowl on the floor, perfect and unclaimed, and
    began, just a little, to understand.

reflection: "Think of something you do — homework, a chore, helping a friend. Can you do it well without worrying the whole time about what you'll get for it? How would that feel different?"
