chapter: 18
verse: 58

speaker: krishna

sanskrit: "मच्चित्तः सर्वदुर्गाणि मत्प्रसादात्तरिष्यसि। अथ चेत्त्वमहंकारान्न श्रोष्यसि विनङ्क्ष्यसि॥"

transliteration: "maccittaḥ sarvadurgāṇi matprasādāttariṣyasi | atha cettvamahaṁkārānna śroṣyasi vinaṅkṣyasi ||"

dhatu_breakdown:
