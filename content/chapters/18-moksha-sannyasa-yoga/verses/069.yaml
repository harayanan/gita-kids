chapter: 18
verse: 69
speaker: krishna

sanskrit: "न च तस्मान्मनुष्येषु कश्चिन्मे प्रियकृत्तमः। भविता न च मे तस्मादन्यः प्रियतरो भुवि॥"

transliteration: "na ca tasmānmanuṣyeṣu kaścinme priyakṛttamaḥ | bhavitā na ca me tasmādanyaḥ priyataro bhuvi ||"

dhatu_breakdown:
  - word: "न"
    parts: ["na (not)"]
    meaning: "not, no one"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"
  - word: "तस्मात्"
    parts: ["tad (that, him)"]
    meaning: "than that one, than him"
  - word: "मनुष्येषु"
    parts: ["manuṣya (human being, person)"]
    meaning: "among people, among human beings"
  - word: "कश्चित्"
    parts: ["kim (who)", "cit (any)"]
    meaning: "anyone, any single person"
  - word: "मे"
    parts: ["mad (My, to Me)"]
    meaning: "to Me, of Mine"
  - word: "प्रियकृत्तमः"
    parts: ["prī (to love, to please)", "kṛ (to do, to make)", "tama (most)"]
    meaning: "one who does the most that is dear to Me"
  - word: "भविता"
    parts: ["bhū (to be, to become)"]
    meaning: "will there be, will come to be"
  - word: "तस्मात्"
    parts: ["tad (that, him)"]
    meaning: "than that one, than him"
  - word: "अन्यः"
    parts: ["anya (other)"]
    meaning: "another, any other"
  - word: "प्रियतरः"
    parts: ["prī (to love, to please)", "tara (more)"]
    meaning: "dearer, more beloved"
  - word: "भुवि"
    parts: ["bhū (to be, the earth)"]
    meaning: "on the earth, in this world"

meaning: >
  Krishna says something astonishing about the person who lovingly shares this
  teaching with others: no one among all people does anything dearer to Him than
  that — and no one on the whole earth will ever be more beloved to Him. Of all
  the ways to please the one you love, helping others find their way to Him is
  the very dearest. Sharing love, Krishna says, makes you the most loved of all.

story:
  title: "Dearest of All"
  source: "mythological"
  body: |
    There was once a poor cowherd named Sudama — not the famous one, but a
    quiet man with cracked feet and a kind face — who loved Krishna with his
    whole heart and had almost nothing else.

    He owned no temple to build, no gold to give, no great deeds to offer. But
    he knew the teaching, the precious one, and he had a gift for telling it
    so that children understood. So every evening, under the old banyan tree,
    he gathered the village young ones and the tired farmers and told them,
    in simple words full of love, how the Lord lives in every heart and asks
    only that we turn toward Him.

    One night, troubled, Sudama looked up at the stars and spoke to Krishna in
    his thoughts. "Lord, I am nobody. The kings give You jewelled crowns. The
    priests give You rivers of milk and rice. The sages give You years of
    fierce penance. What can a barefoot cowherd give You that would matter at
    all?"

    And in the deep quiet of his own heart, he felt an answer rise, warm as
    sunlight.

    "You give Me the dearest thing of all," it seemed to say. "When you take
    My teaching and gently place it in another heart, when you help even one
    frightened person find their way home to Me — there is no one among all
    people who does anything dearer to Me than that. The crowns and the milk
    and the penance are sweet. But you, Sudama, you carry My love to others.
    And so there will never be anyone on this whole earth more beloved to Me
    than you."

    Sudama wept under the stars, not from sorrow but from a joy too large for
    his small chest. He had thought himself the least of the Lord's people.

    The next evening he went back to the banyan tree, and the children came
    running, and he told the old true story once more. But now his voice
    trembled with a new sweetness — for he knew, at last, that in giving love
    away, he had become the dearest of all.

reflection: "What is something you could give to the people you love that doesn't cost any money at all? Why do you think kindness shared can be the most precious gift?"
