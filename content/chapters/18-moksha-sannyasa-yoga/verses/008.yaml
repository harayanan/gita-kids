chapter: 18
verse: 8
speaker: krishna

sanskrit: "दुःखमित्येव यत्कर्म कायक्लेशभयात्त्यजेत्। स कृत्वा राजसं त्यागं नैव त्यागफलं लभेत्॥"

transliteration: "duḥkham ity eva yat karma kāyakleśabhayāt tyajet | sa kṛtvā rājasaṁ tyāgaṁ naiva tyāgaphalaṁ labhet ||"

dhatu_breakdown:
  - word: "दुःखम्"
    parts: ["dus (bad, hard)", "kha (space, feeling)"]
    meaning: "painful, troublesome, hard"
  - word: "इति"
    parts: ["iti (thus, so saying)"]
    meaning: "thinking 'this is...'"
  - word: "एव"
    parts: ["eva (just, only)"]
    meaning: "merely, simply"
  - word: "यत्"
    parts: ["yad (which)"]
    meaning: "which, whatever"
  - word: "कर्म"
    parts: ["kṛ (to do, to act)"]
    meaning: "action, work, duty"
  - word: "कायक्लेशभयात्"
    parts: ["kāya (body)", "kliś (to trouble) — kleśa (hardship, strain)", "bhī (to fear) — bhaya (fear)"]
    meaning: "out of fear of bodily hardship"
  - word: "त्यजेत्"
    parts: ["tyaj (to give up, to abandon)"]
    meaning: "should give up, abandons"
  - word: "सः"
    parts: ["tad (he, that one)"]
    meaning: "he, that person"
  - word: "कृत्वा"
    parts: ["kṛ (to do, to make)"]
    meaning: "having done, having made"
  - word: "राजसम्"
    parts: ["rajas (the restless quality, passion)"]
    meaning: "rajasic, of the restless kind"
  - word: "त्यागम्"
    parts: ["tyaj (to give up) — tyāga (letting go, relinquishment)"]
    meaning: "a letting-go, a giving-up"
  - word: "न"
    parts: ["na (not)"]
    meaning: "not"
  - word: "त्यागफलम्"
    parts: ["tyāga (renunciation, giving up)", "phal (to bear fruit) — phala (fruit, reward)"]
    meaning: "the fruit of renunciation"
  - word: "लभेत्"
    parts: ["labh (to obtain, to gain)"]
    meaning: "would gain, obtains"

meaning: >
  Suppose someone drops their duty just because it is hard — "this is too much
  trouble, my body will ache, I might get hurt." Krishna says that is the
  restless, rajasic kind of giving-up. It looks like letting go, but it is
  really just running away from effort. And so it earns nothing. The person who
  quits out of fear of hard work never tastes the real reward that true letting
  go can bring.

story:
  title: "The Half-Built Wall"
  source: "puranas"
  body: |
    Long ago, on the edge of a great forest, a king asked two young
    students of the sage Gautama to build a stone wall around the
    hermitage. Tigers had been seen near the cows at night, and a wall
    would keep the sacred herd safe.

    The first student, Vidur, rolled up his sleeves at sunrise. The
    stones were heavy and the morning grew hot. His palms blistered. His
    back ached. By noon, sweat ran down his face like rain.

    The second student, Shubha, lifted three stones, felt the burn in his
    arms, and stopped. "This is too hard," he said. "My hands hurt. My
    shoulders are on fire. Why should I suffer like this?" He sat in the
    shade and watched a kingfisher dart over the river, telling himself he
    had wisely "let go" of a troublesome task.

    Vidur worked on. Stone by stone, the wall rose. When the sun went
    down, half the wall stood firm and strong, and he slept like a stone
    himself, tired but light inside.

    Shubha slept poorly. He kept thinking, "I gave up the work — so I
    should feel free now." But he felt no freedom at all. Only a small,
    nagging shame, like a pebble in his sandal.

    The next morning the sage Gautama walked the grounds. He ran his hand
    along Vidur's wall and smiled. Then he looked at Shubha's empty patch
    of ground and the pile of untouched stones.

    "Shubha," the sage said gently, "you thought you let go of the work.
    But tell me — do you feel any of the peace that letting-go is supposed
    to bring?"

    Shubha looked down. "No, Gurudev. I only feel restless and small."

    "That is because you did not let go of anything worthy," said Gautama.
    "You only ran from a sore back. To drop your duty because it is hard
    is not renunciation — it is fear wearing renunciation's clothes. The
    true reward, the quiet heart, comes to the one who does the hard thing
    fully, and then offers it up. Fear gives up the work but keeps the
    weight. Wisdom does the work and sets the weight down."

    Shubha picked up a stone. It was heavy, and his hands still hurt. But
    this time he held on. By dusk, the second half of the wall was rising,
    and for the first time he felt the small, clean peace he had been
    chasing all along.

reflection: "Have you ever quit something just because it was hard or tiring, and then felt restless instead of free? What is one hard thing you could finish today instead of dropping?"
