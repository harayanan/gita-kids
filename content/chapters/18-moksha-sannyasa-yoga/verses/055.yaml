chapter: 18
verse: 55

speaker: krishna

sanskrit: "भक्त्या मामभिजानाति यावान्यश्चास्मि तत्त्वतः। ततो मां तत्त्वतो ज्ञात्वा विशते तदनन्तरम्॥"

transliteration: "bhaktyā māmabhijānāti yāvānyaścāsmi tattvataḥ | tato māṁ tattvato jñātvā viśate tadanantaram ||"

dhatu_breakdown:
