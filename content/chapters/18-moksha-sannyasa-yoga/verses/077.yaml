chapter: 18
verse: 77
speaker: sanjaya

sanskrit: "तच्च संस्मृत्य संस्मृत्य रूपमत्यद्भुतं हरेः। विस्मयो मे महान् राजन्हृष्यामि च पुनः पुनः॥"

transliteration: "tacca saṁsmṛtya saṁsmṛtya rūpamatyadbhutaṁ hareḥ | vismayo me mahān rājanhṛṣyāmi ca punaḥ punaḥ ||"

