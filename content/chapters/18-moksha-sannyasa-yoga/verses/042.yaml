chapter: 18
verse: 42
speaker: krishna

sanskrit: "शमो दमस्तपः शौचं क्षान्तिरार्जवमेव च। ज्ञानं विज्ञानमास्तिक्यं ब्रह्मकर्म स्वभावजम्॥"

transliteration: "śamo damastapaḥ śaucaṁ kṣāntirārjavameva ca | jñānaṁ vijñānamāstikyaṁ brahmakarma svabhāvajam ||"

dhatu_breakdown:
  - word: "शमः"
    parts: ["śam (to be calm, to grow quiet)"]
    meaning: "calmness, an inner quiet of the mind"
  - word: "दमः"
    parts: ["dam (to tame, to control)"]
    meaning: "self-control, mastery of the senses"
  - word: "तपः"
    parts: ["tap (to burn, to heat)"]
    meaning: "austerity, willing effort and discipline"
  - word: "शौचम्"
    parts: ["śuc (to be clean, to be pure)"]
    meaning: "purity, cleanness inside and out"
  - word: "क्षान्तिः"
    parts: ["kṣam (to endure, to be patient)"]
    meaning: "patience, the power to bear with things"
  - word: "आर्जवम्"
    parts: ["ṛju (straight, upright)"]
    meaning: "uprightness, straightness, honesty"
  - word: "एव"
    parts: ["eva (indeed, just)"]
    meaning: "indeed, truly"
  - word: "च"
    parts: ["ca (and)"]
    meaning: "and"
  - word: "ज्ञानम्"
    parts: ["jñā (to know)"]
    meaning: "knowledge, knowing the truth"
  - word: "विज्ञानम्"
    parts: ["vi (fully, apart)", "jñā (to know)"]
    meaning: "wisdom, deep realised understanding"
  - word: "आस्तिक्यम्"
    parts: ["asti (it is, there is)", "ka (-ness)"]
    meaning: "faith, the trust that the sacred truth is real"
  - word: "ब्रह्मकर्म"
    parts: ["brahman (the sacred, the vast Spirit)", "kṛ (to do, to act)"]
    meaning: "the work of a brāhmaṇa, the work of the seeker"
  - word: "स्वभावजम्"
    parts: ["sva (own)", "bhāva (nature)", "ja (born of)"]
    meaning: "born of one's own nature"

meaning: >
  Krishna names the work that flows naturally from a brāhmaṇa — a seeker of
  sacred truth: "Calmness of mind, control of the senses, willing discipline,
  purity, patience, uprightness, knowledge, deep wisdom, and faith — this is the
  work born of the brāhmaṇa's own nature." These are not chores but qualities of
  character. The seeker's real work is to become quiet, honest, patient, clean,
  and wise, and to keep faith in what is sacred — and to live so steadily that
  others can lean on that calm.

story:
  title: "Hari Uncle's Quiet Way"
  source: "modern"
  body: |
    Everyone in the village near Puri went to Hari Uncle when something was
    tangled.

    He was only a rice farmer — sun-browned, plain-spoken, his hands cracked
    from the fields — but the whole village treated him as something more.
    Aarav noticed it one afternoon when two fishermen came stamping up the
    path, furious over a torn net, shouting that the other was a thief.

    Hari Uncle did not shout back. He set down his tools, wiped his hands, and
    said, "Sit. Drink water first. Then talk, one at a time." His voice was so
    calm that the two angry men found themselves quieting down without quite
    knowing why.

    Aarav watched, fascinated, as Hari Uncle listened — really listened, without
    interrupting, without taking sides. He asked careful questions. He did not
    lie, not even a small kind lie to smooth things over; he said plainly what
    he thought was fair. And he was patient when one of the fishermen lost his
    temper again, simply waiting until the man ran out of steam. By the time the
    sun was low, the two were shaking hands.

    Later Aarav asked Dadu about it. "Hari Uncle grows rice, but everyone treats
    him like a wise man. Why?"

    Dadu nodded. "Because some people carry a certain kind of work inside them,"
    he said. "Not the work of their hands — the work of their character. Hari
    Uncle is calm when others are loud. He controls his temper. He keeps himself
    honest and clean. He is patient. He tells the truth even when a lie would be
    easier. He knows things, and more than that, he understands things. And he
    keeps faith that doing right matters. Krishna once listed exactly those
    qualities — calm, control, discipline, purity, patience, uprightness,
    knowledge, wisdom, faith — and called them the natural work of the seeker."

    "But he never went to a big school," said Aarav.

    "He didn't need one," said Dadu. "That kind of work isn't learned from
    books alone. It grows out of a person's own nature, the way rice grows out
    of good soil. Hari Uncle simply let his grow — quietly, every single day."

    Aarav looked down the path toward the rice fields, where the old farmer had
    already gone back to his work, and decided that quiet honesty was a thing
    worth growing.

reflection: "Hari Uncle's real work was calmness, patience, and honesty — not just farming. Which of these qualities — being calm, self-controlled, patient, honest, or trustworthy — would you most like to grow in yourself?"
