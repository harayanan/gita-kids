chapter: 18
verse: 11
speaker: krishna

sanskrit: "न हि देहभृता शक्यं त्यक्तुं कर्माण्यशेषतः। यस्तु कर्मफलत्यागी स त्यागीत्यभिधीयते॥"

transliteration: "na hi dehabhṛtā śakyaṁ tyaktuṁ karmāṇy aśeṣataḥ | yas tu karmaphalatyāgī sa tyāgīty abhidhīyate ||"

