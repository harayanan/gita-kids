chapter: 18
verse: 15

speaker: krishna

sanskrit: "शरीरवाङ्मनोभिर्यत्कर्म प्रारभते नरः। न्याय्यं वा विपरीतं वा पञ्चैते तस्य हेतवः॥"

transliteration: "śarīravāṅmanobhiryatkarma prārabhate naraḥ | nyāyyaṁ vā viparītaṁ vā pañcaite tasya hetavaḥ ||"

