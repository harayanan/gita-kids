    meaning: "O Partha — son of Pritha, a name for Arjuna"
  - word: "त्वया"
    parts: ["tvad (you)"]
    meaning: "by you"
  - word: "एकाग्रेण"
    parts: ["eka (one)", "agra (point, tip)"]
    meaning: "one-pointed, fully focused"
  - word: "चेतसा"
    parts: ["cit (to be aware, to think)"]
    meaning: "with the mind, with awareness"
  - word: "कच्चित्"
    parts: ["kaccid (whether? I hope?)"]
    meaning: "I hope that…?"
  - word: "अज्ञानसम्मोहः"
    parts: ["a (not)", "jñā (to know)", "sam (fully)", "muh (to be confused, deluded)"]
    meaning: "the deep confusion that comes from not-knowing"
  - word: "प्रनष्टः"
    parts: ["pra (completely)", "naś (to perish, to be destroyed)"]
    meaning: "destroyed, gone completely"
  - word: "ते"
    parts: ["yuṣmad (you)"]
    meaning: "of you, your"
  - word: "धनञ्जय"
    parts: ["dhana (wealth)", "ji (to win, to conquer)"]
    meaning: "O Dhananjaya — winner of wealth, a name for Arjuna"

meaning: >
  Now Krishna turns to Arjuna with a kind, careful question, the way a good
  teacher checks before closing the lesson. "Partha, did you hear all of this
  with a one-pointed, fully attentive mind? And tell me — has the deep
  confusion that came from not understanding, the fog that made you want to
  drop your bow, has it now been completely cleared away, Dhananjaya?" He does
  not assume. He asks gently, and waits.

story:
  title: "Now — Do You Understand?"
  source: "modern"
  body: |
    The lamp was out, but neither of them was sleepy yet. Aarav lay back on
    the mat, looking up at the dark rafters, while Dadu sat with his back
    against the cool wall. The long story was finished. The whole great
    teaching had been told, from the trembling on the chariot to the last
    secret whispered like a gift.

    For a while Dadu said nothing. He let the quiet settle, the way he let his
    net settle into the water before drawing it in. Then he spoke, and his
    voice was softer than usual, almost shy.

    "Aarav," he said, "I want to ask you something, and I want you to answer me
    truly — not the answer you think I want to hear. Did you really listen
    tonight? Not just with your ears. With all of you, gathered into one
    point, like a flame that does not flicker?"

    Aarav turned his head toward the dark shape of his grandfather. He
    remembered how, at the start of the evening, he had only been half there —
    one part of him still thinking about the kite he had lost on the beach, and
    whether Hari Uncle would let him ride the cart tomorrow. But somewhere in
    the middle of the story, all those scattered pieces of him had come
    together. He had listened with everything.

    "Yes, Dadu," he said. "I did. After a while I forgot about the kite. I
    forgot about everything else. There was just the story."

    Dadu nodded slowly in the dark. "And the muddle inside you," he went on,
    "the foggy feeling you came in with — you said this morning you didn't know
    what was right, that everything felt tangled. Is that fog still there? Or
    has it cleared?"

    Aarav was quiet, but it was a thinking quiet, not a stuck one. He searched
    inside himself the way you feel along a shelf in the dark. The tangle that
    had been there — the not-knowing, the heaviness — he could not find it.

    "It's gone, Dadu," he said, and he sounded surprised by his own answer.
    "It really is gone. I can see clearly now. Like the morning after a storm,
    when the whole sky is washed."

    Dadu smiled in the dark. This was the question every true teacher asks at
    the end, the question Krishna himself asked the archer: <em>Now — do you
    understand?</em> And the best answer is not loud. It is calm, and certain,
    and free.

reflection: "When someone teaches you something important, why might it matter that they ask whether you truly understood, instead of just assuming you did?"
