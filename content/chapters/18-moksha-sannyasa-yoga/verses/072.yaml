chapter: 18
verse: 72
speaker: krishna

sanskrit: "कच्चिदेतच्छ्रुतं पार्थ त्वयैकाग्रेण चेतसा। कच्चिदज्ञानसम्मोहः प्रनष्टस्ते धनञ्जय॥"

transliteration: "kaccidetacchrutaṁ pārtha tvayaikāgreṇa cetasā | kaccidajñānasammohaḥ pranaṣṭaste dhanañjaya ||"

dhatu_breakdown:
  - word: "कच्चित्"
    parts: ["kaccid (whether? I hope?)"]
    meaning: "I hope that…? — a tender, questioning word"
  - word: "एतत्"
