chapter: 18
verse: 24

speaker: krishna

sanskrit: "यत्तु कामेप्सुना कर्म साहङ्कारेण वा पुनः। क्रियते बहुलायासं तद्राजसमुदाहृतम्॥"

transliteration: "yattu kāmepsunā karma sāhaṅkāreṇa vā punaḥ | kriyate bahulāyāsaṁ tadrājasamudāhṛtam ||"

dhatu_breakdown:
  - word: "यत्"
    parts: ["yad (which)"]
    meaning: "that which"
  - word: "तु"
    parts: ["tu (but)"]
    meaning: "but, however"
  - word: "कामेप्सुना"
    parts: ["kāma (desire, craving)", "āp (to obtain)", "epsu (desiring to)"]
    meaning: "by one who craves to get what he desires"
  - word: "कर्म"
    parts: ["kṛ (to do)"]
    meaning: "action, deed"
  - word: "साहङ्कारेण"
    parts: ["sa (with)", "aham (I)", "kāra (making, doing)", "ahaṅkāra (ego, the 'I-maker')"]
    meaning: "with ego, with a proud 'look-what-I-did' feeling"
  - word: "वा"
    parts: ["vā (or)"]
    meaning: "or"
  - word: "पुनः"
    parts: ["punaḥ (again)"]
    meaning: "again, moreover"
  - word: "क्रियते"
    parts: ["kṛ (to do)"]
    meaning: "is done, is performed"
  - word: "बहुलायासम्"
    parts: ["bahula (much, abundant)", "ā (toward)", "yas (to strive, to labour)", "āyāsa (effort, strain, toil)"]
    meaning: "with great strain, with a lot of stressful effort"
  - word: "तत्"
    parts: ["tad (that)"]
    meaning: "that"
  - word: "राजसम्"
    parts: ["rajas (passion, restlessness)"]
    meaning: "rajasic, born of restless passion"
  - word: "उदाहृतम्"
    parts: ["ud (up, forth)", "ā (toward)", "hṛ (to carry)"]
    meaning: "is declared, is called"

meaning: >
  Krishna describes the restless, fiery kind of action. It is work driven
  by craving, done to grab what you want, puffed up with ego and the
  pride of "see what I did," and pushed through with enormous strain and
  stress. Action done with all that hunger, showing-off, and exhausting
  struggle is called rajasic, action born of restless passion.

story:
  title: "The King Who Built to the Sky"
  source: "mythological"
  body: |
    King Vena was not content to be remembered as a good king. He wanted to
    be remembered as the greatest king who had ever lived, and the only way
    he could imagine proving it was to build something taller, grander, and
    more dazzling than anyone had ever built before.

    "I will raise a tower," he declared, "so high that the gods themselves
    must look up to see its golden roof. When travelers from distant lands
    see it, they will say only one name — Vena, Vena, Vena."

    He did not build it for shelter. He did not build it for his people. He
    built it for the sound of his own name.

    The work began, and it was brutal. Vena drove his builders without rest.
    Thousands of workers hauled stone up wooden ramps under the burning sun.
    Whenever a level was finished, Vena would frown and shout, "Higher! It
    must go higher! What good is it if the king next door has a tower nearly
    this tall?" And so the strain doubled, and then doubled again. Backs
    bent, hands bled, and the king paced below, never satisfied, always
    craving one more cubit of height.

    Each evening Vena climbed the unfinished steps and surveyed the land. "I
    did this," he would say to himself, thumping his chest. "Not the masons,
    not the gods, not the years of others before me. I. Me. Vena." The
    bigger the tower grew, the bigger his "I" grew with it, until there was
    hardly room in his heart for anything else.

    A wandering sage paused at the foot of the great tower one day and
    watched the endless, frantic labour: the whips, the shouting, the
    exhausted workers, the king devouring himself with hunger for glory.

    "Such a mountain of effort," the sage murmured. "Such a furnace of
    wanting. And all of it spent to carve one small word, his own name,
    into the sky."

    The tower did rise very high. People did say "Vena, Vena." But the king
    was never once at peace. The moment one craving was fed, a hungrier one
    took its place, and the strain never ended, because a fire that burns
    for itself can never burn down to rest.

reflection: "Have you ever worked very hard at something mostly to be praised or to beat someone else? Did getting the praise actually make you feel calm and full, or did you soon want more?"
