chapter: 18
verse: 64
speaker: krishna

sanskrit: "सर्वगुह्यतमं भूयः शृणु मे परमं वचः। इष्टोऽसि मे दृढमिति ततो वक्ष्यामि ते हितम्॥"

transliteration: "sarvaguhyatamaṁ bhūyaḥ śṛṇu me paramaṁ vacaḥ | iṣṭo'si me dṛḍhamiti tato vakṣyāmi te hitam ||"

