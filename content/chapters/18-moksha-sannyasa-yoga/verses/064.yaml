meaning: >
  Krishna leans close and says, "Listen once more — this is the most secret
  thing of all, My highest word. I am not telling it to everyone. I am telling
  it to you, because you are very, very dear to Me. And because you are so dear,
  I will tell you the one thing that is truly good for you." It is the soft voice
  of a friend who has saved the best for last.

story:
  title: "Saved for the One I Love"
  source: "mythological"
  body: |
    The teaching had been long. Across the silent field of Kurukshetra,
    Krishna had spoken of duty and renunciation, of action and stillness,
    of the three colours that run through every heart. Arjuna had listened
    to all of it. He thought, perhaps, that there was nothing left to say.

    But Krishna turned to him now with a different look in his eyes. Not the
    look of a teacher at the front of a hall. The look of a friend who has
    walked a long road beside you and stops, at the very end, to tell you
    one last thing.

    "Arjuna," he said quietly, "lean close. There is something more."

    Arjuna leaned in. The horses had grown still. Even the wind over the
    plain seemed to hush itself to listen.

    "Of everything I have told you," Krishna went on, "this is the most
    secret of all. The deepest thing in My heart. I have kept it for the
    end, the way a mother keeps the sweetest fruit for the child she loves
    most."

    Arjuna's throat tightened. "Why tell it to me?" he whispered. "I am only
    a soldier with a shaking heart. I doubted. I wept. I wanted to run away."

    Krishna smiled, and it was the gentlest smile Arjuna had ever seen.

    "That is exactly why," he said. "Not because you are perfect. Because you
    are dear to Me. Firmly, deeply dear. You have been My friend through
    games and journeys and sorrows. And when you love someone, you do not
    give them clever words to impress them. You give them the one true thing
    that will help them most."

    He placed a hand over Arjuna's heart.

    "So hear it now, the way you would hear a secret from someone who has
    never once wished you harm. I am telling you this for one reason only:
    because it is good for you, and because you are mine."

    Arjuna closed his eyes. Around them the great army waited, the banners
    hung heavy, the war stood paused on the edge of the world. But in that
    small space between two friends, there was only love, and the soft sound
    of the most precious words being saved for the last.

reflection: "Has someone ever told you something important and said, 'I'm telling you this because I love you'? How did it feel to know the words were chosen just for you?"
