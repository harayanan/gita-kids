summary: >
  This is the grand finale! Krishna brings all his teachings together like the
  last chapter of an amazing book. He reminds Arjuna about duty, devotion,
  and knowledge. Then he says the most beautiful words — "I love you dearly,
  so I have shared this deepest wisdom with you. Now think about it carefully
  and do what your heart tells you." Arjuna's doubts vanish, and he picks up
  his bow, ready to face whatever comes.
