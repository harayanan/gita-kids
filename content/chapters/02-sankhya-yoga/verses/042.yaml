chapter: 2
verse: 42
speaker: krishna

sanskrit: "यामिमां पुष्पितां वाचं प्रवदन्त्यविपश्चितः। वेदवादरताः पार्थ नान्यदस्तीति वादिनः॥"

transliteration: "yāmimāṁ puṣpitāṁ vācaṁ pravadantyavipaścitaḥ | vedavādaratāḥ pārtha nānyadastīti vādinaḥ ||"

