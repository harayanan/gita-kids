chapter: 2
verse: 54
speaker: arjuna

sanskrit: "अर्जुन उवाच। स्थितप्रज्ञस्य का भाषा समाधिस्थस्य केशव। स्थितधीः किं प्रभाषेत किमासीत व्रजेत किम्॥"

transliteration: "arjuna uvāca | sthitaprajñasya kā bhāṣā samādhisthasya keśava | sthitadhīḥ kiṁ prabhāṣeta kimāsīta vrajeta kim ||"

