chapter: 2
verse: 8
speaker: arjuna

sanskrit: "न हि प्रपश्यामि ममापनुद्याद्यच्छोकमुच्छोषणमिन्द्रियाणाम्। अवाप्य भूमावसपत्नमृद्धं राज्यं सुराणामपि चाधिपत्यम्॥"

transliteration: "na hi prapaśyāmi mamāpanudyādyacchokamucchoṣaṇamindriyāṇām | avāpya bhūmāvasapatnamṛddhaṁ rājyaṁ surāṇāmapi cādhipatyam ||"

dhatu_breakdown:
