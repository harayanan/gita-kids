chapter: 2
verse: 36
speaker: krishna

sanskrit: "अवाच्यवादांश्च बहून्वदिष्यन्ति तवाहिताः। निन्दन्तस्तव सामर्थ्यं ततो दुःखतरं नु किम्॥"

transliteration: "avācyavādāṁśca bahūnvadiṣyanti tavāhitāḥ | nindantastava sāmarthyaṁ tato duḥkhataraṁ nu kim ||"

