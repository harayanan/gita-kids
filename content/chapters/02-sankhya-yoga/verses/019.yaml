chapter: 2
verse: 19
speaker: krishna

sanskrit: "य एनं वेत्ति हन्तारं यश्चैनं मन्यते हतम्। उभौ तौ न विजानीतो नायं हन्ति न हन्यते॥"

transliteration: "ya enaṁ vetti hantāraṁ yaścainaṁ manyate hatam | ubhau tau na vijānīto nāyaṁ hanti na hanyate ||"

