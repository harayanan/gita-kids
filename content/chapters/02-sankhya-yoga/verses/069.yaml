chapter: 2
verse: 69
speaker: krishna

sanskrit: "या निशा सर्वभूतानां तस्यां जागर्ति संयमी। यस्यां जाग्रति भूतानि सा निशा पश्यतो मुनेः॥"

transliteration: "yā niśā sarvabhūtānāṁ tasyāṁ jāgarti saṁyamī | yasyāṁ jāgrati bhūtāni sā niśā paśyato muneḥ ||"

