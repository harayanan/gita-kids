chapter: 2
verse: 33
speaker: krishna

sanskrit: "अथ चेत्त्वमिमं धर्म्यं सङ्ग्रामं न करिष्यसि। ततः स्वधर्मं कीर्तिं च हित्वा पापमवाप्स्यसि॥"

transliteration: "atha cettvamidaṁ dharmyaṁ saṅgrāmaṁ na kariṣyasi | tataḥ svadharmaṁ kīrtiṁ ca hitvā pāpamavāpsyasi ||"

