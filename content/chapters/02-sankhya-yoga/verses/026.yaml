chapter: 2
verse: 26
speaker: krishna

sanskrit: "अथ चैनं नित्यजातं नित्यं वा मन्यसे मृतम्। तथापि त्वं महाबाहो नैवं शोचितुमर्हसि॥"

transliteration: "atha cainaṁ nityajātaṁ nityaṁ vā manyase mṛtam | tathāpi tvaṁ mahābāho naivaṁ śocitumarhasi ||"

