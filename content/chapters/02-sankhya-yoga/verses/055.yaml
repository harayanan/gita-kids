chapter: 2
verse: 55
speaker: krishna

sanskrit: "श्रीभगवानुवाच। प्रजहाति यदा कामान्सर्वान्पार्थ मनोगतान्। आत्मन्येवात्मना तुष्टः स्थितप्रज्ञस्तदोच्यते॥"

transliteration: "śrībhagavānuvāca | prajahāti yadā kāmānsarvānpārtha manogatān | ātmanyevātmanā tuṣṭaḥ sthitaprajñastadocyate ||"

