chapter: 2
verse: 70
speaker: krishna

sanskrit: "आपूर्यमाणमचलप्रतिष्ठं समुद्रमापः प्रविशन्ति यद्वत्। तद्वत्कामा यं प्रविशन्ति सर्वे स शान्तिमाप्नोति न कामकामी॥"

transliteration: "āpūryamāṇamacalapratiṣṭhaṁ samudramāpaḥ praviśanti yadvat | tadvatkāmā yaṁ praviśanti sarve sa śāntimāpnoti na kāmakāmī ||"

