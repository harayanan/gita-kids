chapter: 2
verse: 72
speaker: krishna

sanskrit: "एषा ब्राह्मी स्थितिः पार्थ नैनां प्राप्य विमुह्यति। स्थित्वास्यामन्तकालेऽपि ब्रह्मनिर्वाणमृच्छति॥"

transliteration: "eṣā brāhmī sthitiḥ pārtha naināṁ prāpya vimuhyati | sthitvāsyāmantakāle'pi brahmanirvāṇamṛcchati ||"

