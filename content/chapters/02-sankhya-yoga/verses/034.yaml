chapter: 2
verse: 34
speaker: krishna

sanskrit: "अकीर्तिं चापि भूतानि कथयिष्यन्ति तेऽव्ययाम्। सम्भावितस्य चाकीर्तिर्मरणादतिरिच्यते॥"

transliteration: "akīrtiṁ cāpi bhūtāni kathayiṣyanti te'vyayām | sambhāvitasya cākīrtirmaraṇādatiricyate ||"

