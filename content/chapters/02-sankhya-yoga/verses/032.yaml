chapter: 2
verse: 32
speaker: krishna

sanskrit: "यदृच्छया चोपपन्नं स्वर्गद्वारमपावृतम्। सुखिनः क्षत्रियाः पार्थ लभन्ते युद्धमीदृशम्॥"

transliteration: "yadṛcchayā copapannaṁ svargadvāramapāvṛtam | sukhinaḥ kṣatriyāḥ pārtha labhante yuddhamīdṛśam ||"

