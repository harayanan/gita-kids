    parts: ["iti (thus, so — quotation marker)"]
    meaning: "thus (marking the end of the quoted words)"
  - word: "गोविन्दम्"
    parts: ["go (cows, senses)", "vid (to find, to know)"]
    meaning: "finder of cows, knower of senses — a name for Krishna"
