chapter: 2
verse: 9
speaker: sanjaya

sanskrit: "एवमुक्त्वा हृषीकेशं गुडाकेशः परन्तपः। न योत्स्य इति गोविन्दमुक्त्वा तूष्णीं बभूव ह॥"

transliteration: "evamuktvā hṛṣīkeśaṁ guḍākeśaḥ parantapaḥ | na yotsya iti govindamuktvā tūṣṇīṁ babhūva ha ||"

