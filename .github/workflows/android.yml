name: Build Android APK

# Phase 1: the app is a Remote WebView of https://gitakids.com, so this APK only
# needs rebuilding when the native shell / Capacitor config changes — not for
# content or image edits (those go live on the website automatically).
on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'www/**'
      - 'capacitor.config.ts'
      - 'package.json'
      - '.github/workflows/android.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0" >/dev/null

      - name: Install dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk gita-kids-debug.apk

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: gita-kids-debug-apk
          path: gita-kids-debug.apk

      - name: Publish to rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: Gita Kids — latest Android APK
          prerelease: true
          files: gita-kids-debug.apk
          body: |
            Debug APK (Remote WebView of gitakids.com) — sideload to test.
            Built from ${{ github.sha }} on ${{ github.run_number }}.
            Enable "Install unknown apps" for your browser/file manager, then open this APK.
